<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%220.9em%22 font-size=%2290%22>🎛️</text></svg>">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Control Center ✦</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* ── sleep-dashboard 同款色票 ── */
  --bg:#e8e4de;--bg2:#ede9e3;--card:#f4f1ec;
  --ink:#28261f;--sub:#55514a;--faint:#7a7570;
  --border:rgba(40,38,32,.09);--bstr:rgba(40,38,32,.16);
  --deep:#5c7a96;--rem:#8b7898;--core:#5e8f7e;--awake:#b08d62;--mental:#9e6b7a;
  --ok:#27ae60;--warn:#e67e22;--danger:#c0392b;
  --blur:blur(32px) saturate(160%);
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang TC',sans-serif;}
body{position:relative;}

/* ── BG Layer ── */
#bg-default{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 18% 22%,rgba(139,120,152,.14) 0%,transparent 52%),
    radial-gradient(ellipse at 82% 78%,rgba(92,122,150,.12) 0%,transparent 52%),
    radial-gradient(ellipse at 52% 48%,rgba(94,143,126,.07) 0%,transparent 45%),
    #e8e4de;
}
#bg-wallpaper{
  position:fixed;inset:0;z-index:1;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  opacity:0;transition:opacity .5s;
}
#bg-wallpaper.active{opacity:0.9;}
#noise{position:fixed;inset:0;z-index:2;opacity:.018;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size:128px;}

/* ── Clock & Header ── */
#header{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  padding-top:14vh;pointer-events:none;
}
#clock{
  font-size:min(14vw,112px);font-weight:100;letter-spacing:-5px;
  color:var(--ink);line-height:1;
  font-variant-numeric:tabular-nums;
}
#clock-sec{font-size:min(5vw,38px);font-weight:200;color:var(--faint);margin-left:2px;vertical-align:super;margin-top:10px;display:inline-block;}
#date-line{font-size:13px;color:var(--faint);margin-top:10px;letter-spacing:.05em;}
#greeting{font-size:13.5px;font-weight:400;color:var(--sub);margin-top:4px;letter-spacing:.12em;text-transform:uppercase;}

/* ── Guard Group ── */
#guard-group{
  position:fixed;bottom:18px;right:18px;z-index:10000;
  display:flex;align-items:center;gap:8px;
}
#guard-pill{
  display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:100px;
  background:rgba(244,241,236,.82);border:1px solid var(--bstr);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  font-size:12px;color:var(--sub);
  box-shadow:0 2px 12px rgba(40,38,32,.1),0 1px 0 rgba(255,255,255,.7) inset;
  cursor:pointer;user-select:none;transition:background .2s;
}
#guard-pill:hover{background:rgba(255,255,255,.9);}
#guard-stop-btn{
  display:none;align-items:center;gap:5px;padding:7px 13px;border-radius:100px;
  background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.25);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  font-size:11px;font-weight:600;color:var(--danger);
  box-shadow:0 2px 10px rgba(40,38,32,.08);
  cursor:pointer;font-family:inherit;transition:background .2s;
}
#guard-stop-btn:hover{background:rgba(192,57,43,.18);}
#guard-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);transition:background .5s;flex-shrink:0;}
#guard-dot.warn{background:var(--warn);}
#guard-dot.alert{background:var(--danger);animation:pulse-r 1s infinite;}

/* ── Settings Btn ── */
#settings-btn{
  position:fixed;top:22px;left:22px;z-index:50;
  width:36px;height:36px;border-radius:50%;
  background:rgba(244,241,236,.82);border:1px solid var(--bstr);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  color:var(--sub);font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(40,38,32,.1),0 1px 0 rgba(255,255,255,.7) inset;
  transition:background .2s;
}
#settings-btn:hover{background:rgba(255,255,255,.9);}
/* ── Dev Dashboard Btn（設定齒輪正右方，同大小同風格）── */
#dev-btn{
  position:fixed;top:22px;left:68px;z-index:50;
  width:36px;height:36px;border-radius:50%;
  background:rgba(244,241,236,.82);border:1px solid var(--bstr);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  color:var(--sub);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(40,38,32,.1),0 1px 0 rgba(255,255,255,.7) inset;
  transition:background .2s;
}
#dev-btn:hover{background:rgba(255,255,255,.9);}
/* ── Life Tracker Btn ── */
#lto-btn{
  position:fixed;top:68px;left:22px;z-index:50;
  width:36px;height:36px;border-radius:50%;
  background:rgba(244,241,236,.82);border:1px solid var(--bstr);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  color:var(--sub);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(40,38,32,.1),0 1px 0 rgba(255,255,255,.7) inset;
  transition:background .2s;text-decoration:none;
}
#lto-btn:hover{background:rgba(255,255,255,.9);}

/* ── NexusPortal lens panel ── */
#lto-panel{
  position:fixed;top:112px;left:22px;z-index:200;
  background:rgba(244,241,236,.98);border:1px solid var(--bstr);
  border-radius:14px;min-width:168px;overflow:hidden;
  box-shadow:0 8px 32px rgba(40,38,32,.16),0 1px 0 rgba(255,255,255,.8) inset;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  display:none;
}
#lto-panel.open{display:block;}
.lto-hd{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--faint);padding:10px 14px 8px;border-bottom:1px solid var(--border);}
.lto-row{display:flex;align-items:center;gap:10px;padding:9px 14px;
  text-decoration:none;color:var(--ink);font-size:12px;font-weight:500;
  transition:background .15s;cursor:pointer;}
.lto-row:hover{background:rgba(40,38,32,.06);}
.lto-row-ic{font-size:10px;color:var(--sub);width:12px;text-align:center;flex-shrink:0;line-height:1;}
.lto-sep{height:1px;background:var(--border);margin:4px 0;}

/* ── Lab button ── */
#lab-btn{
  position:fixed;top:114px;left:22px;z-index:50;
  width:36px;height:36px;border-radius:50%;
  background:rgba(244,241,236,.82);border:1px solid var(--bstr);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  color:var(--sub);font-size:15px;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(40,38,32,.1),0 1px 0 rgba(255,255,255,.7) inset;
  transition:background .2s;
}
#lab-btn:hover{background:rgba(255,255,255,.9);}
/* Lab overlay */
#lab-overlay{position:fixed;inset:0;z-index:800;background:rgba(40,38,32,.25);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;}
#lab-panel{background:rgba(244,241,236,.97);backdrop-filter:blur(40px) saturate(180%);border:.5px solid var(--bstr);border-radius:18px;width:min(93vw,600px);max-height:88vh;overflow:hidden;display:flex;box-shadow:0 20px 70px rgba(40,38,32,.18);animation:panel-in .22s cubic-bezier(.34,1.56,.64,1);}
#lab-sidebar{width:152px;flex-shrink:0;padding:22px 10px;border-right:.5px solid var(--bstr);background:rgba(255,255,255,.5);display:flex;flex-direction:column;gap:2px;}
#lab-content{flex:1;padding:22px;overflow-y:auto;}
/* Lab icons */
.lab-icon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.lab-app{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;text-decoration:none;}
.lab-app-box{width:52px;height:52px;border-radius:14px;background:rgba(94,143,126,.15);border:.5px solid var(--bstr);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 2px 8px rgba(40,38,32,.1);transition:transform .12s cubic-bezier(.34,1.56,.64,1);}
.lab-app-box:hover{transform:scale(1.1);}
.lab-app-lbl{font-size:10.5px;color:var(--sub);text-align:center;line-height:1.3;max-width:62px;word-break:break-word;}
.lab-inp{width:100%;padding:8px 10px;border-radius:9px;border:.5px solid var(--bstr);background:rgba(255,255,255,.6);color:var(--ink);font-size:13px;font-family:inherit;outline:none;transition:border .18s;}
.lab-inp:focus{border-color:var(--accent);}
.lab-add-btn{padding:8px 16px;border-radius:9px;background:var(--ink);color:var(--card);border:none;font-size:13px;font-family:inherit;cursor:pointer;transition:background .15s;}
.lab-add-btn:hover{background:#3a352e;}
.lab-emoji-btn{width:46px;height:38px;border-radius:9px;border:.5px solid var(--bstr);background:rgba(255,255,255,.6);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;}
.lab-emoji-btn:hover{background:rgba(255,255,255,.9);}
.lab-emoji-picker{display:none;position:absolute;z-index:100;background:rgba(244,241,236,.98);border:.5px solid var(--bstr);border-radius:12px;padding:8px;box-shadow:0 8px 30px rgba(40,38,32,.15);display:grid;grid-template-columns:repeat(5,1fr);gap:4px;width:194px;}
.lab-emoji-picker.hidden{display:none!important;}
.ep-opt{font-size:22px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;border:none;background:none;transition:background .12s;}
.ep-opt:hover{background:rgba(40,38,32,.08);}
/* Mobile lab card */
#lab-mobile-card{display:none;margin:16px 12px 0;padding:16px;background:rgba(244,241,236,.82);border:.5px solid var(--bstr);border-radius:18px;}

/* ── Dev Dashboard（開發概況）── */
#dev-overlay{position:fixed;inset:0;z-index:800;background:rgba(40,38,32,.25);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;}
#dev-panel{background:rgba(244,241,236,.97);backdrop-filter:blur(40px) saturate(180%);border:.5px solid var(--bstr);border-radius:18px;width:min(94vw,820px);max-height:88vh;overflow-y:auto;box-shadow:0 20px 70px rgba(40,38,32,.18);animation:panel-in .22s cubic-bezier(.34,1.56,.64,1);padding:24px;}
#dev-panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
#dev-panel-title{font-size:14px;font-weight:700;color:var(--ink);letter-spacing:.04em;}
#dev-panel-close{width:28px;height:28px;border-radius:50%;border:.5px solid var(--bstr);background:rgba(255,255,255,.6);color:var(--sub);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#dev-panel-close:hover{background:rgba(255,255,255,.9);}
#dev-panel-sub{font-size:10.5px;color:var(--faint);margin-bottom:18px;}
.dev-col-title{font-size:10px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.dev-section{margin-bottom:22px;}
.dev-section:last-child{margin-bottom:0;}
/* 時間軸：同一天聚合一列，左日期／右細節 */
.dev-timeline{display:flex;flex-direction:column;gap:0;max-height:280px;overflow-y:auto;padding-right:4px;}
.dev-tl-item{display:flex;gap:14px;padding:9px 4px;border-bottom:1px solid var(--border);}
.dev-tl-item:last-child{border-bottom:none;}
.dev-tl-date{flex-shrink:0;width:66px;font-size:10px;color:var(--faint);font-family:monospace;padding-top:2px;font-weight:700;}
.dev-tl-detail{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;}
.dev-tl-row{display:flex;gap:7px;align-items:baseline;flex-wrap:wrap;}
.dev-tl-proj{font-size:11px;font-weight:700;color:var(--deep);flex-shrink:0;}
.dev-tl-summary{font-size:11px;color:var(--sub);line-height:1.5;}
/* 熱點/使用頻率：並排兩欄 */
.dev-grid2{display:grid;grid-template-columns:1fr 1fr;gap:26px;}
@media(max-width:640px){.dev-grid2{grid-template-columns:1fr;}}
.dev-hotspots{display:flex;flex-direction:column;gap:11px;}
.dev-hot-row{display:flex;flex-direction:column;gap:4px;}
.dev-hot-lbl{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--ink);gap:6px;}
.dev-hot-name{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dev-hot-reason{font-size:9px;color:var(--faint);background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1px 7px;flex-shrink:0;white-space:nowrap;}
.dev-hot-count{color:var(--faint);font-family:monospace;flex-shrink:0;}
.dev-hot-bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.dev-hot-bar-fill{height:100%;background:var(--deep);border-radius:3px;}
.dev-use-bar-fill{height:100%;background:var(--core);border-radius:3px;}
#dev-empty{font-size:12px;color:var(--faint);text-align:center;padding:40px 0;}

/* ── Dock ── */
#dock-outer{
  position:fixed;bottom:18px;left:0;right:0;margin:0 auto;
  z-index:100;display:flex;flex-direction:column;align-items:center;gap:6px;
  width:max-content;max-width:calc(100vw - 24px);
}
#dock{overflow-x:auto;max-width:100%;}
#dock{
  display:flex;align-items:flex-end;gap:5px;
  padding:10px 16px 10px;
  background:rgba(244,241,236,.78);
  backdrop-filter:blur(50px) saturate(180%);
  -webkit-backdrop-filter:blur(50px) saturate(180%);
  border-radius:22px;
  border:.5px solid var(--bstr);
  box-shadow:0 8px 40px rgba(40,38,32,.12),0 1px 0 rgba(255,255,255,.8) inset;
}
.d-sep{
  width:.5px;height:38px;align-self:center;
  background:var(--bstr);margin:0 6px;flex-shrink:0;
}
.d-icon{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;position:relative;width:60px;
  transition:transform .12s cubic-bezier(.34,1.56,.64,1);
  will-change:transform;
}
.d-box{
  width:52px;height:52px;border-radius:13px;
  background:rgba(255,255,255,.88);
  border:.5px solid rgba(40,38,32,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;line-height:1;
  box-shadow:0 2px 10px rgba(40,38,32,.1),0 1px 0 rgba(255,255,255,.9) inset;
  transition:inherit;
}
.d-icon:active .d-box{transform:scale(.92);}
.d-lbl{
  font-size:9.5px;color:var(--faint);font-weight:500;
  white-space:nowrap;letter-spacing:.02em;
}

/* ── Lean Tooltip ── */
#tooltip{
  position:fixed;z-index:5000;pointer-events:none;
  background:rgba(244,241,236,.70);
  backdrop-filter:blur(24px) saturate(180%);
  border:.5px solid var(--bstr);
  border-radius:13px;
  padding:11px 14px;
  box-shadow:0 8px 32px rgba(40,38,32,.12);
  transition:opacity .12s,transform .12s;
}
#tooltip.tt-hide{opacity:0;transform:translateY(8px);}
.tt-head{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:9px;}
.tt-row{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:2px 0;}
.tt-k{font-size:11px;color:var(--faint);font-weight:600;}
.tt-v{font-size:12px;font-weight:600;color:var(--ink);}
.tt-v.g{color:#7d9e85;}.tt-v.a{color:#b09870;}.tt-v.r{color:#a87868;}
.tt-hr{height:.5px;background:var(--border);margin:7px 0;}
.tt-spark{font-size:11px;letter-spacing:1.5px;font-weight:600;}
.tt-adv{padding:2px 0;display:flex;gap:7px;align-items:baseline}
.tt-adv-k{font-size:10px;font-weight:700;color:var(--faint);white-space:nowrap;min-width:56px;letter-spacing:.02em}
.tt-adv-v{font-size:11.5px;color:var(--ink);line-height:1.4;flex:1}

/* ── Settings Modal ── */
#settings-overlay{
  position:fixed;inset:0;z-index:800;
  background:rgba(40,38,32,.25);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
}
#settings-panel{
  background:rgba(244,241,236,.97);
  backdrop-filter:blur(40px) saturate(180%);
  border:.5px solid var(--bstr);
  border-radius:18px;
  width:min(93vw,600px);max-height:88vh;
  overflow:hidden;display:flex;
  box-shadow:0 20px 70px rgba(40,38,32,.18);
  animation:panel-in .22s cubic-bezier(.34,1.56,.64,1);
}
@keyframes panel-in{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}

/* Settings sidebar */
#s-sidebar{
  width:152px;flex-shrink:0;padding:22px 10px;
  border-right:.5px solid var(--bstr);
  background:rgba(255,255,255,.5);
  display:flex;flex-direction:column;gap:2px;
}
#s-sidebar .s-cat{font-size:10px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:0 8px;margin-bottom:5px;margin-top:14px;}
#s-sidebar .s-cat:first-child{margin-top:0;}
.s-tab{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;
  font-size:13px;color:var(--sub);cursor:pointer;
  border:none;background:none;width:100%;text-align:left;font-family:inherit;
  transition:all .15s;
}
.s-tab:hover{background:rgba(40,38,32,.06);color:var(--ink);}
.s-tab.on{background:rgba(40,38,32,.09);color:var(--ink);font-weight:600;}
.s-tab-ic{font-size:15px;width:20px;text-align:center;}

/* Settings content */
#s-content{
  flex:1;padding:26px;overflow-y:auto;color:var(--ink);
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
#s-content::-webkit-scrollbar{width:4px;}
#s-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.s-title{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:22px;}
.s-sec{margin-bottom:22px;}
.s-lbl{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.09em;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.s-inp{
  width:100%;background:rgba(255,255,255,.75);border:.5px solid var(--bstr);
  border-radius:10px;padding:10px 13px;font-size:13px;color:var(--ink);
  font-family:inherit;outline:none;transition:border-color .2s,background .2s;
}
.s-inp:focus{border-color:var(--deep);background:#fff;}
.s-inp::placeholder{color:var(--faint);}
.s-btn{padding:10px 18px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;}
.s-btn-pr{background:var(--deep);color:#fff;}
.s-btn-pr:hover{background:#4e6a84;transform:translateY(-1px);}
.s-btn-g{background:rgba(40,38,32,.06);color:var(--sub);border:.5px solid var(--bstr);}
.s-btn-g:hover{background:rgba(40,38,32,.1);}
.s-row{display:flex;gap:8px;margin-bottom:10px;}

/* Wallpaper picker */
.wp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.wp-card{
  aspect-ratio:16/9;border-radius:10px;cursor:pointer;overflow:hidden;
  border:2px solid transparent;transition:all .2s;position:relative;
}
.wp-card:hover{border-color:var(--deep);transform:scale(1.03);}
.wp-card.active{border-color:var(--ink);}
.wp-card-name{position:absolute;bottom:0;left:0;right:0;padding:4px 7px;font-size:10px;color:rgba(255,255,255,.82);background:linear-gradient(transparent,rgba(40,38,32,.45));}
.wp-upload{
  aspect-ratio:16/9;border-radius:10px;border:2px dashed var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  cursor:pointer;color:var(--faint);font-size:11px;
  background:rgba(255,255,255,.4);transition:all .2s;
}
.wp-upload:hover{border-color:var(--deep);color:var(--sub);background:rgba(255,255,255,.7);}

/* Slider */

input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid var(--deep);box-shadow:0 2px 8px rgba(40,38,32,.15);}

/* ── Guard Overlay ── */
#guard-overlay{position:fixed;inset:0;z-index:9999;cursor:pointer;}
#cat-stage{position:absolute;inset:0;}
#big-cat{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#big-cat img{width:100%;height:100%;object-fit:cover;}
#big-cat svg{width:100%;height:100%;}

#cat-speech{display:none!important;}
#guard-ctrl{display:none!important;}
#guard-snooze-btn{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);font-size:.72rem;padding:8px 22px;border-radius:20px;border:.5px solid rgba(255,255,255,.25);background:rgba(0,0,0,.28);color:rgba(255,255,255,.75);cursor:pointer;z-index:10000;letter-spacing:.03em;white-space:nowrap;}

/* ── SAS Modal ── */

.m-ttl{font-size:19px;font-weight:700;color:var(--ink);margin-bottom:16px;}
.m-cls{float:right;background:rgba(40,38,32,.07);border:none;color:var(--faint);font-size:14px;width:26px;height:26px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.m-cls:hover{background:rgba(40,38,32,.14);color:var(--ink);}

.btn-pr{display:block;width:100%;padding:12px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;background:var(--deep);color:#fff;transition:all .18s;}
.btn-pr:hover{background:#4e6a84;transform:translateY(-1px);}

#dbg-btn{position:fixed;bottom:62px;right:20px;z-index:6000;background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);border-radius:100px;padding:8px 16px;font-size:11px;color:var(--danger);cursor:pointer;font-family:inherit;backdrop-filter:blur(16px);}

/* ── Sync Pill ── */
#sync-pill{

}
#sync-pill button:hover{background:rgba(40,38,32,.08);color:var(--ink);}
#sync-sep{width:.5px;height:14px;background:var(--bstr);margin:0 2px;flex-shrink:0;}
#sync-msg{

}
#sync-msg.show{opacity:1;transform:translateY(0);}

@keyframes pulse-r{0%,100%{opacity:1;}50%{opacity:.2;}}
@keyframes pulse-s{0%,100%{opacity:1;}50%{opacity:.35;}}
@keyframes bounce{0%{transform:translateY(0) scale(1);}30%{transform:translateY(-28px) scale(1.08);}60%{transform:translateY(-8px) scale(1.03);}100%{transform:translateY(0) scale(1);}}
.bouncing{animation:bounce .5s cubic-bezier(.34,1.56,.64,1)!important;}

/* LinkedIn not-set indicator */
.d-icon[data-unset="1"] .d-box{border:1.5px dashed var(--faint);background:rgba(255,255,255,.5);}

/* ── Mobile / Touch Responsive ── */
@media (pointer:coarse){
  /* Allow page scrolling */
  html,body{height:auto!important;overflow-y:auto!important;overflow-x:hidden!important;}

  /* Performance: kill backdrop-filter (GPU-heavy on mobile) */
  #dock,#guard-pill,#guard-stop-btn,#settings-btn,#lto-btn,#sync-pill{
    backdrop-filter:none!important;-webkit-backdrop-filter:none!important;
  }
  #guard-pill,#settings-btn,#lto-btn,#sync-pill{background:rgba(244,241,236,.96)!important;}

  /* Sync pill: raise above iOS gesture zone */
  #sync-pill{bottom:calc(22px + env(safe-area-inset-bottom,34px))!important;}

  /* Sync message: center bottom row, bottom edge aligned with pill buttons */
  #sync-msg{
    left:50%!important;
    bottom:calc(22px + env(safe-area-inset-bottom,34px))!important;
    transform:translateX(-50%) translateY(6px)!important;
    max-width:55vw;white-space:normal;text-align:center;z-index:501!important;
  }
  #sync-msg.show{transform:translateX(-50%) translateY(0)!important;}

  /* Header: in document flow */

  #clock{font-size:min(20vw,108px);}

  /* Dock: in document flow, grid layout */
  #dock-outer{

    display:flex;flex-direction:column;align-items:center;
  }
  #dock{
    display:grid!important;
    grid-template-columns:repeat(4,1fr);
    gap:10px;padding:14px;
    width:100%;max-width:400px;
    align-items:start;
  }
  .d-sep{display:none!important;}
  .d-icon{width:auto;}
  .d-box{width:52px;height:52px;}
  /* Mobile lab */
  #lab-btn{display:none!important;}
  /* Dev Dashboard 為 Mac 專屬入口，手機版隱藏，避免與 lto-btn 重疊 */
  #dev-btn{display:none!important;}
  #lto-btn{top:22px!important;left:66px!important;z-index:110!important;}
  #lto-panel{top:66px!important;left:22px!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;background:rgba(244,241,236,.99)!important;}

  #guard-snooze-btn{bottom:calc(env(safe-area-inset-bottom,0px) + 72px)!important;}

  /* Tooltip not usable on touch; hide it */
  #tooltip{display:none!important;}
}
</style>
</head>

function loadMentalData(){

    }))};
  }catch{}
}
function loadOptimizerData(){
  try{
    const rev=JSON.parse(localStorage.getItem('review_'+TODAY)||'{}');
    const tasks=JSON.parse(localStorage.getItem('tina_tasks')||'[]');
    const items=rev.items||[];
    const taskList=items.length>0
      ?items.map(t=>({text:t.name,done:t.status==='done'}))

let _liLastFetch=0;
function _notionHdr(token){return{'Authorization':'Bearer '+token,'Notion-Version':'2022-06-28','Content-Type':'application/json'};}
function _liCount(results){
  const counts={saved:0,applied:0,declined:0,contacted:0,interviewed:0,interviewed_titles:[],to_interviewed:0,to_interviewed_titles:[],abandoned:0};
  for(const pg of results){
    const sp=pg.properties?.Status||pg.properties?.status||Object.values(pg.properties||{}).find(p=>p.type==='status'||p.type==='select');
    const name=(sp?.status?.name||sp?.select?.name||'').trim();
    const s=name.toLowerCase();
    const _getTitle=()=>{
      const np=pg.properties?.Title??pg.properties?.Name??Object.values(pg.properties||{}).find(p=>p.type==='title');
      return np?.type==='rich_text'
        ?(np.rich_text||[]).map(r=>r.plain_text||'').join('').trim()
        :(np?.title||[]).map(r=>r.plain_text||'').join('').trim();
    };
    if(s==='saved only')counts.saved++;
    else if(s==='applied')counts.applied++;
    else if(s==='declined')counts.declined++;
    else if(s==='contacted')counts.contacted++;
    else if(s==='abandoned')counts.abandoned++;
    else if(s==='to be interviewed'){
      counts.to_interviewed++;
      const t=_getTitle();
      if(t)counts.to_interviewed_titles.push(t);
    }
    else if(s==='interviewed'){
      counts.interviewed++;
      const t=_getTitle();
      if(t)counts.interviewed_titles.push(t);
    }
    else if(s)console.log('[LinkedIn] unmatched status:',name);
  }
  return counts;
}
async function fetchNotionLinkedIn(){
  if(Date.now()-_liLastFetch<30000)return;
  _liLastFetch=Date.now();
  const token=localStorage.getItem('notion_token')||'';
  const rawId=(localStorage.getItem('notion_li_db')||'').replace(/-/g,'');
  if(!token||!rawId)return;
  const hdr=_notionHdr(token);
  try{
    // 1. Try direct database query
    const r=await fetch('https://corsproxy.io/?https://api.notion.com/v1/databases/'+rawId+'/query',
      {method:'POST',headers:hdr,body:JSON.stringify({page_size:100})});
    if(r.ok){
      const j=await r.json();
      if(j.results?.length>0)console.log('[LinkedIn] props:',Object.keys(j.results[0].properties||{}));
      const counts=_liCount(j.results||[]);
      console.log('[LinkedIn] counts',counts,'from',j.results.length,'pages');
      LIVE.linkedin=counts;localStorage.setItem(LI_KEY,JSON.stringify(counts));return;
    }
    const errTxt=await r.text().catch(()=>'{}');
    const err=JSON.parse(errTxt);
    console.warn('[LinkedIn] db query failed:',err.message||errTxt);

    // 2. Fallback: search API (works when db is a linked view)
    console.log('[LinkedIn] trying search API fallback…');
    const sr=await fetch('https://corsproxy.io/?https://api.notion.com/v1/search',
      {method:'POST',headers:hdr,body:JSON.stringify({filter:{property:'object',value:'page'},page_size:100})});
    if(!sr.ok){console.error('[LinkedIn] search also failed',sr.status);return;}
    const sj=await sr.json();
    // Filter pages that belong to our database
    const savedId=(localStorage.getItem('notion_li_db')||'').replace(/-/g,'');
    const dbPages=(sj.results||[]).filter(p=>{const pid=(p.parent?.database_id||'').replace(/-/g,'');return pid===rawId||pid===savedId;});
    if(dbPages.length===0){
      // Use all pages returned — user may have only one DB in the integration
      console.log('[LinkedIn] search returned',sj.results?.length,'total pages (unfiltered)');
      const all=_liCount(sj.results||[]);
      console.log('[LinkedIn] unfiltered counts',all);
      LIVE.linkedin=all;localStorage.setItem(LI_KEY,JSON.stringify(all));
    } else {
      const counts=_liCount(dbPages);
      console.log('[LinkedIn] search counts',counts,'from',dbPages.length,'pages');
      LIVE.linkedin=counts;localStorage.setItem(LI_KEY,JSON.stringify(counts));
    }
  }catch(e){console.error('[LinkedIn] fetch error',e);}
}
function fetchSleepData(){
  try{
    // Primary: read from localStorage (written by sleep_dashboard.html on load)
    const stored=JSON.parse(localStorage.getItem('sas_sleep_latest')||'null');
    const cp=parseInt(localStorage.getItem('sas_combat')||'0')||null;
    const cpSingle=parseInt(localStorage.getItem('sas_combat_single')||'0')||null;
    if(stored||cp){
      const deepP=stored?.deepP??0,remP=stored?.remP??0,coreP=stored?.coreP??0,awakeP=stored?.awakeP??0;
      const combatPower=cp??(()=>{
        // Recompute using sleep_dashboard formula if sas_combat missing
        const remScore=Math.min(remP/22.5*100,100);
        const deepScore=Math.min(deepP/18*100,100);
        return Math.round(deepScore*0.7+remScore*0.3);
      })();
      const trend7=stored?.trend7||[];
      LIVE.sleep={
        date:stored?.date||'—',deepP,remP,coreP,awakeP,
        combatPower,
        combatSingle:  stored?.combatSingle   ?? cpSingle,
        combatWeighted:stored?.combatWeighted ?? cp,
        nightsWeighted:stored?.nightsWeighted ?? 1,
        totalMin:  stored?.totalMin  ?? null,
        bedtime:   stored?.bedtime   ?? null,
        wake:      stored?.wake      ?? null,
        pace:combatPower>=80?'高效能 · 火力全開 🔥':combatPower>=70?'穩定輸出 ⚡':combatPower>=60?'注意 · 稍作保留 ⚠':'恢復優先 · 輕量任務 💤',
        endTime:localStorage.getItem('sas_endurance')||null,
        trend7
      };
    } else {
      // No localStorage data → user hasn't visited sleep dashboard yet
      LIVE.sleep=null;
    }
  }catch{}
}

function tick(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  const s=String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent=h+':'+m;
  document.getElementById('clock-sec').textContent=':'+s;
  const WD=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const yyyy=n.getFullYear(),mm=String(n.getMonth()+1).padStart(2,'0'),dd=String(n.getDate()).padStart(2,'0');
  document.getElementById('date-line').textContent=yyyy+'/'+mm+'/'+dd+' · '+WD[n.getDay()];
  const hr=n.getHours();
  document.getElementById('greeting').textContent=hr<5?'late night, get some rest 🌙':hr<12?'good morning ☀️':hr<17?'good afternoon 🌤':hr<21?'good evening 🌆':'late night 🌙';
}

// ── DOCK MAGNIFICATION ──
const dock=document.getElementById('dock');
function dockMag(e){
  dock.querySelectorAll('.d-icon').forEach(ic=>{
    const r=ic.getBoundingClientRect();
    const cx=r.left+r.width/2;
    const dist=Math.abs(e.clientX-cx);
    const maxD=120,maxS=0.58,maxY=22;
    if(dist<maxD){
      const f=1-dist/maxD;
      ic.style.transform=`translateY(${-(f*maxY)}px) scale(${1+f*maxS})`;
    } else {
      ic.style.transform='';
    }
  });
}
if(!window.matchMedia('(pointer:coarse)').matches){
  dock.addEventListener('mousemove',dockMag);
  dock.addEventListener('mouseleave',()=>dock.querySelectorAll('.d-icon').forEach(i=>i.style.transform=''));
}

    stats[id].count=(stats[id].count||0)+1;

    localStorage.setItem('cc_usage_stats',JSON.stringify(stats));
  }catch(e){}
}

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function row(k,v,c=''){return`<div class="tt-row"><span class="tt-k">${k}</span><span class="tt-v${c?' '+c:''}">${v}</span></div>`;}
function advRow(k,v){return`<div class="tt-adv"><span class="tt-adv-k">${k}</span><span class="tt-adv-v">${v}</span></div>`;}
function hr(){return`<div class="tt-hr"></div>`;}
function spark(vals){
  const B='▁▂▃▄▅▆▇█';
  if(!vals||!vals.length)return'';
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  return vals.map(v=>B[Math.round((v-mn)/rng*7)]).join('');
}

      const s=LIVE.sleep;
      const dot=(c)=>`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${c};margin-right:4px;vertical-align:middle;opacity:.85;"></span>`;
      let out=h('睡眠紀錄 · '+s.date);
      // 時長 + 起止
      if(s.totalMin){
        const durH=Math.floor(s.totalMin/60),durM=s.totalMin%60;
        const durStr=durH+'h'+(durM?durM+'m':'');
        out+=row('時長',durStr,durH>=7?'g':durH>=6?'a':'r');
      }
      if(s.bedtime&&s.wake) out+=row('起止',s.bedtime+' → '+s.wake);
      out+=hr();
      // 睡眠分期
      out+=row(dot('#8aabcc')+'Deep', s.deepP+'%', s.deepP>=18?'g':s.deepP>=12?'a':'r')
         +row(dot('#a898b8')+'REM',   s.remP+'%',  s.remP>=18?'g':s.remP>=12?'a':'r')
         +row(dot('#8fac94')+'Core',  s.coreP+'%')
         +row(dot('#c4aa7c')+'Awake', s.awakeP+'%',s.awakeP<=8?'g':s.awakeP<=15?'a':'r');
      // 近7日趨勢
      if(s.trend7&&s.trend7.length>2){
        const deepVals=s.trend7.map(n=>n.deepP);
        const remVals=s.trend7.map(n=>n.remP);
        const latestDeep=deepVals[deepVals.length-1],prevDeep=deepVals[deepVals.length-2];
        const latestRem=remVals[remVals.length-1],prevRem=remVals[remVals.length-2];
        const dArr=latestDeep>prevDeep?'↑':latestDeep<prevDeep?'↓':'→';
        const rArr=latestRem>prevRem?'↑':latestRem<prevRem?'↓':'→';
        out+=hr()
          +`<div style="font-size:9.5px;color:var(--faint);letter-spacing:.06em;margin-bottom:6px;">近${s.trend7.length}日趨勢</div>`
          +`<div class="tt-row"><span class="tt-k">${dot('#8aabcc')}Deep</span><span class="tt-v tt-spark" style="color:#8aabcc;">${spark(deepVals)}</span><span class="tt-v ${latestDeep>=18?'g':latestDeep>=12?'a':'r'}" style="font-size:10px;margin-left:4px;">${dArr}</span></div>`
          +`<div class="tt-row"><span class="tt-k">${dot('#a898b8')}REM</span><span class="tt-v tt-spark" style="color:#a898b8;">${spark(remVals)}</span><span class="tt-v ${latestRem>=18?'g':latestRem>=12?'a':'r'}" style="font-size:10px;margin-left:4px;">${rArr}</span></div>`;

    case 'mental':{

          out+=m.factors.map(f=>`<div style="font-size:10.5px;color:var(--sub);padding:1px 0 1px 4px;line-height:1.5;">· ${f}</div>`).join('');

    case 'optimizer':{

      if(!o)return h('優化器')+`<div style="font-size:11px;color:var(--faint);">讀取中…</div>`;

      if(o.tasks&&o.tasks.length){
        out+=`<div style="display:grid;grid-template-columns:14px 1fr;row-gap:5px;column-gap:7px;padding:2px 0;">`;
        for(const t of o.tasks){
          const dn=t.done||false;
          const lbl=(t.text||t.title||t.label||t.content||t.name||'').slice(0,24)||'—';
          out+=`<span style="font-size:10px;color:${dn?'#7d9e85':'#bbb'};text-align:center;line-height:1.5;">${dn?'✓':'○'}</span>`

        }
        out+=`</div>`;
      }
      return out;
    }
    case 'refueler':
      return h('今日攝取')+row('☕ 咖啡',rf.coffee+'杯',rf.coffee<=3?'g':rf.coffee<=4?'a':'r')+row('💧 水分',rf.water+'ml',rf.water>=2000?'g':rf.water>=1000?'a':'r');
    case 'report':

    case 'aitracker':{
      const ai=LIVE.aitracker;
      if(!ai)return'';
      if(!ai.hasNote)return h('AI 追蹤')+`<div style="font-size:11.5px;color:var(--warn);padding:3px 0;font-weight:500;">📝 今天還沒寫新聞筆記！</div>`;

    }
    case 'linkedin':{
      loadLinkedInData();
      fetchNotionLinkedIn();
      const li=LIVE.linkedin||{saved:0,applied:0,declined:0,contacted:0,interviewed:0,interviewed_titles:[],to_interviewed:0,to_interviewed_titles:[],abandoned:0};
      const hasData=li.saved||li.applied||li.declined||li.contacted||li.interviewed||li.to_interviewed||li.abandoned;
      const itvDone=(li.interviewed_titles||[]);
      const itvPending=(li.to_interviewed_titles||[]);

        +row('⭐ Saved',li.saved+'個')
        +row('📨 Applied',li.applied+'個',li.applied>0?'g':'')
        +row('💬 Contacted',li.contacted+'個',li.contacted>0?'g':'')
        +row('🗓 To Be Interviewed',li.to_interviewed+'個',li.to_interviewed>0?'g':'')
        +(itvPending.length?itvPending.map(t=>`<div style="font-size:11px;color:var(--ok);padding:1px 0 1px 10px;line-height:1.55;">· ${t.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`).join(''):'')
        +row('✅ Interviewed',li.interviewed+'個',li.interviewed>0?'g':'')
        +(itvDone.length?itvDone.map(t=>`<div style="font-size:11px;color:var(--ink);padding:1px 0 1px 10px;line-height:1.55;">· ${t.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`).join(''):'')
        +row('🚫 Declined',li.declined+'個',li.declined>0?'a':'')
        +row('💨 Abandoned',li.abandoned+'個',li.abandoned>0?'a':'')
        +(hasData?'':hr()+`<div style="font-size:10px;color:var(--faint);text-align:center;padding:2px 0;">正在從 Notion 同步…</div>`);
    }
    case 'oasis':{
      let saved=[];
      try{saved=JSON.parse(localStorage.getItem('oasis_saved')||'[]');}catch{}
      if(!saved.length)return h('🌿 Oasis')+`<div style="font-size:11px;color:var(--faint);padding:4px 0;">收藏夾是空的</div>`;
      const item=saved[Math.floor(Math.random()*saved.length)];
      const isZh=(item.lang==='zh');
      const quote=(item.quote||'').replace(/\n/g,' ').slice(0,80)+(item.quote&&item.quote.replace(/\n/g,' ').length>80?'…':'');
      const trans=(!isZh&&item.translation)?(item.translation||'').replace(/\n/g,' ').slice(0,60)+(item.translation&&item.translation.replace(/\n/g,' ').length>60?'…':''):'';
      const metaOrig=[item.title?`《${item.title}》`:'',item.author||''].filter(Boolean).join('　');
      const metaZh=!isZh?[item.title_zh?`《${item.title_zh}》`:'',item.author_zh||''].filter(Boolean).join('　'):'';
      const country=item.country||'';
      return h('🌿 Oasis')+
        (country?`<div style="font-size:10px;padding:2px 7px;border-radius:8px;background:var(--card);display:inline-block;margin-bottom:7px;color:var(--sub);">${country}</div>`+hr():'')+
        `<div style="font-size:12px;line-height:1.7;color:var(--ink);margin-bottom:6px;">${quote}</div>`+
        (trans?`<div style="font-size:11px;line-height:1.6;color:var(--sub);margin-bottom:6px;">${trans}</div>`:'')+
        hr()+
        `<div style="font-size:10.5px;color:var(--faint);">${metaOrig}</div>`+
        (metaZh?`<div style="font-size:10px;color:var(--faint);opacity:.75;">${metaZh}</div>`:'')+
        ((item.tags&&item.tags.length)?hr()+`<div style="font-size:10px;color:var(--faint);">${item.tags.map(t=>'#'+t).join('　')}</div>`:'');
    }
    case 'worship':{
      let wl=null;try{wl=JSON.parse(localStorage.getItem('worship_last')||'null');}catch{}
      if(!wl)return h('⛩️ Worship')+`<div style="font-size:11px;color:var(--faint);padding:4px 0;">尚無參拜紀錄，點擊新增</div>`;
      return h('⛩️ Worship')+row('最近參拜',esc(wl.temple))+row('日期',esc(wl.date)+(wl.time?' '+esc(wl.time):''),'g');
    }
    case 'astro':{
      let as=null;try{as=JSON.parse(localStorage.getItem('astro_settings')||'null');}catch{}
      const hasW=!!(as&&as.western);
      const hasV=(()=>{try{return JSON.parse(localStorage.getItem('astro_vedic_images')||'[]').length>0;}catch{return false;}})();
      if(!as||(!hasW&&!hasV))return h('⭐ Astro Bot')+`<div style="font-size:11px;color:var(--faint);padding:4px 0;">尚未設定星盤資料，點擊進入</div>`;
      // Try today's brief
      let brief=null;
      try{
        const b=JSON.parse(localStorage.getItem('astro_cc_brief')||'null');
        if(b){
          const _t=new Date();
          const ds=`${_t.getFullYear()}-${String(_t.getMonth()+1).padStart(2,'0')}-${String(_t.getDate()).padStart(2,'0')}`;
          if(b.date===ds)brief=b;
        }
      }catch{}
      if(!brief){
        return h('⭐ Astro Bot')+
          row('西洋星盤',hasW?'已設定':'未設定',hasW?'g':'')+
          row('印度星盤',hasV?`${JSON.parse(localStorage.getItem('astro_vedic_images')||'[]').length} 張`:'未設定',hasV?'g':'')+
          (as.name?row('對象',esc(as.name)):'')+
          hr()+
          `<div style="font-size:11px;color:var(--faint);padding:2px 0;">前往 Astro Bot 生成今日建議</div>`;
      }
      const _n=new Date();
      const dateLbl=`${_n.getMonth()+1}/${_n.getDate()}`;
      const monthLbl=`${_n.getMonth()+1}月`;
      let out=h(`⭐ Astro  ${monthLbl} & ${dateLbl}`);
      out+=`<div class="tt-head" style="margin-bottom:5px">本月</div>`;
      (brief.thisMonth||[]).forEach(l=>{const p=l.split('|');out+=advRow(esc((p[0]||l).trim()),esc((p[1]||'').trim()));});
      out+=hr();
      out+=`<div class="tt-head" style="margin-bottom:5px">${dateLbl}</div>`;
      (brief.today||[]).forEach(l=>{const p=l.split('|');const k=esc((p[0]||l).trim().replace(/^本日\s*/,dateLbl+' '));out+=advRow(k,esc((p[1]||'').trim()));});
      return out;
    }
    case 'english':{
      const lib=JSON.parse(localStorage.getItem('es_idiom_lib')||'[]');
      const saved=JSON.parse(localStorage.getItem('es_saved_phrases')||'[]');
      let out=ttHead('🎯 English Sandbox');
      out+=row('Small Talk','破冰接球 + AI 三階潤飾');
      out+=row('Idiom Arcade','道地片語克漏字拆彈');
      if(lib.length||saved.length){
        out+=hr();
        if(lib.length) out+=row('字庫',lib.length+' 個片語');
        if(saved.length) out+=row('精華句',saved.length+' 句收藏');
      }
      return out;
    }
    default:return'';
  }
}
document.addEventListener('mouseover',e=>{
  const ic=e.target.closest('.d-icon');
  if(!ic)return;
  clearTimeout(ttT);
  const c=buildTT(ic.dataset.id);
  if(!c){ttp.classList.add('tt-hide');return;}
  ttp.innerHTML=c;ttp.style.display='block';ttp.classList.remove('tt-hide');
  // Width = clock element's rendered width
  const clockRow=document.querySelector('#header > div:first-child');
  const cw=clockRow?Math.round(clockRow.getBoundingClientRect().width):200;
  ttp.style.width=cw+'px';
  // Center under clock
  const tw=ttp.offsetWidth||cw,th=ttp.offsetHeight||110;
  ttp.style.left=Math.round(window.innerWidth/2-tw/2)+'px';
  ttp.style.top=Math.round(window.innerHeight/2-th/2-40)+'px';
});
document.addEventListener('mouseout',e=>{
  if(!e.target.closest('.d-icon'))return;
  ttT=setTimeout(()=>{ttp.classList.add('tt-hide');setTimeout(()=>ttp.style.display='none',130);},70);
});

  document.querySelectorAll('.s-tab').forEach(b=>{
    b.classList.toggle('on',b.dataset.tab===curTab);

let gState='monitoring',cooldownEnd=null,cdIv=null;
function getGuardData(){try{return JSON.parse(localStorage.getItem(GS_KEY))||{};}catch{return{};}}
function getEffective(){
  const s=getGuardData();
  // Prefer live sleep-derived combat power, fallback to optimizer review, then default
  let stamina=LIVE.sleep?.combatPower??LIVE.optimizer?.combatPower??MOCK.opt.stamina;

function clearGuardSnooze(){
  localStorage.removeItem('guard_snooze_'+TODAY);

}
function snoozeGuard(){
  localStorage.setItem('guard_snooze_'+TODAY,'1');
  if(cdIv){clearInterval(cdIv);cdIv=null;}
  gState='monitoring';cooldownEnd=null;
  document.getElementById('guard-overlay').style.display='none';
  document.getElementById('guard-stop-btn').style.display='none';
  const dot=document.getElementById('guard-dot');
  const txt=document.getElementById('guard-txt');
  if(dot)dot.className='warn';
  if(txt)txt.textContent='Guard · 低戰力（今日靜默）';
}
function checkGuard(){
  if(gState==='alerting'||gState==='resting')return;
  if(gState==='cooldown'&&cooldownEnd&&Date.now()<cooldownEnd)return;
  const{stamina,endTime}=getEffective();
  const now=new Date();
  const[eh,em]=endTime.split(':').map(Number);
  const end=new Date();end.setHours(eh,em,0,0);
  const end2=new Date(end.getTime()+1*60*60*1000);
  const dot=document.getElementById('guard-dot');
  const txt=document.getElementById('guard-txt');
  const newDay=(now-end2)>8*60*60*1000;
  if(localStorage.getItem('guard_snooze_'+TODAY)){
    dot.className='warn';txt.textContent='Guard · 低戰力（今日靜默）';gState='monitoring';return;
  }
  // 體能續航觸發：繞過 newDay（日間指標，不受睡眠截止時間限制）
  const _enduranceStr=localStorage.getItem('sas_endurance');
  const pastEndurance=_enduranceStr&&(()=>{
    const[_h,_m]=_enduranceStr.split(':').map(Number);
    const _t=new Date();_t.setHours(_h,_m,0,0);return now>_t;
  })();
  if(pastEndurance){triggerGuard('endurance');}
  else if(!newDay&&(stamina<40||now>end2)){triggerGuard('low');}
  else if(stamina<60){dot.className='warn';txt.textContent='Guard · 注意';gState='monitoring';}
  else{dot.className='';txt.textContent='Guard · 監控中';gState='monitoring';}
}
function renderCatDisplay(){
  const url=localStorage.getItem('cc_cat_gif')||'';
  const el=document.getElementById('big-cat');
  if(url){
    el.style.fontSize='';
    el.innerHTML=`<img src="${url}" alt="🐱" onerror="this.innerHTML=CAT_SVG"/>`;
  } else {
    el.style.fontSize='';
    el.innerHTML=CAT_SVG;
  }
}
function triggerGuard(reason='low'){
  if(gState==='alerting'||gState==='resting')return;
  gState='alerting';
  const{stamina,endTime,workTime}=getEffective();
  const msgs=reason==='endurance'?'體能續航已結束，建議切換輕量任務或短暫休息 🔋'
    :stamina<40?'戰力剩 '+stamina+'%，需要充電了！':'已過 '+endTime+'，該歇歇了！';
  const cats=['喵！你已經工作很久了<br>是時候休息一下 🌿','喵嗚～戰力不足<br>先補充才能繼續 💪','本貓命令你休息！<br>健康比工作重要 🐱'];
  renderCatDisplay();
  const cat=document.getElementById('big-cat');
  cat.style.animation='none';void cat.offsetWidth;
  cat.style.animation='catRise 1.2s ease forwards';
  document.getElementById('guard-overlay').style.display='block';
  document.getElementById('guard-dot').className='alert';
  document.getElementById('guard-txt').textContent='執法中';
  document.getElementById('guard-stop-btn').style.display='flex';
  startBreak();
}
function startBreak(){
  gState='resting';
  const{workTime}=getEffective();
  if(cdIv)clearInterval(cdIv);
  let secs=workTime*60;
  const speech=document.getElementById('cat-speech');
  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  if(speech)speech.innerHTML=fmt(secs);
  cdIv=setInterval(()=>{
    secs--;
    if(speech)speech.innerHTML=fmt(secs);
    if(secs<=0){clearInterval(cdIv);endBreak();}
  },1000);
}
function endBreak(){
  if(cdIv){clearInterval(cdIv);cdIv=null;}
  const{skipDur}=getEffective();
  const skipMs=skipDur*60*1000;
  gState='cooldown';cooldownEnd=Date.now()+skipMs;
  document.getElementById('guard-overlay').style.display='none';
  document.getElementById('guard-dot').className='warn';
  document.getElementById('guard-txt').textContent=`Guard · ${skipDur}m cooldown`;
  document.getElementById('guard-stop-btn').style.display='none';
  setTimeout(()=>{gState='monitoring';checkGuard();},skipMs);
}
function forceStopGuard(){
  if(cdIv){clearInterval(cdIv);cdIv=null;}
  gState='monitoring';cooldownEnd=null;
  document.getElementById('guard-overlay').style.display='none';
  document.getElementById('guard-dot').className='';
  document.getElementById('guard-txt').textContent='Guard · 監控中';
  document.getElementById('guard-stop-btn').style.display='none';
}

async function syncUpload(){
  const pat=localStorage.getItem('gh_pat')||'';
  const gid=localStorage.getItem('gist_id')||'';
  if(!pat||!gid){showSyncMsg('請先在 API 設定填入 PAT 和 Gist ID',true);hideSyncMsg(3000);openSettings('api');return;}
  const btn=document.getElementById('sync-up');
  if(btn)btn.textContent='…';
  showSyncMsg('上傳中…');
  try{
    const nowStr=new Date().toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    localStorage.setItem('cc_last_sync',nowStr);
    const SKIP_KEYS=['gh_pat','gist_id','tina_groq','groq_key','groq_api_key','wordvault_groq_key','notion_token','do_gist_token','do_gist_id','wordvault_gist_token','wordvault_gist_id','gist_token','gist_id'];
    const PAT_RE=/ghp_[A-Za-z0-9]{10,}|ghs_[A-Za-z0-9]{10,}|github_pat_[A-Za-z0-9_]{10,}|gsk_[A-Za-z0-9]{10,}/;
    const snap={};
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(SKIP_KEYS.includes(k)||k.startsWith('gsk_'))continue;
      const v=localStorage.getItem(k)||'';
      if(PAT_RE.test(v))continue;
      if(v.length>200000)continue; // skip base64 images / custom wallpaper (too large for mobile localStorage)
      snap[k]=v;
    }
    const r=await fetch('https://api.github.com/gists/'+gid,{
      method:'PATCH',
      headers:{'Authorization':'Bearer '+pat,'Content-Type':'application/json','Accept':'application/vnd.github+json'},
      body:JSON.stringify({files:{'cc_sync.json':{content:JSON.stringify(snap)}}})
    });
    if(!r.ok){
      let msg='GitHub '+r.status;
      if(r.status===403){let b={};try{b=await r.json();}catch(_){}msg='403：PAT 請使用 Classic token 並勾選 gist scope（不支援 fine-grained token）。'+(b.message?b.message:'');}
      else if(r.status===404){msg='404：Gist ID 不存在或不屬於此帳號';}
      else if(r.status===401){msg='401：PAT 無效或已過期';}
      throw new Error(msg);
    }
    updateSyncTime();
    showSyncMsg('✓ 上傳完成（共 '+Object.keys(snap).length+' 個 key）');
    hideSyncMsg();
    if(btn){btn.textContent='✓';setTimeout(()=>{btn.textContent='↑';},1500);}
  }catch(e){
    console.error('[Sync] upload error',e);
    showSyncMsg('✗ '+e.message,true);
    hideSyncMsg(3500);
    if(btn){btn.textContent='!';setTimeout(()=>{btn.textContent='↑';},1500);}
  }
}
async function syncDownload(){
  const pat=(localStorage.getItem('gh_pat')||'').trim();
  const gid=(localStorage.getItem('gist_id')||'').replace(/\s/g,'');
  if(!pat||!gid){showSyncMsg('請先在 API 設定填入 PAT 和 Gist ID',true);hideSyncMsg(3000);openSettings('api');return;}
  if(!/^[a-f0-9]{20,}$/i.test(gid)){showSyncMsg('Gist ID 格式錯誤（'+gid.slice(0,8)+'…），請重新貼上',true);hideSyncMsg(4000);return;}
  const btn=document.getElementById('sync-dn');
  if(btn)btn.textContent='…';
  showSyncMsg('連線 Gist 中…');
  try{
    let r;
    try{r=await fetch('https://api.github.com/gists/'+gid,{headers:{'Authorization':'Bearer '+pat}});}
    catch(fe){throw new Error('網路錯誤 '+fe.message);}
    if(!r.ok)throw new Error('GitHub '+r.status+(r.status===401?' (PAT無效)':r.status===404?' (Gist ID錯誤)':''));
    const j=await r.json();
    const fileData=j.files?.['cc_sync.json'];
    if(!fileData)throw new Error('Gist 內找不到 cc_sync.json');
    showSyncMsg('還原資料中…');
    let content=fileData.content;
    if(fileData.truncated){
      let rawR;
      try{rawR=await fetch(fileData.raw_url);}
      catch(fe){throw new Error('讀取完整內容失敗 '+fe.message);}
      if(!rawR.ok)throw new Error('raw 內容取得失敗 '+rawR.status);
      content=await rawR.text();
    }
    let snap;
    try{snap=JSON.parse(content);}catch(e){throw new Error('資料格式錯誤：'+e.message);}
    if(!snap||typeof snap!=='object'||Array.isArray(snap))throw new Error('資料結構錯誤，請重新 Upload');
    const skipped=[];
    for(const[k,v] of Object.entries(snap)){
      if(v==null)continue;
      try{localStorage.setItem(k,v);}
      catch(e){if(e.name==='QuotaExceededError'){skipped.push(k);}else throw e;}
    }
    if(btn)btn.textContent='✓';
    if(skipped.length){
      alert('下載完成。以下 key 因超過裝置容量上限而略過：\n\n'+skipped.join('\n')+'\n\n（這些通常是圖片類資料，可在此裝置另行設定）');
    }
    showSyncMsg('✓ 下載完成，重新載入中…');
    setTimeout(()=>window.location.reload(),800);
  }catch(e){
    console.error('[Sync] download error',e);
    showSyncMsg('✗ 下載失敗：'+e.message+(e.name?'['+e.name+']':''),true);
    hideSyncMsg(3500);
    if(btn){btn.textContent='!';setTimeout(()=>{btn.textContent='↓';},1500);}
  }
}

async function genAstroBrief(){
  const key=localStorage.getItem(GROQ_KEY)||'';
  if(!key)return;
  let as=null;try{as=JSON.parse(localStorage.getItem('astro_settings')||'null');}catch{}
  if(!as||!as.western)return;
  const now=new Date();
  const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  try{const ex=JSON.parse(localStorage.getItem('astro_cc_brief')||'null');if(ex&&ex.date===todayStr)return;}catch{}
  const name=as.name||'你';
  const dayN=['日','一','二','三','四','五','六'];
  const todayD=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${dayN[now.getDay()]}）`;
  const monthD=`${now.getFullYear()}年${now.getMonth()+1}月`;
  const prompt=`你是精通現代西方占星學的占星師，深刻理解行星過境（Transits）與二次推運（Progressions）。\n\n以下是 ${name} 的西洋星盤資料：\n${as.western}\n\n針對今日 ${todayD} 和 ${monthD}，各給出 3-4 條簡短建議。以純 JSON 輸出，不加任何說明：\n{"today":["面向 | 建議（8-14字）",...],"month":["面向 | 建議（8-14字）",...]}`;
  try{
    const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],max_tokens:700,temperature:.7})});
    if(!resp.ok)return;
    const result=await resp.json();
    const text=result.choices?.[0]?.message?.content||'';
    const jm=text.match(/\{[\s\S]*\}/);
    if(!jm)return;
    const p=JSON.parse(jm[0]);
    if(!Array.isArray(p.today)||!Array.isArray(p.month))return;
    localStorage.setItem('astro_cc_brief',JSON.stringify({date:todayStr,today:p.today,thisMonth:p.month,ts:Date.now()}));
  }catch(e){}
}

    var editSep=document.getElementById('lto-edit-sep');
    if(editRow)editRow.style.display=isTouch?'none':'flex';
    if(editSep)editSep.style.display=isTouch?'none':'block';
  }
}
document.addEventListener('click',function(e){
  var p=document.getElementById('lto-panel');
  if(!p||!p.classList.contains('open'))return;
  var btn=document.getElementById('lto-btn');
  if(p.contains(e.target)||(btn&&btn.contains(e.target)))return;
  p.classList.remove('open');
});

  var isTouch=('ontouchstart' in window||navigator.maxTouchPoints>0);
  if(isTouch)return;
  var NP_KEY='?access=tina_nexus_2026_secure&lens=';
  document.querySelectorAll('#lto-panel .lto-lens').forEach(function(a){
    var lens=a.getAttribute('data-lens');
    if(lens)a.href='https://nexus-portal-epq.pages.dev/'+NP_KEY+lens;

})();

loadWP();
tick();setInterval(tick,1000);
checkGuard();setInterval(checkGuard,30000);
updateUnsetFlags();
initLiveData();
updateSyncTime();
document.addEventListener('keydown',e=>{if(e.shiftKey&&(e.key==='C'||e.key==='c'))debugTrigger();});

// ── 🧪 Lab ──
const LAB_KEY='cc_lab_projects';
const LAB_DEFAULT=[{name:'WordVault Kids',url:'https://resolutetinging.github.io/wordvault/wordvault-kids_v2.html',emoji:'🧒'}];
function labEsc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function getLabProjects(){try{const a=JSON.parse(localStorage.getItem(LAB_KEY));if(Array.isArray(a)&&a.length)return a;}catch(e){}return JSON.parse(JSON.stringify(LAB_DEFAULT));}
function saveLabProjects(a){localStorage.setItem(LAB_KEY,JSON.stringify(a));}
function openLab(){document.getElementById('lab-overlay').style.display='flex';switchLabTab('exp');}
function closeLab(){document.getElementById('lab-overlay').style.display='none';}
var _labTab='exp';
function switchLabTab(tab){
  _labTab=tab;
  document.querySelectorAll('#lab-sidebar .s-tab').forEach(b=>b.classList.remove('on'));
  const tb=document.getElementById('lab-tab-'+tab);if(tb)tb.classList.add('on');
  renderLabContent();
}
function renderLabContent(){
  const el=document.getElementById('lab-content');if(!el)return;
  const ps=getLabProjects();
  if(_labTab==='exp'){
    el.innerHTML=ps.length
      ?'<div class="lab-icon-grid">'+ps.map(p=>`<a class="lab-app" href="${labEsc(p.url)}" target="_blank" rel="noopener"><div class="lab-app-box">${p.emoji||'🔗'}</div><span class="lab-app-lbl">${labEsc(p.name)}</span></a>`).join('')+'</div>'
      :'<div style="color:var(--faint);font-size:.8rem;text-align:center;padding-top:40px">尚無專案，切換到「連結管理」新增。</div>';
  }else{
    const inp='style="width:100%;padding:8px 10px;border-radius:9px;border:.5px solid var(--bstr);background:rgba(255,255,255,.6);color:var(--ink);font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;display:block"';
    const EP_EMOJIS=['🌐','📱','💻','🚀','⚡','💡','🎯','🎨','📚','📊','🎵','🌊','✨','🏆','🎮','🧩','📝','🌟','🔮','🌱'];
    el.innerHTML=`<div style="margin-bottom:14px">
      <div style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:10px">新增專案</div>
      <input id="lab-new-name" ${inp} placeholder="名稱（如：WordVault Kids）" oninput="labAutoEmoji(this.value)">
      <input id="lab-new-url" ${inp} placeholder="URL（如：https://...）">
      <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;position:relative">
        <button class="lab-emoji-btn" id="lab-ep-btn" onclick="labTogglePicker(event)" title="選擇 Emoji">🌐</button>
        <div class="lab-emoji-picker hidden" id="lab-ep-picker">
          ${EP_EMOJIS.map(e=>`<button class="ep-opt" onclick="labPickEmoji('${e}')">${e}</button>`).join('')}
        </div>
        <button class="lab-add-btn" onclick="addLabProject()">➕ 新增</button>
      </div>
    </div>
    <div style="border-top:.5px solid var(--bstr);padding-top:12px">
      <div style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:8px">已存專案</div>
      ${ps.length?ps.map((p,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--border)">
        <span style="font-size:20px;flex-shrink:0">${p.emoji||'🔗'}</span>
        <div style="flex:1;min-width:0"><div style="font-size:.8rem;font-weight:600;color:var(--ink)">${labEsc(p.name)}</div><div style="font-size:.65rem;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${labEsc(p.url)}</div></div>
        <button onclick="deleteLabProject(${i})" style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--faint);padding:4px;border-radius:6px;transition:color .15s" title="刪除">🗑️</button>
      </div>`).join(''):'<div style="color:var(--faint);font-size:.8rem">尚無專案。</div>'}
    </div>`;
  }
}
var _labEmoji='🌐';
function labTogglePicker(e){
  e.stopPropagation();
  const p=document.getElementById('lab-ep-picker');if(!p)return;
  p.classList.toggle('hidden');
  // 點外面關閉
  if(!p.classList.contains('hidden')){
    setTimeout(()=>document.addEventListener('click',function h(){p.classList.add('hidden');document.removeEventListener('click',h);},{once:true}),0);
  }
}
function labPickEmoji(emoji){
  _labEmoji=emoji;
  const btn=document.getElementById('lab-ep-btn');if(btn)btn.textContent=emoji;
  const p=document.getElementById('lab-ep-picker');if(p)p.classList.add('hidden');
}
function labAutoEmoji(name){
  const n=name.toLowerCase();
  const map=[
    [/word|vocab|dict|英文/,'📚'],[/kid|child|兒童|小孩/,'🧒'],[/sleep|睡/,'😴'],
    [/music|song|音樂/,'🎵'],[/game|遊戲/,'🎮'],[/ai|tracker|追蹤/,'🔬'],
    [/mental|mood|情緒/,'🌱'],[/dash|stat|chart|報告/,'📊'],[/art|design|設計/,'🎨'],
    [/oasis|relax|放鬆/,'🌊'],[/star|worship|星/,'🌟'],[/optimizer|排程/,'⚡'],
    [/hub|center|中心/,'💻'],[/note|記錄/,'📝']
  ];
  for(const[rx,em]of map){if(rx.test(n)){labPickEmoji(em);return;}}
  // 無匹配時不覆蓋，保留目前選擇
}
function addLabProject(){
  const name=(document.getElementById('lab-new-name').value||'').trim();
  const url=(document.getElementById('lab-new-url').value||'').trim();
  const emoji=_labEmoji||'🌐';
  if(!name||!url){alert('請輸入名稱與網址');return;}
  const ps=getLabProjects();ps.push({name,url,emoji});saveLabProjects(ps);
  _labEmoji='🌐';
  renderLabContent();renderLabMobile();
}
function deleteLabProject(i){
  const ps=getLabProjects();ps.splice(i,1);saveLabProjects(ps);
  renderLabContent();renderLabMobile();
}
function renderLabMobile(){
  const el=document.getElementById('lab-mobile-grid');if(!el)return;
  const ps=getLabProjects();
  el.innerHTML=ps.map(p=>`<a class="lab-app" href="${labEsc(p.url)}" target="_blank" rel="noopener"><div class="lab-app-box">${p.emoji||'🔗'}</div><span class="lab-app-lbl">${labEsc(p.name)}</span></a>`).join('');
}
renderLabMobile();

// ── Dev Dashboard（開發概況）──
function openDevDashboard(){
  document.getElementById('dev-overlay').style.display='flex';
  renderDevDashboard();
}
function closeDevDashboard(){document.getElementById('dev-overlay').style.display='none';}
function renderDevDashboard(){
  const subEl=document.getElementById('dev-panel-sub');
  const bodyEl=document.getElementById('dev-panel-body');
  if(!bodyEl)return;
  bodyEl.innerHTML='<div id="dev-empty">讀取中…</div>';
  fetch('data/dev_log.json?v='+Date.now())
    .then(r=>{if(!r.ok)throw new Error('讀取失敗');return r.json();})
    .then(d=>{
      const tl=d.timeline||[];
      const hs=d.hotspots||[];
      const reasonLabels=d.reason_labels||{};
      if(subEl)subEl.textContent='開發紀錄更新至 '+esc(d.generated_through||'—');

      // ── 開發履歷時間軸：同一天聚合一列，同一天內同一專案也合併一行 ──
      const byDate={};const dateOrder=[];
      tl.forEach(it=>{
        if(!byDate[it.date]){byDate[it.date]={};dateOrder.push(it.date);}
        const proj=it.project||it.file||'';
        if(!byDate[it.date][proj])byDate[it.date][proj]=[];
        byDate[it.date][proj].push(it.summary||'');
      });
      const tlHtml=dateOrder.length
        ?'<div class="dev-timeline">'+dateOrder.map(date=>{
          const projects=byDate[date];
          const rows=Object.keys(projects).map(proj=>`<div class="dev-tl-row"><span class="dev-tl-proj">${esc(proj)}</span><span class="dev-tl-summary">${projects[proj].map(esc).join('＋')}</span></div>`).join('');
          return `<div class="dev-tl-item">
            <div class="dev-tl-date">${esc(date)}</div>
            <div class="dev-tl-detail">${rows}</div>
          </div>`;
        }).join('')+'</div>'
        :'<div id="dev-empty">尚無時間軸資料</div>';

      // ── 組件熱點監測：橫條 + top1 修改原因徽章 ──
      const maxCount=Math.max(1,...hs.map(h=>h.count||0));
      const hsHtml=hs.length
        ?'<div class="dev-hotspots">'+hs.map(h=>{
          const pct=Math.round((h.count||0)/maxCount*100);
          const rl=reasonLabels[h.top_reason];
          const reasonBadge=rl?`<span class="dev-hot-reason">${esc(rl.emoji||'')} ${esc(rl.label||h.top_reason||'')}</span>`:'';
          return `<div class="dev-hot-row">
            <div class="dev-hot-lbl"><span class="dev-hot-name">${esc(h.project||h.file||'')}</span>${reasonBadge}<span class="dev-hot-count">${h.count||0}</span></div>
            <div class="dev-hot-bar-track"><div class="dev-hot-bar-fill" style="width:${pct}%"></div></div>
          </div>`;
        }).join('')+'</div>'
        :'<div id="dev-empty">尚無熱點資料</div>';

      // ── 使用頻率：讀本機 localStorage（Dock 點擊即時累計，非 fetch）──
      let usage=[];
      try{
        const stats=JSON.parse(localStorage.getItem('cc_usage_stats')||'{}');
        usage=Object.keys(stats).map(k=>({label:stats[k].label||k,count:stats[k].count||0})).sort((a,b)=>b.count-a.count);
      }catch(e){}
      const maxUse=Math.max(1,...usage.map(u=>u.count||0));
      const useHtml=usage.length
        ?'<div class="dev-hotspots">'+usage.map(u=>{
          const pct=Math.round((u.count||0)/maxUse*100);
          return `<div class="dev-hot-row">
            <div class="dev-hot-lbl"><span class="dev-hot-name">${esc(u.label)}</span><span class="dev-hot-count">${u.count}</span></div>
            <div class="dev-hot-bar-track"><div class="dev-use-bar-fill" style="width:${pct}%"></div></div>
          </div>`;
        }).join('')+'</div>'
        :'<div id="dev-empty">尚無使用紀錄，從 Dock 點各 App 開始累積</div>';

      bodyEl.innerHTML=`
        <div class="dev-section">
          <div class="dev-col-title">開發履歷時間軸</div>
          ${tlHtml}
        </div>
        <div class="dev-grid2">
          <div class="dev-section">
            <div class="dev-col-title">Component Hotspots · Dev Activity</div>
            ${hsHtml}
          </div>
          <div class="dev-section">
            <div class="dev-col-title">使用頻率（本機 Dock 點擊次數）</div>
            ${useHtml}
          </div>
        </div>`;
    })
    .catch(e=>{
      bodyEl.innerHTML='<div id="dev-empty">讀取失敗：'+esc(e.message)+'</div>';
    });
}
</script>
<script src="cc_autosync.js"></script>
