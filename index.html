// ── LIVE DATA (populated async on load) ──
let LIVE={sleep:null,mental:null,optimizer:null,aitracker:null,linkedin:null};

function loadMentalData(){
  try{
    const db=JSON.parse(localStorage.getItem('wellness_v5')||'{}');
    const es=(db.entries||[]).filter(e=>e.timestamp&&e.timestamp.slice(0,10)===TODAY);
    LIVE.mental={entries:es.map(e=>({
      time:e.timestamp?e.timestamp.slice(11,16):'',
      score:e.moodScore,
      factors:(e.impactFactors||[]).map(f=>f.detail||f.category||'').filter(Boolean)
    }))};
  }catch{}
}
function loadOptimizerData(){
  try{
    const rev=JSON.parse(localStorage.getItem('review_'+TODAY)||'{}');
    const tasks=JSON.parse(localStorage.getItem('tina_tasks')||'[]');
    const items=rev.items||[];
    const taskList=items.length>0
      ?items.map(t=>({text:t.name,done:t.status==='done'}))
      :tasks;
    const done=items.length>0?items.filter(t=>t.status==='done').length:tasks.filter(t=>t.done).length;
    const total=items.length>0?items.length:tasks.length;
    LIVE.optimizer={total,done,rest:rev.restMode||false,combatPower:rev.combatPower!=null?+rev.combatPower:null,endTime:rev.endTime||null,tasks:taskList};
  }catch{}
}
function loadAITrackerData(){

}
function loadLinkedInData(){
  try{LIVE.linkedin=JSON.parse(localStorage.getItem(LI_KEY)||'null');}catch{}
}
let _liLastFetch=0;
function _notionHdr(token){return{'Authorization':'Bearer '+token,'Notion-Version':'2022-06-28','Content-Type':'application/json'};}
function _liCount(results){
  const counts={saved:0,applied:0,declined:0,contacted:0,interviewed:0,interviewed_titles:[],to_interviewed:0,to_interviewed_titles:[],abandoned:0};
  for(const pg of results){
    const sp=pg.properties?.Status||pg.properties?.status||Object.values(pg.properties||{}).find(p=>p.type==='status'||p.type==='select');
    const name=(sp?.status?.name||sp?.select?.name||'').trim();
    const s=name.toLowerCase();
    const _getTitle=()=>{
      const np=pg.properties?.Title??pg.properties?.Name??Object.values(pg.properties||{}).find(p=>p.type==='title');
      return np?.type==='rich_text'
        ?(np.rich_text||[]).map(r=>r.plain_text||'').join('').trim()
        :(np?.title||[]).map(r=>r.plain_text||'').join('').trim();
    };
    if(s==='saved only')counts.saved++;
    else if(s==='applied')counts.applied++;
    else if(s==='declined')counts.declined++;
    else if(s==='contacted')counts.contacted++;
    else if(s==='abandoned')counts.abandoned++;
    else if(s==='to be interviewed'){
      counts.to_interviewed++;
      const t=_getTitle();
      if(t)counts.to_interviewed_titles.push(t);
    }
    else if(s==='interviewed'){
      counts.interviewed++;
      const t=_getTitle();
      if(t)counts.interviewed_titles.push(t);
    }
    else if(s)console.log('[LinkedIn] unmatched status:',name);
  }
  return counts;
}
async function fetchNotionLinkedIn(){
  if(Date.now()-_liLastFetch<30000)return;
  _liLastFetch=Date.now();
  const token=localStorage.getItem('notion_token')||'';
  const rawId=(localStorage.getItem('notion_li_db')||'').replace(/-/g,'');
  if(!token||!rawId)return;
  const hdr=_notionHdr(token);
  try{
    // 1. Try direct database query
    const r=await fetch('https://corsproxy.io/?https://api.notion.com/v1/databases/'+rawId+'/query',
      {method:'POST',headers:hdr,body:JSON.stringify({page_size:100})});
    if(r.ok){
      const j=await r.json();
      if(j.results?.length>0)console.log('[LinkedIn] props:',Object.keys(j.results[0].properties||{}));
      const counts=_liCount(j.results||[]);
      console.log('[LinkedIn] counts',counts,'from',j.results.length,'pages');
      LIVE.linkedin=counts;localStorage.setItem(LI_KEY,JSON.stringify(counts));return;
    }
    const errTxt=await r.text().catch(()=>'{}');
    const err=JSON.parse(errTxt);
    console.warn('[LinkedIn] db query failed:',err.message||errTxt);

    // 2. Fallback: search API (works when db is a linked view)
    console.log('[LinkedIn] trying search API fallback…');
    const sr=await fetch('https://corsproxy.io/?https://api.notion.com/v1/search',
      {method:'POST',headers:hdr,body:JSON.stringify({filter:{property:'object',value:'page'},page_size:100})});
    if(!sr.ok){console.error('[LinkedIn] search also failed',sr.status);return;}
    const sj=await sr.json();
    // Filter pages that belong to our database
    const savedId=(localStorage.getItem('notion_li_db')||'').replace(/-/g,'');
    const dbPages=(sj.results||[]).filter(p=>{const pid=(p.parent?.database_id||'').replace(/-/g,'');return pid===rawId||pid===savedId;});
    if(dbPages.length===0){
      // Use all pages returned — user may have only one DB in the integration
      console.log('[LinkedIn] search returned',sj.results?.length,'total pages (unfiltered)');
      const all=_liCount(sj.results||[]);
      console.log('[LinkedIn] unfiltered counts',all);
      LIVE.linkedin=all;localStorage.setItem(LI_KEY,JSON.stringify(all));
    } else {
      const counts=_liCount(dbPages);
      console.log('[LinkedIn] search counts',counts,'from',dbPages.length,'pages');
      LIVE.linkedin=counts;localStorage.setItem(LI_KEY,JSON.stringify(counts));
    }
  }catch(e){console.error('[LinkedIn] fetch error',e);}
}
function fetchSleepData(){
  try{
    // Primary: read from localStorage (written by sleep_dashboard.html on load)
    const stored=JSON.parse(localStorage.getItem('sas_sleep_latest')||'null');
    const cp=parseInt(localStorage.getItem('sas_combat')||'0')||null;
    const cpSingle=parseInt(localStorage.getItem('sas_combat_single')||'0')||null;
    if(stored||cp){
      const deepP=stored?.deepP??0,remP=stored?.remP??0,coreP=stored?.coreP??0,awakeP=stored?.awakeP??0;
      const combatPower=cp??(()=>{
        // Recompute using sleep_dashboard formula if sas_combat missing
        const remScore=Math.min(remP/22.5*100,100);
        const deepScore=Math.min(deepP/18*100,100);
        return Math.round(deepScore*0.7+remScore*0.3);
      })();
      const trend7=stored?.trend7||[];
      LIVE.sleep={
        date:stored?.date||'—',deepP,remP,coreP,awakeP,
        combatPower,
        combatSingle:  stored?.combatSingle   ?? cpSingle,
        combatWeighted:stored?.combatWeighted ?? cp,
        nightsWeighted:stored?.nightsWeighted ?? 1,
        totalMin:  stored?.totalMin  ?? null,
        bedtime:   stored?.bedtime   ?? null,
        wake:      stored?.wake      ?? null,
        pace:combatPower>=80?'高效能 · 火力全開 🔥':combatPower>=70?'穩定輸出 ⚡':combatPower>=60?'注意 · 稍作保留 ⚠':'恢復優先 · 輕量任務 💤',
        endTime:localStorage.getItem('sas_endurance')||null,
        trend7
      };
    } else {
      // No localStorage data → user hasn't visited sleep dashboard yet
      LIVE.sleep=null;
    }
  }catch{}
}

// ── DOCK MAGNIFICATION ──
const dock=document.getElementById('dock');
function dockMag(e){
  dock.querySelectorAll('.d-icon').forEach(ic=>{
    const r=ic.getBoundingClientRect();
    const cx=r.left+r.width/2;
    const dist=Math.abs(e.clientX-cx);
    const maxD=120,maxS=0.58,maxY=22;
    if(dist<maxD){
      const f=1-dist/maxD;
      ic.style.transform=`translateY(${-(f*maxY)}px) scale(${1+f*maxS})`;
    } else {
      ic.style.transform='';
    }
  });
}
if(!window.matchMedia('(pointer:coarse)').matches){
  dock.addEventListener('mousemove',dockMag);
  dock.addEventListener('mouseleave',()=>dock.querySelectorAll('.d-icon').forEach(i=>i.style.transform=''));
}

  if(cdIv){clearInterval(cdIv);cdIv=null;}
  gState='monitoring';cooldownEnd=null;
  document.getElementById('guard-overlay').style.display='none';
  document.getElementById('guard-stop-btn').style.display='none';
  const dot=document.getElementById('guard-dot');
  const txt=document.getElementById('guard-txt');
  if(dot)dot.className='warn';
  if(txt)txt.textContent='Guard · 低戰力（今日靜默）';
}
function checkGuard(){
  if(gState==='alerting'||gState==='resting')return;
  if(gState==='cooldown'&&cooldownEnd&&Date.now()<cooldownEnd)return;
  const{stamina,endTime}=getEffective();
  const now=new Date();
  const[eh,em]=endTime.split(':').map(Number);
  const end=new Date();end.setHours(eh,em,0,0);
  const end2=new Date(end.getTime()+1*60*60*1000);
  const dot=document.getElementById('guard-dot');
  const txt=document.getElementById('guard-txt');
  const newDay=(now-end2)>8*60*60*1000;
  if(localStorage.getItem('guard_snooze_'+TODAY)){
    dot.className='warn';txt.textContent='Guard · 低戰力（今日靜默）';gState='monitoring';return;
  }
  // 體能續航觸發：繞過 newDay（日間指標，不受睡眠截止時間限制）
  const _enduranceStr=localStorage.getItem('sas_endurance');
  const pastEndurance=_enduranceStr&&(()=>{
    const[_h,_m]=_enduranceStr.split(':').map(Number);
    const _t=new Date();_t.setHours(_h,_m,0,0);return now>_t;
  })();
  if(pastEndurance){triggerGuard('endurance');}
  else if(!newDay&&(stamina<40||now>end2)){triggerGuard('low');}
  else if(stamina<60){dot.className='warn';txt.textContent='Guard · 注意';gState='monitoring';}
  else{dot.className='';txt.textContent='Guard · 監控中';gState='monitoring';}
}

  if(url){

    el.innerHTML=`<img src="${url}" alt="🐱" onerror="this.innerHTML=CAT_SVG"/>`;
  } else {
    el.style.fontSize='';

}
function triggerGuard(reason='low'){
  if(gState==='alerting'||gState==='resting')return;
  gState='alerting';
  const{stamina,endTime,workTime}=getEffective();
  const msgs=reason==='endurance'?'體能續航已結束，建議切換輕量任務或短暫休息 🔋'
    :stamina<40?'戰力剩 '+stamina+'%，需要充電了！':'已過 '+endTime+'，該歇歇了！';
  const cats=['喵！你已經工作很久了<br>是時候休息一下 🌿','喵嗚～戰力不足<br>先補充才能繼續 💪','本貓命令你休息！<br>健康比工作重要 🐱'];
  renderCatDisplay();
  const cat=document.getElementById('big-cat');
  cat.style.animation='none';void cat.offsetWidth;
  cat.style.animation='catRise 1.2s ease forwards';
  document.getElementById('guard-overlay').style.display='block';
  document.getElementById('guard-dot').className='alert';
  document.getElementById('guard-txt').textContent='執法中';
  document.getElementById('guard-stop-btn').style.display='flex';
  startBreak();
}
function startBreak(){
  gState='resting';
  const{workTime}=getEffective();
  if(cdIv)clearInterval(cdIv);
  let secs=workTime*60;
  const speech=document.getElementById('cat-speech');
  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  if(speech)speech.innerHTML=fmt(secs);
  cdIv=setInterval(()=>{
    secs--;
    if(speech)speech.innerHTML=fmt(secs);
    if(secs<=0){clearInterval(cdIv);endBreak();}
  },1000);
}
function endBreak(){
  if(cdIv){clearInterval(cdIv);cdIv=null;}
  const{skipDur}=getEffective();
  const skipMs=skipDur*60*1000;
  gState='cooldown';cooldownEnd=Date.now()+skipMs;
  document.getElementById('guard-overlay').style.display='none';
  document.getElementById('guard-dot').className='warn';
  document.getElementById('guard-txt').textContent=`Guard · ${skipDur}m cooldown`;
  document.getElementById('guard-stop-btn').style.display='none';
  setTimeout(()=>{gState='monitoring';checkGuard();},skipMs);
}
function forceStopGuard(){
  if(cdIv){clearInterval(cdIv);cdIv=null;}
  gState='monitoring';cooldownEnd=null;
  document.getElementById('guard-overlay').style.display='none';
  document.getElementById('guard-dot').className='';
  document.getElementById('guard-txt').textContent='Guard · 監控中';
  document.getElementById('guard-stop-btn').style.display='none';
}

async function syncUpload(){
  const pat=localStorage.getItem('gh_pat')||'';
  const gid=localStorage.getItem('gist_id')||'';
  if(!pat||!gid){showSyncMsg('請先在 API 設定填入 PAT 和 Gist ID',true);hideSyncMsg(3000);openSettings('api');return;}
  if(!window.ccSyncCore){showSyncMsg('✗ cc_autosync.js 未載入，無法同步',true);hideSyncMsg(3500);return;}
  const btn=document.getElementById('sync-up');
  if(btn)btn.textContent='…';
  showSyncMsg('上傳中…');
  try{
    // 共用 cc_autosync.js 核心：白名單快照＋大型 key 分塊（不再有 200K 靜默跳過）
    const sum=await window.ccSyncCore.uploadFull();
    updateSyncTime();
    let msg='✓ 上傳完成（共 '+sum.keyCount+' 個 key';
    if(sum.bigKeys.length)msg+='，含 '+sum.bigKeys.length+' 個大型 key 分塊';
    msg+='）';
    if(sum.skippedBig.length)msg+='；略過無法分塊：'+sum.skippedBig.join('、');
    showSyncMsg(msg);
    hideSyncMsg(sum.skippedBig.length?4500:2600);
    if(btn){btn.textContent='✓';setTimeout(()=>{btn.textContent='↑';},1500);}
  }catch(e){
    let m=e.message||'';
    if(m.indexOf('全量同步進行中')>-1){
      showSyncMsg('⏳ 自動備份正在進行，稍候幾秒再按即可');
      hideSyncMsg(2600);
      if(btn)btn.textContent='↑';
      return;
    }
    console.error('[Sync] upload error',e);
    if(m.indexOf('403')>-1)m='403：PAT 請使用 Classic token 並勾選 gist scope（不支援 fine-grained token）';
    showSyncMsg('✗ '+m,true);
    hideSyncMsg(3500);
    if(btn){btn.textContent='!';setTimeout(()=>{btn.textContent='↑';},1500);}
  }
}
async function syncDownload(){
  const pat=(localStorage.getItem('gh_pat')||'').trim();
  const gid=(localStorage.getItem('gist_id')||'').replace(/\s/g,'');
  if(!pat||!gid){showSyncMsg('請先在 API 設定填入 PAT 和 Gist ID',true);hideSyncMsg(3000);openSettings('api');return;}
  if(!/^[a-f0-9]{20,}$/i.test(gid)){showSyncMsg('Gist ID 格式錯誤（'+gid.slice(0,8)+'…），請重新貼上',true);hideSyncMsg(4000);return;}
  const btn=document.getElementById('sync-dn');
  if(btn)btn.textContent='…';
  showSyncMsg('連線 Gist 中…');
  try{
    let r;
    try{r=await fetch('https://api.github.com/gists/'+gid,{headers:{'Authorization':'Bearer '+pat}});}
    catch(fe){throw new Error('網路錯誤 '+fe.message);}
    if(!r.ok)throw new Error('GitHub '+r.status+(r.status===401?' (PAT無效)':r.status===404?' (Gist ID錯誤)':''));
    const j=await r.json();
    const fileData=j.files?.['cc_sync.json'];
    if(!fileData)throw new Error('Gist 內找不到 cc_sync.json');
    showSyncMsg('還原資料中…');
    let content=fileData.content;
    if(fileData.truncated){
      let rawR;
      try{rawR=await fetch(fileData.raw_url);}
      catch(fe){throw new Error('讀取完整內容失敗 '+fe.message);}
      if(!rawR.ok)throw new Error('raw 內容取得失敗 '+rawR.status);
      content=await rawR.text();
    }
    let snap;
    try{snap=JSON.parse(content);}catch(e){throw new Error('資料格式錯誤：'+e.message);}
    if(!snap||typeof snap!=='object'||Array.isArray(snap))throw new Error('資料結構錯誤，請重新 Upload');
    const MANIFEST_KEY='__cc_manifest';
    const skipped=[];
    for(const[k,v] of Object.entries(snap)){
      if(v==null||k===MANIFEST_KEY)continue;
      try{localStorage.setItem(k,v);}
      catch(e){if(e.name==='QuotaExceededError'){skipped.push(k);}else throw e;}
    }
    // 大型 key 分塊還原（cc_big__ 檔案，由 __cc_manifest 索引）
    const incomplete=[];let bigRestored=0;
    let manifest={};
    try{manifest=JSON.parse(snap[MANIFEST_KEY]||'{}');}catch(e){manifest={};}
    for(const[bk,info] of Object.entries(manifest)){
      if(!info||!Array.isArray(info.names)){incomplete.push(bk);continue;}
      showSyncMsg('還原大型資料 '+bk+' 中…');
      let val='',ok=true;
      for(const name of info.names){
        const f=j.files?.[name];
        if(!f){ok=false;break;}
        let c=f.content;
        if(f.truncated){
          try{const rr=await fetch(f.raw_url);if(!rr.ok)throw 0;c=await rr.text();}
          catch(e){ok=false;break;}
        }
        val+=c;
      }
      if(!ok){incomplete.push(bk);continue;}
      try{localStorage.setItem(bk,val);bigRestored++;}
      catch(e){if(e.name==='QuotaExceededError'){skipped.push(bk);}else throw e;}
    }
    if(bigRestored)try{localStorage.setItem('cc_big_manifest',snap[MANIFEST_KEY]||'{}');}catch(e){}
    if(btn)btn.textContent='✓';
    if(skipped.length||incomplete.length){
      let warn='下載完成。';
      if(skipped.length)warn+='\n\n以下 key 因超過裝置容量上限而略過：\n'+skipped.join('\n');
      if(incomplete.length)warn+='\n\n以下大型 key 分塊不完整，未還原（請在來源裝置重新上傳）：\n'+incomplete.join('\n');
      alert(warn);
    }
    showSyncMsg('✓ 下載完成，重新載入中…');
    setTimeout(()=>window.location.reload(),800);
  }catch(e){
    console.error('[Sync] download error',e);
    showSyncMsg('✗ 下載失敗：'+e.message+(e.name?'['+e.name+']':''),true);
    hideSyncMsg(3500);
    if(btn){btn.textContent='!';setTimeout(()=>{btn.textContent='↓';},1500);}
  }
}

  const n=name.toLowerCase();
  const map=[
    [/word|vocab|dict|英文/,'📚'],[/kid|child|兒童|小孩/,'🧒'],[/sleep|睡/,'😴'],
    [/music|song|音樂/,'🎵'],[/game|遊戲/,'🎮'],[/ai|tracker|追蹤/,'🔬'],
    [/mental|mood|情緒/,'🌱'],[/dash|stat|chart|報告/,'📊'],[/art|design|設計/,'🎨'],
    [/oasis|relax|放鬆/,'🌊'],[/star|worship|星/,'🌟'],[/optimizer|排程/,'⚡'],
    [/hub|center|中心/,'💻'],[/note|記錄/,'📝']
  ];
  for(const[rx,em]of map){if(rx.test(n)){labPickEmoji(em);return;}}
  // 無匹配時不覆蓋，保留目前選擇
}
function addLabProject(){
  const name=(document.getElementById('lab-new-name').value||'').trim();
  const url=(document.getElementById('lab-new-url').value||'').trim();
  const emoji=_labEmoji||'🌐';
  if(!name||!url){alert('請輸入名稱與網址');return;}
  const ps=getLabProjects();ps.push({name,url,emoji});saveLabProjects(ps);
  _labEmoji='🌐';
  renderLabContent();renderLabMobile();
}
function deleteLabProject(i){
  const ps=getLabProjects();ps.splice(i,1);saveLabProjects(ps);
  renderLabContent();renderLabMobile();
}
function renderLabMobile(){
  const el=document.getElementById('lab-mobile-grid');if(!el)return;
  const ps=getLabProjects();
  el.innerHTML=ps.map(p=>`<a class="lab-app" href="${labEsc(p.url)}" target="_blank" rel="noopener"><div class="lab-app-box">${p.emoji||'🔗'}</div><span class="lab-app-lbl">${labEsc(p.name)}</span></a>`).join('');
}
renderLabMobile();

// ── 使用時間追蹤已抽出至 cc_track.js（見 </body> 前 <script src="cc_track.js"> 標籤）──

// ── Dev Dashboard（開發概況）──
function openDevDashboard(){
  document.getElementById('dev-overlay').style.display='flex';
  renderDevDashboard();
}
function closeDevDashboard(){document.getElementById('dev-overlay').style.display='none';}
function renderDevDashboard(){
  const subEl=document.getElementById('dev-panel-sub');
  const bodyEl=document.getElementById('dev-panel-body');
  if(!bodyEl)return;
  bodyEl.innerHTML='<div id="dev-empty">讀取中…</div>';
  fetch('data/dev_log.json?v='+Date.now())
    .then(r=>{if(!r.ok)throw new Error('讀取失敗');return r.json();})
    .then(d=>{
      const tl=d.timeline||[];
      const hs=d.hotspots||[];
      const reasonLabels=d.reason_labels||{};
      if(subEl)subEl.textContent='開發紀錄更新至 '+esc(d.generated_through||'—');

      // ── 開發履歷時間軸：同一天聚合一列，同一天內同一專案也合併一行 ──
      function weekdayZh(dateStr){
        const wd=['日','一','二','三','四','五','六'];
        const d=new Date(dateStr+'T12:00:00');
        return isNaN(d)?'':`(${wd[d.getDay()]})`;
      }
      const byDate={};const dateOrder=[];
      tl.forEach(it=>{
        if(!byDate[it.date]){byDate[it.date]={};dateOrder.push(it.date);}
        const proj=it.project||it.file||'';
        if(!byDate[it.date][proj])byDate[it.date][proj]=[];
        byDate[it.date][proj].push(it.summary||'');
      });
      const tlHtml=dateOrder.length
        ?'<div class="dev-timeline">'+dateOrder.map(date=>{
          const projects=byDate[date];
          const rows=Object.keys(projects).map(proj=>`<div class="dev-tl-row"><span class="dev-tl-proj">${esc(proj)}</span><span class="dev-tl-summary">${projects[proj].map(esc).join('＋')}</span></div>`).join('');
          return `<div class="dev-tl-item">
            <div class="dev-tl-date">${esc(date)}<br>${esc(weekdayZh(date))}</div>
            <div class="dev-tl-detail">${rows}</div>
          </div>`;
        }).join('')+'</div>'
        :'<div id="dev-empty">尚無時間軸資料</div>';

      // ── 組件熱點監測：橫條 + top1 修改原因徽章 ──
      const maxCount=Math.max(1,...hs.map(h=>h.count||0));
      const hsHtml=hs.length
        ?'<div class="dev-hotspots">'+hs.map(h=>{
          const pct=Math.round((h.count||0)/maxCount*100);
          const rl=reasonLabels[h.top_reason];
          const reasonBadge=rl?`<span class="dev-hot-reason">${esc(rl.emoji||'')} ${esc(rl.label||h.top_reason||'')}</span>`:'';
          return `<div class="dev-hot-row">
            <div class="dev-hot-lbl"><span class="dev-hot-name">${esc(h.project||h.file||'')}</span>${reasonBadge}<span class="dev-hot-count">${h.count||0}</span></div>
            <div class="dev-hot-bar-track"><div class="dev-hot-bar-fill" style="width:${pct}%"></div></div>
          </div>`;
        }).join('')+'</div>'
        :'<div id="dev-empty">尚無熱點資料</div>';

      // ── 使用頻率：讀本機 localStorage 累積停留時間（各頁面前景累計 ms，非 fetch）──
      function fmtMs(ms){
        const totalMin=Math.round(ms/60000);
        if(totalMin<1)return'<1min';
        const h=Math.floor(totalMin/60),m=totalMin%60;
        return h>0?`${h}h ${m}m`:`${m}min`;
      }
      let usage=[];
      try{
        const stats=JSON.parse(localStorage.getItem('cc_usage_stats')||'{}');
        usage=Object.keys(stats).map(k=>({label:stats[k].label||k,ms:stats[k].ms||0})).filter(u=>u.ms>0).sort((a,b)=>b.ms-a.ms);
      }catch(e){}
      const maxUse=Math.max(1,...usage.map(u=>u.ms||0));
      const useHtml=usage.length
        ?'<div class="dev-hotspots">'+usage.map(u=>{
          const pct=Math.round((u.ms||0)/maxUse*100);
          return `<div class="dev-hot-row">
            <div class="dev-hot-lbl"><span class="dev-hot-name">${esc(u.label)}</span><span class="dev-hot-count">${fmtMs(u.ms)}</span></div>
            <div class="dev-hot-bar-track"><div class="dev-use-bar-fill" style="width:${pct}%"></div></div>
          </div>`;
        }).join('')+'</div>'
        :'<div id="dev-empty">尚無使用紀錄，開啟各 App 停留即開始累積</div>';

      bodyEl.innerHTML=`
        <div class="dev-section">
          <div class="dev-col-title">開發履歷時間軸</div>
          ${tlHtml}
        </div>
        <div class="dev-grid2">
          <div class="dev-section">
            <div class="dev-col-title">Component Hotspots · Dev Activity</div>
            ${hsHtml}
          </div>
          <div class="dev-section">
            <div class="dev-col-title">使用頻率（累積停留時間）</div>
            ${useHtml}
          </div>
        </div>`;
    })
    .catch(e=>{
      bodyEl.innerHTML='<div id="dev-empty">讀取失敗：'+esc(e.message)+'</div>';
    });
}
</script>
