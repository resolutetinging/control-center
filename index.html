<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Control Center ✦</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#5ED47A;--amber:#F5C542;--red:#FF6B6B;
  --glass:rgba(255,255,255,.16);--glass-b:rgba(255,255,255,.28);
  --blur:blur(40px) saturate(180%);
  --shadow:0 8px 40px rgba(0,0,0,.28);
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang TC',sans-serif;}
body{position:relative;}

/* ── BG Layer ── */
#bg-default{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 20% 20%,rgba(120,80,200,.45) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 75%,rgba(40,130,200,.4) 0%,transparent 55%),
    radial-gradient(ellipse at 55% 50%,rgba(200,80,120,.2) 0%,transparent 45%),
    linear-gradient(150deg,#0d0d1a 0%,#141428 50%,#0a1a2e 100%);
}
#bg-wallpaper{
  position:fixed;inset:0;z-index:1;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  opacity:0;transition:opacity .5s;
}
#bg-wallpaper.active{opacity:1;}
#noise{position:fixed;inset:0;z-index:2;opacity:.025;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size:128px;}

/* ── Clock & Header ── */
#header{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  padding-top:15vh;pointer-events:none;
}
#clock{
  font-size:min(14vw,110px);font-weight:100;letter-spacing:-4px;
  color:#fff;line-height:1;
  font-variant-numeric:tabular-nums;
  text-shadow:0 2px 40px rgba(0,0,0,.4);
}
#clock-sec{font-size:min(5vw,38px);font-weight:200;color:rgba(255,255,255,.35);margin-left:3px;vertical-align:super;margin-top:10px;display:inline-block;}
#date-line{font-size:14px;color:rgba(255,255,255,.45);margin-top:8px;letter-spacing:.08em;}
#greeting{font-size:22px;font-weight:300;color:rgba(255,255,255,.75);margin-top:5px;}

/* ── Guard Pill ── */
#guard-pill{
  position:fixed;top:22px;right:22px;z-index:50;
  display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:100px;
  background:var(--glass);border:1px solid var(--glass-b);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  font-size:12px;color:rgba(255,255,255,.7);
  box-shadow:0 4px 20px rgba(0,0,0,.25);cursor:pointer;user-select:none;
  transition:background .2s;
}
#guard-pill:hover{background:rgba(255,255,255,.22);}
#guard-dot{width:7px;height:7px;border-radius:50%;background:var(--green);transition:background .5s;flex-shrink:0;}
#guard-dot.warn{background:var(--amber);}
#guard-dot.alert{background:var(--red);animation:pulse-r 1s infinite;}

/* ── Settings Btn ── */
#settings-btn{
  position:fixed;top:22px;left:22px;z-index:50;
  width:36px;height:36px;border-radius:50%;
  background:var(--glass);border:1px solid var(--glass-b);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  color:rgba(255,255,255,.65);font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.2);transition:background .2s;
}
#settings-btn:hover{background:rgba(255,255,255,.25);}

/* ── Dock ── */
#dock-outer{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;flex-direction:column;align-items:center;gap:6px;
}
#dock{
  display:flex;align-items:flex-end;gap:5px;
  padding:10px 16px 10px;
  background:rgba(255,255,255,.16);
  backdrop-filter:blur(60px) saturate(200%);
  -webkit-backdrop-filter:blur(60px) saturate(200%);
  border-radius:22px;
  border:1px solid rgba(255,255,255,.3);
  box-shadow:0 12px 50px rgba(0,0,0,.35),0 1px 0 rgba(255,255,255,.2) inset;
}
.d-sep{
  width:1px;height:38px;align-self:center;
  background:rgba(255,255,255,.2);margin:0 5px;flex-shrink:0;
}
.d-icon{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;position:relative;width:60px;
  transition:transform .12s cubic-bezier(.34,1.56,.64,1);
  will-change:transform;
}
.d-box{
  width:52px;height:52px;border-radius:13px;
  background:rgba(255,255,255,.52);
  border:1px solid rgba(255,255,255,.72);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;line-height:1;
  box-shadow:0 2px 14px rgba(0,0,0,.18),0 1px 0 rgba(255,255,255,.7) inset;
  transition:inherit;
}
.d-icon:active .d-box{transform:scale(.92);}
.d-lbl{
  font-size:9.5px;color:rgba(255,255,255,.78);font-weight:500;
  text-shadow:0 1px 5px rgba(0,0,0,.6);
  white-space:nowrap;letter-spacing:.02em;
}
.d-dot{
  width:4px;height:4px;border-radius:50%;
  background:rgba(255,255,255,.55);
  position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);
  display:none;
}

/* ── Lean Tooltip ── */
#tooltip{
  position:fixed;z-index:5000;pointer-events:none;
  background:rgba(12,12,20,.88);
  backdrop-filter:blur(24px) saturate(180%);
  border:1px solid rgba(255,255,255,.1);
  border-radius:13px;
  padding:11px 14px;
  box-shadow:0 16px 48px rgba(0,0,0,.4);
  min-width:150px;
  transition:opacity .12s,transform .12s;
}
#tooltip.tt-hide{opacity:0;transform:translateY(8px);}
.tt-head{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:9px;}
.tt-row{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:2px 0;}
.tt-k{font-size:11px;color:rgba(255,255,255,.38);}
.tt-v{font-size:12px;font-weight:600;color:#fff;}
.tt-v.g{color:#7be08a;}.tt-v.a{color:#f5d078;}.tt-v.r{color:#ff8888;}
.tt-hr{height:1px;background:rgba(255,255,255,.07);margin:7px 0;}

/* ── Settings Modal ── */
#settings-overlay{
  position:fixed;inset:0;z-index:800;
  background:rgba(0,0,0,.45);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
}
#settings-panel{
  background:rgba(22,22,32,.94);
  backdrop-filter:blur(50px) saturate(200%);
  border:1px solid rgba(255,255,255,.09);
  border-radius:18px;
  width:min(93vw,600px);max-height:88vh;
  overflow:hidden;display:flex;
  box-shadow:0 30px 90px rgba(0,0,0,.6);
  animation:panel-in .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes panel-in{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}

/* Settings sidebar */
#s-sidebar{
  width:152px;flex-shrink:0;padding:22px 10px;
  border-right:1px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;gap:2px;
}
#s-sidebar .s-cat{font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:0 8px;margin-bottom:5px;margin-top:14px;}
#s-sidebar .s-cat:first-child{margin-top:0;}
.s-tab{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
  font-size:13px;color:rgba(255,255,255,.5);cursor:pointer;
  border:none;background:none;width:100%;text-align:left;font-family:inherit;
  transition:all .15s;
}
.s-tab:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);}
.s-tab.on{background:rgba(255,255,255,.11);color:#fff;}
.s-tab-ic{font-size:15px;width:20px;text-align:center;}

/* Settings content */
#s-content{
  flex:1;padding:26px;overflow-y:auto;color:#fff;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;
}
#s-content::-webkit-scrollbar{width:4px;}
#s-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px;}
.s-title{font-size:19px;font-weight:600;margin-bottom:22px;}
.s-sec{margin-bottom:22px;}
.s-lbl{font-size:10px;color:rgba(255,255,255,.36);text-transform:uppercase;letter-spacing:.09em;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.s-inp{
  width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:10px;padding:10px 13px;font-size:13px;color:#fff;
  font-family:inherit;outline:none;transition:border-color .2s;
}
.s-inp:focus{border-color:rgba(255,255,255,.3);}
.s-inp::placeholder{color:rgba(255,255,255,.2);}
.s-btn{padding:10px 18px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;}
.s-btn-pr{background:rgba(90,120,255,.85);color:#fff;}
.s-btn-pr:hover{background:rgba(90,120,255,1);transform:translateY(-1px);}
.s-btn-g{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.1);}
.s-btn-g:hover{background:rgba(255,255,255,.14);}
.s-row{display:flex;gap:8px;margin-bottom:10px;}

/* Wallpaper picker */
.wp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.wp-card{
  aspect-ratio:16/9;border-radius:10px;cursor:pointer;overflow:hidden;
  border:2px solid transparent;transition:all .2s;position:relative;
}
.wp-card:hover{border-color:rgba(255,255,255,.45);transform:scale(1.03);}
.wp-card.active{border-color:#fff;}
.wp-card-name{position:absolute;bottom:0;left:0;right:0;padding:4px 7px;font-size:10px;color:rgba(255,255,255,.7);background:linear-gradient(transparent,rgba(0,0,0,.4));}
.wp-upload{
  aspect-ratio:16/9;border-radius:10px;border:2px dashed rgba(255,255,255,.18);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  cursor:pointer;color:rgba(255,255,255,.35);font-size:11px;
  background:rgba(255,255,255,.03);transition:all .2s;
}
.wp-upload:hover{border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.65);background:rgba(255,255,255,.07);}
.wp-upload-ic{font-size:22px;}

/* Slider */
input[type=range]{width:100%;height:4px;border-radius:3px;background:rgba(255,255,255,.2);-webkit-appearance:none;cursor:pointer;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid rgba(90,120,255,.9);box-shadow:0 2px 8px rgba(0,0,0,.3);}

/* ── Guard Cat ── */
#guard-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.9);backdrop-filter:blur(10px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#cat-stage{position:relative;display:flex;align-items:center;justify-content:center;width:100%;}
#big-cat{font-size:min(34vw,300px);line-height:1;filter:drop-shadow(0 0 60px rgba(255,200,100,.35));animation:catRise 1.3s cubic-bezier(.175,.885,.32,1.275) forwards,catFloat 4s ease-in-out 1.3s infinite;}
@keyframes catRise{from{transform:translateY(110vh) scale(.5);}to{transform:translateY(0) scale(1);}}
@keyframes catFloat{0%,100%{transform:translateY(0) rotate(-1.5deg);}50%{transform:translateY(-18px) rotate(1.5deg);}}
#cat-speech{position:absolute;top:5%;right:10%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:12px 18px;font-size:15px;color:rgba(255,255,255,.88);line-height:1.6;animation:fadeUp .5s 1.4s both;max-width:200px;}
@keyframes fadeUp{from{opacity:0;transform:scale(.88);}to{opacity:1;transform:scale(1);}}
#guard-ctrl{display:flex;flex-direction:column;align-items:center;gap:14px;padding:18px 20px;animation:fadeUp .5s 1.9s both;}
#guard-msg{font-size:18px;font-weight:500;color:rgba(255,255,255,.82);text-align:center;max-width:340px;line-height:1.5;}
#rest-btn{background:linear-gradient(135deg,#E8A87C,#C07050);border:none;border-radius:100px;padding:16px 52px;font-family:inherit;font-size:17px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 8px 32px rgba(200,100,60,.35);transition:transform .2s;}
#rest-btn:hover{transform:scale(1.06);}
#break-cd{font-size:66px;font-weight:200;color:rgba(255,255,255,.88);letter-spacing:-2px;text-align:center;display:none;}
#break-lbl{font-size:13px;color:rgba(255,255,255,.42);text-align:center;margin-top:-6px;display:none;}
#resume-btn{display:none;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:100px;padding:12px 36px;font-family:inherit;font-size:15px;color:rgba(255,255,255,.7);cursor:pointer;}
#resume-btn:hover{background:rgba(255,255,255,.18);}

/* ── SAS Modal ── */
.m-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);z-index:800;display:flex;align-items:center;justify-content:center;}
.m-pn{background:rgba(20,20,30,.96);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.09);border-radius:20px;width:min(92vw,620px);max-height:88vh;overflow-y:auto;padding:26px;box-shadow:0 24px 80px rgba(0,0,0,.6);color:#fff;}
.m-ttl{font-size:19px;font-weight:700;margin-bottom:16px;}
.m-cls{float:right;background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.45);font-size:14px;width:26px;height:26px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.m-cls:hover{background:rgba(255,255,255,.18);color:#fff;}
.glass-sm{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:14px 16px;}
.btn-pr{display:block;width:100%;padding:12px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;background:rgba(90,120,255,.85);color:#fff;transition:all .18s;}
.btn-pr:hover{background:rgba(90,120,255,1);transform:translateY(-1px);}

/* ── Debug ── */
#dbg-btn{position:fixed;bottom:110px;right:20px;background:rgba(255,100,100,.1);border:1px solid rgba(255,100,100,.25);border-radius:100px;padding:8px 16px;font-size:11px;color:#ff8888;cursor:pointer;font-family:inherit;backdrop-filter:blur(20px);}
#dbg-btn:hover{background:rgba(255,100,100,.2);}

@keyframes pulse-r{0%,100%{opacity:1;}50%{opacity:.2;}}
@keyframes pulse-s{0%,100%{opacity:1;}50%{opacity:.35;}}
@keyframes bounce{0%{transform:translateY(0) scale(1);}30%{transform:translateY(-28px) scale(1.08);}60%{transform:translateY(-8px) scale(1.03);}100%{transform:translateY(0) scale(1);}}
.bouncing{animation:bounce .5s cubic-bezier(.34,1.56,.64,1)!important;}

/* LinkedIn not-set indicator */
.d-icon[data-unset="1"] .d-box{border:2px dashed rgba(255,255,255,.35);background:rgba(255,255,255,.22);}
</style>
</head>
<body>

<div id="bg-default"></div>
<div id="bg-wallpaper"></div>
<div id="noise"></div>

<div id="header">
  <div><span id="clock">00:00</span><span id="clock-sec">:00</span></div>
  <div id="date-line"></div>
  <div id="greeting"></div>
</div>

<div id="guard-pill" onclick="openSettings('guard')">
  <span id="guard-dot"></span>
  <span id="guard-txt">Guard Cat 監控中</span>
</div>

<button id="settings-btn" onclick="openSettings('appearance')" title="設定">⚙</button>

<!-- DOCK -->
<div id="dock-outer">
  <div id="dock">
    <!-- SAS Group -->
    <div class="d-icon" data-id="sas-hub" onclick="dClick(this,'sas-hub')">
      <div class="d-box">🧬</div>
      <span class="d-lbl">SAS Hub</span>
    </div>
    <div class="d-icon" data-id="sleep" onclick="dClick(this,'sleep')">
      <div class="d-box">😴</div>
      <span class="d-lbl">Sleep</span>
    </div>
    <div class="d-icon" data-id="mental" onclick="dClick(this,'mental')">
      <div class="d-box">💭</div>
      <span class="d-lbl">Mental</span>
    </div>
    <div class="d-icon" data-id="optimizer" onclick="dClick(this,'optimizer')">
      <div class="d-box">⚡</div>
      <span class="d-lbl">Optimizer</span>
    </div>
    <div class="d-icon" data-id="refueler" onclick="dClick(this,'refueler')">
      <div class="d-box">☕</div>
      <span class="d-lbl">Refueler</span>
    </div>
    <div class="d-icon" data-id="report" onclick="openSASAnalysis()">
      <div class="d-box">✨</div>
      <span class="d-lbl">綜觀</span>
    </div>
    <div class="d-sep"></div>
    <!-- World Group -->
    <div class="d-icon" data-id="aitracker" onclick="dClick(this,'aitracker')">
      <div class="d-box">🤖</div>
      <span class="d-lbl">AI Tracker</span>
    </div>
    <div class="d-icon" data-id="linkedin" onclick="dClick(this,'linkedin')">
      <div class="d-box">💼</div>
      <span class="d-lbl">LinkedIn</span>
    </div>
    <div class="d-sep"></div>
    <!-- Learn Group -->
    <div class="d-icon" data-id="wordvault" onclick="dClick(this,'wordvault')">
      <div class="d-box">📖</div>
      <span class="d-lbl">WordVault</span>
    </div>
    <div class="d-icon" data-id="mentaltool" onclick="dClick(this,'mentaltool')">
      <div class="d-box">🧘</div>
      <span class="d-lbl">Mindful</span>
    </div>
    <div class="d-icon" data-id="podcast" onclick="dClick(this,'podcast')">
      <div class="d-box">🎧</div>
      <span class="d-lbl">Podcast</span>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip" class="tt-hide" style="display:none;"></div>

<!-- Settings Overlay -->
<div id="settings-overlay" style="display:none;" onclick="if(event.target===this)closeSettings()">
  <div id="settings-panel">
    <div id="s-sidebar">
      <div class="s-cat">偏好設定</div>
      <button class="s-tab on" data-tab="appearance" onclick="switchTab('appearance')"><span class="s-tab-ic">🖼</span>外觀</button>
      <button class="s-tab" data-tab="links" onclick="switchTab('links')"><span class="s-tab-ic">🔗</span>連結管理</button>
      <div class="s-cat">系統</div>
      <button class="s-tab" data-tab="guard" onclick="switchTab('guard')"><span class="s-tab-ic">🐱</span>Guard Cat</button>
      <button class="s-tab" data-tab="api" onclick="switchTab('api')"><span class="s-tab-ic">🔑</span>API 設定</button>
    </div>
    <div id="s-content"></div>
  </div>
</div>

<!-- Guard Cat Overlay -->
<div id="guard-overlay" style="display:none;">
  <div id="cat-stage">
    <div id="big-cat">🐱</div>
    <div id="cat-speech">喵！你已經工作很久了<br>是時候休息一下 🌿</div>
  </div>
  <div id="guard-ctrl">
    <div id="guard-msg"></div>
    <button id="rest-btn" onclick="startBreak()">先去休息 15 分鐘 🌿</button>
    <div id="break-cd"></div>
    <div id="break-lbl"></div>
    <button id="resume-btn" onclick="endBreak()">我回來了 ✓</button>
  </div>
</div>

<!-- SAS Analysis Modal -->
<div class="m-ov" id="sas-ov" style="display:none;" onclick="if(event.target===this)closeSAS()">
  <div class="m-pn" id="sas-pn"></div>
</div>

<button id="dbg-btn" onclick="triggerGuard()">🐱 測試貓貓</button>

<script>
'use strict';
const GS_KEY='guard_settings_v1', GROQ_KEY='groq_key', LINKS_KEY='cc_links_v2', WP_KEY='cc_wp_v1', RF_KEY='refueler_v1';

// ── DEFAULT LINKS ──
const DEFAULT_LINKS={
  'sas-hub':   '../Sleep Dashboard/index.html',
  'sleep':     '../Sleep Dashboard/sleep_dashboard.html',
  'mental':    'https://resolutetinging.github.io/wellness-tracker/mental-dashboard.html',
  'optimizer': 'https://resolutetinging.github.io/daily-optimizer/daily_optimizer.html',
  'refueler':  './refueler.html',
  'aitracker': '../AI Tracker/ai_tracker_v6.html',
  'linkedin':  '',
  'wordvault': '../WordVault/WordVault.html',
  'mentaltool':'notion://www.notion.so',
  'podcast':   'notion://www.notion.so',
};
function getLinks(){try{return{...DEFAULT_LINKS,...JSON.parse(localStorage.getItem(LINKS_KEY)||'{}')};}catch{return{...DEFAULT_LINKS};}}
function saveLinks(l){localStorage.setItem(LINKS_KEY,JSON.stringify(l));}

// ── MOCK / LIVE DATA ──
const MOCK={
  sleep:{dur:'7h 12m',q:78,deep:'1h45m',rem:'2h08m',trend:'↑'},
  mental:{score:7.2,trend:'↑',streak:5},
  opt:{stamina:62,endTime:'18:30',done:4,total:7,focus:'3.5h'},
  ai:{models:2,topic:'Multimodal',news:8},
  li:{applied:3,pending:2,saved:5},
  wv:{total:234,today:5,streak:12},
  mt:{streak:7,unread:2},
  pc:{unread:3,recent:'The Knowledge Project'}
};
function rfToday(){
  try{
    const d=JSON.parse(localStorage.getItem(RF_KEY)||'{}');
    const td=new Date().toDateString();
    const te=(d.entries||[]).filter(e=>new Date(e.timestamp).toDateString()===td);
    return{coffee:te.filter(e=>e.type==='coffee').length,water:te.filter(e=>e.type==='water').reduce((s,e)=>s+(e.amount||0),0)};
  }catch{return{coffee:0,water:0};}
}

// ── WALLPAPER ──
const WP_PRESETS=[
  {key:'aurora',name:'極光深海',bg:'radial-gradient(ellipse at 20% 20%,rgba(120,80,200,.5) 0%,transparent 55%),radial-gradient(ellipse at 80% 75%,rgba(40,130,200,.45) 0%,transparent 55%),linear-gradient(150deg,#0d0d1a 0%,#141428 50%,#0a1a2e 100%)'},
  {key:'dusk',name:'暮色玫瑰',bg:'linear-gradient(135deg,#2d1b3d 0%,#4a1942 40%,#c0392b 100%)'},
  {key:'forest',name:'深林薄霧',bg:'linear-gradient(150deg,#0a1f1a 0%,#134e3c 50%,#1a6b4a 100%)'},
  {key:'slate',name:'矽谷石板',bg:'linear-gradient(135deg,#1a1a2e 0%,#2d3561 50%,#0f3460 100%)'},
  {key:'warm',name:'暖色沙丘',bg:'linear-gradient(150deg,#2c1810 0%,#5c3a1e 50%,#8b5a2b 100%)'},
  {key:'mint',name:'薄荷冰川',bg:'linear-gradient(135deg,#0a2a2a 0%,#1a4a4a 50%,#2a6a6a 100%)'},
];

function applyBG(preset){
  const bg=document.getElementById('bg-default');
  const wp=document.getElementById('bg-wallpaper');
  bg.style.background=preset.bg;
  wp.classList.remove('active');
  localStorage.setItem(WP_KEY,'preset:'+preset.key);
}
function applyCustomWP(dataUrl){
  const wp=document.getElementById('bg-wallpaper');
  wp.style.backgroundImage='url('+dataUrl+')';
  wp.classList.add('active');
  localStorage.setItem(WP_KEY,'custom:'+dataUrl);
}
function resetWP(){
  document.getElementById('bg-wallpaper').classList.remove('active');
  document.getElementById('bg-default').style.background='';
  localStorage.removeItem(WP_KEY);
}
function loadWP(){
  const v=localStorage.getItem(WP_KEY)||'';
  if(v.startsWith('preset:')){
    const k=v.slice(7);
    const p=WP_PRESETS.find(x=>x.key===k);
    if(p)applyBG(p);
  } else if(v.startsWith('custom:')){
    applyCustomWP(v.slice(7));
  }
}

// ── CLOCK ──
function tick(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  const s=String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent=h+':'+m;
  document.getElementById('clock-sec').textContent=':'+s;
  const MN=['一','二','三','四','五','六','七','八','九','十','十一','十二'];
  const WD=['日','一','二','三','四','五','六'];
  document.getElementById('date-line').textContent=n.getFullYear()+' · '+MN[n.getMonth()]+'月 · 星期'+WD[n.getDay()];
  const hr=n.getHours();
  document.getElementById('greeting').textContent=hr<5?'深夜了，注意休息 🌙':hr<12?'早安 ☀️':hr<17?'午安 🌤':hr<21?'晚上好 🌆':'夜深了 🌙';
}

// ── DOCK MAGNIFICATION ──
const dock=document.getElementById('dock');
function dockMag(e){
  dock.querySelectorAll('.d-icon').forEach(ic=>{
    const r=ic.getBoundingClientRect();
    const cx=r.left+r.width/2;
    const dist=Math.abs(e.clientX-cx);
    const maxD=120,maxS=0.58,maxY=22;
    if(dist<maxD){
      const f=1-dist/maxD;
      ic.style.transform=`translateY(${-(f*maxY)}px) scale(${1+f*maxS})`;
    } else {
      ic.style.transform='';
    }
  });
}
dock.addEventListener('mousemove',dockMag);
dock.addEventListener('mouseleave',()=>dock.querySelectorAll('.d-icon').forEach(i=>i.style.transform=''));

// ── DOCK CLICK ──
function dClick(el,id){
  el.classList.remove('bouncing');void el.offsetWidth;el.classList.add('bouncing');
  setTimeout(()=>el.classList.remove('bouncing'),500);
  const links=getLinks();
  const url=links[id]||'';
  if(!url){openSettings('links');return;}
  window.open(url,'_blank');
}
// Mark LinkedIn if not set
function updateUnsetFlags(){
  const links=getLinks();
  document.querySelectorAll('.d-icon').forEach(ic=>{
    const id=ic.dataset.id;
    if(!id||!links.hasOwnProperty(id))return;
    ic.dataset.unset=(!links[id])?'1':'0';
  });
}

// ── LEAN TOOLTIP ──
const ttp=document.getElementById('tooltip');
let ttT;
function row(k,v,c=''){return`<div class="tt-row"><span class="tt-k">${k}</span><span class="tt-v${c?' '+c:''}">${v}</span></div>`;}
function hr(){return`<div class="tt-hr"></div>`;}
function buildTT(id){
  const R=MOCK;
  const rf=rfToday();
  const h=(t)=>`<div class="tt-head">${t}</div>`;
  switch(id){
    case 'sas-hub': return h('SAS Hub')+row('睡眠',R.sleep.dur,'g')+row('品質',R.sleep.q+'%',R.sleep.q>=70?'g':'a')+hr()+row('情緒',R.mental.score+'/10',R.mental.score>=7?'g':'a')+row('戰力',R.opt.stamina+'%',R.opt.stamina>=60?'g':'a');
    case 'sleep':   return h('昨夜睡眠')+row('時長',R.sleep.dur,'g')+row('品質',R.sleep.q+'%',R.sleep.q>=70?'g':'a')+hr()+row('深睡',R.sleep.deep)+row('REM',R.sleep.rem)+hr()+row('趨勢',R.sleep.trend,'g');
    case 'mental':  return h('心情')+row('今日分',R.mental.score+'/10',R.mental.score>=7?'g':'a')+row('趨勢',R.mental.trend,'g')+hr()+row('連續',R.mental.streak+'天','g');
    case 'optimizer':return h('優化器')+row('戰力',R.opt.stamina+'%',R.opt.stamina>=60?'g':'a')+row('續航至',R.opt.endTime)+hr()+row('任務',R.opt.done+'/'+R.opt.total,R.opt.done===R.opt.total?'g':'a')+row('專注',R.opt.focus,'g');
    case 'refueler':return h('今日攝取')+row('☕ 咖啡',rf.coffee+'杯',rf.coffee<=3?'g':rf.coffee<=4?'a':'r')+row('💧 水分',rf.water+'ml',rf.water>=2000?'g':rf.water>=1000?'a':'r');
    case 'report':  return h('綜觀分析')+row('整合',`${R.sleep.dur} · ${R.mental.score}分 · ${R.opt.stamina}%`);
    case 'aitracker':return h('AI 動態')+row('新模型',R.ai.models+'個','a')+row('熱門',R.ai.topic)+row('新聞',R.ai.news+'則');
    case 'linkedin':{const links=getLinks();return h('LinkedIn')+(links['linkedin']?row('已投遞',R.li.applied+'個','g')+row('待回覆',R.li.pending+'個','a')+hr()+row('待投',R.li.saved+'個'):'<div style="font-size:11px;color:rgba(255,255,255,.3);text-align:center;padding:4px 0;">點擊設定連結 →</div>');}
    case 'wordvault':return h('WordVault')+row('單字',R.wv.total+'個')+row('今日',R.wv.today+'個','a')+hr()+row('連續',R.wv.streak+'天','g');
    case 'mentaltool':return h('心理工具')+row('連續',R.mt.streak+'天','g')+row('未讀',R.mt.unread+'則',R.mt.unread?'a':'g');
    case 'podcast':return h('Podcast')+row('未讀',R.pc.unread+'則',R.pc.unread?'a':'g')+row('最近',R.pc.recent);
    default:return'';
  }
}
document.addEventListener('mouseover',e=>{
  const ic=e.target.closest('.d-icon');
  if(!ic)return;
  clearTimeout(ttT);
  const c=buildTT(ic.dataset.id);
  if(!c)return;
  ttp.innerHTML=c;ttp.style.display='block';ttp.classList.remove('tt-hide');
  const r=ic.getBoundingClientRect();
  const tw=ttp.offsetWidth||160,th=ttp.offsetHeight||100;
  let lx=r.left+r.width/2-tw/2,ty=r.top-th-14;
  lx=Math.max(8,Math.min(lx,window.innerWidth-tw-8));
  if(ty<8)ty=r.bottom+14;
  ttp.style.left=lx+'px';ttp.style.top=ty+'px';
});
document.addEventListener('mouseout',e=>{
  if(!e.target.closest('.d-icon'))return;
  ttT=setTimeout(()=>{ttp.classList.add('tt-hide');setTimeout(()=>ttp.style.display='none',130);},70);
});

// ── SETTINGS ──
let curTab='appearance';
function openSettings(tab){
  curTab=tab||'appearance';
  document.getElementById('settings-overlay').style.display='flex';
  renderTab(curTab);
  document.querySelectorAll('.s-tab').forEach(b=>{
    b.classList.toggle('on',b.dataset.tab===curTab);
  });
}
function closeSettings(){document.getElementById('settings-overlay').style.display='none';}
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.s-tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  renderTab(tab);
}
function renderTab(tab){
  const el=document.getElementById('s-content');
  const links=getLinks();
  const eff=getEffective();
  const curWP=localStorage.getItem(WP_KEY)||'';

  if(tab==='appearance'){
    const presetCards=WP_PRESETS.map(p=>{
      const isActive=curWP==='preset:'+p.key;
      return`<div class="wp-card${isActive?' active':''}" onclick="applyBG_ui('${p.key}')" style="background:${p.bg};"><span class="wp-card-name">${p.name}</span></div>`;
    }).join('');
    el.innerHTML=`
      <div class="s-title">外觀</div>
      <div class="s-sec">
        <div class="s-lbl">桌布 / Wallpaper</div>
        <div class="wp-grid">
          ${presetCards}
          <label class="wp-upload" for="wp-inp">
            <span class="wp-upload-ic">📷</span>
            <span>上傳自訂圖片</span>
          </label>
        </div>
        <input type="file" id="wp-inp" accept="image/*" style="display:none;" onchange="onWPFile(this)"/>
        <div class="s-row">
          <button class="s-btn s-btn-g" onclick="resetWP();renderTab('appearance');">重設預設</button>
        </div>
      </div>
    `;
  } else if(tab==='links'){
    const linkRows=[
      {id:'sas-hub',lbl:'🧬 SAS Hub',ph:'../Sleep Dashboard/index.html'},
      {id:'sleep',lbl:'😴 Sleep Dashboard',ph:'../Sleep Dashboard/sleep_dashboard.html'},
      {id:'mental',lbl:'💭 Mental Dashboard',ph:'https://…'},
      {id:'optimizer',lbl:'⚡ Daily Optimizer',ph:'https://…'},
      {id:'refueler',lbl:'☕ Refueler',ph:'./refueler.html'},
      {id:'aitracker',lbl:'🤖 AI Tracker',ph:'../AI Tracker/ai_tracker_v6.html'},
      {id:'linkedin',lbl:'💼 LinkedIn',ph:'https://www.linkedin.com/…',highlight:true},
      {id:'wordvault',lbl:'📖 WordVault',ph:'../WordVault/WordVault.html'},
      {id:'mentaltool',lbl:'🧘 Mental Tool',ph:'notion://…'},
      {id:'podcast',lbl:'🎧 Podcast Memos',ph:'notion://…'},
    ];
    el.innerHTML=`
      <div class="s-title">連結管理</div>
      <div class="s-sec">
        ${linkRows.map(r=>`
          <div class="s-lbl" style="${r.highlight?'color:#7be08a;':''}">${r.lbl}${r.highlight&&!links[r.id]?' <span style="font-size:9px;background:rgba(123,224,138,.15);padding:2px 7px;border-radius:100px;letter-spacing:0;text-transform:none;">請設定</span>':''}</div>

        `).join('')}
        <button class="s-btn s-btn-pr" onclick="saveAllLinks()">儲存所有連結</button>
      </div>
    `;
  } else if(tab==='guard'){
    el.innerHTML=`
      <div class="s-title">Guard Cat 設定</div>
      <div class="s-sec">
        <div class="s-lbl">今日戰力</div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
          <input type="range" id="gs-s" min="0" max="100" value="${eff.stamina}" oninput="document.getElementById('gs-sv').textContent=this.value+'%'"/>
          <span id="gs-sv" style="font-size:14px;font-weight:600;min-width:40px;">${eff.stamina}%</span>

function applyBG_ui(key){
  const p=WP_PRESETS.find(x=>x.key===key);
  if(p){applyBG(p);renderTab('appearance');}
}
function onWPFile(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{applyCustomWP(ev.target.result);renderTab('appearance');};
  r.readAsDataURL(f);
}
function saveAllLinks(){
  const ids=['sas-hub','sleep','mental','optimizer','refueler','aitracker','linkedin','wordvault','mentaltool','podcast'];
  const l={};
  ids.forEach(id=>{const el=document.getElementById('lnk-'+id);if(el)l[id]=(el.value||'').trim();});
  saveLinks(l);updateUnsetFlags();closeSettings();
}
function saveGS(){
  const stamina=parseInt(document.getElementById('gs-s')?.value)||60;
  const endTime=document.getElementById('gs-t')?.value||'18:30';
  localStorage.setItem(GS_KEY,JSON.stringify({stamina,endTime}));
  closeSettings();checkGuard();
}
function saveAPI(){
  const k=(document.getElementById('gs-k')?.value||'').trim();
  if(k)localStorage.setItem(GROQ_KEY,k);
  closeSettings();
}

// ── GUARD CAT ──
let gState='monitoring',cooldownEnd=null,cdIv=null;
function getGuardData(){try{return JSON.parse(localStorage.getItem(GS_KEY))||{};}catch{return{};}}
function getEffective(){
  const s=getGuardData();
  let stamina=s.stamina!==undefined?+s.stamina:MOCK.opt.stamina;
  let endTime=s.endTime||MOCK.opt.endTime;
  try{const t=new Date().toISOString().split('T')[0];const o=JSON.parse(localStorage.getItem('review_'+t)||'{}');if(o.stamina!==undefined)stamina=+o.stamina;if(o.endTime)endTime=o.endTime;}catch{}
  return{stamina,endTime};
}
function checkGuard(){
  if(gState==='alerting'||gState==='resting')return;
  if(gState==='cooldown'&&cooldownEnd&&Date.now()<cooldownEnd)return;
  const{stamina,endTime}=getEffective();
  const now=new Date();
  const[eh,em]=endTime.split(':').map(Number);
  const end=new Date();end.setHours(eh,em,0,0);
  const dot=document.getElementById('guard-dot');
  const txt=document.getElementById('guard-txt');
  if(stamina<40||now>end){triggerGuard();}
  else if(stamina<60){dot.className='warn';txt.textContent='戰力 '+stamina+'% · 注意';gState='monitoring';}
  else{dot.className='';txt.textContent='Guard Cat · '+stamina+'%';gState='monitoring';}
}
function triggerGuard(){
  if(gState==='alerting'||gState==='resting')return;
  gState='alerting';
  const{stamina,endTime}=getEffective();
  const msgs=stamina<40?['戰力剩 '+stamina+'%，需要充電了！']:['已過 '+endTime+'，該歇歇了！'];
  const cats=['喵！你已經工作很久了<br>是時候休息一下 🌿','喵嗚～戰力不足<br>先補充才能繼續 💪','本貓命令你休息！<br>健康比工作重要 🐱'];
  document.getElementById('guard-msg').textContent=msgs[0];
  document.getElementById('cat-speech').innerHTML=cats[Math.floor(Math.random()*cats.length)];
  document.getElementById('rest-btn').style.display='block';
  document.getElementById('break-cd').style.display=document.getElementById('break-lbl').style.display=document.getElementById('resume-btn').style.display='none';
  const cat=document.getElementById('big-cat');
  cat.style.animation='none';void cat.offsetWidth;
  cat.style.animation='catRise 1.3s cubic-bezier(.175,.885,.32,1.275) forwards,catFloat 4s ease-in-out 1.3s infinite';
  document.getElementById('guard-overlay').style.display='flex';
  document.getElementById('guard-dot').className='alert';
  document.getElementById('guard-txt').textContent='執法中 🐱';
}
function startBreak(){
  gState='resting';
  document.getElementById('rest-btn').style.display='none';
  document.getElementById('guard-msg').textContent='好好休息 🌿 15分鐘後回來';
  const cdEl=document.getElementById('break-cd'),lbEl=document.getElementById('break-lbl');
  cdEl.style.display=lbEl.style.display='block';
  let secs=15*60;
  function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
  cdEl.textContent=fmt(secs);lbEl.textContent='請離開座位休息';
  if(cdIv)clearInterval(cdIv);
  cdIv=setInterval(()=>{secs--;cdEl.textContent=fmt(secs);if(secs<=60)lbEl.textContent='快好了，再'+secs+'秒…';if(secs<=0){clearInterval(cdIv);endBreak();}},1000);
}
function endBreak(){
  if(cdIv){clearInterval(cdIv);cdIv=null;}
  gState='cooldown';cooldownEnd=Date.now()+3600000;
  document.getElementById('guard-overlay').style.display='none';
  document.getElementById('guard-dot').className='warn';
  document.getElementById('guard-txt').textContent='休息完畢 · 60分鐘後偵測';
  setTimeout(()=>{gState='monitoring';checkGuard();},3600000);
}

// ── SAS ANALYSIS ──
function openSASAnalysis(){
  document.getElementById('sas-pn').innerHTML=`
    <button class="m-cls" onclick="closeSAS()">✕</button>
    <div class="m-ttl">✨ SAS 身心綜觀報告</div>
    <p style="font-size:13px;color:rgba(255,255,255,.4);margin-bottom:18px;line-height:1.6;">整合攝取 ↔ 睡眠 ↔ 行為 ↔ 情緒，完整身心洞察。</p>
    <div id="sas-res"><button class="btn-pr" onclick="runSAS()">🔍 開始分析</button></div>
  `;
  document.getElementById('sas-ov').style.display='flex';
}
function closeSAS(){document.getElementById('sas-ov').style.display='none';}
async function runSAS(){
  const key=localStorage.getItem(GROQ_KEY)||'';
  const el=document.getElementById('sas-res');
  if(!key){el.innerHTML='<div style="font-size:13px;color:rgba(255,255,255,.35);text-align:center;padding:16px;">請先在 ⚙️ API設定 填入 Groq API Key</div>';return;}
  el.innerHTML='<div style="text-align:center;padding:24px;"><div style="font-size:28px;animation:pulse-s 1.5s infinite;">✨</div><div style="font-size:13px;color:rgba(255,255,255,.35);margin-top:8px;">分析中…</div></div>';
  const rf=rfToday();const{stamina,endTime}=getEffective();
  const prompt=`你是整合健康顧問。分析多維度身心數據：睡眠${MOCK.sleep.dur}（品質${MOCK.sleep.q}%），情緒${MOCK.mental.score}/10（${MOCK.mental.trend}），戰力${stamina}%，任務${MOCK.opt.done}/${MOCK.opt.total}，續航至${endTime}，咖啡${rf.coffee}杯，水${rf.water}ml。\n用繁體中文分析（語氣溫暖，每段2-3句）：\n1. 🔗 數據間的關聯性\n2. ⚡ 能量管理評估\n3. 🎯 三個具體行動建議\n4. 💬 今天一句話`;
  try{
    const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],max_tokens:700,temperature:.7})});
    if(!resp.ok)throw new Error('API '+resp.status);
    const result=await resp.json();
    el.innerHTML=`<div class="glass-sm"><div style="font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:10px;">✨ 分析結果</div><div style="font-size:13px;line-height:1.85;white-space:pre-wrap;color:rgba(255,255,255,.82);">${result.choices?.[0]?.message?.content||'（無回應）'}</div></div>`;
  }catch(e){el.innerHTML=`<div style="font-size:13px;color:#ff8888;">⚠️ ${e.message}</div>`;}
}

loadWP();
tick();setInterval(tick,1000);
checkGuard();setInterval(checkGuard,30000);
updateUnsetFlags();
