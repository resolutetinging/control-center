<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Yi Ting Yu, Tina Yu">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%220.9em%22 font-size=%2290%22>🌳</text></svg>">
  <title>人生軌跡觀測儀</title>
  <style>
    /* ── TOKENS ── */
    :root {
      --bg:#f4f1ec; --bg2:#eceae3; --ink:#28261f;
      --sub:#55514a; --border:#dcd9d2; --faint:#9e9890; --bg-card:#f8f6f1;
      --sidebar-w:238px; --r:8px;
      --track-label-w:72px; --track-h:72px; --pipe-h:7px; --node-d:17px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','PingFang TC',sans-serif;background:var(--bg);color:var(--ink);font-size:13.5px;line-height:1.65;min-height:100vh;}

    /* ── LAYOUT ── */
    #app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh;}

    /* ── STATUS PANEL ── */
    #status-panel{position:sticky;top:0;height:100vh;overflow-y:auto;background:var(--bg);border-right:1px solid var(--border);padding:30px 18px 24px;display:flex;flex-direction:column;gap:22px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
    .avatar-wrap{display:flex;justify-content:center;}
    .avatar{width:68px;height:68px;border-radius:50%;background:var(--bg2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--faint);cursor:pointer;overflow:hidden;transition:box-shadow 140ms ease;}
    .avatar:hover{box-shadow:0 0 0 2.5px var(--border);}
    .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;}
    .sp-name{font-size:14px;font-weight:700;color:var(--ink);text-align:center;white-space:pre-line;line-height:1.5;}
    .sp-back-btn{display:block;width:100%;margin-top:8px;padding:6px 12px;font-size:10.5px;font-weight:700;cursor:pointer;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--sub);text-align:center;transition:background 140ms ease;font-family:inherit;}
    .sp-back-btn:hover{background:var(--border);}
    /* ── PUBLIC VIEW ── */
    .pub-text{font-size:13px;color:var(--sub);line-height:1.75;white-space:pre-line;margin-bottom:32px;}
    .pub-circles{display:flex;gap:36px;flex-wrap:wrap;}
    .pub-circle-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
    .pub-circle{width:88px;height:88px;border-radius:50%;background:var(--bg2);border:2px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:26px;transition:transform 130ms ease,box-shadow 130ms ease;}
    .pub-circle:hover{transform:scale(1.08);box-shadow:0 4px 18px rgba(40,38,31,0.14);}
    .pub-circle img{width:100%;height:100%;object-fit:cover;display:block;}
    .pub-circle-label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.04em;text-align:center;}
    /* ── LENS AVATAR SETTINGS ── */
    .lens-av-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .lens-av-thumb{width:36px;height:36px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
    .lens-av-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
    .sp-section-title{font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);padding-bottom:7px;border-bottom:1px solid var(--border);}
    .lens-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 11px;border-radius:20px;border:1px solid var(--border);margin-top:8px;white-space:nowrap;}
    .lens-badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
    .lens-desc{font-size:10px;color:var(--faint);margin-top:7px;line-height:1.55;}
    .sp-lens-section{margin-top:auto;padding-top:16px;border-top:1px solid var(--border);}
    .sp-url-hint{margin-top:12px;font-size:9px;color:var(--faint);line-height:1.8;}
    .sp-url-hint code{background:var(--bg2);border:.5px solid var(--border);border-radius:3px;padding:0 4px;font-family:'SF Mono','Fira Mono',monospace;font-size:8.5px;color:var(--sub);}

    /* ── CONTENT AREA ── */
    #content-area{padding:30px 26px 48px;min-height:100vh;}
    .content-header{margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border);}
    .content-title{font-size:21px;font-weight:300;color:var(--ink);letter-spacing:-.4px;}
    .content-subtitle{font-size:11.5px;color:var(--faint);margin-top:5px;}
    .content-lens-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:10px;border:1px solid transparent;}
    .section{margin-bottom:36px;}
    .section-label{font-size:8.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:14px;display:flex;align-items:center;}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border);margin-left:10px;}

    /* ── PIPELINE ── */
    .pipeline-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px 26px;overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
    .pipeline-inner{min-width:540px;}
    .pl-row{display:flex;}
    .pl-label{width:var(--track-label-w);flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;}
    .pl-content{flex:1;position:relative;}
    .axis-row{height:28px;margin-bottom:4px;align-items:flex-end;}
    .year-tick{position:absolute;bottom:0;font-size:9px;font-weight:600;color:var(--faint);transform:translateX(-50%);white-space:nowrap;}
    .year-tick::before{content:'';display:block;width:1px;height:4px;background:var(--border);margin:0 auto 2px;}
    .track-row{height:var(--track-h);transition:opacity 260ms ease;}
    .track-row.vis-active{opacity:1;}.track-row.vis-partial{opacity:0.5;}.track-row.vis-dimmed{opacity:0.09;pointer-events:none;}
    .track-label-inner{display:flex;align-items:center;gap:4px;}
    .track-label-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
    .track-label-text{font-size:9.5px;font-weight:700;letter-spacing:.04em;}
    .guide-line{position:absolute;top:0;bottom:0;width:1px;background:rgba(40,38,31,0.045);pointer-events:none;}
    .pipe-line{position:absolute;top:50%;left:0;right:0;height:var(--pipe-h);border-radius:calc(var(--pipe-h)/2);transform:translateY(-50%);pointer-events:none;}
    .ms-node{position:absolute;top:50%;width:var(--node-d);height:var(--node-d);border-radius:50%;transform:translate(-50%,-50%);border:2.5px solid rgba(255,255,255,0.88);box-shadow:0 1px 5px rgba(0,0,0,0.18);cursor:pointer;z-index:3;transition:transform 130ms ease,box-shadow 130ms ease;}
    .ms-node:hover{transform:translate(-50%,-50%) scale(1.35);box-shadow:0 3px 10px rgba(0,0,0,0.26);}
    .ms-label{position:absolute;top:calc(50% + 12px);font-size:8.5px;font-weight:700;letter-spacing:.04em;transform:translateX(-50%);pointer-events:none;white-space:normal;max-width:56px;text-align:center;line-height:1.3;}

    /* ── MODAL ── */
    .modal-overlay{position:fixed;inset:0;z-index:900;background:rgba(40,38,31,0.42);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 200ms ease;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal-card{background:var(--bg);border:1px solid var(--border);border-radius:calc(var(--r)*1.5);width:100%;max-width:520px;max-height:calc(100vh - 80px);overflow-y:auto;box-shadow:0 10px 40px rgba(40,38,31,0.24);transform:scale(0.95) translateY(8px);transition:transform 200ms ease;}
    .modal-overlay.open .modal-card{transform:scale(1) translateY(0);}
    .modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
    .modal-track-tag{flex-shrink:0;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 9px;border-radius:20px;border:1px solid transparent;margin-top:4px;white-space:nowrap;}
    .modal-title-block{flex:1;min-width:0;}
    .modal-year-label{font-size:10px;font-weight:600;color:var(--faint);}
    .modal-title{font-size:16.5px;font-weight:700;color:var(--ink);margin-top:2px;line-height:1.3;}
    .modal-subtitle{font-size:11.5px;color:var(--sub);margin-top:4px;line-height:1.5;}
    .modal-close-btn{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--sub);transition:background 160ms ease;margin-top:-2px;}
    .modal-close-btn:hover{background:var(--border);}
    .modal-body{padding:16px 20px 22px;}
    .modal-rr-wrap{font-size:12px;color:var(--sub);line-height:1.75;}

    /* ── STAGE 3: CAP FILTER ── */
    .cap-filter-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px;}
    .cap-btn{font-size:10.5px;font-weight:700;letter-spacing:.04em;padding:5px 15px;border-radius:20px;cursor:pointer;background:var(--bg2);border:1px solid var(--border);color:var(--sub);transition:background 150ms ease,color 150ms ease,border-color 150ms ease;white-space:nowrap;}
    .cap-btn.active{background:#2e5d8a;color:#fff;border-color:#2e5d8a;}
    .cap-btn:hover:not(.active){background:var(--border);}

    /* ── STAGE 3: ENG CARDS ── */
    .eng-cards-grid{display:grid;grid-template-columns:1fr;gap:12px;}
    .eng-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:opacity 220ms ease;}
    .eng-card-inner{padding:14px 16px 12px;}
    .eng-card-year{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--faint);display:block;}
    .eng-card-title{font-size:13.5px;font-weight:700;color:var(--ink);margin-top:3px;line-height:1.35;}
    .eng-card-sub{font-size:11px;color:var(--faint);margin-top:4px;line-height:1.5;}
    .eng-cap-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;}
    .eng-cap-tag{font-size:9px;font-weight:700;letter-spacing:.05em;padding:2px 8px;border-radius:20px;text-transform:uppercase;background:#e8f0f8;color:#2e5d8a;border:.5px solid #aaccdd;}
    .eng-kpi-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}
    .eng-kpi-chip{font-size:9.5px;padding:2px 8px;border-radius:4px;background:var(--bg2);border:.5px solid var(--border);color:var(--sub);}
    .eng-card-foot{padding:9px 16px 11px;border-top:1px solid var(--border);background:var(--bg2);}
    .drill-btn{font-size:10px;font-weight:700;letter-spacing:.03em;padding:4px 12px;border-radius:5px;cursor:pointer;background:transparent;border:1px solid #7aaac8;color:#2e5d8a;transition:background 140ms ease;}
    .drill-btn:hover{background:#e8f0f8;}
    .star-expand{max-height:0;overflow:hidden;transition:max-height 320ms cubic-bezier(0.4,0,0.2,1);}
    .star-expand.open{max-height:900px;}
    .star-inner{padding:14px 16px 16px;border-top:1px dashed var(--border);}
    .eng-star-block{margin-bottom:12px;}
    .eng-star-block:last-child{margin-bottom:0;}
    .eng-star-key{display:flex;align-items:center;font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#2e5d8a;margin-bottom:4px;}
    .eng-star-key::after{content:'';flex:1;height:1px;background:#ccdde8;margin-left:8px;}

    /* ── STAGE 4: EMOTION PANEL ── */
    .emotion-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px 18px;}
    .emotion-panel-sub{font-size:10.5px;color:var(--faint);margin-bottom:12px;}
    .chart-wrap{width:100%;overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
    .chart-wrap svg{min-width:360px;}
    .chart-legend{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap;}
    .legend-item{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--sub);}
    .legend-line{display:inline-block;width:22px;height:2px;vertical-align:middle;flex-shrink:0;}
    .legend-dash{background:repeating-linear-gradient(90deg,#b0a898 0,#b0a898 5px,transparent 5px,transparent 9px);}
    .legend-solid{background:#4878a0;}
    .hd-guard{margin-top:14px;padding:12px 16px;border-radius:5px;background:var(--bg);border:1px solid var(--border);border-left:3px solid #4878a0;display:flex;align-items:flex-start;gap:10px;}
    .hd-guard-icon{font-size:14px;flex-shrink:0;line-height:1.5;}
    .hd-guard-body{flex:1;}
    .hd-guard-title{font-size:11.5px;font-weight:700;color:var(--ink);margin-bottom:4px;}
    .hd-guard-msg{font-size:11px;color:var(--sub);line-height:1.65;margin:0;}

    /* ── STAGE 4: LIFE MATRIX ── */
    .life-matrix{background:#28241f;border:1px solid #3c3830;border-radius:var(--r);padding:22px 24px 24px;}
    .lm-title{font-size:14px;font-weight:700;color:#e4e0d8;margin-bottom:4px;}
    .lm-subtitle{font-size:10px;color:#706860;margin-bottom:18px;letter-spacing:.03em;}
    .lm-section-title{font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#6898b0;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #3c3830;}
    .lm-section-title.mt{margin-top:18px;}
    .lm-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;}
    .lm-item{display:flex;flex-direction:column;gap:4px;}
    .lm-cat{font-size:8.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#98a4b0;}
    .lm-rule{font-size:11px;color:#b4b0a8;line-height:1.6;}
    .lm-filters{display:flex;flex-direction:column;}
    .lm-filter-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid #33302b;}
    .lm-filter-item:last-child{border-bottom:none;}
    .lm-filter-cond{font-size:9px;font-weight:700;color:#98a4b0;flex-shrink:0;width:68px;padding-top:2px;line-height:1.4;}
    .lm-quote{margin-top:18px;padding-top:14px;border-top:1px solid #3c3830;font-size:11px;color:#6a6460;line-height:1.8;text-align:center;}

    /* ── STANDALONE LENS LAYOUT ── */
    .standalone-wrap{max-width:700px;}
    .intro-block{padding:36px 0 30px;}
    .intro-headline{font-size:30px;font-weight:200;letter-spacing:-.6px;color:var(--ink);line-height:1.2;}
    .intro-tagline{font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);margin-top:10px;}
    .intro-bio{font-size:13.5px;color:var(--sub);line-height:1.85;margin-top:18px;max-width:580px;}
    .links-block{display:flex;gap:10px;flex-wrap:wrap;padding-bottom:32px;}
    .ext-link-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:6px;background:var(--bg-card);border:1px solid var(--border);color:var(--sub);font-size:12px;font-weight:700;text-decoration:none;cursor:pointer;transition:background 150ms ease,box-shadow 150ms ease;white-space:nowrap;}
    .ext-link-btn:hover{background:var(--bg2);box-shadow:0 2px 10px rgba(40,38,31,0.10);}
    .ext-link-icon{font-size:10px;color:var(--faint);}
    .ig-btn{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);text-decoration:none;transition:background 150ms ease,box-shadow 150ms ease;}
    .ig-btn:hover{background:var(--bg2);box-shadow:0 2px 10px rgba(40,38,31,.12);}
    .preview-card.has-link{cursor:pointer;}
    .preview-card.has-link:hover .pc-inner{filter:brightness(0.95);}
    .preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .preview-card{border-radius:var(--r);overflow:hidden;height:160px;cursor:pointer;transition:transform 200ms ease,box-shadow 200ms ease;}
    .preview-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(40,38,31,0.16);}
    .pc-inner{width:100%;height:100%;padding:12px 14px;display:flex;flex-direction:column;justify-content:flex-end;}
    .pc-cat{font-size:8.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:inline-block;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,0.55);color:var(--ink);margin-bottom:5px;width:fit-content;}
    .pc-title{font-size:12px;font-weight:700;color:var(--ink);line-height:1.4;}

    /* ── COMMANDER PANEL ── */
    .commander-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .commander-label{font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);flex-shrink:0;margin-right:4px;}
    .cmd-btn{font-size:10px;font-weight:700;letter-spacing:.04em;padding:4px 12px;border-radius:20px;cursor:pointer;background:var(--bg);border:1px solid var(--border);color:var(--sub);transition:all 150ms ease;white-space:nowrap;}
    .cmd-btn:hover{background:var(--border);}
    .cmd-btn.cmd-current{background:var(--ink);color:var(--bg);border-color:var(--ink);}

    /* ── DATA MANAGER ── */
    .data-manager{border-top:1px solid var(--border);padding-top:20px;}
    .dm-toggle-btn{font-size:11px;font-weight:700;letter-spacing:.03em;padding:8px 14px;border-radius:6px;cursor:pointer;background:var(--bg2);border:1px solid var(--border);color:var(--sub);transition:background 150ms ease;width:100%;text-align:left;}
    .dm-toggle-btn:hover{background:var(--border);}
    .dm-body{margin-top:14px;padding:20px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);display:none;}
    .dm-body.open{display:block;}
    .dm-label{font-size:10px;font-weight:700;color:var(--sub);margin-bottom:6px;}
    .dm-hint{font-size:9.5px;color:var(--faint);line-height:1.75;margin-bottom:12px;}
    .dm-hint code{background:var(--bg2);border:.5px solid var(--border);border-radius:3px;padding:0 4px;font-family:'SF Mono','Fira Mono',monospace;font-size:8.5px;color:var(--sub);}
    .dm-textarea{width:100%;font-size:11.5px;font-family:'SF Mono','Fira Mono',monospace;padding:10px 12px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--ink);resize:vertical;min-height:140px;line-height:1.6;scrollbar-width:thin;}
    .dm-textarea:focus{outline:none;border-color:#4878a0;box-shadow:0 0 0 2px rgba(72,120,160,0.12);}
    .dm-actions{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
    .dm-sync-btn{font-size:11px;font-weight:700;padding:7px 16px;border-radius:5px;cursor:pointer;background:#2e5d8a;border:none;color:#fff;transition:background 150ms ease;}
    .dm-sync-btn:hover{background:#1e4a72;}
    .dm-status{font-size:10.5px;color:var(--sub);}
    /* form editor */
    .dm-tab-bar{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;}
    .dm-tab-btn{font-size:9.5px;font-weight:700;letter-spacing:.04em;padding:4px 13px;border-radius:20px;cursor:pointer;background:var(--bg2);border:1px solid var(--border);color:var(--sub);transition:all 120ms ease;}
    .dm-tab-btn:hover{background:var(--border);}
    .dm-tab-btn.dm-tab-active{background:var(--ink);color:var(--bg);border-color:var(--ink);}
    .dm-node-list,.dm-card-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
    .dm-entry{border:1px solid var(--border);border-radius:6px;background:var(--bg);overflow:hidden;}
    .dm-entry-hdr{display:flex;align-items:center;gap:6px;padding:8px 12px;}
    .dm-entry-title{flex:1;font-size:11px;font-weight:600;color:var(--ink);}
    .dm-entry-toggle,.dm-entry-del{font-size:11px;padding:1px 7px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--sub);flex-shrink:0;transition:background 120ms ease;}
    .dm-entry-toggle:hover{background:var(--border);}
    .dm-entry-del{color:#a06050;border-color:rgba(160,96,80,.3);}
    .dm-entry-del:hover{background:rgba(160,96,80,.1);}
    .dm-entry-body{padding:10px 12px 12px;border-top:1px solid var(--border);background:var(--bg2);}
    .dm-field-row{display:grid;gap:8px;margin-bottom:8px;}
    .dm-field-row:last-child{margin-bottom:0;}
    .dm-fr3{grid-template-columns:72px 1fr 72px;}
    .dm-fr4{grid-template-columns:60px 46px 1fr 66px;}
    .dm-fr2{grid-template-columns:1fr 1fr;}
    .dm-fr1{grid-template-columns:1fr;}
    .dm-field{display:flex;flex-direction:column;gap:3px;}
    .dm-field-lbl{font-size:7.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);}

    .dm-inp:focus{outline:none;border-color:#4878a0;}

    .dm-ta:focus{outline:none;border-color:#4878a0;}
    .dm-sel{font-size:11.5px;padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--ink);width:100%;cursor:pointer;}
    .dm-sel:focus{outline:none;border-color:#4878a0;}

    .dm-add-btn:hover{background:var(--border);}

    /* dm modal */
    .dm-overlay{position:fixed;inset:0;z-index:850;background:rgba(40,38,31,0.42);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;opacity:0;pointer-events:none;transition:opacity 200ms ease;overflow-y:auto;}
    .dm-overlay.open{opacity:1;pointer-events:all;}
    .dm-modal{background:var(--bg);border:1px solid var(--border);border-radius:12px;width:100%;max-width:660px;box-shadow:0 14px 44px rgba(40,38,31,0.22);transform:scale(0.96) translateY(12px);transition:transform 200ms ease;flex-shrink:0;}
    .dm-overlay.open .dm-modal{transform:scale(1) translateY(0);}
    .dm-modal-head{display:flex;align-items:center;padding:16px 20px 14px;border-bottom:1px solid var(--border);}
    .dm-modal-title{flex:1;font-size:13px;font-weight:700;color:var(--ink);}
    .dm-modal-close{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);cursor:pointer;font-size:16px;color:var(--sub);display:flex;align-items:center;justify-content:center;transition:background 140ms ease;}
    .dm-modal-close:hover{background:var(--border);}
    .dm-help-wrap{position:relative;margin-right:8px;display:flex;align-items:center;}
    .dm-help-btn{width:22px;height:22px;border-radius:50%;background:transparent;border:none;cursor:default;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--faint);transition:color 140ms ease;padding:0;}
    .dm-help-wrap:hover .dm-help-btn{color:var(--sub);}
    .dm-help-tip{position:absolute;top:calc(100% + 10px);right:0;width:252px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:13px 15px 14px;font-size:10.5px;color:var(--sub);line-height:1.75;box-shadow:0 8px 24px rgba(40,38,31,0.14);z-index:900;opacity:0;pointer-events:none;transition:opacity 150ms ease;}
    .dm-help-wrap:hover .dm-help-tip{opacity:1;pointer-events:auto;}
    .dm-help-tip-title{font-size:11.5px;font-weight:700;color:var(--ink);margin-bottom:8px;}
    .dm-help-tip-sec{font-weight:700;color:var(--ink);margin-top:9px;margin-bottom:2px;}
    .dm-help-code{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-family:monospace;font-size:10px;}
    .dm-modal-body{padding:18px 20px 26px;max-height:calc(100vh - 160px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
    /* sidebar dm button */
    .sp-dm-btn{display:block;width:100%;margin-top:12px;padding:8px 12px;font-size:11px;font-weight:700;letter-spacing:.03em;cursor:pointer;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--sub);text-align:left;transition:background 140ms ease;}
    .sp-dm-btn:hover{background:var(--border);}

    /* ── MOBILE ── */
    @media (max-width:680px){
      #app{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
      #status-panel{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:16px;flex-direction:row;flex-wrap:wrap;align-items:center;gap:10px;}
      .sp-lens-section{margin-top:0;padding-top:0;border-top:none;margin-left:auto;}
      .sp-url-hint{display:none;}
      #content-area{padding:18px 14px 40px;}
      .preview-grid{grid-template-columns:repeat(2,1fr);}
      .lm-grid{grid-template-columns:1fr;}
      .commander-panel{gap:7px;}
    }
  </style>
</head>

    /* Commander panel: DOM created ONLY when lens === 'myself' */
    if (lens==='myself') { ap(area,renderCommanderPanel()); }

    /* Standalone lenses: full custom layout, no pipeline */
    if (isStandalone) { ap(area, renderStandaloneSection(lens)); return; }

    /* Public lens: text + 3 circles, no pipeline */
    if (lens==='public') { ap(area, renderPublicSection()); return; }

    /* Pipeline: engineering, myself */
    var pipeSection=el('div',{className:'section'});
    var sLabel=el('div',{className:'section-label'}); ap(sLabel,txt('Timeline'));
    ap(pipeSection,sLabel,renderPipeline(lens));
    ap(area,pipeSection);

    /* Engineering section */
    if (lens==='engineering') { ap(area,renderEngSection()); }
  }

  /* ── INIT ── */
  function init() {
    loadPersistedData();
    var lens=parseLens();
    renderStatusPanel(lens); renderContent(lens);
    var overlay=document.getElementById('modal-overlay');
    if (overlay) { overlay.addEventListener('click',function(e){if(e.target===overlay)closeModal();}); }
    var dmOverlay=document.getElementById('dm-overlay');
    if (dmOverlay) { dmOverlay.addEventListener('click',function(e){if(e.target===dmOverlay)closeDmModal();}); }
    document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closeDmModal();}});
    var lensAvInput=document.getElementById('lens-avatar-input');
    if(lensAvInput){lensAvInput.addEventListener('change',function(){
      var file=this.files&&this.files[0]; if(!file||!file.type.startsWith('image/')||!_lensAvatarTarget) return;
      var target=_lensAvatarTarget;
      this.value=''; _lensAvatarTarget='';
      compressImg(file,480,0.82,function(dataUrl){
        TINA_DATA_MATRIX.lensAvatars[target]=dataUrl;
        persistData();
        var curLens=parseLens();
        if(curLens==='public') renderContent('public');
        renderStatusPanel(curLens);
        var dm=document.getElementById('dm-modal'); if(dm&&dm.children.length) openDmModal();
      });
    });}
    var avatarInput=document.getElementById('avatar-file-input');
    if(avatarInput){avatarInput.addEventListener('change',function(){
      var file=this.files&&this.files[0]; if(!file||!file.type.startsWith('image/')) return;
      this.value='';
      compressImg(file,480,0.82,function(dataUrl){
        TINA_DATA_MATRIX.avatarImg=dataUrl; persistData(); renderStatusPanel(parseLens());
      });
    });}
  }

  if (document.readyState==='loading') { document.addEventListener('DOMContentLoaded',init); } else { init(); }
}());
</script>
</body>
</html>
