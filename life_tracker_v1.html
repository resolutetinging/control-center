<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人生軌跡觀測儀</title>
  <style>
    /* ── TOKENS ── */
    :root {
      --bg:      #f4f1ec;
      --bg2:     #eceae3;
      --ink:     #28261f;
      --sub:     #55514a;
      --border:  #dcd9d2;
      --faint:   #9e9890;
      --bg-card: #f8f6f1;
      --sidebar-w: 238px;
      --r: 8px;
      --track-label-w: 72px;
      --track-h: 72px;
      --pipe-h: 7px;
      --node-d: 17px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang TC', sans-serif;
      background: var(--bg); color: var(--ink); font-size: 13.5px;
      line-height: 1.65; min-height: 100vh;
    }

    /* ── LAYOUT ── */
    #app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }

    /* ── STATUS PANEL ── */
    #status-panel {
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
      background: var(--bg); border-right: 1px solid var(--border);
      padding: 30px 18px 24px; display: flex; flex-direction: column;
      gap: 22px; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .avatar-wrap { display: flex; justify-content: center; }
    .avatar {
      width: 68px; height: 68px; border-radius: 50%; background: var(--bg2);
      border: 1.5px solid var(--border); display: flex; align-items: center;
      justify-content: center; font-size: 13px; color: var(--faint);
    }
    .sp-name { font-size: 15px; font-weight: 700; color: var(--ink); text-align: center; }
    .sp-role { font-size: 10.5px; color: var(--faint); text-align: center; margin-top: 3px; }
    .sp-section-title {
      font-size: 8.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      color: var(--faint); padding-bottom: 7px; border-bottom: 1px solid var(--border);
    }
    .sp-tag-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
    .sp-tag {
      font-size: 10px; padding: 2px 9px; border-radius: 20px;
      background: var(--bg2); border: .5px solid var(--border); color: var(--sub);
    }
    .lens-badge {
      display: inline-flex; align-items: center; gap: 5px; font-size: 10px;
      font-weight: 700; padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border);
      margin-top: 8px; white-space: nowrap;
    }
    .lens-badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .lens-desc { font-size: 10px; color: var(--faint); margin-top: 7px; line-height: 1.55; }
    .sp-lens-section { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
    .sp-url-hint { margin-top: 12px; font-size: 9px; color: var(--faint); line-height: 1.8; }
    .sp-url-hint code {
      background: var(--bg2); border: .5px solid var(--border); border-radius: 3px;
      padding: 0 4px; font-family: 'SF Mono', 'Fira Mono', monospace; font-size: 8.5px; color: var(--sub);
    }

    /* ── CONTENT AREA ── */
    #content-area { padding: 30px 26px 48px; min-height: 100vh; }
    .content-header { margin-bottom: 24px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
    .content-title { font-size: 21px; font-weight: 300; color: var(--ink); letter-spacing: -.4px; }
    .content-subtitle { font-size: 11.5px; color: var(--faint); margin-top: 5px; }
    .content-lens-badge {
      display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px; margin-top: 10px; border: 1px solid transparent;
    }
    .section { margin-bottom: 36px; }
    .section-label {
      font-size: 8.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
      color: var(--faint); margin-bottom: 14px; display: flex; align-items: center; gap: 0;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); margin-left: 10px; }

    /* ── PIPELINE ── */
    .pipeline-wrap {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 18px 16px 26px;
      overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .pipeline-inner { min-width: 540px; }

    /* Each row = label spacer + content; both axis and track rows share same structure */
    .pl-row { display: flex; }
    .pl-label {
      width: var(--track-label-w); flex-shrink: 0;
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 10px;
    }
    .pl-content { flex: 1; position: relative; }

    /* Year axis */
    .axis-row { height: 28px; margin-bottom: 4px; align-items: flex-end; }
    .year-tick {
      position: absolute; bottom: 0; font-size: 9px; font-weight: 600;
      color: var(--faint); transform: translateX(-50%); white-space: nowrap;
    }
    .year-tick::before {
      content: ''; display: block; width: 1px; height: 4px;
      background: var(--border); margin: 0 auto 2px;
    }

    /* Track row */
    .track-row { height: var(--track-h); transition: opacity 260ms ease; }
    .track-row.vis-active  { opacity: 1; }
    .track-row.vis-partial { opacity: 0.5; }
    .track-row.vis-dimmed  { opacity: 0.09; pointer-events: none; }

    .track-label-inner { display: flex; align-items: center; gap: 4px; }
    .track-label-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .track-label-text { font-size: 9.5px; font-weight: 700; letter-spacing: .04em; }

    /* Guide lines */
    .guide-line {
      position: absolute; top: 0; bottom: 0; width: 1px;
      background: rgba(40,38,31,0.045); pointer-events: none;
    }

    /* Pipe line */
    .pipe-line {
      position: absolute; top: 50%; left: 0; right: 0;
      height: var(--pipe-h); border-radius: calc(var(--pipe-h) / 2);
      transform: translateY(-50%); pointer-events: none;
    }

    /* Milestone node */
    .ms-node {
      position: absolute; top: 50%;
      width: var(--node-d); height: var(--node-d); border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 2.5px solid rgba(255,255,255,0.88);
      box-shadow: 0 1px 5px rgba(0,0,0,0.18);
      cursor: pointer; z-index: 3;
      transition: transform 130ms ease, box-shadow 130ms ease;
    }
    .ms-node:hover {
      transform: translate(-50%,-50%) scale(1.35);
      box-shadow: 0 3px 10px rgba(0,0,0,0.26);
    }

    /* Node short label below pipe */
    .ms-label {
      position: absolute; top: calc(50% + 12px);
      font-size: 8.5px; font-weight: 700; letter-spacing: .04em;
      transform: translateX(-50%); pointer-events: none; white-space: nowrap;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(40,38,31,0.42);
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 200ms ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: calc(var(--r) * 1.5); width: 100%; max-width: 520px;
      max-height: calc(100vh - 80px); overflow-y: auto;
      box-shadow: 0 10px 40px rgba(40,38,31,0.24);
      transform: scale(0.95) translateY(8px); transition: transform 200ms ease;
    }
    .modal-overlay.open .modal-card { transform: scale(1) translateY(0); }

    .modal-head {
      padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 10px;
    }
    .modal-track-tag {
      flex-shrink: 0; font-size: 9px; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; padding: 2px 9px; border-radius: 20px;
      border: 1px solid transparent; margin-top: 4px; white-space: nowrap;
    }
    .modal-title-block { flex: 1; min-width: 0; }
    .modal-year-label { font-size: 10px; font-weight: 600; color: var(--faint); }
    .modal-title { font-size: 16.5px; font-weight: 700; color: var(--ink); margin-top: 2px; line-height: 1.3; }
    .modal-subtitle { font-size: 11.5px; color: var(--sub); margin-top: 4px; line-height: 1.5; }
    .modal-close-btn {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      background: var(--bg2); border: 1px solid var(--border); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: var(--sub); transition: background 160ms ease; margin-top: -2px;
    }
    .modal-close-btn:hover { background: var(--border); }

    .modal-body { padding: 16px 20px 22px; display: flex; flex-direction: column; gap: 14px; }
    .star-block { }
    .star-key {
      display: flex; align-items: center; font-size: 8px; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase; margin-bottom: 5px;
    }
    .star-key::after { content: ''; flex: 1; height: 1px; background: var(--border); margin-left: 8px; }
    .star-val { font-size: 12px; color: var(--sub); line-height: 1.7; }

    /* ── MOBILE ── */
    @media (max-width: 680px) {
      #app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      #status-panel {
        position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border);
        padding: 16px; flex-direction: row; flex-wrap: wrap; align-items: center; gap: 10px;
      }
      .sp-lens-section { margin-top: 0; padding-top: 0; border-top: none; margin-left: auto; }
      .sp-url-hint { display: none; }
      #content-area { padding: 18px 14px 40px; }
    }
  </style>
</head>
<body>
<div id="app">
  <aside id="status-panel"></aside>
  <main id="content-area"></main>
</div>
<div id="modal-overlay" class="modal-overlay">
  <div id="modal-card" class="modal-card" role="dialog" aria-modal="true"></div>
</div>

        R:'完成 100 盤以上實練；格局誤判率顯著下降；確立務實心理取向的解盤風格。',
      }},
    { id:'d3', year:2024, track:'divination', label:'諮詢',
      title:'開始提供個人諮詢', subtitle:'命理知識服務化的第一步',
      star:{
        S:'師傳認可解盤能力後，友人主動尋求諮詢，決定以正式框架承接，建立服務邊界。',
        T:'建立清晰的服務邊界、收費機制與諮詢流程，讓命理知識以可持續的方式提供。',
        A:'設計諮詢表單與前置問卷；制定服務說明；以月接案量上限保護服務品質。',
        R:'首季滿意度 4.8/5；口碑轉介率 70%；建立候補名單機制，供需平衡初步成立。',
      }},
    { id:'d4', year:2026, track:'divination', label:'平台',
      title:'斗數預約平台建立', subtitle:'服務流程正式化 · 公開接案',
      star:{
        S:'口碑諮詢已達容量上限，需要系統化預約機制，降低每次行政溝通成本。',
        T:'建立公開預約入口，整合服務說明與個人命理觀點，形成完整的服務品牌。',
        A:'將斗數預約整合至觀測儀公眾視角；設計預約→前置問卷→確認 SOP。',
        R:'（進行中）預約入口 Stage 3 建設中；目標：2026 Q3 公開預約功能正式上線。',
      }},
  ];

  /* ── SAFE DOM UTILS ── */

  function el(tag, props) {
    var node = document.createElement(tag);
    if (props) {
      Object.keys(props).forEach(function (k) {
        var v = props[k];
        if (k === 'style' && typeof v === 'object') {
          Object.keys(v).forEach(function (sk) { node.style[sk] = v[sk]; });
        } else if (k === 'className') {
          node.className = v;
        } else if (k === 'tabIndex') {
          node.tabIndex = v;
        } else {
          node.setAttribute(k, v);
        }
      });
    }
    return node;
  }
  function txt(s) { return document.createTextNode(String(s == null ? '' : s)); }
  function ap(p) {
    var args = Array.prototype.slice.call(arguments, 1);
    args.forEach(function (c) { if (c != null) p.appendChild(c instanceof Node ? c : txt(c)); });
    return p;
  }
  function clearNode(n) { while (n.firstChild) n.removeChild(n.firstChild); }

  /* ── ROUTING ── */
  function parseLens() {
    var raw = '';
    try { raw = new URLSearchParams(window.location.search).get('lens') || ''; } catch (e) {}
    return Object.prototype.hasOwnProperty.call(LENS_META, raw) ? raw : 'public';
  }

  /* ── MODAL ── */
  function openModal(ms) {
    var overlay = document.getElementById('modal-overlay');
    var card    = document.getElementById('modal-card');
    if (!overlay || !card) return;
    clearNode(card);
    var tm = TRACK_META[ms.track];

    var tag = el('span', { className:'modal-track-tag',
      style:{ background: tm.color+'1a', color: tm.color, borderColor: tm.color+'55' }});
    ap(tag, txt(tm.label));

    var yrEl  = el('div', { className:'modal-year-label' }); ap(yrEl, txt(ms.year + ' · ' + ms.label));
    var titEl = el('div', { className:'modal-title' });      ap(titEl, txt(ms.title));
    var subEl = el('div', { className:'modal-subtitle' });   ap(subEl, txt(ms.subtitle));
    var tblock = el('div', { className:'modal-title-block' }); ap(tblock, yrEl, titEl, subEl);

    var closeBtn = el('button', { className:'modal-close-btn', 'aria-label':'關閉', tabIndex:0 });
    ap(closeBtn, txt('×'));
    closeBtn.addEventListener('click', closeModal);

    var head = el('div', { className:'modal-head' }); ap(head, tag, tblock, closeBtn);

    var body = el('div', { className:'modal-body' });
    [['S','Situation 情境'],['T','Task 任務'],['A','Action 行動'],['R','Result 成果']].forEach(function (pair) {
      var block  = el('div', { className:'star-block' });
      var keyEl  = el('div', { className:'star-key' });
      var keySpan = el('span', { style:{ color: tm.color } }); ap(keySpan, txt(pair[1]));
      ap(keyEl, keySpan);
      var valEl  = el('div', { className:'star-val' }); ap(valEl, txt(ms.star[pair[0]]));
      ap(block, keyEl, valEl); ap(body, block);
    });

    ap(card, head, body);
    overlay.classList.add('open');
    closeBtn.focus();
  }

  function closeModal() {
    var ov = document.getElementById('modal-overlay');
    if (ov) ov.classList.remove('open');
  }

  /* ── STATUS PANEL ── */
  function renderStatusPanel(lens) {
    var panel = document.getElementById('status-panel');
    clearNode(panel);
    var meta = LENS_META[lens];

    var avatarWrap = el('div', { className:'avatar-wrap' });
    var avatar = el('div', { className:'avatar' }); ap(avatar, txt('△')); ap(avatarWrap, avatar);

    var name = el('p', { className:'sp-name' }); ap(name, txt('人生軌跡觀測儀'));
    var role = el('p', { className:'sp-role' }); ap(role, txt('Stage 2 · 水管時間軸'));
    var ident = el('div', { style:{ textAlign:'center' } }); ap(ident, name, role);

    var tagsTitle = el('div', { className:'sp-section-title' }); ap(tagsTitle, txt('識別標籤'));
    var tagGroup  = el('div', { className:'sp-tag-group' });
    ['Stage 2','Pipeline','里程碑 STAR','三軌並行'].forEach(function (t) {
      var tag = el('span', { className:'sp-tag' }); ap(tag, txt(t)); ap(tagGroup, tag);
    });
    var tagsSection = el('div', {}); ap(tagsSection, tagsTitle, tagGroup);

    var lensTitle = el('div', { className:'sp-section-title' }); ap(lensTitle, txt('當前視角'));
    var dot   = el('span', { className:'lens-badge-dot', style:{ background: meta.color } });
    var badge = el('div', { className:'lens-badge',
      style:{ color: meta.color, borderColor: meta.border, background: meta.bg } });
    ap(badge, dot, txt(meta.icon + ' ' + meta.label));
    var desc  = el('p', { className:'lens-desc' }); ap(desc, txt(meta.desc));

    var hintWrap = el('div', { className:'sp-url-hint' });
    ap(hintWrap, txt('視角切換 URL：'));
    ['?lens=creative','?lens=engineering','?lens=myself'].forEach(function (c, i, arr) {
      var code = el('code', {}); ap(code, txt(c)); ap(hintWrap, code);
      if (i < arr.length - 1) ap(hintWrap, txt(' '));
    });

    var lensSection = el('div', { className:'sp-lens-section' });
    ap(lensSection, lensTitle, badge, desc, hintWrap);
    ap(panel, avatarWrap, ident, tagsSection, lensSection);
  }

  /* ── PIPELINE ── */
  function renderPipeline(lens) {
    var visMap    = VIS[lens] || VIS.public;
    var yearMarks = [2012,2014,2016,2018,2020,2022,2024,2026];

    var wrap  = el('div', { className:'pipeline-wrap' });
    var inner = el('div', { className:'pipeline-inner' });

    /* Year axis */
    var axisRow = el('div', { className:'pl-row axis-row' });
    ap(axisRow, el('div', { className:'pl-label' })); /* spacer */
    var axisContent = el('div', { className:'pl-content' });
    yearMarks.forEach(function (y) {
      var tick = el('span', { className:'year-tick', style:{ left: pct(y) } });
      ap(tick, txt(y));
      ap(axisContent, tick);
    });
    ap(axisRow, axisContent);
    ap(inner, axisRow);

    /* Track rows */
    TRACK_ORDER.forEach(function (trackId) {
      var tm  = TRACK_META[trackId];
      var vis = visMap[trackId] || 'dimmed';
      var isActive = (vis === 'active');

      var row = el('div', { className:'pl-row track-row vis-' + vis });

      /* Label */
      var labelCell = el('div', { className:'pl-label' });
      var labelIn   = el('div', { className:'track-label-inner' });
      var ldot  = el('span', { className:'track-label-dot', style:{ background: tm.color } });
      var ltext = el('span', { className:'track-label-text', style:{ color: tm.color } });
      ap(ltext, txt(tm.label)); ap(labelIn, ldot, ltext); ap(labelCell, labelIn);
      ap(row, labelCell);

      /* Pipe content */
      var pipeContent = el('div', { className:'pl-content' });

      /* Guide lines */
      yearMarks.forEach(function (y) {
        ap(pipeContent, el('span', { className:'guide-line', style:{ left: pct(y) } }));
      });

      /* Pipe line */
      var pipeLine = el('div', { className:'pipe-line', style:{
        background: tm.gradient,
        boxShadow: isActive
          ? '0 1px 8px '+tm.glow+', 0 0 18px '+tm.glow+', inset 0 -2px 4px rgba(255,255,255,0.12), inset 0 2px 4px rgba(0,0,0,0.14)'
          : 'inset 0 -1px 3px rgba(255,255,255,0.10), inset 0 1px 3px rgba(0,0,0,0.10)',
      }});
      ap(pipeContent, pipeLine);

      /* Nodes */
      MS.filter(function (m) { return m.track === trackId; }).forEach(function (m) {
        var canClick = (vis !== 'dimmed');
        var node = el('div', {
          className:'ms-node', role:'button', tabIndex: canClick ? 0 : -1,
          'aria-label': m.year + '年 ' + m.title,
          style:{ left: pct(m.year), background: tm.color },
        });
        if (canClick) {
          node.addEventListener('click', (function (ms) { return function () { openModal(ms); }; })(m));
          node.addEventListener('keydown', (function (ms) {
            return function (e) { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); openModal(ms); } };
          })(m));
        }
        var nlabel = el('div', { className:'ms-label', style:{ left: pct(m.year), color: tm.color } });
        ap(nlabel, txt(m.label));
        ap(pipeContent, node, nlabel);
      });

      ap(row, pipeContent);
      ap(inner, row);
    });

    ap(wrap, inner);
    return wrap;
  }

  /* ── CONTENT AREA ── */
  function renderContent(lens) {
    var area = document.getElementById('content-area');
    clearNode(area);
    var meta = LENS_META[lens];

    var titleEl = el('h1', { className:'content-title' }); ap(titleEl, txt('人生軌跡觀測儀'));
    var subEl   = el('p',  { className:'content-subtitle' }); ap(subEl, txt('個人生命數據整合平台 · 2012–2026 里程碑水管圖'));
    var dot     = el('span', { className:'lens-badge-dot', style:{ background: meta.color } });
    var lbadge  = el('div', { className:'content-lens-badge',
      style:{ color: meta.color, background: meta.bg, borderColor: meta.border } });
    ap(lbadge, dot, txt(meta.icon + ' ' + meta.label));
    var header = el('div', { className:'content-header' }); ap(header, titleEl, subEl, lbadge);
    ap(area, header);

    var pipeSection = el('div', { className:'section' });
    var sLabel = el('div', { className:'section-label' }); ap(sLabel, txt('時間軸水管圖 2012–2026'));
    ap(pipeSection, sLabel, renderPipeline(lens));

    var hint = el('p', { style:{ fontSize:'10.5px', color:'#9e9890', marginTop:'10px', lineHeight:'1.6' } });
    ap(hint, txt('點擊軌道上的節點，展開里程碑詳細 STAR 資料。'));
    ap(pipeSection, hint);
    ap(area, pipeSection);
  }

  /* ── INIT ── */
  function init() {
    var lens = parseLens();
    renderStatusPanel(lens);
    renderContent(lens);

    var overlay = document.getElementById('modal-overlay');
    if (overlay) {
      overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });
    }
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
}());
</script>
</body>
</html>
