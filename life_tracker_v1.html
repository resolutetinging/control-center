<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人生軌跡觀測儀</title>
  <style>
    /* ── TOKENS ── */
    :root {
      --bg:      #f4f1ec; --bg2:     #eceae3; --ink:     #28261f;
      --sub:     #55514a; --border:  #dcd9d2; --faint:   #9e9890; --bg-card: #f8f6f1;
      --sidebar-w: 238px; --r: 8px;
      --track-label-w: 72px; --track-h: 72px; --pipe-h: 7px; --node-d: 17px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang TC', sans-serif;
      background: var(--bg); color: var(--ink); font-size: 13.5px; line-height: 1.65; min-height: 100vh;
    }

    /* ── LAYOUT ── */
    #app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }

    /* ── STATUS PANEL ── */
    #status-panel {
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
      background: var(--bg); border-right: 1px solid var(--border);
      padding: 30px 18px 24px; display: flex; flex-direction: column;
      gap: 22px; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .avatar-wrap { display: flex; justify-content: center; }
    .avatar { width: 68px; height: 68px; border-radius: 50%; background: var(--bg2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--faint); }
    .sp-name { font-size: 15px; font-weight: 700; color: var(--ink); text-align: center; }
    .sp-role { font-size: 10.5px; color: var(--faint); text-align: center; margin-top: 3px; }
    .sp-section-title { font-size: 8.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--faint); padding-bottom: 7px; border-bottom: 1px solid var(--border); }
    .sp-tag-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
    .sp-tag { font-size: 10px; padding: 2px 9px; border-radius: 20px; background: var(--bg2); border: .5px solid var(--border); color: var(--sub); }
    .lens-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border); margin-top: 8px; white-space: nowrap; }
    .lens-badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .lens-desc { font-size: 10px; color: var(--faint); margin-top: 7px; line-height: 1.55; }
    .sp-lens-section { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
    .sp-url-hint { margin-top: 12px; font-size: 9px; color: var(--faint); line-height: 1.8; }
    .sp-url-hint code { background: var(--bg2); border: .5px solid var(--border); border-radius: 3px; padding: 0 4px; font-family: 'SF Mono','Fira Mono',monospace; font-size: 8.5px; color: var(--sub); }

    /* ── CONTENT AREA ── */
    #content-area { padding: 30px 26px 48px; min-height: 100vh; }
    .content-header { margin-bottom: 24px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
    .content-title { font-size: 21px; font-weight: 300; color: var(--ink); letter-spacing: -.4px; }
    .content-subtitle { font-size: 11.5px; color: var(--faint); margin-top: 5px; }
    .content-lens-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-top: 10px; border: 1px solid transparent; }
    .section { margin-bottom: 36px; }
    .section-label { font-size: 8.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--faint); margin-bottom: 14px; display: flex; align-items: center; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); margin-left: 10px; }

    /* ── PIPELINE ── */
    .pipeline-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 18px 16px 26px; overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .pipeline-inner { min-width: 540px; }
    .pl-row { display: flex; }
    .pl-label { width: var(--track-label-w); flex-shrink: 0; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; }
    .pl-content { flex: 1; position: relative; }
    .axis-row { height: 28px; margin-bottom: 4px; align-items: flex-end; }
    .year-tick { position: absolute; bottom: 0; font-size: 9px; font-weight: 600; color: var(--faint); transform: translateX(-50%); white-space: nowrap; }
    .year-tick::before { content: ''; display: block; width: 1px; height: 4px; background: var(--border); margin: 0 auto 2px; }
    .track-row { height: var(--track-h); transition: opacity 260ms ease; }
    .track-row.vis-active { opacity: 1; } .track-row.vis-partial { opacity: 0.5; } .track-row.vis-dimmed { opacity: 0.09; pointer-events: none; }
    .track-label-inner { display: flex; align-items: center; gap: 4px; }
    .track-label-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .track-label-text { font-size: 9.5px; font-weight: 700; letter-spacing: .04em; }
    .guide-line { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(40,38,31,0.045); pointer-events: none; }
    .pipe-line { position: absolute; top: 50%; left: 0; right: 0; height: var(--pipe-h); border-radius: calc(var(--pipe-h)/2); transform: translateY(-50%); pointer-events: none; }
    .ms-node { position: absolute; top: 50%; width: var(--node-d); height: var(--node-d); border-radius: 50%; transform: translate(-50%,-50%); border: 2.5px solid rgba(255,255,255,0.88); box-shadow: 0 1px 5px rgba(0,0,0,0.18); cursor: pointer; z-index: 3; transition: transform 130ms ease, box-shadow 130ms ease; }
    .ms-node:hover { transform: translate(-50%,-50%) scale(1.35); box-shadow: 0 3px 10px rgba(0,0,0,0.26); }
    .ms-label { position: absolute; top: calc(50% + 12px); font-size: 8.5px; font-weight: 700; letter-spacing: .04em; transform: translateX(-50%); pointer-events: none; white-space: nowrap; }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; z-index: 900; background: rgba(40,38,31,0.42); display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 200ms ease; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-card { background: var(--bg); border: 1px solid var(--border); border-radius: calc(var(--r)*1.5); width: 100%; max-width: 520px; max-height: calc(100vh - 80px); overflow-y: auto; box-shadow: 0 10px 40px rgba(40,38,31,0.24); transform: scale(0.95) translateY(8px); transition: transform 200ms ease; }
    .modal-overlay.open .modal-card { transform: scale(1) translateY(0); }
    .modal-head { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; }
    .modal-track-tag { flex-shrink: 0; font-size: 9px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 2px 9px; border-radius: 20px; border: 1px solid transparent; margin-top: 4px; white-space: nowrap; }
    .modal-title-block { flex: 1; min-width: 0; }
    .modal-year-label { font-size: 10px; font-weight: 600; color: var(--faint); }
    .modal-title { font-size: 16.5px; font-weight: 700; color: var(--ink); margin-top: 2px; line-height: 1.3; }
    .modal-subtitle { font-size: 11.5px; color: var(--sub); margin-top: 4px; line-height: 1.5; }
    .modal-close-btn { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: var(--bg2); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--sub); transition: background 160ms ease; margin-top: -2px; }
    .modal-close-btn:hover { background: var(--border); }
    .modal-body { padding: 16px 20px 22px; display: flex; flex-direction: column; gap: 14px; }
    .star-block { }
    .star-key { display: flex; align-items: center; font-size: 8px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 5px; }
    .star-key::after { content: ''; flex: 1; height: 1px; background: var(--border); margin-left: 8px; }
    .star-val { font-size: 12px; color: var(--sub); line-height: 1.7; }

    /* ── STAGE 3: CAPABILITY FILTER ── */
    .cap-filter-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px; }
    .cap-btn { font-size: 10.5px; font-weight: 700; letter-spacing: .04em; padding: 5px 15px; border-radius: 20px; cursor: pointer; background: var(--bg2); border: 1px solid var(--border); color: var(--sub); transition: background 150ms ease, color 150ms ease, border-color 150ms ease; white-space: nowrap; }
    .cap-btn.active { background: #2e5d8a; color: #fff; border-color: #2e5d8a; }
    .cap-btn:hover:not(.active) { background: var(--border); }

    /* ── STAGE 3: ENG PROJECT CARDS ── */
    .eng-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    .eng-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; transition: opacity 220ms ease; }
    .eng-card-inner { padding: 14px 16px 12px; }
    .eng-card-year { font-size: 9px; font-weight: 700; letter-spacing: .08em; color: var(--faint); display: block; }
    .eng-card-title { font-size: 13.5px; font-weight: 700; color: var(--ink); margin-top: 3px; line-height: 1.35; }
    .eng-card-sub { font-size: 11px; color: var(--faint); margin-top: 4px; line-height: 1.5; }
    .eng-cap-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
    .eng-cap-tag { font-size: 9px; font-weight: 700; letter-spacing: .05em; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; background: #e8f0f8; color: #2e5d8a; border: .5px solid #aaccdd; }
    .eng-kpi-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
    .eng-kpi-chip { font-size: 9.5px; padding: 2px 8px; border-radius: 4px; background: var(--bg2); border: .5px solid var(--border); color: var(--sub); }
    .eng-card-foot { padding: 9px 16px 11px; border-top: 1px solid var(--border); background: var(--bg2); }
    .drill-btn { font-size: 10px; font-weight: 700; letter-spacing: .03em; padding: 4px 12px; border-radius: 5px; cursor: pointer; background: transparent; border: 1px solid #7aaac8; color: #2e5d8a; transition: background 140ms ease; }
    .drill-btn:hover { background: #e8f0f8; }
    .star-expand { max-height: 0; overflow: hidden; transition: max-height 320ms cubic-bezier(0.4,0,0.2,1); }
    .star-expand.open { max-height: 900px; }
    .star-inner { padding: 14px 16px 16px; border-top: 1px dashed var(--border); }
    .eng-star-block { margin-bottom: 12px; }
    .eng-star-block:last-child { margin-bottom: 0; }
    .eng-star-key { display: flex; align-items: center; font-size: 8px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: #2e5d8a; margin-bottom: 4px; }
    .eng-star-key::after { content: ''; flex: 1; height: 1px; background: #ccdde8; margin-left: 8px; }

    /* ── STAGE 3: PORTFOLIO GRID ── */
    .portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .portfolio-item { border-radius: var(--r); overflow: hidden; height: 150px; position: relative; cursor: pointer; transition: transform 210ms ease, box-shadow 210ms ease; }
    .portfolio-item:hover { transform: scale(1.04); box-shadow: 0 6px 22px rgba(40,38,31,0.18); z-index: 2; }
    .portfolio-item.size-tall { height: 310px; }
    .portfolio-item.size-wide { grid-column: span 2; }
    .pf-placeholder { width: 100%; height: 100%; padding: 10px 12px; display: flex; flex-direction: column; justify-content: flex-end; }
    .pf-cat-tag { font-size: 8.5px; font-weight: 700; letter-spacing: .06em; display: inline-block; padding: 2px 8px; border-radius: 20px; background: rgba(255,255,255,0.55); color: var(--ink); margin-bottom: 4px; }
    .pf-title { font-size: 11px; font-weight: 700; color: var(--ink); line-height: 1.4; display: block; }
    .pf-stage-note { font-size: 8px; color: rgba(40,38,31,0.38); margin-top: 2px; display: block; }

    /* ── STAGE 3: DIVINATION BOARD ── */
    .divination-board { background: #fdf7f0; border: 1.5px solid #e0cdb8; border-radius: var(--r); padding: 22px 24px 24px; }
    .div-board-title { font-size: 14.5px; font-weight: 700; color: var(--ink); margin-bottom: 12px; }
    .div-board-philo { font-size: 12.5px; color: var(--sub); line-height: 1.85; margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid #e0cdb8; }
    .div-feature-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
    .div-feature-row { display: flex; align-items: flex-start; gap: 10px; }
    .div-feature-icon { font-size: 12px; color: var(--sub); flex-shrink: 0; margin-top: 2px; }
    .div-feature-text { font-size: 12px; color: var(--sub); line-height: 1.65; }
    .div-feature-label { font-weight: 700; color: var(--ink); font-size: 12px; }
    .div-board-note { font-size: 11px; color: var(--faint); line-height: 1.65; padding-top: 14px; border-top: 1px solid #e0cdb8; }

    /* ── STAGE 4: EMOTION PANEL ── */
    .emotion-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px 18px; }
    .emotion-panel-sub { font-size: 10.5px; color: var(--faint); margin-bottom: 12px; }
    .chart-wrap { width: 100%; overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .chart-wrap svg { min-width: 360px; }
    .chart-legend { display: flex; gap: 18px; margin-top: 10px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 10px; color: var(--sub); }
    .legend-line { display: inline-block; width: 22px; height: 2px; vertical-align: middle; flex-shrink: 0; }
    .legend-dash { background: repeating-linear-gradient(90deg,#b0a898 0,#b0a898 5px,transparent 5px,transparent 9px); }
    .legend-solid { background: #4878a0; }
    .hd-guard { margin-top: 14px; padding: 12px 16px; border-radius: 5px; background: var(--bg); border: 1px solid var(--border); border-left: 3px solid #4878a0; display: flex; align-items: flex-start; gap: 10px; }
    .hd-guard-icon { font-size: 14px; flex-shrink: 0; line-height: 1.5; }
    .hd-guard-body { flex: 1; }
    .hd-guard-title { font-size: 11.5px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
    .hd-guard-msg { font-size: 11px; color: var(--sub); line-height: 1.65; margin: 0; }

    /* ── STAGE 4: LIFE MATRIX ── */
    .life-matrix { background: #28241f; border: 1px solid #3c3830; border-radius: var(--r); padding: 22px 24px 24px; }
    .lm-title { font-size: 14px; font-weight: 700; color: #e4e0d8; margin-bottom: 4px; }
    .lm-subtitle { font-size: 10px; color: #706860; margin-bottom: 18px; letter-spacing: .03em; }
    .lm-section-title { font-size: 8px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #6898b0; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #3c3830; }
    .lm-section-title.mt { margin-top: 18px; }
    .lm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; }
    .lm-item { display: flex; flex-direction: column; gap: 4px; }
    .lm-cat { font-size: 8.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #98a4b0; }
    .lm-rule { font-size: 11px; color: #b4b0a8; line-height: 1.6; }
    .lm-filters { display: flex; flex-direction: column; }
    .lm-filter-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #33302b; }
    .lm-filter-item:last-child { border-bottom: none; }
    .lm-filter-cond { font-size: 9px; font-weight: 700; color: #98a4b0; flex-shrink: 0; width: 68px; padding-top: 2px; line-height: 1.4; }
    .lm-quote { margin-top: 18px; padding-top: 14px; border-top: 1px solid #3c3830; font-size: 11px; color: #6a6460; line-height: 1.8; font-style: italic; text-align: center; }

    /* ── MOBILE ── */
    @media (max-width: 680px) {
      #app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      #status-panel { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 16px; flex-direction: row; flex-wrap: wrap; align-items: center; gap: 10px; }
      .sp-lens-section { margin-top: 0; padding-top: 0; border-top: none; margin-left: auto; }
      .sp-url-hint { display: none; }
      #content-area { padding: 18px 14px 40px; }
      .portfolio-grid { grid-template-columns: repeat(2, 1fr); }
      .portfolio-item.size-wide { grid-column: span 1; }
      .lm-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="app">
  <aside id="status-panel"></aside>
  <main id="content-area"></main>
</div>
<div id="modal-overlay" class="modal-overlay">
  <div id="modal-card" class="modal-card" role="dialog" aria-modal="true"></div>
</div>
<script>
(function () {
  'use strict';

  /* ── CONFIG ── */
  var LENS_META = {
    public:      { label:'公眾視角',      icon:'◎', color:'#6a6a58', bg:'#f0ede8', border:'#c4c2b8', desc:'公開展示模式 · 僅顯示開放節點' },
    creative:    { label:'藝術創作者視角', icon:'◈', color:'#b8682e', bg:'#fdf0e4', border:'#d4a878', desc:'插畫 · 攝影 · 文具週邊 · 命理占驗' },
    engineering: { label:'專業工管視角',   icon:'◧', color:'#2e5d8a', bg:'#e8f0f8', border:'#7aaac8', desc:'13 年供應鏈與工業工程核心數據' },
    myself:      { label:'全觀自我視角',   icon:'◉', color:'#5a3878', bg:'#f0eaf8', border:'#a888c8', desc:'全軌道解鎖 · 含生理 / 情緒 / 防禦層' },
  };
  var TRACK_META = {
    engineering: { label:'工管專案', color:'#2e5d8a', glow:'rgba(46,93,138,0.32)', gradient:'linear-gradient(90deg,#1e4a72 0%,#2e6090 45%,#4e80b0 72%,#2e5d8a 100%)' },
    creative:    { label:'藝術創作', color:'#b8682e', glow:'rgba(184,104,46,0.30)', gradient:'linear-gradient(90deg,#8a481e 0%,#b8682e 45%,#d8884e 72%,#b8682e 100%)' },
    divination:  { label:'命理占驗', color:'#5a3878', glow:'rgba(90,56,120,0.30)',  gradient:'linear-gradient(90deg,#3e2060 0%,#5a3878 45%,#7a58a8 72%,#5a3878 100%)' },
  };
  var TRACK_ORDER = ['engineering','creative','divination'];
  var YEAR_START = 2012, YEAR_END = 2026;
  var VIS = {
    public:      { engineering:'dimmed',  creative:'partial', divination:'partial' },
    creative:    { engineering:'dimmed',  creative:'active',  divination:'dimmed'  },
    engineering: { engineering:'active',  creative:'dimmed',  divination:'dimmed'  },
    myself:      { engineering:'active',  creative:'active',  divination:'active'  },
  };
  function pct(year) { return ((year - YEAR_START) / (YEAR_END - YEAR_START) * 100).toFixed(3) + '%'; }

  /* ── STAGE 3 DATA ── */
  var ENG_PROJECTS = [
    { msId:'e1', caps:['流程優化','跨國協作'],              kpis:['物料缺失率 -35%','跨部門 SOP 建立'] },
    { msId:'e2', caps:['流程優化','危機處理','跨國協作'],   kpis:['齊套率提升至 96%','良率差異 <1.5%'] },
    { msId:'e3', caps:['流程優化','危機處理'],              kpis:['良率回升 99.2%','根因分析框架建立'] },
    { msId:'e4', caps:['流程優化','跨國協作'],              kpis:['培訓時間縮短 40%','SOP 覆蓋率 87%'] },
    { msId:'e5', caps:['危機處理'],                         kpis:['換軌框架建立','技能資產整理'] },
  ];
  var PORTFOLIO_ITEMS = [
    { id:'p1', cat:'插畫', title:'靈境物語 — 角色設計系列', bg:'linear-gradient(145deg,#e8d4b4,#d4bca0)', size:'tall' },
    { id:'p2', cat:'攝影', title:'光影田野 — 田野漫步',     bg:'linear-gradient(145deg,#c8d8c0,#b0c4a8)', size:'wide' },
    { id:'p3', cat:'週邊', title:'記事本設計稿 Vol.1',      bg:'linear-gradient(145deg,#d8c8a8,#c4b494)', size:''     },
    { id:'p4', cat:'插畫', title:'世界觀概念稿',            bg:'linear-gradient(145deg,#dcc8b0,#c8b09c)', size:''     },
    { id:'p5', cat:'攝影', title:'街頭靜物系列',            bg:'linear-gradient(145deg,#c0ccc8,#a8b8b4)', size:'tall' },
    { id:'p6', cat:'攝影', title:'光影練習 2022–2023',      bg:'linear-gradient(145deg,#c8d4d0,#b0c0bc)', size:''     },
  ];

  /* ── STAGE 4 DATA ── */
  var LIFE_MATRIX = {
    baselines: [
      { cat:'睡眠防線', rule:'深睡時段不可讓渡，入睡前一小時切斷螢幕輸入' },
      { cat:'創作底線', rule:'每週最低一件輸出，不論品質，動作比完美重要' },
      { cat:'能量配速', rule:'高能段只用於高密度任務，閒雜事歸入低能段消化' },

  /* ── SAFE DOM UTILS ── */
  function el(tag, props) {
    var node = document.createElement(tag);
    if (props) {
      Object.keys(props).forEach(function (k) {
        var v = props[k];
        if (k === 'style' && typeof v === 'object') {
          Object.keys(v).forEach(function (sk) { node.style[sk] = v[sk]; });
        } else if (k === 'className') { node.className = v;
        } else if (k === 'tabIndex') { node.tabIndex = v;
        } else { node.setAttribute(k, v); }
      });
    }
    return node;
  }
  function txt(s) { return document.createTextNode(String(s == null ? '' : s)); }
  function ap(p) {
    var args = Array.prototype.slice.call(arguments, 1);
    args.forEach(function (c) { if (c != null) p.appendChild(c instanceof Node ? c : txt(c)); });
    return p;
  }
  function clearNode(n) { while (n.firstChild) n.removeChild(n.firstChild); }

  /* ── SVG UTILS (Stage 4) ── */
  var SVG_NS = 'http://www.w3.org/2000/svg';
  function svgEl(tag) { return document.createElementNS(SVG_NS, tag); }
  function sattr(node, obj) {
    Object.keys(obj).forEach(function (k) { node.setAttribute(k, obj[k]); });
    return node;
  }
  function smoothPath(pts) {
    if (!pts.length) return '';
    var d = 'M' + pts[0][0].toFixed(2) + ',' + pts[0][1].toFixed(2);
    for (var i = 1; i < pts.length - 1; i++) {
      var mx = ((pts[i][0] + pts[i+1][0]) / 2).toFixed(2);
      var my = ((pts[i][1] + pts[i+1][1]) / 2).toFixed(2);
      d += ' Q' + pts[i][0].toFixed(2) + ',' + pts[i][1].toFixed(2) + ' ' + mx + ',' + my;
    }
    d += ' L' + pts[pts.length-1][0].toFixed(2) + ',' + pts[pts.length-1][1].toFixed(2);
    return d;
  }

  /* ── MOOD UTILS (Stage 4) ── */
  function generateDemoMood() {
    var d = new Date();
    var doy = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
    var out = [];
    for (var i = 17; i >= 0; i--) {
      var t = doy - i;
      var v = 5.5 + 2.2 * Math.sin(t * 0.38) + 0.9 * Math.sin(t * 0.91 + 0.8);
      out.push(Math.max(1, Math.min(10, Math.round(v))));
    }
    return out;
  }
  function readMoodData() {
    var scores = null;
    try {
      var tryKeys = ['mental_log', 'wt_log', 'daily_mood', 'mood_entries', 'wt_entries'];
      for (var k = 0; k < tryKeys.length && !scores; k++) {
        var raw = localStorage.getItem(tryKeys[k]);
        if (!raw) continue;
        var data = JSON.parse(raw);
        if (!Array.isArray(data) || data.length < 5) continue;
        var extracted = data.slice(-18).map(function (e) {
          if (typeof e === 'number') return Math.max(1, Math.min(10, Math.round(e)));
          if (e && typeof e.score === 'number') return Math.max(1, Math.min(10, Math.round(e.score)));
          if (e && typeof e.mood  === 'number') return Math.max(1, Math.min(10, Math.round(e.mood)));
          return null;
        }).filter(function (v) { return v !== null; });
        if (extracted.length >= 5) scores = extracted;
      }
    } catch (ignore) {}
    if (!scores || scores.length < 5) scores = generateDemoMood();
    while (scores.length < 18) scores.unshift(5);
    return scores.slice(-18);
  }
  function computeMA5(data) {
    return data.map(function (_, i) {
      var slice = data.slice(Math.max(0, i - 4), i + 1).filter(function (v) { return v != null; });
      if (!slice.length) return 5;
      return +(slice.reduce(function (s, v) { return s + v; }, 0) / slice.length).toFixed(1);
    });
  }

  /* ── SVG CHART (Stage 4) ── */
  function buildEmotionSVG(rawData, ma5Data) {
    var N = 18;
    var W = 560, H = 160, PL = 34, PR = 12, PT = 14, PB = 28;
    var CW = W - PL - PR, CH = H - PT - PB;
    function xp(i) { return +(PL + (i / (N - 1)) * CW).toFixed(2); }
    function yp(v) { return +(PT + (1 - (v - 1) / 9) * CH).toFixed(2); }

    var svg = svgEl('svg');
    svg.style.display = 'block'; svg.style.width = '100%';
    sattr(svg, { viewBox:'0 0 ' + W + ' ' + H });

    /* Horizontal grid lines + Y labels */
    [3, 5, 7, 9].forEach(function (yv) {
      var gy = yp(yv);
      svg.appendChild(sattr(svgEl('line'), { x1:PL, y1:gy, x2:W-PR, y2:gy, stroke:'#dcd9d2', 'stroke-width':'0.5' }));
      var lab = sattr(svgEl('text'), { x:PL-4, y:gy+3.5, 'text-anchor':'end', fill:'#9e9890', 'font-size':'8', 'font-family':'system-ui,sans-serif' });
      lab.textContent = yv;
      svg.appendChild(lab);
    });

    /* X axis labels (every 3 days, newest on right) */
    for (var xi = 0; xi < N; xi += 3) {
      var daysAgo = N - 1 - xi;
      var xlab = sattr(svgEl('text'), { x:xp(xi), y:H-5, 'text-anchor':'middle', fill:'#9e9890', 'font-size':'8', 'font-family':'system-ui,sans-serif' });
      xlab.textContent = daysAgo === 0 ? '今' : ('-' + daysAgo + 'd');
      svg.appendChild(xlab);
    }

    /* Area fill under MA5 curve */
    var ma5Pts = ma5Data.map(function (v, i) { return [xp(i), yp(v)]; });
    var areaD = smoothPath(ma5Pts) + ' L' + xp(N-1) + ',' + (PT + CH) + ' L' + xp(0) + ',' + (PT + CH) + ' Z';
    svg.appendChild(sattr(svgEl('path'), { d:areaD, fill:'rgba(72,120,160,0.07)', stroke:'none' }));

    /* Sine baseline — one full cycle over 18 days (dashed) */
    var sinePts = [];
    for (var si = 0; si < N; si++) {
      sinePts.push([xp(si), yp(5 + 2.2 * Math.sin(2 * Math.PI * si / (N - 1)))]);
    }
    var sineD = sinePts.map(function (p, i) { return (i ? 'L' : 'M') + p[0] + ',' + p[1]; }).join(' ');
    svg.appendChild(sattr(svgEl('path'), { d:sineD, fill:'none', stroke:'#b0a898', 'stroke-width':'1', 'stroke-dasharray':'5,4', 'stroke-linecap':'round' }));

    /* MA5 smoothed curve */
    svg.appendChild(sattr(svgEl('path'), { d:smoothPath(ma5Pts), fill:'none', stroke:'#4878a0', 'stroke-width':'2', 'stroke-linecap':'round', 'stroke-linejoin':'round' }));

    /* Raw data dots */
    rawData.forEach(function (v, i) {
      if (v == null) return;
      var isToday = (i === N - 1);
      svg.appendChild(sattr(svgEl('circle'), {
        cx:xp(i), cy:yp(v), r:isToday ? 4.5 : 2.5,
        fill:isToday ? '#4878a0' : 'rgba(72,120,160,0.38)',
        stroke:'#f4f1ec', 'stroke-width':'1.5',
      }));
      if (isToday) {
        var todayLab = sattr(svgEl('text'), { x:xp(i), y:yp(v)-8, 'text-anchor':'middle', fill:'#4878a0', 'font-size':'8', 'font-weight':'700', 'font-family':'system-ui,sans-serif' });
        todayLab.textContent = v;
        svg.appendChild(todayLab);
      }
    });

    return svg;
  }

      if (i < arr.length - 1) ap(hintWrap, txt(' '));
    });
    var lensSection = el('div', { className:'sp-lens-section' });
    ap(lensSection, lensTitle, badge, desc, hintWrap);
    ap(panel, avatarWrap, ident, tagsSection, lensSection);
  }

  /* ── STAGE 3: ENGINEERING SECTION ── */
  function renderEngSection() {
    var section = el('div', { className:'section' });
    var sLabel  = el('div', { className:'section-label' }); ap(sLabel, txt('能力特質濾鏡 · 專案深探'));
    ap(section, sLabel);

    var CAPS = ['全部','流程優化','危機處理','跨國協作'];
    var activeCap   = '全部';
    var cardEntries = [];
    var btnMap      = {};

    var filterRow = el('div', { className:'cap-filter-row' });
    CAPS.forEach(function (cap) {
      var btn = el('button', { className:'cap-btn' + (cap === '全部' ? ' active' : '') });
      ap(btn, txt(cap));
      btn.addEventListener('click', function () { applyFilter(cap); });
      btnMap[cap] = btn; ap(filterRow, btn);
    });
    ap(section, filterRow);

    function applyFilter(cap) {
      activeCap = cap;
      CAPS.forEach(function (c) { btnMap[c].className = 'cap-btn' + (c === cap ? ' active' : ''); });
      cardEntries.forEach(function (entry) {
        var show = (cap === '全部' || entry.caps.indexOf(cap) !== -1);
        entry.el.style.opacity      = show ? '1' : '0.15';
        entry.el.style.pointerEvents = show ? '' : 'none';
      });
    }

    var cardsGrid = el('div', { className:'eng-cards-grid' });
    ENG_PROJECTS.forEach(function (proj) {
      var ms = MS.filter(function (m) { return m.id === proj.msId; })[0];
      if (!ms) return;
      var card = el('div', { className:'eng-card' });
      cardEntries.push({ el: card, caps: proj.caps });

      var inner   = el('div', { className:'eng-card-inner' });
      var yearEl  = el('span', { className:'eng-card-year' });  ap(yearEl,  txt(ms.year + ' · ' + ms.label));
      var titleEl = el('div',  { className:'eng-card-title' }); ap(titleEl, txt(ms.title));
      var subEl   = el('div',  { className:'eng-card-sub' });   ap(subEl,   txt(ms.subtitle));
      var capTags = el('div',  { className:'eng-cap-tags' });
      proj.caps.forEach(function (cap) {
        var ct = el('span', { className:'eng-cap-tag' }); ap(ct, txt(cap)); ap(capTags, ct);
      });
      var kpiRow = el('div', { className:'eng-kpi-row' });
      proj.kpis.forEach(function (kpi) {
        var chip = el('span', { className:'eng-kpi-chip' }); ap(chip, txt(kpi)); ap(kpiRow, chip);
      });
      ap(inner, yearEl, titleEl, subEl, capTags, kpiRow);

      var foot       = el('div', { className:'eng-card-foot' });
      var drillBtn   = el('button', { className:'drill-btn' }); ap(drillBtn, txt('🔍 穿透根因'));
      var starExpand = el('div', { className:'star-expand' });
      var starInner  = el('div', { className:'star-inner' });
      [['S','Situation 情境'],['T','Task 任務'],['A','Action 行動'],['R','Result 成果']].forEach(function (pair) {
        var block = el('div', { className:'eng-star-block' });
        var keyEl = el('div', { className:'eng-star-key' });
        var ks    = el('span', {}); ap(ks, txt(pair[1])); ap(keyEl, ks);
        var valEl = el('div',  { className:'star-val' }); ap(valEl, txt(ms.star[pair[0]]));
        ap(block, keyEl, valEl); ap(starInner, block);
      });
      ap(starExpand, starInner);

      (function (btn, expand) {
        var isOpen = false;
        btn.addEventListener('click', function () {
          isOpen = !isOpen;
          expand.classList[isOpen ? 'add' : 'remove']('open');
          btn.textContent = isOpen ? '▲ 收起' : '🔍 穿透根因';
        });
      })(drillBtn, starExpand);

      ap(foot, drillBtn);
      ap(card, inner, foot, starExpand);
      ap(cardsGrid, card);
    });

    ap(section, cardsGrid);
    return section;
  }

  /* ── STAGE 3: CREATIVE SECTION ── */
  function renderCreativeSection() {
    var wrap = el('div', {});

    var gridSection = el('div', { className:'section' });
    var gridLabel   = el('div', { className:'section-label' }); ap(gridLabel, txt('作品展示牆'));
    ap(gridSection, gridLabel);
    var grid = el('div', { className:'portfolio-grid' });
    PORTFOLIO_ITEMS.forEach(function (item) {
      var cls   = 'portfolio-item' + (item.size ? ' size-' + item.size : '');
      var pItem = el('div', { className:cls });
      var pf    = el('div', { className:'pf-placeholder', style:{ background:item.bg } });
      var catTag  = el('span', { className:'pf-cat-tag' });    ap(catTag,  txt(item.cat));
      var titleEl = el('span', { className:'pf-title' });      ap(titleEl, txt(item.title));
      var stageEl = el('span', { className:'pf-stage-note' }); ap(stageEl, txt('Stage 4 圖源填裝'));
      ap(pf, catTag, titleEl, stageEl); ap(pItem, pf); ap(grid, pItem);
    });
    ap(gridSection, grid); ap(wrap, gridSection);

    var divSection = el('div', { className:'section' });
    var divLabel   = el('div', { className:'section-label' }); ap(divLabel, txt('命理占驗預約'));
    ap(divSection, divLabel);
    var board = el('div', { className:'divination-board' });
    var boardTitle = el('div', { className:'div-board-title' }); ap(boardTitle, txt('紫微斗數同頻交流'));
    var boardPhilo = el('p',   { className:'div-board-philo' });
    ap(boardPhilo, txt('我相信命盤是一份立體的生命地圖，而非算命的機器。透過解盤，我們探索的不是「會發生什麼」，而是「此刻你在哪裡、可以如何移動」。'));
    var featureList = el('div', { className:'div-feature-list' });
    [['◈','深度解讀','以紫微斗數為框架，結合心理取向詮釋，聚焦當下議題'],
     ['◎','一對一交流','線上進行，約 60–75 分鐘，全程錄音供事後回聽'],
     ['◧','非算命服務','不販售吉凶預測，而是協助你理解自身的能量模式與決策脈絡'],
    ].forEach(function (feat) {
      var row      = el('div', { className:'div-feature-row' });
      var icon     = el('span', { className:'div-feature-icon' }); ap(icon, txt(feat[0]));
      var textwrap = el('div',  { className:'div-feature-text' });
      var lbl  = el('span', { className:'div-feature-label' }); ap(lbl,  txt(feat[1]));
      var sep  = el('span', {}); ap(sep,  txt(' · '));
      var desc = el('span', {}); ap(desc, txt(feat[2]));
      ap(textwrap, lbl, sep, desc); ap(row, icon, textwrap); ap(featureList, row);
    });
    var boardNote = el('p', { className:'div-board-note' });
    ap(boardNote, txt('目前透過口碑轉介接案，候補名單制度運作中。如有緣，請透過公開頁面的聯絡入口洽詢。'));
    ap(board, boardTitle, boardPhilo, featureList, boardNote);
    ap(divSection, board); ap(wrap, divSection);
    return wrap;
  }

  /* ── STAGE 4: EMOTION SECTION ── */
  function renderEmotionSection() {
    var section = el('div', { className:'section' });
    var sLabel  = el('div', { className:'section-label' }); ap(sLabel, txt('內在情緒雙軌對照'));
    ap(section, sLabel);

    var rawData    = readMoodData();
    var ma5Data    = computeMA5(rawData);
    var todayScore = rawData[rawData.length - 1];

    var panel = el('div', { className:'emotion-panel' });
    var panelSub = el('p', { className:'emotion-panel-sub' });
    ap(panelSub, txt('理論節律（正弦波）× 實時去噪曲線（MA5）· 18 日觀測視窗'));
    ap(panel, panelSub);

    var chartWrap = el('div', { className:'chart-wrap' });
    ap(chartWrap, buildEmotionSVG(rawData, ma5Data));
    ap(panel, chartWrap);

    /* Legend */
    var legend = el('div', { className:'chart-legend' });
    [['legend-dash','理論節律基線（正弦波）'],['legend-solid','實時情緒 MA5 去噪曲線']].forEach(function (pair) {
      var row  = el('div', { className:'legend-item' });
      var line = el('span', { className:'legend-line ' + pair[0] });
      var lbl  = el('span', {}); ap(lbl, txt(pair[1]));
      ap(row, line, lbl); ap(legend, row);
    });
    ap(panel, legend);

    /* Human Design Guard — only shown when today's raw score <= 4 */
    if (todayScore != null && todayScore <= 4) {
      var guard = el('div', { className:'hd-guard' });
      var icon  = el('span', { className:'hd-guard-icon' }); ap(icon, txt('⚠️'));
      var gbody = el('div',  { className:'hd-guard-body' });
      var gtit  = el('div',  { className:'hd-guard-title' }); ap(gtit, txt('人類圖策略提示 — 情緒波低位'));
      var gmsg  = el('p',    { className:'hd-guard-msg' });
      ap(gmsg, txt('今日原始體感分數 ' + todayScore + '/10，當前處於情緒波低位。認知清明度不足，建議全面暫緩重大決策、財務規劃與人際承諾，優先進入充能與觀察模式。'));
      ap(gbody, gtit, gmsg); ap(guard, icon, gbody);
      ap(panel, guard);
    }

    ap(section, panel);
    return section;
  }

  /* ── STAGE 4: LIFE MATRIX ── */
  function renderLifeMatrix() {
    var section = el('div', { className:'section' });
    var sLabel  = el('div', { className:'section-label' }); ap(sLabel, txt('剛性生活防線看板'));
    ap(section, sLabel);

    var matrix  = el('div', { className:'life-matrix' });
    var lmTitle = el('div', { className:'lm-title' });    ap(lmTitle, txt('生活防線 · 我的剛性配速底線'));
    var lmSub   = el('div', { className:'lm-subtitle' }); ap(lmSub,   txt('每日開機前的自我鏡照'));
    ap(matrix, lmTitle, lmSub);

    /* Baselines — 2-col grid */
    var blTitle = el('div', { className:'lm-section-title' }); ap(blTitle, txt('剛性配速底線'));
    ap(matrix, blTitle);
    var blGrid = el('div', { className:'lm-grid' });
    LIFE_MATRIX.baselines.forEach(function (item) {
      var row  = el('div', { className:'lm-item' });
      var cat  = el('div', { className:'lm-cat' });  ap(cat,  txt(item.cat));
      var rule = el('div', { className:'lm-rule' }); ap(rule, txt(item.rule));
      ap(row, cat, rule); ap(blGrid, row);
    });
    ap(matrix, blGrid);

    /* Divine filters — flat horizontal list */
    var dfTitle = el('div', { className:'lm-section-title mt' }); ap(dfTitle, txt('神明指引過濾條件'));
    ap(matrix, dfTitle);
    var filters = el('div', { className:'lm-filters' });
    LIFE_MATRIX.divineFilters.forEach(function (item) {
      var row    = el('div', { className:'lm-filter-item' });
      var cond   = el('div', { className:'lm-filter-cond' }); ap(cond,   txt(item.cond));
      var action = el('div', { className:'lm-rule' });         ap(action, txt(item.action));
      ap(row, cond, action); ap(filters, row);
    });
    ap(matrix, filters);

    /* Closing quote */
    var quote = el('div', { className:'lm-quote' }); ap(quote, txt('“' + LIFE_MATRIX.quote + '”'));
    ap(matrix, quote);

    ap(section, matrix);
    return section;
  }

  /* ── PIPELINE ── */
  function renderPipeline(lens) {
    var visMap    = VIS[lens] || VIS.public;
    var yearMarks = [2012,2014,2016,2018,2020,2022,2024,2026];
    var wrap  = el('div', { className:'pipeline-wrap' });
    var inner = el('div', { className:'pipeline-inner' });

    var axisRow = el('div', { className:'pl-row axis-row' });
    ap(axisRow, el('div', { className:'pl-label' }));
    var axisContent = el('div', { className:'pl-content' });
    yearMarks.forEach(function (y) {
      var tick = el('span', { className:'year-tick', style:{ left:pct(y) } }); ap(tick, txt(y)); ap(axisContent, tick);
    });
    ap(axisRow, axisContent); ap(inner, axisRow);

    TRACK_ORDER.forEach(function (trackId) {
      var tm  = TRACK_META[trackId];
      var vis = visMap[trackId] || 'dimmed';
      var row = el('div', { className:'pl-row track-row vis-' + vis });
      var labelCell = el('div', { className:'pl-label' });
      var labelIn   = el('div', { className:'track-label-inner' });
      var ldot  = el('span', { className:'track-label-dot', style:{ background:tm.color } });
      var ltext = el('span', { className:'track-label-text', style:{ color:tm.color } });
      ap(ltext, txt(tm.label)); ap(labelIn, ldot, ltext); ap(labelCell, labelIn); ap(row, labelCell);
      var pipeContent = el('div', { className:'pl-content' });
      yearMarks.forEach(function (y) { ap(pipeContent, el('span', { className:'guide-line', style:{ left:pct(y) } })); });
      var pipeLine = el('div', { className:'pipe-line', style:{
        background: tm.gradient,
        boxShadow: vis === 'active'
          ? '0 1px 8px '+tm.glow+', 0 0 18px '+tm.glow+', inset 0 -2px 4px rgba(255,255,255,0.12), inset 0 2px 4px rgba(0,0,0,0.14)'
          : 'inset 0 -1px 3px rgba(255,255,255,0.10), inset 0 1px 3px rgba(0,0,0,0.10)',
      }});
      ap(pipeContent, pipeLine);
      MS.filter(function (m) { return m.track === trackId; }).forEach(function (m) {
        var canClick = (vis !== 'dimmed');
        var node = el('div', { className:'ms-node', role:'button', tabIndex:canClick ? 0 : -1,
          'aria-label':m.year + '年 ' + m.title, style:{ left:pct(m.year), background:tm.color } });
        if (canClick) {
          node.addEventListener('click',   (function (ms) { return function () { openModal(ms); }; })(m));
          node.addEventListener('keydown', (function (ms) { return function (e) { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); openModal(ms); } }; })(m));
        }
        var nlabel = el('div', { className:'ms-label', style:{ left:pct(m.year), color:tm.color } }); ap(nlabel, txt(m.label));
        ap(pipeContent, node, nlabel);
      });
      ap(row, pipeContent); ap(inner, row);
    });
    ap(wrap, inner); return wrap;
  }

  /* ── CONTENT AREA ── */
  function renderContent(lens) {
    var area = document.getElementById('content-area'); clearNode(area);
    var meta = LENS_META[lens];

    /* Header */
    var titleEl = el('h1', { className:'content-title' }); ap(titleEl, txt('人生軌跡觀測儀'));
    var subEl   = el('p',  { className:'content-subtitle' }); ap(subEl, txt('個人生命數據整合平台 · 2012–2026 里程碑水管圖'));
    var dot     = el('span', { className:'lens-badge-dot', style:{ background:meta.color } });
    var lbadge  = el('div', { className:'content-lens-badge', style:{ color:meta.color, background:meta.bg, borderColor:meta.border } });
    ap(lbadge, dot, txt(meta.icon + ' ' + meta.label));
    var header = el('div', { className:'content-header' }); ap(header, titleEl, subEl, lbadge); ap(area, header);

    /* Emotion panel appears at top for myself lens */
    if (lens === 'myself') { ap(area, renderEmotionSection()); }

    /* Pipeline — always rendered */
    var pipeSection = el('div', { className:'section' });
    var sLabel = el('div', { className:'section-label' }); ap(sLabel, txt('時間軸水管圖 2012–2026'));
    ap(pipeSection, sLabel, renderPipeline(lens));
    var hint = el('p', { style:{ fontSize:'10.5px', color:'#9e9890', marginTop:'10px', lineHeight:'1.6' } });
    ap(hint, txt('點擊軌道上的節點，展開里程碑詳細 STAR 資料。'));
    ap(pipeSection, hint); ap(area, pipeSection);

    /* Lens-specific sections */
    if      (lens === 'engineering') { ap(area, renderEngSection()); }
    else if (lens === 'creative')    { ap(area, renderCreativeSection()); }
    else if (lens === 'myself')      { ap(area, renderLifeMatrix()); }
  }

  /* ── INIT ── */
  function init() {
    var lens = parseLens();
    renderStatusPanel(lens); renderContent(lens);
    var overlay = document.getElementById('modal-overlay');
    if (overlay) { overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); }); }
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });
  }

  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init); } else { init(); }
}());
</script>
