<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%220.9em%22 font-size=%2290%22>☕</text></svg>">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#e8e4de"/>
<title>Refueler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#e8e4de;--bg2:#ede9e3;--card:#f4f1ec;
  --coffee:#7B4F2E;--coffee-l:#C47A3A;--coffee-tint:rgba(196,122,58,.1);--coffee-tint2:rgba(196,122,58,.2);
  --water:#4a7fa5;--water-l:#7aaec8;--water-tint:rgba(74,127,165,.1);--water-tint2:rgba(74,127,165,.18);
  --ink:#28261f;--sub:#55514a;--faint:#7a7570;--border:rgba(40,38,32,.09);--bstr:rgba(40,38,32,.16);
  --ok:#27ae60;--warn:#e67e22;--danger:#c0392b;
  --r:13px;--rsm:9px;
  --shadow:0 2px 12px rgba(40,38,32,.07);
  --shadow-lg:0 8px 36px rgba(40,38,32,.14);
}
html,body{height:100%;font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC',sans-serif;background:var(--bg);}
body{
  background:
    radial-gradient(ellipse at 15% 0%,rgba(196,122,58,.07) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 100%,rgba(74,127,165,.06) 0%,transparent 55%),
    #e8e4de;
  min-height:100vh;
}

/* ── Header ── */
#topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(232,228,222,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:.5px solid var(--bstr);
  padding:0 24px;height:52px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--sub);padding:5px 12px;border-radius:100px;background:rgba(40,38,32,.06);border:none;transition:all .18s;cursor:pointer;font-family:inherit;}
.back-btn:hover{background:rgba(40,38,32,.11);color:var(--ink);}
#topbar-title{font-size:15px;font-weight:700;color:var(--ink);}
#topbar-right{display:flex;gap:7px;align-items:center;}
.today-pill{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:100px;font-size:12px;font-weight:600;}
.tp-coffee{background:var(--coffee-tint2);color:var(--coffee);}
.tp-water{background:var(--water-tint2);color:var(--water);}
.sync-pill{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:500;transition:all .3s;cursor:default;}
.sync-idle{background:rgba(40,38,32,.06);color:var(--faint);}
.sync-ing{background:rgba(74,127,165,.13);color:var(--water);}
.sync-ok{background:rgba(39,174,96,.13);color:var(--ok);}
.sync-err{background:rgba(192,57,43,.1);color:var(--danger);}

/* ── Layout ── */
#main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  padding:20px 24px;
  max-width:1200px;
  margin:0 auto;
  align-items:stretch;
}
#ai-wrap{padding:0 24px 32px;max-width:1200px;margin:0 auto;}

/* ── Cards ── */
.card{background:var(--card);border:.5px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;position:relative;display:flex;flex-direction:column;}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.22) 0%,transparent 55%);pointer-events:none;border-radius:inherit;}
.card-header{padding:15px 18px 0;}
.card-body{padding:13px 18px 17px;flex:1;display:flex;flex-direction:column;}
.card-sep{height:.5px;background:var(--border);margin:0 18px;}

/* Section titles */
.sec-emoji{font-size:17px;margin-right:7px;}
.sec-title{font-size:14px;font-weight:700;color:var(--ink);display:flex;align-items:center;}

/* ── Quick Add Form ── */
.add-form{margin-top:11px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;}
.f-lbl{font-size:10px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:3px;}
.f-inp{width:100%;background:var(--bg2);border:1.5px solid transparent;border-radius:var(--rsm);padding:8px 11px;font-size:13px;color:var(--ink);font-family:inherit;outline:none;transition:border-color .2s,background .2s;}
.f-inp:focus{border-color:var(--coffee-l);background:#fff;}
.f-inp.water-focus:focus{border-color:var(--water-l);background:#fff;}
.f-inp::placeholder{color:var(--faint);}
.preset-row{display:flex;gap:5px;margin-bottom:8px;}
.preset-btn{flex:1;padding:7px 4px;border-radius:var(--rsm);border:1.5px solid var(--border);background:var(--bg2);font-family:inherit;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;transition:all .18s;text-align:center;}
.preset-btn:hover,.preset-btn.sel{background:var(--water-tint2);border-color:var(--water-l);color:var(--water);}
.add-btn{width:100%;padding:10px;border-radius:var(--rsm);border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;}
.add-btn-coffee{background:linear-gradient(135deg,var(--coffee-l),var(--coffee));color:#fff;}
.add-btn-coffee:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(196,122,58,.28);}
.add-btn-water{background:linear-gradient(135deg,var(--water-l),var(--water));color:#fff;}
.add-btn-water:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(74,127,165,.28);}

/* ── Log List ── */
.log-wrap{flex:1;min-height:40px;max-height:220px;overflow-y:auto;margin-top:11px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.log-wrap::-webkit-scrollbar{width:3px;}
.log-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.log-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid var(--border);}
.log-row:last-child{border-bottom:none;}
.log-time{font-size:11px;color:var(--faint);min-width:38px;flex-shrink:0;}
.log-desc{flex:1;font-size:12px;color:var(--sub);line-height:1.4;}
.log-price{font-size:11px;color:var(--faint);white-space:nowrap;}
.log-thumb{width:30px;height:30px;border-radius:6px;object-fit:cover;flex-shrink:0;}
.log-del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:12px;padding:3px 5px;border-radius:5px;flex-shrink:0;}
.log-del:hover{color:var(--danger);background:rgba(192,57,43,.07);}
.log-edit{background:none;border:none;color:var(--faint);cursor:pointer;font-size:12px;padding:3px 5px;border-radius:5px;flex-shrink:0;}
.log-edit:hover{color:var(--accent);background:rgba(100,130,180,.07);}
.log-edit-form{display:flex;flex-direction:column;gap:8px;padding:10px 0;border-bottom:.5px solid var(--border);}
.log-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.log-edit-actions{display:flex;gap:8px;}
.log-empty{font-size:12px;color:var(--faint);text-align:center;padding:12px 0;}

/* ── Photo Box ── */
.photo-wrap{display:flex;gap:10px;align-items:center;margin-bottom:8px;}
#photo-box{width:54px;height:54px;border-radius:var(--rsm);background:var(--bg2);border:1.5px dashed rgba(196,122,58,.3);display:flex;align-items:center;justify-content:center;font-size:21px;cursor:pointer;flex-shrink:0;overflow:hidden;transition:border-color .2s;}
#photo-box:hover{border-color:var(--coffee-l);}
#photo-box img{width:100%;height:100%;object-fit:cover;border-radius:calc(var(--rsm) - 2px);}

/* ── Calendar Card ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.cal-month{font-size:13px;font-weight:700;color:var(--ink);}
.cal-nav{background:none;border:none;color:var(--sub);cursor:pointer;font-size:15px;padding:2px 7px;border-radius:6px;}
.cal-nav:hover{background:var(--bg2);}
.cal-week-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;}
.cal-wday{font-size:9px;color:var(--faint);text-align:center;padding:2px 0;font-weight:600;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{aspect-ratio:1;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2px 1px;cursor:default;position:relative;overflow:hidden;background:var(--bg);transition:background .15s;}
.cal-cell.today{outline:1.5px solid var(--coffee-l);}
.cal-cell.today-w{outline:1.5px solid var(--water-l);}
.cal-cell.has-data{cursor:pointer;}
.cal-cell:hover.has-data{background:var(--bg2);}
.cal-num{font-size:9.5px;color:var(--sub);line-height:1;margin-top:2px;}
.cal-cell.today .cal-num,.cal-cell.today-w .cal-num{font-weight:700;color:var(--ink);}
.cal-cell.c1{background:rgba(196,122,58,.09);}
.cal-cell.c2{background:rgba(196,122,58,.18);}
.cal-cell.c3{background:rgba(196,122,58,.28);}
.cal-cell.c4{background:rgba(196,122,58,.38);}
.cal-cell.w-ok{background:rgba(39,174,96,.1);}
.cal-cell.w-warn{background:rgba(230,126,34,.1);}
.cal-cell.w-low{background:rgba(192,57,43,.08);}
.cal-cell.w-none{background:var(--bg);}
.cal-badge{font-size:11px;font-weight:700;line-height:1.2;margin-top:1px;}
.cal-badge-w{font-size:12px;}
.cal-badge-c{color:var(--coffee);}
.cal-badge-w{color:var(--water);}
.cal-badge-ok{color:var(--ok);}
.cal-badge-warn{color:var(--warn);}
.cal-badge-r{color:var(--danger);}
.cal-legend{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;}
.cal-leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--faint);}
.cal-leg-dot{width:7px;height:7px;border-radius:2px;}

/* ── Cost Analysis Card ── */
.cost-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.cost-stat{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rsm);padding:10px 13px;}
.cost-lbl{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:5px;}
.cost-val{font-size:21px;font-weight:300;color:var(--ink);letter-spacing:-.5px;}
.cost-val-unit{font-size:11px;color:var(--faint);margin-left:1px;}
.cost-sub{font-size:10.5px;color:var(--faint);margin-top:3px;}
.cost-bar-section{display:flex;flex-direction:column;gap:9px;}
.cost-cat-row{display:grid;grid-template-columns:80px 1fr 100px;align-items:center;gap:10px;}
.cost-cat-lbl{font-size:12px;color:var(--sub);font-weight:600;white-space:nowrap;}
.cost-bar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.cost-bar{height:100%;border-radius:3px;transition:width .4s ease;}
.cost-cat-amt{font-size:11.5px;font-weight:600;color:var(--ink);text-align:right;white-space:nowrap;}
.cost-breakdown{margin-top:12px;display:flex;flex-direction:column;gap:10px;}
.cost-bd-group{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rsm);padding:9px 11px;}
.cost-bd-title{font-size:10px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;}
.cost-tree-row{display:grid;grid-template-columns:1fr auto 20px;align-items:center;gap:6px;padding:3px 0;border-bottom:.5px solid var(--border);}
.cost-tree-row:not(.cost-tree-parent){padding-left:14px;}
.cost-tree-row:last-child{border-bottom:none;}
.cost-tree-name{display:flex;align-items:center;gap:4px;min-width:0;}
.cost-tree-prefix{font-size:10px;color:var(--faint);flex-shrink:0;font-family:monospace;}
.cost-tree-lbl{font-size:12px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cost-tree-parent .cost-tree-lbl{font-weight:600;color:var(--ink);}
.cost-tree-parent{background:rgba(40,38,32,.07);border-radius:5px;margin:3px -4px 1px;padding-left:4px;padding-right:4px;}
.cost-tree-stats{font-size:11.5px;font-weight:600;color:var(--ink);white-space:nowrap;text-align:center;}
.cost-tree-meta{font-size:10px;font-weight:400;color:var(--faint);margin-left:5px;}
.cost-tree-trend{width:20px;} /* 保留：長期趨勢箭頭 */
.cost-bd-total{font-size:10.5px;color:var(--faint);text-align:right;padding-top:6px;margin-top:4px;border-top:.5px solid var(--border);}

/* ── Coffee Chart ── */
.cost-chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cost-chart-year-sel{font-size:11px;color:var(--sub);background:var(--bg2);border:.5px solid var(--border);border-radius:6px;padding:2px 6px;font-family:inherit;cursor:pointer;outline:none;}
.cost-chart-legend{display:flex;flex-wrap:wrap;gap:5px 10px;margin-top:7px;}
.cost-chart-leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--sub);}
.cost-chart-leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.cost-chart-tabs{display:flex;gap:4px;margin-bottom:7px;}
.cost-chart-tab{font-size:10px;padding:3px 10px;border-radius:10px;border:.5px solid var(--border);background:var(--bg2);color:var(--sub);cursor:pointer;font-family:inherit;transition:background .15s,color .15s;}
.cost-chart-tab.active{background:var(--coffee-tint2);color:var(--coffee);border-color:var(--coffee-l);font-weight:700;}

/* ── AI Analysis Card ── */
.ai-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:15px 20px 13px;}
.ai-title{font-size:15px;font-weight:700;color:var(--ink);}
.ai-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:100px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#8b7898,#5c4a6e);color:#fff;transition:all .18s;}
.ai-btn:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(92,74,110,.28);}
.ai-btn:disabled{opacity:.5;cursor:default;transform:none;}
.ai-body{padding:0 20px 20px;}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.ai-stat-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rsm);padding:10px 12px;}
.ai-stat-lbl{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:4px;}
.ai-stat-val{font-size:22px;font-weight:300;color:var(--ink);}
.ai-stat-unit{font-size:11px;color:var(--faint);margin-left:3px;}
.ai-result{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:14px;font-size:13px;line-height:1.85;color:var(--sub);white-space:pre-wrap;}
.ai-spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Day Detail Panel ── */
#day-detail{position:fixed;inset:0;z-index:500;background:rgba(40,38,32,.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;}
.dd-panel{background:var(--card);border-radius:var(--r);padding:22px;width:min(92vw,380px);max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-lg);border:.5px solid var(--border);}
.dd-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;color:var(--ink);}
.dd-cls{background:none;border:none;color:var(--faint);cursor:pointer;font-size:18px;}
.dd-entry{padding:7px 0;border-bottom:.5px solid var(--border);font-size:13px;color:var(--sub);}
.dd-entry:last-child{border-bottom:none;}

/* ── Reminder Overlay ── */
#reminder-overlay{position:fixed;inset:0;z-index:2000;background:rgba(40,38,32,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.rm-panel{background:var(--card);border-radius:var(--r);padding:30px 26px 22px;width:min(90vw,360px);box-shadow:var(--shadow-lg);border:.5px solid var(--border);text-align:center;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.rm-icon{font-size:50px;line-height:1;margin-bottom:14px;}
.rm-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:9px;}
.rm-body{font-size:13.5px;color:var(--sub);line-height:1.75;margin-bottom:20px;white-space:pre-line;}
.rm-progress{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:-8px 0 18px;}
.rm-progress-bar{height:100%;border-radius:3px;transition:width .4s ease;background:linear-gradient(90deg,var(--water-l),var(--water));}
.rm-btns{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
.rm-ok{padding:11px 28px;border-radius:100px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--water-l),var(--water));color:#fff;transition:all .18s;}
.rm-ok:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(74,127,165,.3);}
.rm-ok.coffee-ok{background:linear-gradient(135deg,var(--coffee-l),var(--coffee));}
.rm-ok.coffee-ok:hover{box-shadow:0 4px 14px rgba(196,122,58,.3);}
.rm-skip{background:none;border:none;font-family:inherit;font-size:12px;color:var(--faint);cursor:pointer;padding:6px 10px;border-radius:8px;transition:color .15s;}
.rm-skip:hover{color:var(--sub);}

/* ── Responsive ── */
@media(max-width:680px){
  #main{grid-template-columns:1fr;gap:14px;padding:14px 16px;}
  #ai-wrap{padding:0 16px 28px;}
  .form-grid{grid-template-columns:1fr;}
  .ai-grid{grid-template-columns:1fr;}
  #topbar{padding:0 16px;}
  .today-pill{display:none;}
  .cost-grid{grid-template-columns:1fr 1fr;}
  .cost-cat-row{grid-template-columns:70px 1fr 80px;}
}
</style>
</head>
<body>

<!-- Top Bar -->
<div id="topbar">
  <div id="topbar-title">☕ Refueler 💧</div>
  <div id="topbar-right">
    <div class="sync-pill sync-idle" id="sync-pill" onclick="forceSyncToGist()" title="點擊強制上傳至 Gist" style="cursor:pointer">☁ 同步</div>
    <div class="today-pill tp-coffee" id="tp-coffee">☕ — 杯</div>
    <div class="today-pill tp-water" id="tp-water">💧 — ml</div>
  </div>
</div>

<!-- Date selector bar -->
<div style="display:flex;align-items:center;gap:10px;padding:10px 24px 4px;">
  <label class="f-lbl" style="margin:0;white-space:nowrap;">記錄日期</label>
  <input type="date" id="rf-date" class="f-inp" style="width:auto;flex:1;max-width:180px;" onchange="onRFDateChange()"/>
  <button onclick="setRFDate(new Date())" style="font-size:11px;padding:5px 12px;border-radius:var(--rsm);border:.5px solid var(--border);background:var(--bg2);color:var(--sub);cursor:pointer;white-space:nowrap;">今天</button>
</div>

<!-- Main 2-Column Grid (4 direct children → auto-aligned rows) -->
<div id="main">

  <!-- ① Coffee Add Card -->
  <div class="card">
    <div class="card-header">
      <div class="sec-title"><span class="sec-emoji">☕</span>Coffee 咖啡記錄</div>
    </div>
    <div class="card-body">
      <div class="photo-wrap">
        <div id="photo-box" onclick="document.getElementById('photo-inp').click()">📷</div>
        <div style="flex:1;">
          <div class="f-lbl">照片（可選）</div>
          <div style="font-size:11px;color:var(--faint);line-height:1.6;">點擊上傳咖啡照片<br>支援 JPG / PNG</div>
        </div>
      </div>
      <input type="file" id="photo-inp" accept="image/*" style="display:none;" onchange="onPhoto(this)"/>
      <div class="add-form">
        <div class="form-grid">
          <div>
            <label class="f-lbl">店名 Café</label>
            <input class="f-inp" id="c-cafe" placeholder="路易莎、星巴克…"/>
          </div>
          <div>
            <label class="f-lbl">品項 Item</label>
            <input class="f-inp" id="c-item" placeholder="拿鐵、美式…"/>
          </div>
          <div>
            <label class="f-lbl">甜點/餐食 Dessert</label>

          </div>

<script>
'use strict';
const RF_KEY='refueler_v1', GROQ_KEY='groq_key', GIST_FILE='refueler_data.json';
const MN=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
let _syncTimer=null;

// ── DATA ──
function loadRF(){try{return JSON.parse(localStorage.getItem(RF_KEY))||{entries:[]};}catch{return{entries:[]};}}
function saveRF(d){
  try{
    localStorage.setItem(RF_KEY,JSON.stringify(d));
  }catch(e){
    if(e.name==='QuotaExceededError'){
      // 剔除所有照片後重試
      const stripped={...d,entries:(d.entries||[]).map(en=>({...en,photo:null}))};
      try{
        localStorage.setItem(RF_KEY,JSON.stringify(stripped));
        console.warn('localStorage 已滿，已自動剔除所有咖啡照片以釋放空間');
      }catch(e2){
        console.error('localStorage 仍然滿，無法儲存：',e2);
        return;
      }
      d=stripped;
    }else{throw e;}
  }
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(()=>syncToGist(d),3000);
}

function todayStr(){return new Date().toDateString();}
function todayEntries(){const d=loadRF();return(d.entries||[]).filter(e=>new Date(e.timestamp).toDateString()===todayStr());}

// ── SELECTED DATE ──
function isoDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function setRFDate(d){const el=document.getElementById('rf-date');if(el)el.value=isoDate(d);onRFDateChange();}
function getRFDate(){const v=document.getElementById('rf-date')?.value;return v?new Date(v+'T12:00:00'):new Date();}
function getRFDateStr(){return getRFDate().toDateString();}
function isToday(){return getRFDateStr()===todayStr();}
function onRFDateChange(){
  const lbl=isToday()?'今日記錄':getRFDate().toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'})+'記錄';
  ['coffee-log-lbl','water-log-lbl'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=lbl;});
  renderCoffeeLog();renderWaterLog();
}

// ── GIST SYNC ──
function setSyncStatus(state,msg){
  const p=document.getElementById('sync-pill');
  if(!p)return;
  p.className='sync-pill '+({idle:'sync-idle',ing:'sync-ing',ok:'sync-ok',err:'sync-err'}[state]||'sync-idle');
  p.textContent=msg;
}

async function syncToGist(data){
  const pat=localStorage.getItem('gh_pat')||'';
  const gist=localStorage.getItem('gist_id')||'';
  if(!pat||!gist){setSyncStatus('idle','☁ 未設定');return;}
  setSyncStatus('ing','↑ 同步中');
  try{
    const r=await fetch('https://api.github.com/gists/'+gist,{
      method:'PATCH',
      headers:{'Authorization':'Bearer '+pat,'Content-Type':'application/json'},
      body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(data)}}})
    });
    if(!r.ok)throw new Error(r.status);
    setSyncStatus('ok','☁ 已同步');
  }catch(e){
    setSyncStatus('err','⚠ 同步失敗');
  }
}

async function forceSyncToGist(){
  const data=loadRF();
  await syncToGist(data);
}

async function loadFromGist(){
  const pat=localStorage.getItem('gh_pat')||'';
  const gist=localStorage.getItem('gist_id')||'';
  if(!pat||!gist){setSyncStatus('idle','☁ 未設定');return;}
  setSyncStatus('ing','↓ 載入中');
  try{
    const r=await fetch('https://api.github.com/gists/'+gist,{
      headers:{'Authorization':'Bearer '+pat}
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    const fileObj=j.files?.[GIST_FILE];
    const content=fileObj?.content;
    if(content){
      const remote=JSON.parse(content);
      // Merge: combine all entries, deduplicate by id (local + remote)
      const local=loadRF();
      const seen=new Set();
      const merged=[...(remote.entries||[]),...(local.entries||[])].filter(e=>{
        if(seen.has(e.id))return false;
        seen.add(e.id);
        return true;
      });
      const mergedData=JSON.stringify({entries:merged});
      try{
        localStorage.setItem(RF_KEY,mergedData);
      }catch(qe){
        // 超額：剔除照片後再試
        const noPhoto=merged.map(en=>({...en,photo:null}));
        localStorage.setItem(RF_KEY,JSON.stringify({entries:noPhoto}));
      }
    }
    setSyncStatus('ok','☁ 已同步');
  }catch(e){
    if(e instanceof SyntaxError){
      // Gist JSON 損壞：自動用本機資料覆蓋修復
      setSyncStatus('ing','↑ 修復 Gist…');
      await syncToGist(loadRF());
    }else{
      setSyncStatus('err','⚠ 載入失敗 ('+e.message+')');
    }
  }
}

function delEntry(id){

// ── RENDER LOGS ──
let _ddKey=null,_ddType=null,_shopName=null;
function renderCoffeeLog(editId=null){

  const d=loadRF();
  const te=(d.entries||[]).filter(e=>e.type==='coffee'&&new Date(e.timestamp).toDateString()===selDs).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));

        </div>
        <div class="log-edit-actions">

function buildDateMap(type){
  const d=loadRF();const map={};
  (d.entries||[]).filter(e=>e.type===type).forEach(e=>{
    const k=new Date(e.timestamp).toDateString();
    if(!map[k])map[k]=[];
    map[k].push(e);
  });
  return map;
}

function renderCoffeeCalendar(){
  const map=buildDateMap('coffee');
  const today=new Date();
  const first=new Date(cCalY,cCalM,1).getDay();
  const daysN=new Date(cCalY,cCalM+1,0).getDate();
  document.getElementById('c-cal-title').textContent=cCalY+' · '+MN[cCalM];
  const blanks='<div class="cal-cell" style="background:transparent;"></div>'.repeat(first);
  const cells=Array.from({length:daysN},(_,i)=>{
    const d=i+1;
    const key=new Date(cCalY,cCalM,d).toDateString();
    const es=map[key]||[];const n=es.length;
    const isT=today.getFullYear()===cCalY&&today.getMonth()===cCalM&&today.getDate()===d;
    const cls=n===0?'':n===1?'c1':n===2?'c2':n===3?'c3':'c4';
    const dayCost=es.reduce((s,e)=>s+(e.coffeePrice??e.price??0)+(e.dessertPrice??0),0);

  }).join('');
  document.getElementById('c-cal-grid').innerHTML=blanks+cells;
}

            <button class="add-btn" style="flex:1;padding:7px;background:var(--card2);color:var(--sub);" onclick="showDayDetail('${key}','coffee')">取消</button>

// ── HELPERS ──
const _x=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtM=n=>'$ '+Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');
const CHART_COLORS=['#c47a3a','#5a8a9a','#7a9a5a','#8a6a7a','#9a7a4a','#5a7a8a','#c4a43a','#6a5a4a'];

// ── COFFEE CHART ──
function renderCoffeeChart(){
  const wrap=document.getElementById('cost-chart-wrap');
  const yearSel=document.getElementById('cost-chart-year');
  if(!wrap)return;
  // sync tab active state
  document.querySelectorAll('.cost-chart-tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.mode===selChartMode);
  });
  const d=loadRF();const all=d.entries||[];
  const coffeeAll=all.filter(e=>e.type==='coffee');
  const curYear=new Date().getFullYear();
  const years=[...new Set(coffeeAll.map(e=>new Date(e.timestamp).getFullYear()))].sort((a,b)=>b-a);
  if(!years.includes(curYear))years.unshift(curYear);
  if(!years.includes(selChartYear))selChartYear=curYear;
  if(yearSel)yearSel.innerHTML=years.map(y=>`<option value="${y}"${y===selChartYear?' selected':''}>${y}</option>`).join('');
  const yearEntries=coffeeAll.filter(e=>new Date(e.timestamp).getFullYear()===selChartYear);
  const maxMonth=selChartYear===curYear?new Date().getMonth()+1:12;
  const allShops=[...new Set(yearEntries.map(e=>e.cafe||'（未填店名）'))].sort();
  const shopColor={};allShops.forEach((s,i)=>shopColor[s]=CHART_COLORS[i%CHART_COLORS.length]);
  const monthData={};
  for(let m=1;m<=maxMonth;m++)monthData[m]={};
  yearEntries.forEach(e=>{
    const m=new Date(e.timestamp).getMonth()+1;
    const shop=e.cafe||'（未填店名）';
    const price=selChartMode==='coffee'
      ?(e.coffeePrice??e.price??0)
      :selChartMode==='dessert'
        ?(e.dessertPrice??0)
        :(e.coffeePrice??e.price??0)+(e.dessertPrice??0);
    monthData[m][shop]=(monthData[m][shop]||0)+price;
  });
  // 從第一個有資料的月份開始，跳過前面空白月份
  let minMonth=1;
  for(let m=1;m<=maxMonth;m++){if(Object.keys(monthData[m]).length>0){minMonth=m;break;}}
  const spanMonths=maxMonth-minMonth+1;
  const monthTotals=Array.from({length:spanMonths},(_,i)=>Object.values(monthData[minMonth+i]||{}).reduce((s,v)=>s+v,0));
  const maxVal=Math.max(...monthTotals,1);
  const W=Math.max(wrap.offsetWidth||wrap.clientWidth||260,160);
  const H=140;const padL=36,padR=6,padT=18,padB=24;
  const chartW=W-padL-padR;const chartH=H-padT-padB;
  const gap=chartW/spanMonths;
  const barW=Math.max(6,Math.min(26,Math.floor(gap*0.65)));
  const step=maxVal<=500?100:maxVal<=1000?200:maxVal<=2000?500:maxVal<=5000?1000:2000;
  const yMax=Math.ceil(maxVal/step)*step||step;
  let svgGrid='',svgBars='';
  for(let v=0;v<=yMax;v+=step){
    const y=H-padB-Math.round(v/yMax*chartH);
    svgGrid+=`<line x1="${padL}" x2="${W-padR}" y1="${y}" y2="${y}" stroke="rgba(40,38,32,.07)" stroke-width="1"/>`;
    const lbl=v>=1000?Math.round(v/100)/10+'k':v;
    svgGrid+=`<text x="${padL-3}" y="${y+3}" text-anchor="end" font-size="8" fill="#7a7570">${lbl}</text>`;
  }
  for(let i=0;i<spanMonths;i++){
    const m=minMonth+i;
    const cx=padL+(i+0.5)*gap;
    const shopsInMonth=allShops.filter(s=>(monthData[m][s]||0)>0);
    let barY=H-padB;
    shopsInMonth.forEach(shop=>{
      const val=monthData[m][shop];
      const bh=Math.max(1,Math.round(val/yMax*chartH));
      barY-=bh;
      svgBars+=`<rect x="${Math.round(cx-barW/2)}" y="${barY}" width="${barW}" height="${bh}" fill="${shopColor[shop]}" rx="2"/>`;
    });
    // 加總金額標籤（顯示在長條最上方）
    const total=monthTotals[i];
    if(total>0){
      const topY=H-padB-Math.round(total/yMax*chartH);
      const lbl=fmtM(total);
      svgBars+=`<text x="${Math.round(cx)}" y="${topY-3}" text-anchor="middle" font-size="9" font-weight="700" fill="#4a4540">${lbl}</text>`;
    }
    svgBars+=`<text x="${Math.round(cx)}" y="${H-padB+14}" text-anchor="middle" font-size="9" fill="#7a7570">${m}月</text>`;
  }
  // 折線圖：連接各月總量頂端
  const linePts=[];
  for(let i=0;i<spanMonths;i++){if(monthTotals[i]>0){const cx=Math.round(padL+(i+0.5)*gap);const ty=H-padB-Math.round(monthTotals[i]/yMax*chartH);linePts.push({cx,ty});}}
  let svgLine='';
  if(linePts.length>=2){
    svgLine+=`<polyline points="${linePts.map(p=>p.cx+','+p.ty).join(' ')}" fill="none" stroke="rgba(40,38,32,.32)" stroke-width="1.5" stroke-linejoin="round"/>`;
    linePts.forEach(p=>{svgLine+=`<circle cx="${p.cx}" cy="${p.ty}" r="2.8" fill="#4a4540" stroke="#f0ede8" stroke-width="1.5"/>`;});
  }
  wrap.innerHTML=`<svg width="${W}" height="${H}" style="display:block;overflow:visible"><line x1="${padL}" x2="${padL}" y1="${padT}" y2="${H-padB}" stroke="rgba(40,38,32,.15)" stroke-width="1"/>${svgGrid}${svgBars}${svgLine}</svg>`;
  const lg=document.getElementById('cost-chart-legend');
  if(lg)lg.innerHTML=allShops.length?allShops.map(s=>`<div class="cost-chart-leg-item"><div class="cost-chart-leg-dot" style="background:${shopColor[s]};"></div><span>${_x(s)}</span></div>`).join(''):'';
}

// ── COST ANALYSIS ──
function renderCostAnalysis(){
  const d=loadRF();const all=d.entries||[];
  const now=new Date();const todayStr=now.toDateString();
  // 跟著咖啡 calendar 顯示對應月份
  const thisM=cCalM,thisY=cCalY;
  const isCurrentMonth=(thisM===now.getMonth()&&thisY===now.getFullYear());
  const monthLabel=isCurrentMonth?'本月':MN[thisM];

  const coffeeEntriesToday=all.filter(e=>e.type==='coffee'&&new Date(e.timestamp).toDateString()===todayStr);
  const todayCoffee=coffeeEntriesToday.reduce((s,e)=>s+(e.coffeePrice??e.price??0),0);
  const todayDessert=coffeeEntriesToday.reduce((s,e)=>s+(e.dessertPrice??0),0);

  const monthEntries=all.filter(e=>{if(e.type!=='coffee')return false;const dt=new Date(e.timestamp);return dt.getMonth()===thisM&&dt.getFullYear()===thisY;});
  const monthCoffee=monthEntries.reduce((s,e)=>s+(e.coffeePrice??e.price??0),0);
  const monthDessert=monthEntries.reduce((s,e)=>s+(e.dessertPrice??0),0);
  const monthTotal=monthCoffee+monthDessert;
  const daysElapsed=isCurrentMonth?now.getDate():new Date(thisY,thisM+1,0).getDate();
  const dailyAvg=daysElapsed>0?Math.round(monthTotal/daysElapsed):0;
  const coffeeP=monthTotal>0?Math.round(monthCoffee/monthTotal*100):0;
  const dessertP=monthTotal>0?100-coffeeP:0;

  // ── Breakdown helpers ──
  function buildTree(entries, shopKeyFn, itemKeyFn, priceFn){
    const shops={};
    entries.forEach(e=>{
      const shop=shopKeyFn(e)||'（未填店名）';
      const item=itemKeyFn(e)||'（未填）';
      const p=priceFn(e);
      if(!shops[shop]) shops[shop]={total:0,count:0,items:{}};
      shops[shop].total+=p; shops[shop].count++;
      if(!shops[shop].items[item]) shops[shop].items[item]={total:0,count:0};
      shops[shop].items[item].total+=p; shops[shop].items[item].count++;
    });
    return shops;
  }
  function renderTree(title, shops){
    const grandTotal=Object.values(shops).reduce((s,v)=>s+v.total,0);
    const grandCount=Object.values(shops).reduce((s,v)=>s+v.count,0);
    if(!grandCount) return '';
    const rows=Object.entries(shops)
      .filter(([,d])=>d.count>0)
      .sort((a,b)=>b[1].total-a[1].total)
      .map(([shop,data])=>{
        const sPct=grandTotal>0?Math.round(data.total/grandTotal*100):0;
        const childRows=Object.entries(data.items)
          .filter(([,d])=>d.count>0)
          .sort((a,b)=>b[1].total-a[1].total)
          .map(([item,d])=>{
            const iPct=data.total>0?Math.round(d.total/data.total*100):0;
            return `<div class="cost-tree-row">
              <div class="cost-tree-name"><span class="cost-tree-prefix">|──</span><span class="cost-tree-lbl">${_x(item)}</span></div>
              <span class="cost-tree-stats">${fmtM(d.total)}<span class="cost-tree-meta">${iPct}% · ${d.count}次</span></span>
              <span class="cost-tree-trend"></span>
            </div>`;
          }).join('');
        const shopEsc=shop.replace(/'/g,"\\'");
        return `<div class="cost-tree-row cost-tree-parent" style="cursor:pointer;" onclick="showShopDetail('${shopEsc}')">
          <div class="cost-tree-name"><span class="cost-tree-lbl">${_x(shop)}</span><span style="font-size:10px;color:var(--faint);margin-left:4px;">✏️</span></div>
          <span class="cost-tree-stats">${fmtM(data.total)}<span class="cost-tree-meta">${sPct}% · ${data.count}次</span></span>
          <span class="cost-tree-trend"></span>
        </div>${childRows}`;
      }).join('');
    return `<div class="cost-bd-group">
      <div class="cost-bd-title">${title}</div>
      ${rows}
      <div class="cost-bd-total">合計 ${fmtM(grandTotal)}</div>
    </div>`;
  }

  const el=document.getElementById('cost-analysis');if(!el)return;
  el.innerHTML=`
    <div class="cost-grid">
      <div class="cost-stat" style="border-left:2.5px solid var(--coffee-l);">
        <div class="cost-lbl">今日 ☕ 咖啡</div>
        <div class="cost-val">${fmtM(todayCoffee)}<span class="cost-val-unit"></span></div>
        <div class="cost-sub">${coffeeEntriesToday.length} 杯</div>
      </div>
      <div class="cost-stat" style="border-left:2.5px solid #c4aa7c;">
        <div class="cost-lbl">今日 🍰 甜點/餐食</div>
        <div class="cost-val">${fmtM(todayDessert)}</div>
        <div class="cost-sub">${coffeeEntriesToday.filter(e=>(e.dessertPrice??0)>0||e.dessert).length} 項</div>
      </div>
      <div class="cost-stat" style="border-left:2.5px solid var(--ink);">
        <div class="cost-lbl">${monthLabel}總計</div>
        <div class="cost-val" style="color:${monthTotal>3000?'var(--danger)':monthTotal>1500?'var(--warn)':'var(--ink)'};">${fmtM(monthTotal)}</div>
        <div class="cost-sub">${monthEntries.length} 筆</div>
      </div>
      <div class="cost-stat">
        <div class="cost-lbl">${monthLabel}日均</div>
        <div class="cost-val">${fmtM(dailyAvg)}</div>
        <div class="cost-sub">前 ${daysElapsed} 天</div>
      </div>
    </div>
    ${monthEntries.length>0?`
    ${monthTotal>0?`
    <div class="cost-bar-section">
      <div class="cost-cat-row">
        <span class="cost-cat-lbl">☕ 咖啡</span>
        <div class="cost-bar-wrap"><div class="cost-bar" style="width:${coffeeP}%;background:var(--coffee-l);"></div></div>
        <span class="cost-cat-amt">${fmtM(monthCoffee)} <span style="color:var(--faint);font-weight:400;">(${coffeeP}%)</span></span>
      </div>
      <div class="cost-cat-row">
        <span class="cost-cat-lbl">🍰 甜點/餐食</span>
        <div class="cost-bar-wrap"><div class="cost-bar" style="width:${dessertP}%;background:#c4aa7c;"></div></div>
        <span class="cost-cat-amt">${fmtM(monthDessert)} <span style="color:var(--faint);font-weight:400;">(${dessertP}%)</span></span>
      </div>
    </div>`:''}
    <div class="cost-breakdown">
      <div class="cost-bd-group">
        <div class="cost-chart-header">
          <div class="cost-bd-title">📊 月度消費走勢（NT$）</div>
          <select class="cost-chart-year-sel" id="cost-chart-year" onchange="selChartYear=parseInt(this.value);renderCoffeeChart()"></select>
        </div>
        <div class="cost-chart-tabs">
          <button class="cost-chart-tab active" data-mode="coffee" onclick="selChartMode='coffee';renderCoffeeChart()">☕ 咖啡</button>
          <button class="cost-chart-tab" data-mode="dessert" onclick="selChartMode='dessert';renderCoffeeChart()">🍰 甜點/餐食</button>
          <button class="cost-chart-tab" data-mode="all" onclick="selChartMode='all';renderCoffeeChart()">📊 全部</button>
        </div>
        <div id="cost-chart-wrap" style="min-height:60px;"></div>
        <div class="cost-chart-legend" id="cost-chart-legend"></div>
      </div>
      ${renderTree('☕ 咖啡', buildTree(monthEntries, e=>e.cafe, e=>e.item, e=>e.coffeePrice??e.price??0))}
      ${renderTree('🍰 甜點/餐食', buildTree(monthEntries.filter(e=>e.dessert), e=>e.cafe, e=>e.dessert, e=>e.dessertPrice??0))}
    </div>`:'<div style="font-size:12px;color:var(--faint);text-align:center;padding:4px 0;">本月尚無消費記錄</div>'}
  `;
  renderCoffeeChart();
}

  const today=new Date();const todayStr=today.toDateString();
  const week=[];for(let i=6;i>=0;i--){const dt=new Date(today);dt.setDate(today.getDate()-i);week.push(dt.toDateString());}

  const coffeeColor=todayCoffee<=3?'var(--ok)':todayCoffee<=4?'var(--warn)':'var(--danger)';
  const waterColor=todayWater>=2000?'var(--ok)':todayWater>=1000?'var(--warn)':'var(--danger)';
  document.getElementById('ai-stats').innerHTML=`
    <div class="ai-stat-card" style="border-left:2.5px solid var(--coffee-l);">
      <div class="ai-stat-lbl">☕ 今日咖啡</div>
      <div class="ai-stat-val" style="color:${coffeeColor};">${todayCoffee}<span class="ai-stat-unit">杯</span></div>
      <div style="font-size:11px;color:var(--faint);margin-top:3px;">7日均 ${weekCoffee} 杯/天</div>
    </div>
    <div class="ai-stat-card" style="border-left:2.5px solid var(--water-l);">
      <div class="ai-stat-lbl">💧 今日水分</div>
      <div class="ai-stat-val" style="color:${waterColor};">${todayWater}<span class="ai-stat-unit">ml</span></div>
      <div style="font-size:11px;color:var(--faint);margin-top:3px;">7日均 ${weekWater} ml/天</div>
    </div>
  `;
}

// ── RUN AI ──
async function runAI(){
  const key=localStorage.getItem(GROQ_KEY)||'';
  const btn=document.getElementById('ai-run-btn');
  const spinner=document.getElementById('ai-spinner');
  const txt=document.getElementById('ai-btn-txt');
  const res=document.getElementById('ai-result');
  if(!key){
    res.style.display='block';
    res.innerHTML='<div style="font-size:13px;color:var(--faint);text-align:center;padding:12px;">請先在 Control Center ⚙️ > API設定 填入 Groq API Key</div>';
    return;
  }
  btn.disabled=true;spinner.style.display='block';txt.textContent='分析中…';
  const d=loadRF();const all=d.entries||[];
  const recentEntries=all.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0,60);
  const summary=recentEntries.map(e=>{
    const dt=new Date(e.timestamp);
    const dl=dt.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
    const tl=dt.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    if(e.type==='coffee'){
      const parts=[e.cafe,e.item,e.dessert].filter(Boolean);
      return`[${dl} ${tl}] ☕ ${parts.join('/')|| '咖啡'}${e.price?' NT$'+e.price:''}`;
    }else{return`[${dl} ${tl}] 💧 水 ${e.amount||250}ml`;}
  }).join('\n');
  const prompt=`以下是用戶近期咖啡與水分記錄（最多60筆）：\n\n${summary}\n\n請用繁體中文，每點一句話，直接說重點，不要廢話：\n☕ 咖啡：時機/頻率有無問題\n💧 水分：有無達標\n🌿 最需要改的一件事`;
  try{
    const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],max_tokens:200,temperature:.6})});
    if(!resp.ok)throw new Error('API '+resp.status);
    const result=await resp.json();
    res.style.display='block';res.className='ai-result';
    res.textContent=result.choices?.[0]?.message?.content||'（無回應）';
  }catch(e){
    res.style.display='block';
    res.innerHTML=`<span style="color:var(--danger);">⚠️ ${e.message}</span>`;
  }
  btn.disabled=false;spinner.style.display='none';txt.textContent='重新分析';
}

// ── REMINDER SYSTEM ──
const RM_STATE_KEY='refueler_rm_state';
function loadRMState(){try{return JSON.parse(localStorage.getItem(RM_STATE_KEY))||{};}catch{return{};}}
function saveRMState(s){localStorage.setItem(RM_STATE_KEY,JSON.stringify(s));}

let _rmOkCb=null;
function rmDismiss(){
  document.getElementById('reminder-overlay').style.display='none';
  _rmOkCb=null;
}
function showReminder({icon,title,body,okLabel,okClass,showProgress,waterMl,onOk}){
  document.getElementById('rm-icon').textContent=icon||'💧';
  document.getElementById('rm-title').textContent=title||'';
  document.getElementById('rm-body').textContent=body||'';
  const okBtn=document.getElementById('rm-ok');
  okBtn.textContent=okLabel||'知道了';
  okBtn.className='rm-ok'+(okClass?' '+okClass:'');
  const prog=document.getElementById('rm-progress');
  const bar=document.getElementById('rm-progress-bar');
  if(showProgress&&waterMl!==undefined){
    const pct=Math.min(100,Math.round(waterMl/2000*100));
    bar.style.width=pct+'%';
    prog.style.display='block';
  }else{prog.style.display='none';}
  _rmOkCb=onOk||null;
  document.getElementById('reminder-overlay').style.display='flex';
  okBtn.onclick=()=>{rmDismiss();if(_rmOkCb)_rmOkCb();};
  document.getElementById('rm-skip').onclick=rmDismiss;
}

// Coffee 3rd-cup reminder
function checkCoffeeReminder(){
  const te=todayEntries();
  const cc=te.filter(e=>e.type==='coffee').length;
  if(cc!==3)return; // 只在恰好第3杯時觸發
  const state=loadRMState();
  const dk=new Date().toDateString();
  if(state.coffee3===dk)return; // 今天已提醒過
  state.coffee3=dk;
  saveRMState(state);
  const wml=te.filter(e=>e.type==='water').reduce((s,e)=>s+(e.amount||0),0);
  const gap=Math.max(0,2000-wml);
  showReminder({
    icon:'☕💧',
    title:'咖啡因攝取提醒',
    body:`今天已經是第 3 杯咖啡了！\n\n咖啡因有利尿效果，建議每喝一杯咖啡就補充 300ml 以上的水幫助代謝。\n\n今日水分：${wml} ml / 目標 2000 ml（還差 ${gap} ml）`,
    okLabel:'馬上去喝水 💧',
    okClass:'coffee-ok',
    showProgress:true,
    waterMl:wml,
    onOk:()=>{document.getElementById('w-amount').focus();document.getElementById('w-amount').scrollIntoView({behavior:'smooth',block:'center'});}
  });
}

// Water schedule reminders（依成人一天建議 2000ml 安排）
const WATER_SCHEDULE=[
  {hm:'08:00',msg:'早安！起床後喝一杯水，促進新陳代謝，為一天補足能量 🌅'},
  {hm:'10:00',msg:'上午工作中，補充水分有助保持專注，大腦運作更靈活 🧠'},
  {hm:'12:00',msg:'午餐時間到！餐前喝一杯水有助消化，也能避免吃太多 🍱'},
  {hm:'14:00',msg:'午後容易感到疲憊，補充水分比咖啡更能提振精神 ⚡'},
  {hm:'16:00',msg:'下午補水時間，讓身體保持水分平衡，肌膚也會謝謝你 ✨'},
  {hm:'18:30',msg:'晚餐前補一杯水，幫助消化並減少晚餐攝取量 🥗'},
  {hm:'20:30',msg:'睡前 2 小時適量補水，但別喝太多以免夜間起床 🌙'},
];
function timeInWindow(hmStr){
  const now=new Date();
  const[h,m]=hmStr.split(':').map(Number);
  const sched=new Date(now);sched.setHours(h,m,0,0);
  const diff=(now-sched)/60000;
  return diff>=0&&diff<5; // 排程後5分鐘內都算
}
function checkWaterSchedule(){
  const state=loadRMState();
  const dk=new Date().toDateString();
  for(const s of WATER_SCHEDULE){
    if(!timeInWindow(s.hm))continue;
    const key='w_'+s.hm+'_'+dk;
    if(state[key])break; // 今天這時段已提醒
    const wml=todayEntries().filter(e=>e.type==='water').reduce((sum,e)=>sum+(e.amount||0),0);
    if(wml>=2000){state[key]=true;saveRMState(state);break;} // 已達標，靜默記下
    state[key]=true;saveRMState(state);
    const gap=Math.max(0,2000-wml);
    showReminder({
      icon:'💧',
      title:'補水提醒 '+s.hm,
      body:s.msg+`\n\n今日已喝：${wml} ml（目標 2000 ml，還差 ${gap} ml）`,
      okLabel:'記錄喝水 💧',
      showProgress:true,
      waterMl:wml,
      onOk:()=>{document.getElementById('w-amount').scrollIntoView({behavior:'smooth',block:'center'});document.getElementById('w-amount').focus();}
    });
    break;
  }
}
// 每 60 秒檢查一次水分排程
setInterval(checkWaterSchedule,60000);
