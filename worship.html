<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>⛩️ Worship</title>
<style>
:root{
  --bg:#e8e4de;--bg2:#ede9e3;--card:#f4f1ec;
  --border:rgba(40,38,32,.09);--bstr:rgba(40,38,32,.16);
  --ink:#28261f;--sub:#55514a;--faint:#7a7570;
  --temple:#6B4FA8;--temple-l:#8B6DC8;--temple-tint:rgba(107,79,168,.1);
  --gold:#8B6218;--gold-dark:#6B4A10;--gold-tint:rgba(139,98,24,.1);
  --ok:#27ae60;--warn:#e67e22;--danger:#c0392b;
  --r:13px;--rsm:9px;
  --shadow:0 2px 12px rgba(40,38,32,.07);--shadow-lg:0 8px 32px rgba(40,38,32,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse at 12% 0%,rgba(107,79,168,.07) 0%,transparent 52%),
    radial-gradient(ellipse at 88% 100%,rgba(139,98,24,.06) 0%,transparent 52%),
    #e8e4de;
  color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang TC',sans-serif;
  font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased;
}
.app{max-width:720px;margin:0 auto;padding:1rem;display:flex;flex-direction:column;gap:1rem;}
header{display:flex;align-items:center;gap:.5rem;padding:.4rem 0 .1rem;font-size:1.1rem;font-weight:700;color:var(--temple);letter-spacing:.01em;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem;box-shadow:var(--shadow);}
.sec-lbl{font-size:.63rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:.7rem;display:flex;align-items:center;justify-content:space-between;}
.sep{border:none;border-top:1px solid var(--border);margin:1rem 0;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.grid3{display:grid;grid-template-columns:1fr 1fr 2fr;gap:.6rem;}
label.lbl{font-size:.73rem;color:var(--sub);display:block;margin-bottom:.3rem;}
input[type=text],input[type=date],input[type=time],input[type=number],textarea,select{
  width:100%;background:#fff;border:1px solid var(--bstr);border-radius:var(--rsm);
  color:var(--ink);font-size:.88rem;padding:.48rem .7rem;outline:none;
  transition:border-color .15s;font-family:inherit;
}
input:focus,textarea:focus,select:focus{border-color:var(--temple);box-shadow:0 0 0 2px var(--temple-tint);}
textarea{resize:vertical;min-height:60px;line-height:1.5;}
.fg{display:flex;flex-direction:column;}

/* Toggle switch */
.toggle-row{display:flex;align-items:center;gap:.55rem;cursor:pointer;user-select:none;}
.toggle-lbl{font-size:.9rem;color:var(--ink);font-weight:500;}
.toggle{position:relative;width:40px;height:22px;background:rgba(40,38,32,.15);border:1px solid var(--border);border-radius:11px;transition:background .2s,border-color .2s;flex-shrink:0;}
.toggle.on{background:var(--temple);border-color:var(--temple);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.on::after{transform:translateX(18px);}

/* Slip section */
.slip-section{margin-top:1rem;display:none;}
.tab-row{display:flex;gap:.4rem;margin-bottom:.8rem;}
.tab{padding:.32rem .8rem;border-radius:var(--rsm);font-size:.78rem;font-weight:600;cursor:pointer;background:rgba(40,38,32,.06);color:var(--sub);border:1px solid var(--border);transition:all .15s;}
.tab.active{background:var(--temple-tint);color:var(--temple);border-color:var(--temple);}
.slip-panel{display:none;}
.slip-panel.active{display:block;}
.fetch-row{display:flex;gap:.5rem;align-items:flex-end;}
.fetch-row .fg{flex:1;}

/* Photo drop */
.photo-drop{border:1.5px dashed var(--bstr);border-radius:var(--rsm);padding:1.3rem;text-align:center;color:var(--faint);cursor:pointer;transition:border-color .2s,background .2s;display:block;background:rgba(40,38,32,.03);}
.photo-drop:hover,.photo-drop.drag-over{border-color:var(--temple);color:var(--temple);background:var(--temple-tint);}
.photo-hint{font-size:.82rem;margin-bottom:.3rem;}
.photo-preview{max-width:100%;border-radius:var(--rsm);margin-top:.7rem;display:none;object-fit:contain;max-height:220px;}

/* Poem box */
.poem-box{background:var(--gold-tint);border:1px solid rgba(139,98,24,.2);border-radius:var(--rsm);padding:.9rem 1rem;margin-top:.8rem;display:none;}
.poem-num{font-size:.63rem;color:var(--gold);font-weight:700;letter-spacing:.09em;margin-bottom:.4rem;}
.poem-text{font-size:.92rem;line-height:1.9;color:var(--gold-dark);font-weight:600;background:rgba(255,255,255,.55);border-color:rgba(139,98,24,.25);}
.poem-text:focus{border-color:var(--gold);}
.poem-meaning{font-size:.82rem;color:var(--sub);margin-top:.5rem;background:rgba(255,255,255,.45);border-color:rgba(139,98,24,.2);}
.poem-meaning:focus{border-color:var(--gold);}
.poem-ai-note{font-size:.7rem;color:var(--warn);margin:.25rem 0 .5rem;line-height:1.5;}

/* AI result */
.ai-card{background:var(--temple-tint);border:1px solid rgba(107,79,168,.18);border-radius:var(--rsm);padding:1rem;margin-top:.8rem;display:none;}
.ai-layer{margin-bottom:.9rem;padding-bottom:.9rem;border-bottom:1px solid rgba(40,38,32,.07);}
.ai-layer:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.ai-layer-title{font-size:.65rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--temple);margin-bottom:.4rem;}
.ai-layer-body{font-size:.85rem;line-height:1.72;color:var(--ink);}

/* Buttons */
.btn{padding:.48rem 1rem;border-radius:var(--rsm);font-size:.84rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:.3rem;white-space:nowrap;}
.btn-temple{background:var(--temple);color:#fff;}
.btn-temple:hover{background:var(--temple-l);transform:translateY(-1px);}
.btn-temple:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-gold{background:var(--gold);color:#fff;font-weight:700;}
.btn-gold:hover{background:var(--gold-dark);transform:translateY(-1px);}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-outline{background:rgba(40,38,32,.06);color:var(--sub);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--temple);color:var(--temple);background:var(--temple-tint);}
.save-row{display:flex;justify-content:flex-end;gap:.5rem;margin-top:1rem;}

/* Spinner */
.sp{display:none;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Timeline */
.cat-bar{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;}
.cat-sel{background:#fff;border:1px solid var(--bstr);border-radius:var(--rsm);color:var(--ink);font-size:.84rem;padding:.38rem .65rem;outline:none;cursor:pointer;}
.cat-sel:focus{border-color:var(--temple);}
.timeline{display:flex;flex-direction:column;position:relative;}
.timeline::before{content:'';position:absolute;left:7px;top:14px;bottom:14px;width:1.5px;background:linear-gradient(to bottom,var(--temple),rgba(107,79,168,0));border-radius:1px;}
.tl-node{display:flex;gap:.85rem;padding-bottom:1.4rem;position:relative;}
.tl-node:last-child{padding-bottom:0;}
.tl-dot{width:15px;height:15px;border-radius:50%;background:var(--temple);border:2.5px solid var(--card);flex-shrink:0;margin-top:2px;box-shadow:0 0 0 3px var(--temple-tint);z-index:1;}
.tl-content{flex:1;min-width:0;}
.tl-meta{font-size:.7rem;color:var(--faint);font-weight:600;margin-bottom:.2rem;}
.tl-temple{font-size:.88rem;font-weight:700;color:var(--temple);margin-bottom:.3rem;}
.tl-report{font-size:.82rem;color:var(--sub);line-height:1.6;margin-bottom:.4rem;}
.tl-slip{background:var(--gold-tint);border:1px solid rgba(139,98,24,.18);border-radius:6px;padding:.55rem .75rem;font-size:.8rem;color:var(--sub);line-height:1.6;}
.tl-q{font-size:.77rem;color:var(--faint);font-style:italic;margin-bottom:.25rem;}
.tl-slip-num{font-size:.78rem;color:var(--gold);font-weight:600;margin-bottom:.15rem;}
.tl-poem{font-size:.77rem;color:var(--sub);margin-bottom:.3rem;}
.tl-ai3{font-size:.82rem;color:var(--ink);line-height:1.65;margin-top:.4rem;display:none;}
.tl-expand{font-size:.73rem;color:var(--temple);cursor:pointer;margin-top:.3rem;font-weight:500;}
.tl-expand:hover{text-decoration:underline;}

/* History */
.hist-item{border-bottom:1px solid var(--border);padding:.65rem 0;cursor:default;}
.hist-item:last-child{border-bottom:none;}
.hist-top{display:flex;justify-content:space-between;align-items:center;}
.hist-temple{font-weight:600;font-size:.87rem;}
.hist-date{font-size:.72rem;color:var(--faint);}
.hist-tags{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.3rem;}
.hist-tag{font-size:.65rem;padding:.13rem .42rem;border-radius:20px;background:rgba(40,38,32,.07);color:var(--sub);}
.hist-slip-badge{font-size:.65rem;padding:.13rem .42rem;border-radius:20px;background:var(--gold-tint);color:var(--gold);border:1px solid rgba(139,98,24,.2);}
.hist-del{font-size:.7rem;color:var(--faint);cursor:pointer;padding:.18rem .4rem;border-radius:4px;border:1px solid transparent;transition:all .15s;}
.hist-del:hover{color:var(--danger);border-color:var(--danger);}
.empty{text-align:center;color:var(--faint);padding:2rem;font-size:.84rem;}
.hist-edit{font-size:.7rem;color:var(--faint);cursor:pointer;padding:.18rem .4rem;border-radius:4px;border:1px solid transparent;transition:all .15s;}
.hist-edit:hover{color:var(--temple);border-color:var(--temple);}
.custom-frow{display:grid;grid-template-columns:88px 1fr auto;gap:.4rem;align-items:start;margin-top:.45rem;}
.custom-frow input[type=text]{width:100%;}
.del-custom{padding:.42rem .55rem;background:rgba(40,38,32,.05);border:1px solid var(--border);border-radius:var(--rsm);cursor:pointer;color:var(--faint);font-size:.78rem;line-height:1;transition:all .15s;}
.del-custom:hover{color:var(--danger);border-color:var(--danger);}
</style>
</head>
<body>
<div class="app">
<header>⛩️ Worship</header>

<!-- ── 新增紀錄 ── -->
<div class="card">
  <div class="sec-lbl">
    <span id="form-title">新增參拜紀錄</span>
    <button class="btn btn-outline" style="font-size:.72rem;padding:.22rem .6rem" onclick="loadLastReports()">沿用上次交代事項</button>
  </div>
  <div class="grid3">
    <div class="fg"><label class="lbl">日期</label><input type="date" id="inp-date"></div>
    <div class="fg"><label class="lbl">時間</label><input type="time" id="inp-time"></div>
    <div class="fg"><label class="lbl">廟宇名稱</label><input type="text" id="inp-temple" placeholder="行天宮、龍山寺…"></div>
  </div>

  <hr class="sep">
  <div class="sec-lbl"><span>近期交代事項</span></div>
  <div class="grid2">
    <div class="fg"><label class="lbl">正職</label><textarea id="rpt-work" placeholder="工作現況、待解問題…" rows="2"></textarea></div>
    <div class="fg"><label class="lbl">副業</label><textarea id="rpt-side" placeholder="副業進展、計畫…" rows="2"></textarea></div>
    <div class="fg"><label class="lbl">健康</label><textarea id="rpt-health" placeholder="近期健康狀況…" rows="2"></textarea></div>
    <div class="fg"><label class="lbl">財務</label><textarea id="rpt-finance" placeholder="財務狀態、目標…" rows="2"></textarea></div>
  </div>
  <div class="fg" style="margin-top:.6rem">
    <label class="lbl">家務</label>
    <textarea id="rpt-chores" placeholder="家務或生活事務…" rows="2"></textarea>
  </div>
  <div id="custom-fields-wrap"></div>
  <div style="margin-top:.5rem">
    <button type="button" class="btn btn-outline" style="font-size:.72rem;padding:.22rem .6rem" onclick="addCustomField()">＋ 新增分類</button>
  </div>

  <hr class="sep">
  <!-- 賜籤開關 -->
  <div class="toggle-row" onclick="toggleSlip()">
    <div class="toggle" id="slip-toggle"></div>
    <span class="toggle-lbl">賜籤紀錄</span>
  </div>

  <div class="slip-section" id="slip-section">
    <div class="tab-row" style="margin-top:.9rem">
      <div class="tab active" id="tab-num" onclick="setSlipTab('num')">🔢 籤號帶入</div>
      <div class="tab" id="tab-photo" onclick="setSlipTab('photo')">📸 照片辨識</div>
    </div>

    <!-- 數字流 -->
    <div class="slip-panel active" id="panel-num">
      <div class="fetch-row">
        <div class="fg"><label class="lbl">籤號</label><input type="number" id="slip-num" min="1" max="100" placeholder="例：42" style="width:100px"></div>
        <button class="btn btn-temple" id="fetch-btn" onclick="fetchSlipByNumber()" style="margin-bottom:.05rem">
          <span class="sp" id="fetch-sp"></span>自動帶入
        </button>
      </div>
    </div>

    <!-- 照片流 -->
    <div class="slip-panel" id="panel-photo">
      <input type="file" id="photo-input" accept="image/jpeg,image/jpg,image/png,image/webp" style="display:none" onchange="handlePhotoSelect(event)">
      <div class="photo-drop" id="photo-drop" onclick="document.getElementById('photo-input').click()">
        <div class="photo-hint" id="photo-hint">📸 點擊選取或拖曳上傳籤詩照片</div>
        <img id="photo-preview" class="photo-preview">
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:.5rem">
        <button class="btn btn-temple" id="photo-btn" onclick="analyzePhoto()" style="display:none">
          <span class="sp" id="photo-sp"></span>AI 辨識照片
        </button>
      </div>
    </div>

    <!-- 籤詩顯示（可編輯） -->
    <div class="poem-box" id="poem-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem">
        <div class="poem-num" id="poem-num-lbl"></div>
        <button type="button" class="btn btn-outline" style="font-size:.68rem;padding:.15rem .5rem" onclick="clearPoem()">重設</button>
      </div>
      <div class="poem-ai-note" id="poem-ai-note"></div>
      <label class="lbl">籤詩原文</label>
      <textarea class="poem-text" id="poem-text" rows="4" placeholder="籤詩原文（可直接修正）…"></textarea>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:.5rem">
        <label class="lbl" style="margin:0">基本意涵</label>
        <button type="button" class="btn btn-outline" id="gen-meaning-btn" style="font-size:.7rem;padding:.18rem .55rem" onclick="genMeaning()">
          <span class="sp" id="gen-meaning-sp" style="border-top-color:var(--temple);border-color:rgba(107,79,168,.3)"></span>✨ 生成意涵
        </button>
      </div>
      <textarea class="poem-meaning" id="poem-meaning" rows="2" placeholder="原文確認後點「✨ 生成意涵」，或直接手動填寫…"></textarea>
    </div>

    <!-- 求籤問題 -->
    <div class="fg" style="margin-top:.8rem">
      <label class="lbl">求籤問題</label>
      <textarea id="slip-question" placeholder="這次求籤想詢問的問題…" rows="2"></textarea>
    </div>

    <!-- 三階解析 -->
    <div style="margin-top:.6rem">
      <button class="btn btn-gold" id="analyze-btn" onclick="analyzeSlip()" style="width:100%;justify-content:center">
        <span class="sp" id="analyze-sp" style="border-top-color:#1a1200"></span>⚡ AI 三階解析
      </button>
    </div>
    <div class="ai-card" id="ai-result"></div>
  </div>

  <div class="save-row">
    <button class="btn btn-outline" onclick="clearForm()">清除</button>
    <button class="btn btn-temple" onclick="saveEntry()">儲存紀錄</button>
  </div>
</div>

<!-- ── 分類時間軸 ── -->
<div class="card" id="timeline-card" style="display:none">
  <div class="cat-bar">
    <div class="sec-lbl" style="margin:0">分類時間軸</div>
    <select class="cat-sel" id="cat-select" onchange="renderTimeline()">
      <option value="work">正職</option>
      <option value="side">副業</option>
      <option value="health">健康</option>
      <option value="finance">財務</option>
      <option value="chores">家務</option>
    </select>
  </div>
  <div class="timeline" id="timeline"></div>
</div>

<!-- ── 歷史紀錄 ── -->
<div class="card">
  <div class="sec-lbl"><span>歷史紀錄</span></div>
  <div id="history"></div>
</div>
</div>

<script>
// ── 關聖帝君一百籤 資料庫（來源：temple01.com）──

光武陷昆陽 丁癸 上吉",p:"新來換得好規模、\n何用隨他步與趨、\n只聽耳邊消息到、\n崎嶇歷盡見亨衢。",s:"名終成。訟得勝。孕生男。保無病。 行人回。婚宜定。事須遲。有餘慶。"},41:{l:"劉文龍求官 戊甲 中吉",p:"自南自北自東西、\n欲到天涯誰作梯、\n遇鼠逢牛三弄笛、\n好將名姓榜頭題。",s:"訟無定。終有遇。病多憂。擇醫愈。 信即到。婚終好。凡所謀。慎勿躁。"},42:{l:"董永賣身 戊乙 中吉",p:"我曾許汝事和諧、\n誰料修為汝自乖、\n但改新圖莫依舊、\n營謀應得稱心懷。",s:"病更醫。訟改圖。名與利。換規模。 婚別議。行人遲。謹修為。神力持。"},43:{l:"玄德公黃鶴樓赴宴 戊丙 中吉",p:"一紙官書火急催、\n扁舟速下浪如雷、\n雖然目下多驚險、\n保汝平安去復回。",s:"功名遂。子嗣歡。訟病險。終必安。 失物在。行人還。婚宜遠。利不難。"},44:{l:"王莽篡漢 戊丁 中平",p:"汝是人中最吉人、\n誤為誤作損精神、\n堅牢一念酬香願、\n富貴榮華萃汝身。",s:"事多錯。訟莫作。病禱神。且勿藥。 婚莫求。行未還。能自悔。利名全。"},45:{l:"高祖遇丁公 戊戊 中平",p:"好將心地力耕耘、\n彼此山頭總是墳、\n陰地不如心地好、\n修為到底卻輸君。",s:"心地好。地亦美。病即安。訟得理。 財勿求。且守己。行人至。終有喜。"},46:{l:"孤兒報冤 戈己 中平",p:"君是山中萬戶侯、\n信知騎馬勝騎牛、\n今朝馬上看山色、\n爭似騎牛得自由。",s:"名與利。皆不濟。訟莫興。多阻滯。 行人遲。婚莫許。謹踐修。當靜處。"},47:{l:"楚漢爭鋒 戊庚 下吉",p:"與君萬語復千言、\n祗欲平和雪爾冤、\n訟則終凶君記取、\n試於清夜把心捫。",s:"訟莫興。恐遭刑。財莫貪。病未寧。 行有阻。婚難成。且循理。保和平。"},48:{l:"趙五娘尋夫 戊辛 中平",p:"登山涉水正天寒、\n兄弟姻親那得安、\n幸遇虎頭人一喚、\n全家遂保汝重歡。",s:"遇貴者。訟和平。病驚險。莫求名。 財物耗。婚宜停。逢寅字。事漸亨。"},49:{l:"張子房遁跡 戊壬 下吉",p:"彼此家居只一山、\n如何似隔鬼門關、\n日月如梭人易老、\n許多勞碌不如閒。",s:"名利阻。且休問。訟宜和。病有願。 婚姻遲。行人遠。欲獲吉。且安分。"},50:{l:"蘇東坡勸民 戊癸 上吉",p:"人說今年勝舊年、\n也須步多要周旋、\n一家和氣多生福、\n萋菲讒言莫聽偏。",s:"出入吉。財物多。孕可保。病即瘥。 婚必成。訟宜和。問行人。奏凱歌。"},51:{l:"御溝流紅葉 己甲 上吉",p:"君今百事且隨緣、\n水到渠成聽自然、\n莫嘆年來不如意、\n喜逢新運稱心田。",s:"名漸顯。訟漸寬。財自裕。病自安。 行有信。婚可定。命漸亨。心必稱。"},52:{l:"匡衡夜讀書 己乙 上吉",p:"兀坐幽居歎寂廖、\n孤燈掩映度清宵、\n萬金忽報秋光好、\n活計扁舟渡北朝。",s:"名晚成。利遲得。病漸安。訟終息。 孕無驚。婚姻吉。行人回。事勝昔。"},53:{l:"劉玄德入贅孫權妹 己丙 下下",p:"艱難險阻路蹊蹺、\n南鳥孤飛依北巢、\n今日貴人曾識面、\n相逢卻在夏秋交。",s:"病與訟。皆不利。名與財。亦阻滯。 孕有驚。行未至。若遇貴。事方濟。"},54:{l:"蘇秦刺股 己丁 中平",p:"萬人叢裏逞英豪、\n便欲飛騰霄漢高、\n爭奈承流風未便、\n青燈黃卷且勤勞。",s:"財未遂。名未超。訟不宜。病未消。 婚難信。行路迢。待時至。百事饒。"},55:{l:"包龍圖勸農 己戊 中平",p:"勤耕力作莫蹉跎、\n衣食隨時安分過、\n縱使經商收倍利、\n不如逐歲廩禾多。",s:"休問名。莫貪財。訟宜解。病無災。 婚可就。遠行回。戒出入。福自來。"},56:{l:"王樞密奸險 己己 下下",p:"心頭理曲強詞遮、\n直欲欺官行路斜、\n一旦醜形臨月鏡、\n身投憲網莫咨嗟。",s:"莫興訟。勿求財。病有祟。行人回。 婚須審。難信媒。行正直。免凶災。"},57:{l:"欄柯觀棋 己庚 中平",p:"事端百出慮雖長、\n莫聽人言自主張、\n一著仙機君記取、\n紛紛鬧裏更思量。",s:"訟急解。病早禳。信即至。財如常。 孕生男。禱神康。凡百事。自主張。"},58:{l:"蘇秦背劍 己辛 上吉",p:"蘇秦三寸足平生、\n富貴功名在此行、\n更好修為陰騭事、\n前程萬里自通亨。",s:"病即安。訟決勝。行人回。婚宜定。 孕生男。家道盛。積陰功。福來應。"},59:{l:"鄧伯無兒 己壬 中平",p:"門衰戶冷苦伶仃、\n自嘆祈求不一靈、\n幸有祖宗陰騭在、\n香煙未斷續螟蛉。",s:"名難保。財難圖。訟不利。病無虞。 婚可合。信音無。行方便。守規模。"},60:{l:"宋郊兄弟同科 己癸 上上",p:"羨君兄弟好名聲、\n只管謙撝莫自矜、\n丹詔槐黃相逼近、\n巍巍科甲兩同登。",s:"宜出入。好謀望。訟即決。財亦旺。 孕生男。病無恙。信音回。有神相。"},61:{l:"蒯輙見韓信 庚甲 中平",p:"嘯聚山林兇惡儔、\n善良無事苦煎憂、\n主人大笑出門去、\n不用干戈盜賊休。",s:"財平平。病漸效。訟自散。莫與較。 遠行歸。婚亦宜。雖有險。終平夷。"},62:{l:"韓信戰霸王 庚乙 中平",p:"百千人面虎狼心、\n賴汝干戈用力深、\n得勝回時秋漸老、\n虎頭城裏喜相尋。",s:"訟必勝。財必進。病有祟。遠有信。 婚可成。名可稱。到秋來。百事順。"},63:{l:"楊令公撞李陵碑 庚丙 中平",p:"曩時敗北且圖南、\n筋力雖衰尚一堪、\n欲識生前君大數、\n前三三與後三三。",s:"病可醫。訟中平。財尋常。信有準。 名未亨。婚可聘。勿強圖。隨分定。"},64:{l:"管飽分金 庚丁 上上",p:"吉人相遇本和同、\n況有持謀天水翁、\n人力不勞公論協、\n事成功倍笑談中。",s:"貴遇趙。訟即了。名能成。病可療。 財有餘。婚亦好。問信音。即刻到。"},65:{l:"蒙正木蘭和詩 庚戊 上上",p:"朔風凜凜正窮冬、\n多羨門庭喜氣濃、\n更入新春人事後、\n衷言方得信先容。",s:"財多得。名高中。可問婚。亦宜訟。 病即安。行人動。禍變消。福力重。"},66:{l:"杜甫遊春 庚己 上上",p:"耕耘只可在鄉邦、\n何用求謀向外方、\n見說今年新運好、\n門闌喜氣事雙雙。",s:"病即安。訟即決。財漸豊。名高揭。 行人回。婚可結。莫外求。福儘得。"},67:{l:"江遺囑兒 庚庚 中平",p:"纔發君心天己知、\n何須問我決狐疑、\n願子改圖從孝悌、\n不愁家室不相宜。",s:"訟和貴。病改醫。財別圖。婚姻遲。 問行人。尚未歸。能改過。事皆宜。"},68:{l:"錢大王販鹽 庚辛 中平",p:"南販珍珠北販鹽、\n年來幾倍偵財掭、\n勸君止此求田舍、\n心欲多時何日厭。",s:"訟已勝。莫再戰。名已成。毋再問。 婚可定。病自散。行人歸。且安分。"},69:{l:"孫龐鬥智 庚壬 下吉",p:"捨舟遵路總相宜、\n慎勿嬉遊逐貴兒、\n一夜樽前兄與弟、\n明朝仇敵又相隨。",s:"名與利。莫強求。醫宜審。婚難謀。 行人至。訟可休。凡出入。謹交遊。"},70:{l:"王曾祈禱 庚癸 中平",p:"雷雨風雲各有司、\n至誠禱告莫生疑、\n與君定約為霖日、\n正是蘊隆中伏時。",s:"訟與病。漸可解。名與利。姑少待。 婚宜遲。行無信。若禱神。三日應。"},71:{l:"蘇武還鄉 辛甲 中平",p:"喜鵲簷前報好音、\n知君千里欲歸心、\n繡幃重結鴛鴦帶、\n葉落霜飛寒色侵。",s:"訟宜和。名漸通。婚再合。病主凶。 問求財。時未同。凡謀望。在秋冬。"},72:{l:"范蠡歸湖 辛乙 下平",p:"河渠傍路有高低、\n可歎長途日山西、\n縱有榮華好時節、\n直須猴犬換金雞。",s:"求財遲。占病險。名難成。信尚遠。 訟終凶。婚必晚。孕必驚。地未穩。"},73:{l:"王昭君憶漢帝 辛丙 下吉",p:"憶昔蘭房分半釵、\n而今忽把信音乖、\n痴心指望成連理、\n到底誰知事不諧。",s:"名利無。訟休爭。婚事吹。孕多驚。(吹本作娶) 病危險。命迍邅。宜作福。保安全。"},74:{l:"崔武求官 辛丁 上吉",p:"崔巍崔巍復崔巍、\n履險如夷去復來、\n身似菩提心似鏡、\n長安一道放春回。",s:"訟與病。險而平。名與利。連而亨。 婚先難。終必成。行人至。福自生。"},75:{l:"劉小姐愛蒙正 辛戊 中吉",p:"生前結得好緣姻、\n一笑相逢情自親、\n相當人物無高下、\n得意休論富與貧。",s:"財物聚。病即愈。若問訟。必遇主。 更修善。禱神助。行人回。事無阻。"},76:{l:"蕭何註律 辛己 中平",p:"三千法律八千文、\n此事如何說與君、\n善惡兩途君自作、\n一生禍福此中分。",s:"問公訟。且審理。求財祿。當揣己。 病蚤禳。宜求嗣。婚更審。方吉利。"},77:{l:"呂后害韓信 辛庚 下下",p:"木有根荄水有源、\n君當自此究其原、\n莫隨道路人閒話、\n訟到終凶是至言。",s:"訟當戒。病宜禳。名不利。婚難老。 防口舌。行未到。凡事謹。莫輕躁。"},78:{l:"袁安寸困 辛辛 下吉",p:"家道豐腴自飽溫、\n也須肚裏立乾坤、\n財多害己君當省、\n福有胚胎禍有門。",s:"莫貪財。能害己。休闕訟。當知止。 病禱神。孕生子。婚擇良。行未至。"},79:{l:"宋神宗誤圩牛頭山 辛壬 中平",p:"乾亥來龍仔細看、\n坎居午向自當安、\n若移丑艮陰陽逆、\n門戶凋零家道難。",s:"名與利。依理求。婚與訟。莫妄謀。 病擇醫。方無憂。行人至。慮且休。"},80:{l:"陶侃卜牛眠 辛癸 中平",p:"一朝無事忽遭官、\n也是門衰墳未安、\n改換陰陽移禍福、\n勸君莫作等閒看。",s:"名與利。宜改圖。訟和解。保無虞。 病更醫。行漸回。婚別配。莫輕為。"},81:{l:"寇公任雷陽 壬甲 中平",p:"假君財物自當還、\n謀賴心欺他自奸、\n幸有高臺明月鏡、\n請來對照破機關。",s:"訟莫欺。依本分。病遇醫。名休問。 婚慎求。事審辦。孕保安。行人鈍。"},82:{l:"宋仁宗認母 壬乙 上吉",p:"彼亦儔中一輩賢、\n勸君特達與周旋、\n此時賓主歡相會、\n他日王侯卻並肩。",s:"財必獲。名遇薦。訟得理。病有願。 婚可成。行必見。發福祿。由積善。"},83:{l:"諸葛孔明學道 壬丙 下平",p:"隨分堂前赴粥饘、\n何須妄想苦憂煎、\n主張門戶誠難事、\n百歲安閒得幾年。",s:"名與利。難遽致。訟宜和。行未至。 病瘥遲。婚莫議。能守待。家必利。"},84:{l:"須賈害范睢 壬丁 中平",p:"箇中事緒更粉然、\n當局須知一著先、\n長舌婦人休酷聽、\n力行禮義要心堅。",s:"訟宜解。莫信讒。財緩求。名莫貪。 孕生女。行人還。婚更審。莫妄攀。"},85:{l:"姜女尋夫 壬戊 中平",p:"一春風雨正瀟瀟、\n千里行人去路遙、\n移寡就多君得計、\n如何歸路轉無聊。",s:"且隨分。莫貪財。訟宜息。防外災。 婚不利。遠行回。禱神助。福自來。"},86:{l:"管飽為賈 壬己 上上",p:"一舟行貨好招邀、\n積少成多自富饒、\n常把他人比自己、\n管須日後勝今朝。",s:"財祿富。訟得理。婚和合。病漸止。 問行人。歸未矣。莫害人。人即己。"},87:{l:"武侯與子敬同舟 壬庚 下吉",p:"陰裏詳看怪爾曹、\n舟中敵圖笑中刀、\n藩籬剖破渾無事、\n一種天生惜羽毛。",s:"名利無。病有祟。訟莫興。和為貴。 莫貪財。婚不利。孕無憂。行未至。"},88:{l:"高文定守困 壬辛 上吉",p:"從前作事總徒勞、\n纔見新春時漸遭、\n百計營求都得意、\n更須守己莫心高。",s:"名與利。且隨緣。訟解釋。病安痊。 婚姻合。行人還。若謀望。在新年。"},89:{l:"班超歸玉門關 壬壬 中平",p:"樽前無事且高歌、\n時未來時奈若何、\n白馬渡江嘶日暮、\n虎頭城裏看巍峨。",s:"名未得。財尚遲。病漸愈。歸有期。 訟可解。孕無危。婚和合。緩則宜。"},90:{l:"楊文廣陷柳州 壬癸 中平",p:"崆峒城裏事如麻、\n無事如君有幾家、\n勸汝不須勤致禱、\n徒勞生事苦咨嘆。",s:"訟和吉。求財無。婚未成。病無虞。 信未至。勿他圖。不須禱。守規模。"},91:{l:"趙子龍抱太子 癸甲 中吉",p:"佛說淘沙始見金、\n只緣君子不勞心、\n榮華總得詩書效、\n妙裏工夫仔細尋。",s:"求名利。勤苦有。訟須勞。終無咎。 問婚姻。宜擇友。探行人。二六九。"},92:{l:"高祖治漢民 癸乙 下吉",p:"今年禾穀不如前、\n物價喧騰倍百年、\n災數流行多疫癘、\n一陽復後始安全。",s:"訟紛紜。久自解。病患多。終無害。 財祿難。有且待。孕屬陽。福終在。"},93:{l:"邵康節定陰陽 癸丙 中平",p:"春來雨水太連綿、\n入夏晴乾雨又愆、\n節氣直交三伏始、\n喜逢滂沛足田園。",s:"財聚散。病反覆。欲求安。候三伏。 事進退。宜作福。婚可成。審往復。"},94:{l:"提結過長者門 癸丁 中平",p:"一般器用與人同、\n巧斵輪輿梓匠工、\n凡事有緣且隨分、\n秋冬方遇主人翁。",s:"遇貴人。訟得理。財尚遲。病未愈。 婚未成。信尚阻。待秋冬。方有遇。"},95:{l:"張文遠求官 癸戊 中平",p:"知君袖內有驪珠、\n笁不逢辰亦強圖、\n可歎頭顱己如許、\n而今方得貴人扶。",s:"財發遲。訟終折。名晚成。婚未決。 問遠信。有此月。遇貴人。災撲滅。"},96:{l:"山濤見王衍 癸己 上吉",p:"婚姻子息莫嫌遲、\n但把精神仗佛持、\n四十年前須報應、\n功圓行滿育馨兒。",s:"名利訟。遲方吉。病漸瘥。婚姻結。 終年後。得子息。問行人。未有日。"},97:{l:"買臣五十富貴 癸庚 上上",p:"五十功名心已灰、\n那知富貴逼人來、\n更行好事存方寸、\n壽比岡陵位鼎台。",s:"訟即解。名可成。財漸聚。病可寧。 孕生子。婚姻平。行人至。事稱情。"},98:{l:"薛仁貴投軍 癸辛 中平",p:"經營百出費精神、\n南北奔馳運未新、\n玉兔交時當得意、\n恰如枯木再逢春。",s:"名利有。晚方成。訟與病。久方平 var _dropBound=false;
function toggleSlip(){
  slipOn=!slipOn;
  slipOn?$('slip-toggle').classList.add('on'):$('slip-toggle').classList.remove('on');
  $('slip-section').style.display=slipOn?'block':'none';

    drop.addEventListener('drop',function(e){
      e.preventDefault();drop.classList.remove('drag-over');
      var f=e.dataTransfer.files[0];
      if(f&&f.type.startsWith('image/'))readPhoto(f);
    });
  }
}

}

// ── Photo ──
function compressImage(dataUrl,maxW,maxH,quality,cb){
  var img=new Image();
  img.onload=function(){
    try{
      var w=img.width,h=img.height;
      if(w>maxW||h>maxH){var ratio=Math.min(maxW/w,maxH/h);w=Math.round(w*ratio);h=Math.round(h*ratio);}
      var c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      var result=c.toDataURL('image/jpeg',quality);
      cb(result);
    }catch(err){cb(null);}
  };
  img.onerror=function(){cb(null);};
  img.src=dataUrl;
}
function handlePhotoSelect(e){if(e.target.files[0])readPhoto(e.target.files[0]);}
function readPhoto(file){
  var r=new FileReader();
  r.onload=function(ev){
    compressImage(ev.target.result,1024,1024,0.82,function(compressed){
      if(!compressed){
        alert('無法處理此圖片格式。\n請將照片轉存為 JPG 或 PNG 後再試。\n（iPhone 可在「照片」App 中分享→轉換格式）');
        $('photo-input').value='';
        return;
      }
      photoB64=compressed;
      $('photo-preview').src=compressed;$('photo-preview').style.display='block';
      $('photo-hint').textContent='✓ 照片已選取，點擊更換';
      $('photo-btn').style.display='inline-flex';
    });
  };
  r.readAsDataURL(file);
}
// ── Groq ──
async function groqCall(messages,model,maxTokens){
  var key=localStorage.getItem(GROQ_STORE)||'';
  if(!key)throw new Error('找不到 Groq API Key（localStorage: tina_groq）');
  var res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:model,messages:messages,max_tokens:maxTokens,temperature:0.5})
  });
  var txt=await res.text();var d;
  try{d=JSON.parse(txt);}catch(e){throw new Error('Groq 非 JSON（'+res.status+'）: '+txt.slice(0,120));}
  if(d.choices&&d.choices[0])return d.choices[0].message.content;
  throw new Error('Groq '+res.status+': '+(d.error&&d.error.message||txt.slice(0,120)));
}

      {type:'image_url',image_url:{url:imageDataUrl,detail:'auto'}}

  // ── Fallback：Groq AI（籤號超出 1-100，或非關帝籤）──
  var btn=$('fetch-btn'),sp=$('fetch-sp');
  btn.disabled=true;sp.style.display='block';
  try{
    var r=await groqCall([
      {role:'system',content:'你是台灣廟宇籤詩資料庫。回應格式：\n【籤詩】\n（四句，每句一行）'},
      {role:'user',content:'廟宇：'+temple+'，籤號：第'+num+'籤。請提供籤詩原文（⚠️ 若非確定內容請直接說明，不要捏造）。'}
    ],TEXT_MDL,300);
    var pm=r.match(/【籤詩】\s*([\s\S]+?)(?=$)/);
    curSlip={number:num,poem:pm?pm[1].trim():r.trim(),basicMeaning:''};
    showPoem(temple,num,curSlip.poem,'',true,false);
  }catch(e){alert(e.message);}
  btn.disabled=false;sp.style.display='none';
}

// ── 照片辨識 ──
async function analyzePhoto(){
  if(!photoB64)return;
  if(!photoB64.startsWith('data:image/jpeg')&&!photoB64.startsWith('data:image/png')&&!photoB64.startsWith('data:image/webp')){
    alert('圖片格式不符（'+photoB64.slice(5,25)+'）\n請選取 JPG 或 PNG 格式的照片。');return;
  }
  var sizeKB=Math.round(photoB64.length*0.75/1024);
  if(sizeKB>3800){alert('圖片太大（'+sizeKB+'KB），請縮小後再試。');return;}
  var temple=$('inp-temple').value.trim()||'廟宇';
  var btn=$('photo-btn'),sp=$('photo-sp');
  btn.disabled=true;sp.style.display='block';
  try{
    var r=await groqVisionCall(temple,photoB64);
    var nm=r.match(/【籤號】\s*([^\n]+)/);
    var pm=r.match(/【籤詩】\s*([\s\S]+?)(?=$)/);
    var num=nm?nm[1].trim().replace(/第|籤/g,'').trim():'?';
    curSlip={number:num,poem:pm?pm[1].trim():'',basicMeaning:'',photoData:photoB64};
    showPoem(temple,num,curSlip.poem,'',false,false);
  }catch(e){
    var fmt=photoB64?photoB64.slice(5,30):'無圖';
    var sz=photoB64?Math.round(photoB64.length*0.75/1024)+'KB':'';
    alert('AI 辨識失敗：'+e.message+'\n格式：'+fmt+'\n大小：'+sz+'\n\n若持續失敗，請改用籤號帶入後手動輸入籤詩。');
  }
  btn.disabled=false;sp.style.display='none';
}

async function genMeaning(){
  var poem=$('poem-text').value.trim();
  if(!poem)return alert('請先填入籤詩原文');
  var temple=$('inp-temple').value.trim()||'廟宇';
  var num=curSlip?curSlip.number:'?';
  var btn=$('gen-meaning-btn'),sp=$('gen-meaning-sp');
  btn.disabled=true;sp.style.display='inline-block';
  try{
    var r=await groqCall([
      {role:'system',content:'你是台灣廟宇籤詩專家，精通傳統籤詩解讀，全程繁體中文。'},
      {role:'user',content:'廟宇：'+temple+'，籤號：第'+num+'籤\n\n籤詩原文：\n'+poem+'\n\n請提供2-3句白話意涵，說明整體吉凶走向與神明指引重點，不要重複籤詩原文。'}
    ],TEXT_MDL,200);
    $('poem-meaning').value=r.trim();
  }catch(e){alert('生成失敗：'+e.message);}
  btn.disabled=false;sp.style.display='none';
}

function clearPoem(){
  curSlip=null;aiRaw=null;photoB64=null;
  $('slip-num').value='';
  $('poem-box').style.display='none';
  $('poem-text').value='';$('poem-meaning').value='';$('poem-ai-note').textContent='';
  $('ai-result').style.display='none';$('ai-result').innerHTML='';
  $('photo-preview').style.display='none';$('photo-preview').src='';
  $('photo-hint').textContent='📸 點擊選取或拖曳上傳籤詩照片';
  $('photo-btn').style.display='none';$('photo-input').value='';
}
function showPoem(temple,num,poem,meaning,isAiRef,fillMeaning){
  $('poem-num-lbl').textContent='⛩ '+temple+' · 第 '+num+' 籤';
  $('poem-text').value=poem;
  $('poem-meaning').value=(fillMeaning&&meaning)?meaning:'';
  $('poem-ai-note').textContent=isAiRef
    ?'⚠️ AI 參考，非實際資料庫——請對照實體籤詩修正後點「✨ 生成意涵」'
    :'✓ 照片辨識完成——如有錯字請修正，確認後點「✨ 生成意涵」';
  $('poem-box').style.display='block';
}

// ── AI 三階解析 ──
async function analyzeSlip(){
  var poem=($('poem-text')||{}).value&&$('poem-text').value.trim();
  if(!poem)return alert('請先取得籤詩內容，並確認籤詩原文欄位有內容');
  var slipNum=($('slip-num').value||'').trim()||(curSlip?String(curSlip.number||'?'):'?');
  if(!curSlip)curSlip={number:slipNum};
  var temple=$('inp-temple').value.trim()||'廟宇';
  var question=$('slip-question').value.trim();
  var rpts={work:$('rpt-work').value.trim(),side:$('rpt-side').value.trim(),health:$('rpt-health').value.trim(),finance:$('rpt-finance').value.trim(),chores:$('rpt-chores').value.trim()};
  var customRpts=getCustomReports();
  var rptLines=[
    Object.entries({'正職':rpts.work,'副業':rpts.side,'健康':rpts.health,'財務':rpts.finance,'家務':rpts.chores}).filter(function(e){return e[1];}).map(function(e){return'- '+e[0]+'：'+e[1];}).join('\n'),
    customRpts.filter(function(cr){return cr.content;}).map(function(cr){return'- '+cr.label+'：'+cr.content;}).join('\n')
  ].filter(Boolean).join('\n')||'（未填寫）';
  var btn=$('analyze-btn'),sp=$('analyze-sp'),res=$('ai-result');
  btn.disabled=true;sp.style.display='block';
  res.innerHTML='<span style="color:var(--faint)">AI 解析中…</span>';res.style.display='block';
  try{
    var poemVal=$('poem-text').value.trim();
    var meaningVal=$('poem-meaning').value.trim();
    var prompt='你是廟宇籤詩解析專家，請以繁體中文提供三層解析。\n\n廟宇：'+temple+'\n籤號：第'+slipNum+'籤\n籤詩原文：\n'+poemVal+'\n'+(meaningVal?'基本意涵：'+meaningVal+'\n':'')+'\n求籤問題：'+(question||'（未指定）')+'\n\n近期交代事項：\n'+rptLines+'\n\n請嚴格依以下格式回覆，各段落不可省略：\n\n## 籤詩意涵\n[白話翻譯與聖意，2-3句，說明這張籤的整體神意]\n\n## 籤意解析\n[單純解讀籤詩含意與運勢走向，不帶入個人問題，3-4句，直白清晰]\n\n## 問題綜合解析\n[嚴格比對求籤問題與近期交代事項，給出客製化深度解答與具體行動建議，4-6句]';
    var r=await groqCall([
      {role:'system',content:'你是精通易理與廟宇文化的籤詩解析顧問，分析具體有深度，不說空話，全程繁體中文。'},
      {role:'user',content:prompt}
    ],TEXT_MDL,900);
    aiRaw=r;
    var secs={};
    ['籤詩意涵','籤意解析','問題綜合解析'].forEach(function(n){
      var m=r.match(new RegExp('##\\s*'+n+'\\s*([\\s\\S]+?)(?=##|$)'));
      secs[n]=m?m[1].trim():'';
    });
    res.innerHTML=[
      {t:'一、籤詩意涵',b:secs['籤詩意涵']},
      {t:'二、籤意解析',b:secs['籤意解析']},
      {t:'三、問題綜合解析',b:secs['問題綜合解析']}
    ].filter(function(s){return s.b;}).map(function(s){
      return '<div class="ai-layer"><div class="ai-layer-title">'+s.t+'</div><div class="ai-layer-body">'+s.b.replace(/\n/g,'<br>')+'</div></div>';
    }).join('');
  }catch(e){res.innerHTML='<span style="color:var(--danger)">'+e.message+'</span>';}
  btn.disabled=false;sp.style.display='none';
}

// ── 儲存 ──
function saveEntry(){
  var temple=$('inp-temple').value.trim();
  if(!temple)return alert('請填寫廟宇名稱');
  var d=loadWP();
  var entry={
    id:editId||('wp_'+Date.now()),
    date:$('inp-date').value,
    time:$('inp-time').value,
    temple:temple,
    reports:{work:$('rpt-work').value.trim(),side:$('rpt-side').value.trim(),health:$('rpt-health').value.trim(),finance:$('rpt-finance').value.trim(),chores:$('rpt-chores').value.trim()},
    customReports:getCustomReports(),
    hasSlip:slipOn,
    slip:slipOn&&curSlip?{number:($('slip-num').value||'').trim()||String(curSlip.number||'?'),poem:($('poem-text')||{}).value||curSlip.poem,basicMeaning:($('poem-meaning')||{}).value||'',photoData:curSlip.photoData||null,question:$('slip-question').value.trim(),aiRaw:aiRaw||''}:null
  };
  if(editId){d.entries=d.entries.map(function(e){return e.id===editId?entry:e;});}
  else d.entries.push(entry);
  saveWP(d);
  localStorage.setItem('worship_last',JSON.stringify({temple:temple,date:entry.date,time:entry.time}));
  clearForm();renderAll();
}

function clearForm(){
  editId=null;
  $('form-title').textContent='新增參拜紀錄';
  _dropBound=false;
  clearCustomFields();
  var n=new Date();$('inp-date').value=dkey(n);$('inp-time').value=n.toTimeString().slice(0,5);
  $('inp-temple').value='';
  ['work','side','health','finance','chores'].forEach(function(k){$('rpt-'+k).value='';});
  if(slipOn)toggleSlip();slipOn=false;
  $('slip-toggle').classList.remove('on');$('slip-section').style.display='none';
  $('slip-num').value='';$('slip-question').value='';
  photoB64=null;curSlip=null;aiRaw=null;
  $('poem-box').style.display='none';$('poem-text').value='';$('poem-meaning').value='';$('poem-ai-note').textContent='';
  $('ai-result').style.display='none';$('ai-result').innerHTML='';
  $('photo-preview').style.display='none';$('photo-preview').src='';
  $('photo-hint').textContent='📸 點擊選取或拖曳上傳籤詩照片';
  $('photo-btn').style.display='none';$('photo-input').value='';
}

function loadLastReports(){
  var d=loadWP();
  var last=d.entries.slice().sort(function(a,b){return(b.date+b.time).localeCompare(a.date+a.time);})[0];
  if(!last||!last.reports)return alert('尚無歷史紀錄可沿用');
  ['work','side','health','finance','chores'].forEach(function(k){if(last.reports[k])$('rpt-'+k).value=last.reports[k];});
  if(last.temple&&!$('inp-temple').value)$('inp-temple').value=last.temple;
  clearCustomFields();
  if(last.customReports)last.customReports.forEach(function(cr){addCustomField(cr.label,cr.content);});
}

// ── 自訂分類 ──
function addCustomField(label,content){
  label=label||'';content=content||'';
  var idx=_customIdx++;
  var wrap=document.createElement('div');
  wrap.className='custom-frow';wrap.id='custom-row-'+idx;
  var li=document.createElement('input');
  li.type='text';li.id='custom-lbl-'+idx;li.placeholder='分類名稱';li.value=label;
  var ta=document.createElement('textarea');
  ta.id='custom-val-'+idx;ta.placeholder='內容…';ta.rows=2;ta.value=content;
  var db=document.createElement('button');
  db.type='button';db.className='del-custom';db.textContent='✕';
  db.onclick=(function(i){return function(){var r=$('custom-row-'+i);if(r)r.remove();};})(idx);
  wrap.appendChild(li);wrap.appendChild(ta);wrap.appendChild(db);
  $('custom-fields-wrap').appendChild(wrap);
}
function getCustomReports(){
  var res=[];
  $('custom-fields-wrap').querySelectorAll('[id^="custom-row-"]').forEach(function(row){
    var idx=row.id.replace('custom-row-','');
    var lbl=($('custom-lbl-'+idx)||{}).value||'';
    var val=($('custom-val-'+idx)||{}).value||'';
    if(lbl.trim()||val.trim())res.push({label:lbl.trim(),content:val.trim()});
  });
  return res;
}
function clearCustomFields(){$('custom-fields-wrap').innerHTML='';_customIdx=0;}

// ── 編輯已有紀錄 ──
function editEntry(id){
  var d=loadWP();
  var e=d.entries.find(function(x){return x.id===id;});
  if(!e)return;
  editId=e.id;
  $('inp-date').value=e.date;
  $('inp-time').value=e.time||'';
  $('inp-temple').value=e.temple;
  ['work','side','health','finance','chores'].forEach(function(k){$('rpt-'+k).value=(e.reports&&e.reports[k])||'';});
  clearCustomFields();
  if(e.customReports)e.customReports.forEach(function(cr){addCustomField(cr.label,cr.content);});
  // 籤
  if(slipOn)toggleSlip();
  _dropBound=false;
  curSlip=null;aiRaw=null;
  $('slip-num').value='';$('slip-question').value='';
  $('poem-box').style.display='none';$('poem-text').value='';$('poem-meaning').value='';$('poem-ai-note').textContent='';
  $('ai-result').style.display='none';$('ai-result').innerHTML='';
  if(e.hasSlip&&e.slip){
    if(!slipOn)toggleSlip();
    curSlip={number:e.slip.number,poem:e.slip.poem,basicMeaning:e.slip.basicMeaning,photoData:e.slip.photoData||null};
    $('slip-num').value=e.slip.number;
    $('slip-question').value=e.slip.question||'';
    aiRaw=e.slip.aiRaw||null;
    showPoem(e.temple,e.slip.number,e.slip.poem,e.slip.basicMeaning,false,true);
    if(aiRaw){
      var r=aiRaw;var secs={};
      ['籤詩意涵','籤意解析','問題綜合解析'].forEach(function(n){
        var m=r.match(new RegExp('##\\s*'+n+'\\s*([\\s\\S]+?)(?=##|$)'));
        secs[n]=m?m[1].trim():'';
      });
      $('ai-result').innerHTML=[
        {t:'一、籤詩意涵',b:secs['籤詩意涵']},
        {t:'二、籤意解析',b:secs['籤意解析']},
        {t:'三、問題綜合解析',b:secs['問題綜合解析']}
      ].filter(function(s){return s.b;}).map(function(s){
        return '<div class="ai-layer"><div class="ai-layer-title">'+s.t+'</div><div class="ai-layer-body">'+s.b.replace(/\n/g,'<br>')+'</div></div>';
      }).join('');
      $('ai-result').style.display='block';
    }
  }
  $('form-title').textContent='✏️ 編輯紀錄';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── 自訂分類 select 更新 ──
function updateCatSelect(){
  var d=loadWP();
  var customLabels=[];
  d.entries.forEach(function(e){
    if(e.customReports)e.customReports.forEach(function(cr){
      if(cr.label&&cr.content&&customLabels.indexOf(cr.label)<0)customLabels.push(cr.label);
    });
  });
  var sel=$('cat-select');
  while(sel.options.length>5)sel.remove(5);
  customLabels.forEach(function(lbl){
    var opt=document.createElement('option');opt.value='custom:'+lbl;opt.textContent=lbl;sel.appendChild(opt);
  });
}

// ── 分類時間軸 ──
function renderTimeline(){
  var val=$('cat-select').value;
  var isCustom=val.indexOf('custom:')=== 0;
  var customLabel=isCustom?val.slice(7):'';
  var cat=isCustom?'':val;
  var d=loadWP();
  var rel;
  if(isCustom){
    rel=d.entries.filter(function(e){return e.customReports&&e.customReports.some(function(cr){return cr.label===customLabel&&cr.content;});}).sort(function(a,b){return(b.date+b.time).localeCompare(a.date+a.time);});
  } else {
    rel=d.entries.filter(function(e){return e.reports&&e.reports[cat];}).sort(function(a,b){return(b.date+b.time).localeCompare(a.date+a.time);});
  }
  $('timeline-card').style.display=rel.length?'block':'none';
  if(!rel.length){$('timeline').innerHTML='<div class="empty">此分類尚無紀錄</div>';return;}
  $('timeline').innerHTML=rel.map(function(e,i){
    var slipHtml='';
    if(e.hasSlip&&e.slip){
      var ai3='';
      if(e.slip.aiRaw){var m=e.slip.aiRaw.match(/##\s*問題綜合解析\s*([\s\S]+?)(?=##|$)/);ai3=m?m[1].trim():'';}
      slipHtml='<div class="tl-slip">'+(e.slip.question?'<div class="tl-q">「'+e.slip.question+'」</div>':'')+
        '<div class="tl-slip-num">第 '+e.slip.number+' 籤</div>'+
        (e.slip.poem?'<div class="tl-poem">'+e.slip.poem.split('\n').slice(0,2).join('　')+(e.slip.poem.split('\n').length>2?'…':'')+'</div>':'')+
        (ai3?'<div class="tl-ai3" id="ai3-'+i+'">'+ai3.replace(/\n/g,'<br>')+'</div><div class="tl-expand" onclick="toggleAI3('+i+')">▼ 展開綜合解析</div>':'')+
      '</div>';
    }
    return '<div class="tl-node"><div class="tl-dot"></div><div class="tl-content">'+
      '<div class="tl-meta">'+e.date+(e.time?' '+e.time:'')+'</div>'+
      '<div class="tl-temple">⛩ '+e.temple+'</div>'+
      '<div class="tl-report">'+(isCustom?(customLabel+'：'+((e.customReports.find(function(cr){return cr.label===customLabel;})||{}).content||'')):(CAT_LABELS[cat]+'：'+e.reports[cat])).replace(/\n/g,'<br>')+'</div>'+
      slipHtml+'</div></div>';
  }).join('');
}

function toggleAI3(i){
  var el=$('ai3-'+i);if(!el)return;
  var open=el.style.display==='block';
  el.style.display=open?'none':'block';
  var exp=el.nextElementSibling;if(exp)exp.textContent=open?'▼ 展開綜合解析':'▲ 收合解析';
}

// ── 歷史 ──
function renderHistory(){
  var d=loadWP();
  var entries=d.entries.slice().sort(function(a,b){return(b.date+b.time).localeCompare(a.date+a.time);});
  if(!entries.length){$('history').innerHTML='<div class="empty">尚無參拜紀錄</div>';return;}
  $('history').innerHTML=entries.map(function(e){
    var cats=Object.entries(e.reports||{}).filter(function(r){return r[1];}).map(function(r){return'<span class="hist-tag">'+CAT_LABELS[r[0]]+'</span>';}).join('');
    var slip=e.hasSlip&&e.slip?'<span class="hist-slip-badge">第 '+e.slip.number+' 籤</span>':'';
    return '<div class="hist-item">'+
      '<div class="hist-top"><span class="hist-temple">⛩ '+e.temple+'</span>'+
      '<div style="display:flex;align-items:center;gap:.4rem">'+
      '<span class="hist-edit" onclick="editEntry(\''+e.id+'\')">✏️</span>'+
      '<span class="hist-del" onclick="delEntry(event,\''+e.id+'\')">✕</span>'+
      '<span class="hist-date">'+e.date+(e.time?' '+e.time:'')+'</span></div></div>'+
      '<div class="hist-tags">'+cats+slip+'</div></div>';
  }).join('');
}

function delEntry(evt,id){
  evt.stopPropagation();
  if(!confirm('確定刪除此筆紀錄？'))return;
  var d=loadWP();d.entries=d.entries.filter(function(e){return e.id!==id;});saveWP(d);renderAll();
}

function renderAll(){updateCatSelect();renderHistory();renderTimeline();}

// ── Init ──
(function(){
  var n=new Date();$('inp-date').value=dkey(n);$('inp-time').value=n.toTimeString().slice(0,5);
  setSlipTab('num');renderAll();
})();
</script>
