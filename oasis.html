<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%220.9em%22 font-size=%2290%22>🌿</text></svg>">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Oasis</title>
<style>
:root{
  --bg:#e8e4de;--bg2:#ede9e3;--card:#f4f1ec;
  --ink:#28261f;--sub:#55514a;--faint:#7a7570;
  --border:rgba(40,38,32,.09);--bstr:rgba(40,38,32,.16);
  --accent:#b08d62;--accent2:#7a6040;
  --saved:#5e8f7e;--red:#c0392b;
  --shadow:rgba(40,38,32,.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  min-height:100%;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang TC',sans-serif;
  -webkit-font-smoothing:antialiased;
}
body{display:flex;flex-direction:column;}

/* ── HEADER ── */
#hdr{padding:20px 28px 0;}
.hdr-title{font-size:22px;font-weight:700;letter-spacing:-.3px;color:var(--ink);}

/* ── TABS ── */
#tab-bar{
  display:flex;padding:14px 28px 0;
  border-bottom:1px solid var(--bstr);margin-top:10px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
#tab-bar::-webkit-scrollbar{display:none;}
.tab{
  padding:8px 18px 10px;font-size:13.5px;cursor:pointer;white-space:nowrap;
  border-bottom:2.5px solid transparent;margin-bottom:-1px;
  color:var(--faint);transition:.15s;user-select:none;flex-shrink:0;
}
.tab.on{color:var(--ink);border-bottom-color:var(--accent);font-weight:700;}
.tab:hover:not(.on){color:var(--sub);}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;padding:20px 28px;max-width:780px;margin:0 auto;width:100%;}

/* ── KEYWORD PILLS ── */
#kw-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.kw-pill{
  padding:5px 15px;border-radius:20px;font-size:12.5px;cursor:pointer;
  border:1px solid var(--bstr);background:var(--card);color:var(--faint);
  transition:.15s;user-select:none;white-space:nowrap;
}
.kw-pill.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
.kw-pill:hover:not(.on){border-color:var(--accent);color:var(--ink);}

/* ── FETCH BAR ── */
#fetch-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;}
.fetch-btn{
  padding:7px 14px;border-radius:8px;border:1px solid var(--bstr);
  background:var(--card);color:var(--sub);font-size:12px;cursor:pointer;
  font-family:inherit;display:flex;align-items:center;gap:5px;transition:.15s;
  white-space:nowrap;flex-shrink:0;
}
.fetch-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.fetch-btn:disabled{opacity:.5;cursor:not-allowed;}
.last-fetch{font-size:11px;color:var(--faint);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── CARDS ── */
.card{
  background:var(--card);border:.5px solid var(--bstr);border-radius:14px;
  padding:18px 20px;margin-bottom:12px;box-shadow:0 2px 10px var(--shadow);
  position:relative;transition:.15s;
}
.card:hover{box-shadow:0 4px 16px var(--shadow);}
.card-country{
  display:inline-block;font-size:10px;padding:2px 9px;border-radius:10px;
  background:var(--bg2);color:var(--sub);margin-bottom:12px;letter-spacing:.3px;
}
.source-badge{
  display:inline-block;font-size:10px;padding:2px 9px;border-radius:10px;
  background:var(--border);color:var(--faint);margin-bottom:12px;margin-left:6px;letter-spacing:.3px;
}
.card-quote{
  font-size:14.5px;line-height:1.9;color:var(--ink);
  border-left:3px solid var(--accent);padding-left:13px;margin-bottom:10px;
  white-space:pre-wrap;word-break:break-word;padding-right:36px;
}
.card-translation{
  font-size:13.5px;line-height:1.85;color:var(--sub);
  border-left:3px solid var(--border);padding-left:13px;margin-bottom:14px;
  white-space:pre-wrap;word-break:break-word;
}
.card-meta-orig{font-size:12px;color:var(--faint);margin-bottom:4px;line-height:1.5;}
.card-meta-zh{font-size:11.5px;color:var(--faint);opacity:.75;line-height:1.5;}
.card-title{color:var(--accent2);font-weight:600;}
.card-tags{margin-top:10px;}
.tag{
  display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;
  background:var(--border);color:var(--faint);margin-right:4px;
}
.save-btn{
  position:absolute;top:14px;right:14px;background:none;border:none;
  font-size:21px;cursor:pointer;opacity:.4;transition:.2s;padding:3px;line-height:1;
}
.save-btn:hover{opacity:1;}
.save-btn.saved{opacity:1;}

/* ── LOADING / EMPTY ── */
.loading{text-align:center;padding:44px 20px;color:var(--faint);}
.spinner{
  display:inline-block;width:22px;height:22px;
  border:2.5px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--faint);}
.empty-icon{font-size:38px;margin-bottom:12px;}
.empty-msg{font-size:14px;margin-bottom:6px;color:var(--ink);}
.empty-sub{font-size:12px;margin-bottom:16px;}

/* ── SAVED FILTER ── */
.saved-filter{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.filter-pill{
  padding:4px 12px;border-radius:14px;font-size:11.5px;cursor:pointer;
  border:1px solid var(--bstr);color:var(--faint);background:var(--card);
  transition:.15s;user-select:none;
}
.filter-pill.on{background:var(--saved);color:#fff;border-color:var(--saved);}
.filter-pill:hover:not(.on){border-color:var(--saved);color:var(--saved);}

/* ── SETTINGS ── */
.setting-group{margin-bottom:24px;}
.setting-label{
  font-size:11px;color:var(--faint);margin-bottom:8px;
  letter-spacing:.8px;text-transform:uppercase;font-weight:600;
}
.key-wrap{position:relative;display:flex;align-items:center;}
.key-wrap .setting-input{padding-right:44px;}
.eye-btn{
  position:absolute;right:12px;background:none;border:none;
  cursor:pointer;color:var(--faint);font-size:16px;padding:4px;
  line-height:1;transition:color .15s;
}
.eye-btn:hover{color:var(--sub);}
.setting-input{
  width:100%;padding:10px 14px;border:1.5px solid var(--bstr);border-radius:9px;
  background:var(--bg2);color:var(--ink);font-size:13px;font-family:inherit;transition:.15s;
}
.setting-input:focus{outline:none;border-color:var(--accent);}
.setting-hint{font-size:11px;color:var(--faint);margin-top:5px;}
.btn{padding:9px 18px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-family:inherit;transition:.15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;border:1px solid var(--bstr);color:var(--faint);padding:8px 14px;}
.btn-ghost:hover{border-color:var(--accent);color:var(--sub);}
.manage-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:8px;background:var(--bg2);
  border:.5px solid var(--bstr);margin-bottom:7px;
}
.manage-main{flex:1;font-size:13px;}
.manage-sub{font-size:11px;color:var(--faint);}
.del-btn{background:none;border:none;font-size:15px;cursor:pointer;color:var(--faint);padding:2px 5px;transition:.15s;}
.del-btn:hover{color:var(--red);}
.stat-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.stat-chip{padding:6px 14px;background:var(--card);border:.5px solid var(--bstr);border-radius:10px;font-size:12px;}
.stat-chip strong{color:var(--accent);}
.add-row{display:flex;gap:8px;margin-top:8px;}
.add-row .setting-input{flex:1;}

/* ── MOBILE ── */
@media(max-width:600px){
  #hdr{padding:16px 16px 0;}
  #tab-bar{padding:12px 16px 0;}
  #main{padding:14px 14px;}
  .card{padding:14px 14px;}
  .card-quote{font-size:13.5px;}
  .hdr-title{font-size:19px;}
  .tab{font-size:13px;padding:7px 14px 9px;}
}
@media(max-width:400px){
  #main{padding:12px 10px;}
  .card{padding:12px 12px;}
}
</style>
</head>
<body>

<div id="hdr">
  <div class="hdr-title">🌿 Oasis</div>
</div>

<div id="tab-bar">
  <div class="tab on" data-tab="discover" onclick="showTab('discover')">探索</div>
  <div class="tab" data-tab="saved" onclick="showTab('saved')">收藏</div>
  <div class="tab" data-tab="settings" onclick="showTab('settings')">設定</div>
</div>

<div id="main"></div>

<script>
// ── STATE ──
const S={
  get keywords(){try{return JSON.parse(localStorage.getItem('oasis_keywords')||'[]');}catch{return[];}},
  set keywords(v){localStorage.setItem('oasis_keywords',JSON.stringify(v));saveStatus();},
  get saved(){try{return JSON.parse(localStorage.getItem('oasis_saved')||'[]');}catch{return[];}},
  set saved(v){localStorage.setItem('oasis_saved',JSON.stringify(v));saveStatus();},
  get authors(){try{return JSON.parse(localStorage.getItem('oasis_authors')||'[]');}catch{return[];}},
  set authors(v){localStorage.setItem('oasis_authors',JSON.stringify(v));saveStatus();},
  get groqKey(){return localStorage.getItem('oasis_groq_key')||'';},
  set groqKey(v){localStorage.setItem('oasis_groq_key',v);},
  get cache(){try{return JSON.parse(localStorage.getItem('oasis_cache')||'{}');}catch{return{};}},
  set cache(v){localStorage.setItem('oasis_cache',JSON.stringify(v));saveStatus();},
};

function saveStatus(){
  const kws=S.keywords,saved=S.saved,cache=S.cache,authors=S.authors;
  const totalCards=Object.values(cache).reduce((a,arr)=>a+(arr?.length||0),0);
  localStorage.setItem('oasis_status',JSON.stringify({
    keywords:kws.length,savedCount:saved.length,totalCards,
    authors:authors.length,lastKeywords:kws.slice(0,3),ts:Date.now()
  }));
}
window.getOasisStatus=()=>{try{return JSON.parse(localStorage.getItem('oasis_status')||'null');}catch{return null;}};

let curTab='discover',curKw=null,savedFilter='all',savedFilter2=null,discoverFilter=null;
// discoverFilter / savedFilter2: null | 'ol' | 'country:X' | 'author:X'
const fetching=new Set();

// ── ROUTING ──
function showTab(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.tab===t));
  render();
}
function render(){
  document.getElementById('main').innerHTML=
    curTab==='discover'?buildDiscover():
    curTab==='saved'?buildSaved():
    buildSettings();
}

// ── CARD RENDERER ──
const SOURCE_MAP={
  'book':'📚 實體書','novel':'📚 實體書','poetry':'📚 詩集','poetry_collection':'📚 詩集',
  'essay':'📚 散文集','short_story':'📚 短篇集',
  'threads':'🧵 Threads','instagram':'📷 Instagram','twitter':'🐦 Twitter','weibo':'微博',
  'blog':'📝 網誌','magazine':'📰 雜誌','newspaper':'📰 報紙','online':'🔗 網路',
};
function buildCard(c){
  const isSaved=S.saved.some(s=>s.id===c.id);
  const isZh=(c.lang==='zh');

  // 1. 國別 + 來源類型
  const sourceLbl=SOURCE_MAP[c.source_type]||'';
  const sourceBadge=sourceLbl?`<span class="source-badge">${sourceLbl}</span>`:'';
  const countryHtml=c.country
    ?`<div style="margin-bottom:12px;"><span class="card-country" style="margin-bottom:0;">${esc(c.country)}</span>${sourceBadge}</div>`:'';

  // 2. 原文內容
  const quoteHtml=`<div class="card-quote">${esc(c.quote)}</div>`;

  // 3. 中文翻譯（非中文才顯示，LLM 漏填時提示）
  let transHtml='';
  if(!isZh){
    transHtml=c.translation
      ?`<div class="card-translation">${esc(c.translation)}</div>`
      :`<div class="card-translation" style="opacity:.4;font-size:12px;">（翻譯未載入，請重新探索）</div>`;
  }

  // 4. 出處原文：《書名》　作者　年代
  const origParts=[
    c.title?`《${esc(c.title)}》`:'',
    c.author?esc(c.author):'',
    c.year?String(c.year):'',
  ].filter(Boolean);
  const metaOrigHtml=origParts.length
    ?`<div class="card-meta-orig">${origParts.join('　')}</div>`:'';

  // 5. 出處中文：《中文書名》　中文作者　年代（非中文才顯示）
  const zhParts=!isZh?[
    c.title_zh?`《${esc(c.title_zh)}》`:'',
    c.author_zh?esc(c.author_zh):'',
    c.year?String(c.year):'',
  ].filter(Boolean):[];
  const metaZhHtml=zhParts.length
    ?`<div class="card-meta-zh">${zhParts.join('　')}</div>`:'';

  const tagsHtml=(c.tags||[]).length
    ?`<div class="card-tags">${c.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:'';

  // 來源連結：有 Open Library URL 優先顯示，否則 Google 搜尋
  const searchQ=encodeURIComponent(`"${c.title||''}" ${c.author||''}`);
  const verifyHtml=c.olUrl
    ?`<div style="margin-top:8px;"><a href="${c.olUrl}" target="_blank" rel="noopener" style="font-size:11px;color:var(--faint);text-decoration:none;opacity:.7;">📖 Open Library</a></div>`
    :`<div style="margin-top:8px;"><a href="https://www.google.com/search?q=${searchQ}" target="_blank" rel="noopener" style="font-size:11px;color:var(--faint);text-decoration:none;opacity:.7;">🔍 查核來源</a></div>`;

  return `<div class="card">
    <button class="save-btn${isSaved?' saved':''}" onclick="toggleSave('${esc(c.id)}')"
      title="${isSaved?'移除收藏':'加入收藏'}">${isSaved?'🌿':'🤍'}</button>
    ${countryHtml}${quoteHtml}${transHtml}${metaOrigHtml}${metaZhHtml}${tagsHtml}${verifyHtml}
  </div>`;
}

// ── DISCOVER ──
function buildDiscover(){
  const kws=S.keywords;
  if(!kws.length) return `<div class="empty">
    <div class="empty-icon">🌾</div>
    <div class="empty-msg">還沒有探索關鍵字</div>
    <div class="empty-sub">到設定新增感興趣的主題</div>
    <button class="btn btn-primary" onclick="showTab('settings')">前往設定</button>
  </div>`;

  if(!curKw||!kws.includes(curKw)) curKw=kws[0];

  const pills=kws.map(k=>
    `<div class="kw-pill${k===curKw?' on':''}" onclick="selectKw('${esc(k)}')">${esc(k)}</div>`
  ).join('');

  const cache=S.cache,cards=cache[curKw]||[];
  const lastTs=parseInt(localStorage.getItem('oasis_last_'+curKw)||'0');
  const ago=lastTs?timeSince(lastTs):'從未取得';
  const isLoading=fetching.has(curKw);

  // 過濾已收藏的項目（以 title+author 為 key，避免重複探索）
  const savedKeys=new Set(S.saved.map(s=>`${s.title}|${s.author}`));
  const unsaved=cards.filter(c=>!savedKeys.has(`${c.title}|${c.author}`));

  // 篩選選項來源
  const hasOl=unsaved.some(c=>c.olUrl);
  const countries=[...new Set(unsaved.map(c=>c.country).filter(Boolean))];
  const favAuthors=S.authors;
  const matchedAuthors=favAuthors.filter(a=>
    unsaved.some(c=>c.author===a.name||c.author_zh===a.name_zh||c.author===a.name_zh||c.author_zh===a.name)
  );

  // 套用篩選
  let displayed=unsaved;
  if(discoverFilter==='ol') displayed=unsaved.filter(c=>c.olUrl);
  else if(discoverFilter?.startsWith('country:')){
    const co=discoverFilter.slice(8);
    displayed=unsaved.filter(c=>c.country===co);
  } else if(discoverFilter?.startsWith('author:')){
    const ak=discoverFilter.slice(7);
    displayed=unsaved.filter(c=>c.author===ak||c.author_zh===ak);
  }
  // 若篩選後無結果（換分頁後），自動重置
  if(discoverFilter&&!displayed.length&&unsaved.length) discoverFilter=null,displayed=unsaved;

  let cardsHtml='';
  if(isLoading){
    cardsHtml=`<div class="loading"><div class="spinner"></div><br>正在探索「${esc(curKw)}」…</div>`;
  } else if(!unsaved.length&&!cards.length){
    cardsHtml=`<div class="empty">
      <div class="empty-icon">📚</div>
      <div class="empty-msg">尚無「${esc(curKw)}」的探索結果</div>
      <div class="empty-sub">按右上角開始探索</div>
    </div>`;
  } else if(!unsaved.length){
    cardsHtml=`<div class="empty">
      <div class="empty-icon">🌿</div>
      <div class="empty-msg">此關鍵字的探索結果都已收藏</div>
      <div class="empty-sub">按「重新探索」取得新內容</div>
    </div>`;
  } else if(!displayed.length){
    cardsHtml=`<div class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-msg">此篩選條件下無符合項目</div>
      <div class="empty-sub">點擊篩選標籤取消選取</div>
    </div>`;
  } else {
    cardsHtml=displayed.map(c=>buildCard(c)).join('');
  }

  // 篩選列（有任何可篩選選項就顯示）
  const hasFilters=hasOl||countries.length||matchedAuthors.length;
  const filterRow=hasFilters&&!isLoading?`<div style="display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap;">
    ${hasOl?`<div class="filter-pill${discoverFilter==='ol'?' on':''}" onclick="setDiscoverFilter('ol')">📖 OpenLibrary</div>`:''}
    ${countries.map(co=>`<div class="filter-pill${discoverFilter==='country:'+co?' on':''}" onclick="setDiscoverFilter('country:${esc(co)}')">${esc(co)}</div>`).join('')}
    ${matchedAuthors.map(a=>{const k=a.name||a.name_zh,lbl=a.name_zh||a.name;return`<div class="filter-pill${discoverFilter==='author:'+k?' on':''}" onclick="setDiscoverFilter('author:${esc(k)}')">${esc(lbl)}</div>`;}).join('')}
  </div>`:'';

  return `
    <div id="kw-row">${pills}</div>
    <div id="fetch-bar">
      <span class="last-fetch">上次更新：${ago}</span>
      <button class="fetch-btn"${isLoading?' disabled':''} onclick="fetchCards('${esc(curKw)}')">
        ${isLoading?'⏳ 探索中…':'🔄 重新探索'}
      </button>
    </div>
    ${filterRow}
    <div id="cards-area">${cardsHtml}</div>`;
}

function selectKw(k){curKw=k;render();}
function setDiscoverFilter(f){discoverFilter=discoverFilter===f?null:f;render();}

// ── SAVED ──
function buildSaved(){
  const items=S.saved;
  if(!items.length) return `<div class="empty">
    <div class="empty-icon">🌿</div>
    <div class="empty-msg">收藏夾是空的</div>
    <div class="empty-sub">在探索頁按 🤍 加入收藏</div>
  </div>`;

  const allTags=['all',...new Set(items.flatMap(i=>i.tags||[]))];
  if(!allTags.includes(savedFilter)) savedFilter='all';
  const filters=allTags.map(t=>
    `<div class="filter-pill${t===savedFilter?' on':''}" onclick="setSavedFilter('${esc(t)}')">${t==='all'?'全部':esc(t)}</div>`
  ).join('');

  // 套用關鍵字標籤篩選
  const tagFiltered=savedFilter==='all'?items:items.filter(i=>(i.tags||[]).includes(savedFilter));

  // 第二列篩選選項（OL / 國別 / 喜愛作家）
  const hasOl=tagFiltered.some(c=>c.olUrl);
  const countries=[...new Set(tagFiltered.map(c=>c.country).filter(Boolean))];
  const matchedAuthors=S.authors.filter(a=>
    tagFiltered.some(c=>c.author===a.name||c.author_zh===a.name_zh||c.author===a.name_zh||c.author_zh===a.name)
  );
  const hasFilter2=hasOl||countries.length||matchedAuthors.length;

  // 套用第二層篩選
  let show=tagFiltered;
  if(savedFilter2==='ol') show=tagFiltered.filter(c=>c.olUrl);
  else if(savedFilter2?.startsWith('country:')){const co=savedFilter2.slice(8);show=tagFiltered.filter(c=>c.country===co);}
  else if(savedFilter2?.startsWith('author:')){const ak=savedFilter2.slice(7);show=tagFiltered.filter(c=>c.author===ak||c.author_zh===ak);}
  if(savedFilter2&&!show.length&&tagFiltered.length){savedFilter2=null;show=tagFiltered;}

  const filter2Row=hasFilter2?`<div style="display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap;">
    ${hasOl?`<div class="filter-pill${savedFilter2==='ol'?' on':''}" onclick="setSavedFilter2('ol')">📖 OpenLibrary</div>`:''}
    ${countries.map(co=>`<div class="filter-pill${savedFilter2==='country:'+co?' on':''}" onclick="setSavedFilter2('country:${esc(co)}')">${esc(co)}</div>`).join('')}

function addKw(){
  const inp=document.getElementById('new-kw');

  const kws=S.keywords;
  if(!kws.includes(v)){kws.push(v);S.keywords=kws;}
  inp.value='';render();

  const zhEl=document.getElementById('new-author-zh');

  const name_zh=(zhEl?.value||'').trim();

// ── SAVE / UNSAVE ──
function toggleSave(id){
  let saved=S.saved;
  const idx=saved.findIndex(s=>s.id===id);
  if(idx>=0){
    saved.splice(idx,1);
  } else {
    const cache=S.cache;
    let card=null;
    for(const k of Object.keys(cache)){
      card=(cache[k]||[]).find(c=>c.id===id);
      if(card)break;
    }
    if(card)saved.push({...card,savedAt:Date.now()});
  }
  S.saved=saved;render();
}

// ── OPEN LIBRARY 來源查詢 ──
// 只查 book/novel/essay，且非中文（OL 不收詩作單篇、短篇，也不索引中文書名）
const OL_TYPES=new Set(['book','novel','essay']);
async function lookupSource(title,author){
  try{
    const t=encodeURIComponent(title);
    const a=encodeURIComponent(author);
    const res=await Promise.race([
      fetch(`https://openlibrary.org/search.json?title=${t}&author=${a}&limit=1&fields=key`),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),4000))
    ]);
    if(!res.ok)return null;
    const json=await res.json();
    const key=json.docs?.[0]?.key;
    return key?`https://openlibrary.org${key}`:null;
  }catch{return null;}
}
async function enrichWithSources(cards){
  const results=await Promise.all(
    cards.map(c=>OL_TYPES.has(c.source_type)&&c.lang!=='zh'
      ?lookupSource(c.title,c.author)
      :Promise.resolve(null))
  );
  return cards.map((c,i)=>results[i]?{...c,olUrl:results[i]}:c);
}

async function fetchCards(kw){
  if(!S.groqKey){alert('請先在「設定」頁輸入 Groq API Key');showTab('settings');return;}
  fetching.add(kw);render();

  const savedSample=S.saved.slice(0,5).map(s=>`《${s.title}》${s.author}`).filter(Boolean).join('、');
  const favAuthors=S.authors.map(a=>{
    if(a.name&&a.name_zh)return`${a.name}（${a.name_zh}）`;
    return a.name||a.name_zh||'';
  }).filter(Boolean).join('、');

  // 收集所有已出現過的作品（跨關鍵字），用於告訴 LLM 避免重複
  const allCached=Object.values(S.cache).flat();
  const seenTitles=[...new Set(allCached.map(c=>c.title).filter(Boolean))].slice(0,30);
  const excludeCtx=seenTitles.length?`\n⚠️ 以下作品已出現過，請完全避免重複，改用其他作品或作者：${seenTitles.join('、')}`:'';

  const learningParts=[];
  if(savedSample)learningParts.push(`用戶收藏風格參考：${savedSample}`);
  if(favAuthors)learningParts.push(`喜愛作者（優先納入其與關鍵字相關作品）：${favAuthors}`);
  const learningCtx=learningParts.length?'\n'+learningParts.join('\n'):'';

  const sys=`你是文學引文資料庫。只提供真實已出版、可查證的作品原文節選，若不確定引文是否真實存在，寧可省略該條，絕不虛構。回傳純 JSON 陣列，直接從 [ 開始。
【語言純粹性規則】quote 欄位必須 100% 使用作品原始語言，嚴禁夾雜任何其他語言文字（韓文 quote 內不得出現中文；英文 quote 內不得出現中文）。中文翻譯只放在 translation 欄位。
【繁體中文規則】所有中文欄位（translation、title_zh、author_zh、country）一律使用繁體中文，嚴禁使用簡體中文。
【真實性規則】只輸出你 100% 確定真實存在的作品與引文內容。若你無法確認某段 quote 是否為該作品的真實原文，必須完全省略該條，寧可回傳 0 條也不捏造。虛構內容冠上真實作者姓名是嚴重錯誤，絕對禁止。`;

  const prompt=`關鍵字「${kw}」。${learningCtx}${excludeCtx}

找 3-5 條可查證的真實文學引文，按以下 JSON 結構輸出。非中文作品的翻譯欄位不得省略。
⚠️ 語言多樣性規則：3-5 條中，至少 1 條必須來自中文文學（台灣、中國大陸、香港均可），至少 1 條來自非英語語系（日文、法文、德文、韓文、西班牙文等），不得 3 條以上全為英文作品。
⚠️ quote 欄位只能含原文語言文字，嚴禁混入中文或其他語言。
⚠️ quote 長度規則：詩作請提供完整詩節（至少 3-6 行）；散文/小說請提供完整段落（3-8 句），不要只截取單句。用 \n 標示換行。
⚠️ 以下三條為【格式示範，絕對不得出現在你的回傳結果中】：

source_type 填寫規則：實體出版書籍填 "book"；詩集填 "poetry"；散文集填 "essay"；短篇小說集填 "short_story"；Threads 貼文填 "threads"；Instagram 填 "instagram"；部落格填 "blog"；雜誌填 "magazine"；報紙填 "newspaper"；其他網路內容填 "online"。

【格式示範一 - 勿輸出】韓文詩集：
{"country":"韓國","quote":"자세히 보아야 예쁘다\n오래 보아야 사랑스럽다\n너도 그렇다","translation":"仔細端詳才看見美麗，久久凝視才懂得愛，你也是如此。","title":"풀꽃","title_zh":"野花","author":"나태주","author_zh":"羅太柱","year":1976,"lang":"ko","source_type":"poetry","tags":["${kw}"]}

【格式示範二 - 勿輸出】法文小說：
{"country":"法國","quote":"Aujourd'hui, maman est morte.","translation":"今天，媽媽死了。","title":"L'Étranger","title_zh":"異鄉人","author":"Albert Camus","author_zh":"阿爾貝·卡繆","year":1942,"lang":"fr","source_type":"book","tags":["${kw}"]}

【格式示範三 - 勿輸出】中文散文（無翻譯欄）：
{"country":"台灣","quote":"生命是一襲華美的袍，爬滿了蚤子。","translation":"","title":"天才夢","title_zh":"","author":"張愛玲","author_zh":"","year":1940,"lang":"zh","source_type":"essay","tags":["${kw}"]}

現在請根據關鍵字「${kw}」，輸出你確定真實存在的 3-5 條引文，回傳 JSON 陣列，不加任何說明：`;

  // Use few-shot: include the examples as assistant demo
  const msgs=[
    {role:'system',content:sys},
    {role:'user',content:prompt}
  ];

  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Authorization':'Bearer '+S.groqKey,'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        messages:msgs,
        temperature:0.75,max_tokens:2000
      })
    });
    if(!res.ok){const e=await res.text();alert('Groq 錯誤 '+res.status+': '+e.slice(0,200));fetching.delete(kw);render();return;}
    const json=await res.json();
    const text=json.choices?.[0]?.message?.content||'';
    const m=text.match(/\[[\s\S]*\]/);
    if(!m){alert('格式錯誤，請重試');fetching.delete(kw);render();return;}
    let cards=JSON.parse(repairJson(m[0]));
    if(!Array.isArray(cards)||!cards.length)throw new Error('empty');
    cards=cards.map((c,i)=>({
      id:kw+'_'+Date.now()+'_'+i,
      country:c.country||'',
      quote:sanitizeQuote(c.quote||'',c.lang||'zh'),translation:c.translation||'',
      title:c.title||'',title_zh:c.title_zh||'',
      author:c.author||'',author_zh:c.author_zh||'',
      year:c.year||null,lang:c.lang||'zh',tags:c.tags||[kw],
      source_type:c.source_type||''
    })).filter(c=>c.quote);
    // 用 s2t() 字表轉繁體
    cards=cards.map(c=>({...c,
      quote:c.lang==='zh'?s2t(c.quote):c.quote,
      translation:s2t(c.translation),
      title_zh:s2t(c.title_zh),
      author_zh:s2t(c.author_zh)
    }));
    // Open Library 來源 URL 查詢（平行，4 秒逾時後跳過）
    cards=await enrichWithSources(cards);
    // 累積 cache（append + dedup by title+author），避免覆蓋造成篩選池太小
    const cache=S.cache;
    const existing=cache[kw]||[];
    const seenKey=new Set(existing.map(c=>`${c.title}|${c.author}`));
    const newCards=cards.filter(c=>!seenKey.has(`${c.title}|${c.author}`));
    cache[kw]=[...existing,...newCards];
    S.cache=cache;
    localStorage.setItem('oasis_last_'+kw,Date.now().toString());
  }catch(e){alert('探索失敗：'+e.message);}
  fetching.delete(kw);render();
}

function s2t(str){
  if(!str)return str;
  return[...str].map(c=>S2T_MAP[c]||c).join('');
}

// ── UTILS ──
// 修復 LLM 在 JSON 字串內插入原始控制字元或無效跳脫序列導致 JSON.parse 失敗
function repairJson(str){
  const VALID_ESC=new Set(['"','\\','/','b','f','n','r','t','u']);
  let out='',inStr=false,i=0;
  while(i<str.length){
    const c=str[i];
    if(!inStr){
      out+=c;
      if(c==='"') inStr=true;
      i++;continue;
    }
    // 在字串內
    if(c==='"'){out+=c;inStr=false;i++;continue;}
    if(c==='\\'){
      const nx=str[i+1]||'';
      if(VALID_ESC.has(nx)){
        out+=c+nx;i+=2;
        if(nx==='u'){out+=str.slice(i,i+4);i+=4;} // \uXXXX
      } else {
        out+=nx;i+=2; // 無效跳脫：丟掉反斜線，保留字元
      }
      continue;
    }
    // 裸控制字元
    if(c==='\n'){out+='\\n';i++;continue;}
    if(c==='\r'){out+='\\r';i++;continue;}
    if(c==='\t'){out+='\\t';i++;continue;}
    out+=c;i++;
  }
  return out;
}
// 偵測非中文 quote 混入 CJK 漢字（排除日文合理用字），回傳清空字串讓 filter 丟棄該筆
function sanitizeQuote(q,lang){
  if(lang==='zh')return q; // 中文本身就是 CJK，不過濾
  // 日文可合法含漢字（lang==='ja'），不過濾
  if(lang==='ja')return q;
  // 韓文、英文、法文、德文等：quote 中若含 CJK Unified Ideographs（U+4E00–U+9FFF）則視為混語
  if(/[一-鿿]/.test(q)){
    console.warn('[Oasis] 混語 quote 被過濾（lang='+lang+'）:',q);
    return ''; // 被 filter(c=>c.quote) 丟棄
  }
  return q;
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function timeSince(ts){
  if(!ts)return'從未';
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return s+'秒前';
  if(s<3600)return Math.floor(s/60)+'分鐘前';
  if(s<86400)return Math.floor(s/3600)+'小時前';
  return Math.floor(s/86400)+'天前';
}

// ── INIT ──
// 一次性：將 cache 與收藏中的中文欄位轉換為繁體
(function migrateToTraditional(){
  let changed=false;
  const cache=S.cache;
  for(const kw of Object.keys(cache)){
    cache[kw]=(cache[kw]||[]).map(c=>{
      const t=s2t(c.translation||''),tz=s2t(c.title_zh||''),az=s2t(c.author_zh||'');
      if(t!==c.translation||tz!==c.title_zh||az!==c.author_zh){
        changed=true;
        return{...c,translation:t,title_zh:tz,author_zh:az};
      }
      return c;
    });
  }
  if(changed)S.cache=cache;
  const saved=S.saved.map(c=>{
    const t=s2t(c.translation||''),tz=s2t(c.title_zh||''),az=s2t(c.author_zh||'');
    if(t!==c.translation||tz!==c.title_zh||az!==c.author_zh)
      return{...c,translation:t,title_zh:tz,author_zh:az};
    return c;
  });
  if(JSON.stringify(saved)!==JSON.stringify(S.saved))S.saved=saved;
})();
// 清理已收藏中混語的 quote（一次性，不影響中文/日文作品）
(function cleanSavedMixedLang(){
  const before=S.saved;
  const after=before.map(c=>{
    const q=sanitizeQuote(c.quote||'',c.lang||'zh');
    return q?c:null;
  }).filter(Boolean);
  if(after.length<before.length){
    S.saved=after;
    console.info('[Oasis] 已清除',before.length-after.length,'筆混語收藏');
  }
})();
