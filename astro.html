<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>星盤分析</title>
<style>
:root{
  --bg:#e8e4de;--bg2:#ede9e3;--card:#f4f1ec;
  --ink:#28261f;--sub:#55514a;--faint:#7a7570;
  --border:rgba(40,38,32,.09);--bstr:rgba(40,38,32,.16);
  --astro:#3d527a;--astro-l:#506898;--astro-tint:rgba(61,82,122,.08);--astro-tint2:rgba(61,82,122,.14);
  --shadow:0 1px 4px rgba(40,38,32,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang TC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;background:rgba(232,228,222,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--bstr);display:flex;align-items:center;gap:0;padding:0 16px}
.nav-title{font-size:15px;font-weight:700;color:var(--astro);padding:14px 0;margin-right:20px;letter-spacing:.02em}
.tab-btn{padding:14px 16px;background:none;border:none;color:var(--faint);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap}
.tab-btn.active{color:var(--astro);border-bottom-color:var(--astro);font-weight:600}
.tab-btn:hover:not(.active){color:var(--sub)}
.back-link{margin-left:auto;font-size:12px;color:var(--faint);text-decoration:none;padding:6px 10px;border-radius:6px;transition:background .15s}
.back-link:hover{background:rgba(40,38,32,.07);color:var(--ink)}

/* ── WRAPPER ── */
.page{display:none;padding:20px 16px;max-width:860px;margin:0 auto}
.page.active{display:block}

/* ── PANELS & CARDS ── */
.panel{background:var(--card);border:.5px solid var(--bstr);border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
.panel-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--astro);margin-bottom:14px}
.card{background:var(--bg2);border:.5px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.card-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--astro);margin-bottom:8px}
.section-heading{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:6px}

/* ── INPUTS ── */
textarea,input[type=text]{width:100%;background:var(--bg2);border:1.5px solid transparent;border-radius:8px;padding:10px 12px;color:var(--ink);font-size:13px;font-family:inherit;outline:none;resize:vertical;transition:border .18s,background .18s;line-height:1.6}
textarea:focus,input[type=text]:focus{border-color:var(--astro-l);background:#fff}
textarea{min-height:80px}
label{font-size:12px;color:var(--sub);display:block;margin-bottom:6px}

/* ── BUTTONS ── */
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;font-family:inherit}
.btn-primary{background:var(--astro);color:#fff}
.btn-primary:hover{background:var(--astro-l);transform:translateY(-1px)}
.btn-primary:disabled{background:rgba(61,82,122,.3);color:rgba(61,82,122,.5);cursor:not-allowed;transform:none}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:6px}
.btn-ghost{background:rgba(40,38,32,.06);border:1px solid var(--bstr);color:var(--sub)}
.btn-ghost:hover{background:rgba(40,38,32,.1);color:var(--ink)}
.btn-danger{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);color:#c0392b}
.btn-danger:hover{background:rgba(192,57,43,.15)}

/* ── IMAGE UPLOAD ── */
.img-upload-area{border:1.5px dashed var(--bstr);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border .18s,background .18s;position:relative;background:rgba(40,38,32,.02)}
.img-upload-area:hover{border-color:var(--astro-l);background:var(--astro-tint)}
.img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-upload-hint{font-size:12px;color:var(--faint);margin-top:4px}
.img-previews{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.img-preview-wrap{position:relative;width:120px;height:90px;border-radius:8px;overflow:hidden;border:.5px solid var(--bstr)}
.img-preview-wrap img{width:100%;height:100%;object-fit:cover}
.img-del{position:absolute;top:3px;right:3px;background:rgba(40,38,32,.7);border:none;color:#fff;border-radius:4px;padding:1px 5px;font-size:11px;cursor:pointer}

/* ── FORECAST ── */
.year-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.year-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--bstr);background:rgba(40,38,32,.04);color:var(--sub);font-size:13px;cursor:pointer;transition:all .18s;font-family:inherit}
.year-btn.active{background:var(--astro);border-color:var(--astro);color:#fff;font-weight:600}
.year-btn:hover:not(.active){border-color:var(--astro-l);color:var(--astro)}
.month-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:14px}
.month-btn{padding:7px 4px;border-radius:7px;border:.5px solid var(--border);background:var(--bg2);color:var(--faint);font-size:12px;cursor:pointer;transition:all .18s;text-align:center;font-family:inherit}
.month-btn.active{background:var(--astro-tint2);border-color:var(--astro);color:var(--astro);font-weight:600}
.month-btn.has-cache{border-color:rgba(61,82,122,.3);color:var(--astro)}
.month-btn:hover:not(.active){border-color:var(--astro-l);color:var(--astro)}

/* chart source toggle */
.chart-src-row{display:flex;gap:6px;margin-bottom:14px}
.chart-src-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--bstr);background:rgba(40,38,32,.04);color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:inherit}
.chart-src-btn.active{background:var(--astro);border-color:var(--astro);color:#fff}
.chart-src-btn:hover:not(.active){border-color:var(--astro-l);color:var(--astro)}

/* filter pills */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-pill{padding:5px 12px;border-radius:20px;border:1px solid var(--bstr);background:rgba(40,38,32,.04);color:var(--sub);font-size:12px;cursor:pointer;transition:all .18s;font-family:inherit;white-space:nowrap}
.filter-pill.active{background:var(--astro);border-color:var(--astro);color:#fff;font-weight:600}
.filter-pill:hover:not(.active){border-color:var(--astro-l);color:var(--astro)}

/* forecast section cards */
.forecast-sections{display:flex;flex-direction:column;gap:20px}
.forecast-section{background:var(--card);border:.5px solid var(--bstr);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(40,38,32,.08)}
.forecast-section-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--astro);padding:12px 18px;background:var(--bg2);border-bottom:1px solid var(--border)}
.forecast-section-body{padding:16px 18px;font-size:13px;line-height:1.85;color:var(--ink)}
.forecast-section-body p{margin-bottom:10px}.forecast-section-body p:last-child{margin-bottom:0}
.forecast-section-body strong{color:var(--astro);font-weight:600}

/* timeline (year view) */
.timeline-list{display:flex;flex-direction:column}
.timeline-row{display:grid;grid-template-columns:44px 1fr;gap:10px;padding:10px 0;border-bottom:.5px solid var(--border);align-items:baseline}
.timeline-row:last-child{border-bottom:none}
.timeline-month{font-size:11px;font-weight:700;color:var(--astro);white-space:nowrap}
.timeline-body{font-size:13px;line-height:1.75;color:var(--sub)}
.timeline-body strong{color:var(--ink);font-weight:600}

/* ── CHAT ── */
.chat-messages{height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:14px;background:var(--bg2);border:.5px solid var(--bstr);border-radius:10px;margin-bottom:12px}
.msg{max-width:80%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.65;word-break:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:var(--astro);color:#fff;border-bottom-right-radius:3px}
.msg.ai{align-self:flex-start;background:var(--card);border:.5px solid var(--bstr);color:var(--ink);border-bottom-left-radius:3px}
.msg.ai strong{color:var(--astro)}
.msg.sys{align-self:center;font-size:11px;color:var(--faint)}
.chat-input-row{display:flex;gap:8px}
.chat-input-row textarea{min-height:46px;max-height:120px;resize:none;padding:10px 12px;flex:1}

/* ── MYSELF OUTPUT ── */
/* ── MYSELF 3-col ── */
.myself-col-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:start}
@media(max-width:800px){.myself-col-grid{grid-template-columns:1fr 1fr}}
@media(max-width:540px){.myself-col-grid{grid-template-columns:1fr}.month-grid{grid-template-columns:repeat(4,1fr)}}
.myself-col{display:flex;flex-direction:column;gap:10px}
.myself-col-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 10px;border-bottom:1.5px solid var(--astro-tint2);margin-bottom:2px}
.myself-col-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--astro)}
.myself-col-meta{display:flex;align-items:center;gap:6px}
.myself-section{background:var(--card);border:.5px solid var(--bstr);border-radius:10px;padding:14px;box-shadow:var(--shadow)}
.myself-section .card-label{color:var(--astro)}
.myself-section p{font-size:13px;line-height:1.78;color:var(--sub);margin-bottom:8px}
.myself-section p:last-child{margin-bottom:0}
.myself-section p strong{color:var(--astro);font-weight:600}

/* ── MISC ── */
.divider{height:.5px;background:var(--bstr);margin:14px 0}
.dim{color:var(--faint);font-size:12px}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;background:var(--astro-tint);color:var(--astro);border:1px solid rgba(61,82,122,.2)}
.loading{color:var(--astro);font-size:13px;padding:8px 0;display:flex;align-items:center;gap:6px}
.loading::before{content:'';width:14px;height:14px;border:2px solid rgba(61,82,122,.2);border-top-color:var(--astro);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-hint{text-align:center;padding:32px;color:var(--faint);font-size:13px;line-height:1.8}
.save-bar{display:flex;align-items:center;gap:10px;margin-top:14px}
.saved-note{font-size:11px;color:var(--faint);opacity:0}
.saved-note.show{opacity:1;transition:opacity .3s}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-title">⭐ 星盤分析</div>
  <button class="tab-btn active" onclick="switchTab('setting')">⚙️ 設定</button>
  <button class="tab-btn" onclick="switchTab('myself')">🌙 我的星象</button>
  <button class="tab-btn" onclick="switchTab('forecast')">📅 人生預測</button>
  <button class="tab-btn" onclick="switchTab('chat')">💬 討論</button>
  <a class="back-link" href="index.html">← CC</a>
</nav>

<!-- ══════════════ SETTING ══════════════ -->
<div class="page active" id="page-setting">
  <div class="panel">
    <div class="panel-title">基本設定</div>
    <label>姓名 / 暱稱</label>
    <input type="text" id="s-name" placeholder="Tina" style="max-width:200px;margin-bottom:14px">
  </div>

  <div class="panel">
    <div class="panel-title">西洋星盤 — 文字資料</div>
    <label>將星盤文字完整貼入（Astro.com 或其他來源均可）</label>
    <textarea id="s-western" rows="10" placeholder="貼入完整星盤文字，包含行星位置、宮位、相位等資料..."></textarea>
  </div>

  <div class="panel">
    <div class="panel-title">印度星盤 — 圖片（最多 3 張）</div>
    <div class="img-upload-area" onclick="document.getElementById('vedic-file').click()">
      <input type="file" id="vedic-file" accept="image/*" multiple onchange="handleVedicUpload(event)">
      <div style="font-size:22px;margin-bottom:6px">🪐</div>
      <div style="font-size:13px;color:var(--sub)">點擊上傳圖片（支援 JPG / PNG，最多 3 張）</div>
      <div class="img-upload-hint">圖片將壓縮後儲存在本機</div>
    </div>
    <div class="img-previews" id="vedic-previews"></div>
  </div>

  <div class="panel">
    <div class="panel-title">補充備註（選填）</div>
    <textarea id="s-notes" rows="3" placeholder="特殊相位、主導元素、格局說明，或其他你認為重要的背景資訊..."></textarea>
  </div>

  <div class="save-bar">
    <button class="btn btn-primary" onclick="saveSettings()">儲存設定</button>
    <span class="saved-note" id="saved-note">已儲存 ✓</span>
  </div>
</div>

<!-- ══════════════ MYSELF ══════════════ -->
<div class="page" id="page-myself">
  <div class="myself-col-grid">
    <!-- ─ 西方 ─ -->
    <div class="myself-col">
      <div class="myself-col-header">
        <span class="myself-col-label">西方占星</span>
        <div class="myself-col-meta">
          <span class="dim" id="myself-ts-western" style="font-size:10px"></span>
          <button class="btn btn-primary btn-sm" id="myself-btn-western" onclick="genMyself('western')">生成</button>
          <button class="btn btn-ghost btn-sm" onclick="clearMyselfCol('western')" style="padding:5px 8px;font-size:10px">✕</button>
        </div>
      </div>
      <div id="myself-loading-western" style="display:none" class="loading">分析中…</div>
      <div id="myself-out-western"></div>
      <div class="empty-hint" id="myself-empty-western" style="font-size:11px;padding:20px 8px;text-align:left">尚無分析<br><span style="font-size:10px">需西洋星盤文字</span></div>
    </div>
    <!-- ─ 印度 ─ -->
    <div class="myself-col">
      <div class="myself-col-header">
        <span class="myself-col-label">印度占星</span>
        <div class="myself-col-meta">
          <span class="dim" id="myself-ts-vedic" style="font-size:10px"></span>
          <button class="btn btn-primary btn-sm" id="myself-btn-vedic" onclick="genMyself('vedic')">生成</button>
          <button class="btn btn-ghost btn-sm" onclick="clearMyselfCol('vedic')" style="padding:5px 8px;font-size:10px">✕</button>
        </div>
      </div>
      <div id="myself-loading-vedic" style="display:none" class="loading">分析中…</div>
      <div id="myself-out-vedic"></div>
      <div class="empty-hint" id="myself-empty-vedic" style="font-size:11px;padding:20px 8px;text-align:left">尚無分析<br><span style="font-size:10px">需印度星盤圖片</span></div>
    </div>
    <!-- ─ 整體 ─ -->
    <div class="myself-col">
      <div class="myself-col-header">
        <span class="myself-col-label">雙系統整合</span>
        <div class="myself-col-meta">
          <span class="dim" id="myself-ts-both" style="font-size:10px"></span>
          <button class="btn btn-primary btn-sm" id="myself-btn-both" onclick="genMyself('both')">生成</button>
          <button class="btn btn-ghost btn-sm" onclick="clearMyselfCol('both')" style="padding:5px 8px;font-size:10px">✕</button>
        </div>
      </div>
      <div id="myself-loading-both" style="display:none" class="loading">分析中…</div>
      <div id="myself-out-both"></div>
      <div class="empty-hint" id="myself-empty-both" style="font-size:11px;padding:20px 8px;text-align:left">尚無分析<br><span style="font-size:10px">需西洋 + 印度雙資料</span></div>
    </div>
  </div>
</div>

<!-- ══════════════ FORECAST ══════════════ -->
<div class="page" id="page-forecast">
  <div class="panel">
    <div class="panel-title">選擇時間段</div>
    <div class="chart-src-row">
      <button class="chart-src-btn active" id="btn-western" onclick="selectChartType('western')">西方星盤</button>
      <button class="chart-src-btn" id="btn-vedic" onclick="selectChartType('vedic')">印度星盤</button>
    </div>
    <div class="year-row" id="year-row"></div>
    <div id="month-section" style="display:none">
      <div class="divider"></div>
      <div style="font-size:11px;color:var(--faint);margin-bottom:8px">選擇月份（點選年份即分析全年；選月份分析當月）</div>
      <div class="month-grid" id="month-grid"></div>
    </div>
  </div>

  <div id="forecast-loading" style="display:none" class="loading">推算中，請稍候…</div>

  <div id="forecast-result" style="display:none">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div id="forecast-period-label" style="font-size:13px;font-weight:700;color:var(--astro)"></div>
      <button class="btn btn-ghost btn-sm" onclick="regenForecast()">重新生成</button>
      <button class="btn btn-ghost btn-sm" onclick="clearForecast()">清除</button>
    </div>
    <div class="filter-bar">
      <button class="filter-pill active" data-cat="all" onclick="filterForecast('all')">全部</button>
      <button class="filter-pill" data-cat="work" onclick="filterForecast('work')">工作 & 事業</button>
      <button class="filter-pill" data-cat="relationship" onclick="filterForecast('relationship')">感情 & 人際</button>
      <button class="filter-pill" data-cat="finance" onclick="filterForecast('finance')">財務</button>
      <button class="filter-pill" data-cat="health" onclick="filterForecast('health')">健康</button>
      <button class="filter-pill" data-cat="side" onclick="filterForecast('side')">副業</button>
      <button class="filter-pill" data-cat="summary" onclick="filterForecast('summary')">整體 & 建議</button>
    </div>
    <div class="forecast-sections" id="forecast-sections"></div>
  </div>
</div>

<!-- ══════════════ CHAT ══════════════ -->
<div class="page" id="page-chat">
  <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
    <button class="btn btn-ghost btn-sm btn-danger" onclick="clearChat()">清除對話</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="msg sys">對話上下文包含你的完整星盤資料。直接提問即可。</div>
  </div>
  <div class="chat-input-row">
    <textarea id="chat-input" placeholder="輸入問題，例如：我適合自己創業嗎？今年感情運如何？" onkeydown="chatKeydown(event)"></textarea>
    <button class="btn btn-primary" id="chat-send" onclick="sendChat()" style="align-self:flex-end;padding:10px 16px">送出</button>
  </div>
</div>

<script src="cc_autosync.js"></script>
<script>
const GROQ = 'https://api.groq.com/openai/v1/chat/completions';
const MODEL_TEXT = 'llama-3.3-70b-versatile';
const MODEL_VISION = 'meta-llama/llama-4-scout-17b-16e-instruct';
const KEY_SETTINGS = 'astro_settings';
const KEY_MYSELF   = 'astro_myself';
const KEY_FORECAST = 'astro_forecast';
const KEY_CHAT     = 'astro_chat';
const KEY_IMAGES   = 'astro_vedic_images';

const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
let selYear = null, selMonth = null, selCategory = 'all', selChartType = 'western';
let chatHistory = [];

// ── 雙系統角色定義（固定此用戶星盤配置）──
const ASTRO_SYSTEM_ROLE = `你是同時精通「現代西方占星學（Western Tropical Astrology）」與「古典印度吠陀占星學（Vedic / Jyotish）」的跨領域占星大師，深刻理解兩套系統在計算方式、解盤邏輯與語境上的本質差異。

【此用戶雙系統核心配置】

系統 A｜現代西方占星（Tropical / Placidus 分宮）
上升：天蠍座 ／ 太陽：巨蟹座（第9宮）／ 月亮・金星：雙子座（第8宮）／ 木星：巨蟹座（第9宮）
解讀風格：心理學占星、內在潛能、靈魂演化；語氣溫和療癒、具同理心且賦能（Empowerment）
流年工具：流年行星相位（Transits）＋ 二次推運（Secondary Progressions）

系統 B｜印度吠陀占星（Sidereal / Lahiri Ayanamsha / Whole Sign 整宮制）
上升 Lagna：天秤座（第1宮，主星金星）／ 月亮：金牛座（第8宮，旺相 Exaltation）
太陽・木星：巨蟹座（第10宮，事業核心宮位）／ 火星：金牛座（第8宮）
解讀風格：業力顯化（Karma）、廟旺平陷（Dignity）、格局（Yogas）；語氣客觀結構化、直擊痛點、現實操作指導
流年工具：大運（Vimshottari Dasha）＋ 流年行星（Gochar）

【嚴格分流規則】
1. 解析西方星盤時：嚴禁提及上升天秤或月亮金牛（那是吠陀配置）
2. 解析印度星盤時：嚴禁提及上升天蠍或月亮雙子（那是西方配置）
3. 整合分析時：分段陳述，先西盤心理底蘊，再印盤現實業力，最後找出兩系統共振交集
4. 每次輸出開頭第一行須標註：【解析視角：現代西方占星】或【解析視角：古典印度占星】或【解析視角：雙系統整合】`;

// ── Groq API ──
function getGroqKey(){
  return localStorage.getItem('groq_key')||localStorage.getItem('tina_groq')||localStorage.getItem('oasis_groq_key')||'';
}

async function callGroq(messages, useVision=false, maxTokens=2000){
  const key = getGroqKey();
  if(!key) throw new Error('未設定 Groq API Key（請在 CC 主頁設定）');
  const model = useVision ? MODEL_VISION : MODEL_TEXT;
  const resp = await fetch(GROQ, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body: JSON.stringify({model, messages, temperature:0.7, max_tokens:maxTokens})
  });
  if(!resp.ok){
    const err = await resp.json().catch(()=>({}));
    const msg = err.error?.message||'HTTP '+resp.status;
    if(resp.status===429||msg.includes('Rate limit')){
      const wait = msg.match(/try again in ([\d.]+)s/i);
      const sec = wait ? Math.ceil(parseFloat(wait[1])) : 30;
      throw new Error(`請求過於頻繁，請稍候 ${sec} 秒後再試（Vision 模型 TPM 限制）`);
    }
    throw new Error(msg);
  }
  const data = await resp.json();
  return data.choices?.[0]?.message?.content||'';
}

function handleVedicUpload(e){
  const files = Array.from(e.target.files);
  const images = getImages();
  const remaining = 3 - images.length;
  if(!remaining){ alert('最多只能上傳 3 張圖片'); return; }
  const toProcess = files.slice(0, remaining);
  let done = 0;
  toProcess.forEach(file=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      compressImage(ev.target.result, compressed=>{
        images.push(compressed);
        done++;
        if(done===toProcess.length){
          localStorage.setItem(KEY_IMAGES, JSON.stringify(images));
          renderImagePreviews();
        }
      });
    };
    reader.readAsDataURL(file);
  });
  e.target.value='';
}

function compressImage(dataUrl, cb){
  const img = new Image();
  img.onload = ()=>{
    const maxW = 1024, maxH = 1024;
    let w = img.width, h = img.height;
    if(w>maxW||h>maxH){
      const r = Math.min(maxW/w, maxH/h);
      w = Math.round(w*r); h = Math.round(h*r);
    }
    const canvas = document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    cb(canvas.toDataURL('image/jpeg',0.75));
  };
  img.src = dataUrl;
}

function renderImagePreviews(){
  const imgs = getImages();
  const wrap = document.getElementById('vedic-previews');
  wrap.innerHTML = imgs.map((src,i)=>`

  {key:'personality', label:'核心個性'},
  {key:'strengths',   label:'天賦強項'},
  {key:'career',      label:'工作 & 事業'},
  {key:'challenges',  label:'成長課題'},

// ── 段落文字渲染（每行各自成 <p>，敘述主軸轉換自然換段）
function renderParas(text){
  return stripMdHeaders(text).split('\n').filter(l=>l.trim()).map(line=>{
    const h = esc(line.trim()).replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
    return `<p>${h}</p>`;
  }).join('');
}

// ── 解析 myself 文字 → sections map
function parseMyselfText(text){
  const sectionKeys = MYSELF_SECTIONS.map(s=>s.label);
  const sections = {};
  const re = /\*{0,2}【([^】]+)】\*{0,2}[^\n]*\n([\s\S]*?)(?=\n?\*{0,2}【[^】]+】|$)/g;
  let m;
  while((m = re.exec(text)) !== null){
    const title = m[1].trim();
    if(sectionKeys.includes(title)) sections[title] = m[2].trim();
  }
  const normKey = k => k.replace(/\s*[&和與]\s*/g,' & ');
  const missingKeys = sectionKeys.filter(k=>!sections[k]);
  if(missingKeys.length > 0){
    let currentKey = null, currentLines = [];
    text.split('\n').forEach(line=>{
      const stripped = line.trim().replace(/^\*+|\*+$/g,'');
      const matched = sectionKeys.find(k=>{
        const inner = (stripped.match(/【([^】]+)】/)||[])[1];
        if(!inner) return false;
        return normKey(inner.trim()) === normKey(k);
      });
      if(matched){
        if(currentKey && !sections[currentKey]) sections[currentKey] = currentLines.join('\n').trim();
        currentKey = matched; currentLines = [];
        const inline = stripped.replace(/【[^】]+】/,'').replace(/^\*+|\*+$/g,'').trim();
        if(inline) currentLines.push(inline);
      } else if(currentKey){ currentLines.push(line); }
    });
    if(currentKey && !sections[currentKey]) sections[currentKey] = currentLines.join('\n').trim();
  }
  return sections;
}

// ── 渲染單欄
function renderMyselfCol(mode, cache){
  const outEl   = document.getElementById(`myself-out-${mode}`);
  const emptyEl = document.getElementById(`myself-empty-${mode}`);
  const tsEl    = document.getElementById(`myself-ts-${mode}`);
  const btn     = document.getElementById(`myself-btn-${mode}`);
  if(!cache){
    outEl.innerHTML = ''; emptyEl.style.display = 'block';
    tsEl.textContent = ''; btn.textContent = '生成';
    return;
  }
  emptyEl.style.display = 'none';
  btn.textContent = '重新生成';
  const d = new Date(cache.ts);
  tsEl.textContent = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;

  const text = cache.text;
  const sections = parseMyselfText(text);
  const sectionKeys = MYSELF_SECTIONS.map(s=>s.label);
  const parsedCount = sectionKeys.filter(k=>sections[k]).length;

  if(parsedCount === 0){
    outEl.innerHTML = `<div class="myself-section"><div class="card-label">分析結果</div>${renderParas(text)}</div>`;
    return;
  }
  outEl.innerHTML = MYSELF_SECTIONS.map(({label})=>{
    const content = sections[label] || '';
    const bodyHtml = content
      ? renderParas(content)
      : `<p><span style="color:var(--faint)">（未能解析此段落）</span></p>`;
    return `<div class="myself-section"><div class="card-label">${label}</div>${bodyHtml}</div>`;
  }).join('');
}

function renderMyself(){
  const store = JSON.parse(localStorage.getItem(KEY_MYSELF)||'{}');
  // 相容舊格式（{text,ts} 直接在根層）
  const compat = store.text ? {western: store} : store;
  ['western','vedic','both'].forEach(mode => renderMyselfCol(mode, compat[mode]||null));

  loadForecastResult();

    return `<button class="month-btn${selMonth===i+1?' active':''}${hasC?' has-cache':''}" onclick="selectMonth(${i+1})">${m}</button>`;
  }).join('');

function selectMonth(m){

  renderMonthGrid();
  loadForecastResult();
}

// ── Forecast helpers ──
function fKey(y, m){
  const base = m ? `${y}_${m}` : String(y);
  return selChartType === 'vedic' ? base + '_vedic' : base;
}
function selectChartType(type){
  selChartType = type;
  document.getElementById('btn-western').classList.toggle('active', type==='western');
  document.getElementById('btn-vedic').classList.toggle('active', type==='vedic');
  document.getElementById('forecast-result').style.display = 'none';
  renderMonthGrid();
  if(selYear) loadForecastResult();
}

function getCat(title){
  if(/時間軸/.test(title)) return 'timeline';
  if(/關鍵星象/.test(title)) return 'events';
  if(/工作|事業/.test(title)) return 'work';
  if(/感情|人際/.test(title)) return 'relationship';
  if(/財務|資源/.test(title)) return 'finance';
  if(/健康|能量/.test(title)) return 'health';
  if(/副業|收入/.test(title)) return 'side';
  if(/建議|整體|方向/.test(title)) return 'summary';
  return 'other';
}

function stripMdHeaders(s){
  return s.replace(/^#{1,6}\s*/gm,'').trim();
}
function mdToHtml(s){
  return esc(stripMdHeaders(s)).replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
}

function renderForecastSections(text){
  const sections = [];
  const re = /【([^】]+)】[^\n]*\n([\s\S]*?)(?=\n?【[^】]+】|$)/g;
  let m;
  while((m = re.exec(text)) !== null){
    const t = m[1].trim(), b = m[2].trim();
    if(t) sections.push({title:t, body:b});
  }
  if(!sections.length){
    return `<div class="forecast-section"><div class="forecast-section-body">${mdToHtml(text)}</div></div>`;
  }
  return sections.map(({title, body})=>{
    const cat = getCat(title);
    let bodyHtml;
    if(cat === 'timeline'){
      const rows = stripMdHeaders(body).split('\n').filter(l=>l.trim()).map(line=>{
        const mm = line.match(/^(\d{1,2}月)[：:]\s*(.*)/);
        if(mm) return `<div class="timeline-row"><div class="timeline-month">${esc(mm[1])}</div><div class="timeline-body">${esc(mm[2]).replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>')}</div></div>`;
        return `<div class="timeline-row"><div class="timeline-month"></div><div class="timeline-body">${esc(line).replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>')}</div></div>`;
      }).join('');
      bodyHtml = `<div class="timeline-list">${rows}</div>`;
    } else {
      bodyHtml = renderParas(body);
    }
    return `<div class="forecast-section" data-cat="${cat}"><div class="forecast-section-title">${esc(title)}</div><div class="forecast-section-body">${bodyHtml}</div></div>`;
  }).join('');
}

function filterForecast(cat){
  selCategory = cat;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.toggle('active', p.dataset.cat===cat));
  document.querySelectorAll('#forecast-sections .forecast-section').forEach(s=>{
    const c = s.dataset.cat;
    s.style.display = (cat==='all' || c==='timeline' || c==='events' || c===cat) ? '' : 'none';
  });
}

function loadForecastResult(){
  const key = selYear ? fKey(selYear, selMonth) : null;
  if(!key){ document.getElementById('forecast-result').style.display='none'; return; }
  const forecasts = JSON.parse(localStorage.getItem(KEY_FORECAST)||'{}');
  const cache = forecasts[key];
  const resultDiv = document.getElementById('forecast-result');
  const label = document.getElementById('forecast-period-label');
  if(cache){
    label.textContent = selMonth ? `${selYear}年 ${MONTHS[selMonth-1]}` : `${selYear}年`;
    document.getElementById('forecast-sections').innerHTML = renderForecastSections(cache.text);
    filterForecast(selCategory);
    resultDiv.style.display='block';
  } else {
    resultDiv.style.display='none';
    genForecast(key);
  }
}

  if(isYearly){
    return base +
`【年度時間軸】
以「M月：主題詞 + 關鍵星象事件（含大約日期） + 對${name}的具體影響」格式逐月列出1月到12月。
格式範例：1月：**土星**在水瓶座尾聲，事業格局整固期，X/X **木星**進入X宮帶來擴張機遇，適合主動出擊。

**月中（${selMonth}/${d1+1}-${d2}日）**：說明此段轉折或機遇

最後引用本命盤職場天賦指標，給出整月最核心的工作策略（2句）。

【感情 & 人際】

【財務 & 資源】
說明本月財務節奏（4-5句）：哪個時段適合投入/保守、本月可能出現的財務機遇或需注意的風險，以及最佳財務決策時間點（精確到日期區間）。引用本命盤財務指標與本月行星過境依據。

【健康 & 能量】
說明本月身心能量的具體節奏（4-5句）：哪個時段能量高峰、哪個低谷、本月最需要注意的健康面向（引用本命盤健康相關指標）。給出符合本命盤特質的具體養護建議。

async function genForecast(cacheKey){
  if(!hasChart()){ alert('請先在設定頁貼入星盤資料'); return; }
  const imgs = getImages();
  if(selChartType === 'vedic' && !imgs.length){
    alert('請先在設定頁上傳印度星盤圖片'); return;
  }
  if(selChartType === 'western' && !loadSettings().western){
    alert('請先在設定頁貼入西方星盤文字'); return;
  }
  const loading = document.getElementById('forecast-loading');
  loading.style.display='flex';
  try{
    const name = getName();
    const ctx = chartContext();
    const useVision = selChartType === 'vedic';
    const promptText = buildForecastPrompt(name, ctx, selChartType, imgs);
    const maxTok = !selMonth ? 3500 : 2800;
    let messages;
    if(useVision){
      messages = [{role:'user', content:[{type:'text', text:promptText}, ...imgs.map(src=>({type:'image_url', image_url:{url:src}}))]}];
    } else {
      messages = [{role:'user', content:promptText}];
    }
    const result = await callGroq(messages, useVision, maxTok);
    const forecasts = JSON.parse(localStorage.getItem(KEY_FORECAST)||'{}');
    forecasts[cacheKey] = {text:result, ts:Date.now()};
    localStorage.setItem(KEY_FORECAST, JSON.stringify(forecasts));

    const label = document.getElementById('forecast-period-label');
    label.textContent = selMonth ? `${selYear}年 ${MONTHS[selMonth-1]}` : `${selYear}年`;
    document.getElementById('forecast-sections').innerHTML = renderForecastSections(result);
    filterForecast(selCategory);
    document.getElementById('forecast-result').style.display='block';
    renderMonthGrid();
  }catch(e){
    alert('生成失敗：'+e.message);
  }finally{
    loading.style.display='none';
  }
}

function regenForecast(){
  if(!selYear) return;
  const key = fKey(selYear, selMonth);
  const forecasts = JSON.parse(localStorage.getItem(KEY_FORECAST)||'{}');
  delete forecasts[key];
  localStorage.setItem(KEY_FORECAST, JSON.stringify(forecasts));
  document.getElementById('forecast-result').style.display='none';
  genForecast(key);
}

function clearForecast(){
  if(!selYear) return;
  const key = fKey(selYear, selMonth);
  const forecasts = JSON.parse(localStorage.getItem(KEY_FORECAST)||'{}');
  delete forecasts[key];
  localStorage.setItem(KEY_FORECAST, JSON.stringify(forecasts));
  document.getElementById('forecast-result').style.display='none';
  renderMonthGrid();
}

// ══ CHAT ══
function loadChatHistory(){
  try{ chatHistory = JSON.parse(localStorage.getItem(KEY_CHAT)||'[]'); }
  catch(e){ chatHistory = []; }
  renderChatMessages();
}

function saveChatHistory(){
  const trimmed = chatHistory.slice(-40);
  localStorage.setItem(KEY_CHAT, JSON.stringify(trimmed));
}

function renderChatMessages(){
  const container = document.getElementById('chat-messages');
  const sysMsg = '<div class="msg sys">對話上下文包含你的完整星盤資料。直接提問即可。</div>';
  container.innerHTML = sysMsg + chatHistory.map(m=>`
    <div class="msg ${m.role==='user'?'user':'ai'}">${
      esc(m.content).replace(/【([^】]+)】/g,'<strong>【$1】</strong>').replace(/\n/g,'<br>')
    }</div>`).join('');
  container.scrollTop = container.scrollHeight;
}

async function sendChat(){
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  if(!hasChart()){ alert('請先在設定頁貼入星盤資料'); return; }

  input.value = '';
  const btn = document.getElementById('chat-send');
  btn.disabled = true; btn.textContent = '…';

  chatHistory.push({role:'user', content:text});
  renderChatMessages();

  try{
    const name = getName();
    const ctx = chartContext();
    const imgs = getImages();
    const useVision = imgs.length > 0 && chatHistory.length === 1;

    const imgs2 = getImages();
    const chatMode = (ctx && imgs2.length) ? '雙系統整合' : imgs2.length ? '古典印度占星' : '現代西方占星';
    const chartRef = ctx ? `\n\n西洋星盤資料：\n${ctx}` : '';
    const systemMsg = {role:'system', content:`${ASTRO_SYSTEM_ROLE}\n\n本次以【解析視角：${chatMode}】回答。${chartRef}\n\n請用繁體中文，全程以「你」稱呼，給出針對此星盤配置的具體觀察，不說泛泛廢話。回答簡明有深度。`};

    let messages = [systemMsg, ...chatHistory.map(m=>({role:m.role, content:m.content}))];

    if(useVision && imgs.length){
      const lastMsg = messages[messages.length-1];
      messages[messages.length-1] = {
        role: 'user',
        content: [
          {type:'text', text: lastMsg.content + '\n\n（圖片為印度星盤，請參考）'},
          ...imgs.map(src=>({type:'image_url', image_url:{url:src}}))
        ]
      };
    }

    const result = await callGroq(messages, useVision);
    chatHistory.push({role:'assistant', content:result});
    saveChatHistory();
    renderChatMessages();
  }catch(e){
    chatHistory.push({role:'assistant', content:'生成失敗：'+e.message});
    renderChatMessages();
  }finally{
    btn.disabled=false; btn.textContent='送出';
  }
}

function chatKeydown(e){
  if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){
    e.preventDefault();
    sendChat();
  }
}

function clearChat(){
  if(!confirm('確定清除對話記錄？')) return;
  chatHistory=[];
  localStorage.removeItem(KEY_CHAT);
  renderChatMessages();
}
