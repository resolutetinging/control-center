<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>星盤分析</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#13112a;color:#e2ddf0;min-height:100vh;font-size:14px}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;background:#13112a;border-bottom:1px solid #2e2a50;display:flex;align-items:center;gap:0;padding:0 16px}
.nav-title{font-size:15px;font-weight:700;color:#c8a8f0;padding:14px 0;margin-right:20px;letter-spacing:.04em}
.tab-btn{padding:14px 16px;background:none;border:none;color:#8880b0;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap}
.tab-btn.active{color:#c8a8f0;border-bottom-color:#9060d0;font-weight:600}
.tab-btn:hover:not(.active){color:#b8a8e0}
.back-link{margin-left:auto;font-size:12px;color:#6860a0;text-decoration:none;padding:6px 10px;border-radius:6px;transition:background .15s}
.back-link:hover{background:#1e1a40;color:#a090d0}

/* ── WRAPPER ── */
.page{display:none;padding:20px 16px;max-width:860px;margin:0 auto}
.page.active{display:block}

/* ── PANELS & CARDS ── */
.panel{background:#1c1838;border:1px solid #2e2a50;border-radius:12px;padding:18px;margin-bottom:16px}
.panel-title{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8070c0;margin-bottom:14px}
.card{background:#211d3c;border:1px solid #2e2a50;border-radius:10px;padding:16px;margin-bottom:12px}
.card-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9060d0;margin-bottom:8px}
.section-heading{font-size:13px;font-weight:700;color:#c8a8f0;margin-bottom:6px}

/* ── INPUTS ── */
textarea,input[type=text]{width:100%;background:#16133a;border:1px solid #2e2a50;border-radius:8px;padding:10px 12px;color:#e2ddf0;font-size:13px;font-family:inherit;outline:none;resize:vertical;transition:border .18s;line-height:1.6}
textarea:focus,input[type=text]:focus{border-color:#7050b0}
textarea{min-height:80px}
label{font-size:12px;color:#9080c0;display:block;margin-bottom:6px}

/* ── BUTTONS ── */
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s}
.btn-primary{background:#6040b0;color:#fff}
.btn-primary:hover{background:#7050c8}
.btn-primary:disabled{background:#382860;color:#7060a0;cursor:not-allowed}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:6px}
.btn-ghost{background:none;border:1px solid #3a3060;color:#9080c0}
.btn-ghost:hover{border-color:#6050a0;color:#c0b0e0}
.btn-danger{background:#602040;color:#e09090}
.btn-danger:hover{background:#802050}

/* ── IMAGE UPLOAD ── */
.img-upload-area{border:2px dashed #3a3060;border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border .18s;position:relative}
.img-upload-area:hover{border-color:#6050a0}
.img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-upload-hint{font-size:12px;color:#6860a0;margin-top:4px}
.img-previews{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.img-preview-wrap{position:relative;width:120px;height:90px;border-radius:8px;overflow:hidden;border:1px solid #3a3060}
.img-preview-wrap img{width:100%;height:100%;object-fit:cover}
.img-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.7);border:none;color:#e09090;border-radius:4px;padding:1px 5px;font-size:11px;cursor:pointer}

/* ── FORECAST ── */
.year-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.year-btn{padding:8px 16px;border-radius:8px;border:1px solid #3a3060;background:none;color:#9080c0;font-size:13px;cursor:pointer;transition:all .18s}
.year-btn.active{background:#6040b0;border-color:#6040b0;color:#fff;font-weight:600}
.year-btn:hover:not(.active){border-color:#6050a0;color:#c0b0e0}
.month-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:14px}
.month-btn{padding:7px 4px;border-radius:7px;border:1px solid #2e2a50;background:#1c1838;color:#8880b0;font-size:12px;cursor:pointer;transition:all .18s;text-align:center}
.month-btn.active{background:#4e3090;border-color:#7050b0;color:#e0d0f8;font-weight:600}
.month-btn.has-cache{border-color:#3d3070;color:#a090d0}
.month-btn:hover:not(.active){border-color:#5040a0;color:#c0b0e0}
.forecast-out{background:#16133a;border:1px solid #2e2a50;border-radius:10px;padding:14px;font-size:13px;line-height:1.8;white-space:pre-wrap;min-height:60px}
.forecast-out strong{color:#c8a8f0}

/* ── CHAT ── */
.chat-messages{height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:14px;background:#16133a;border:1px solid #2e2a50;border-radius:10px;margin-bottom:12px}
.msg{max-width:80%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.65;word-break:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:#4e3090;color:#ede0ff;border-bottom-right-radius:3px}
.msg.ai{align-self:flex-start;background:#211d3c;border:1px solid #2e2a50;color:#ddd8f0;border-bottom-left-radius:3px}
.msg.ai strong{color:#c8a8f0}
.msg.sys{align-self:center;font-size:11px;color:#6060a0;font-style:italic}
.chat-input-row{display:flex;gap:8px}
.chat-input-row textarea{min-height:46px;max-height:120px;resize:none;padding:10px 12px;flex:1}

/* ── MYSELF OUTPUT ── */
.myself-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.myself-grid{grid-template-columns:1fr}.month-grid{grid-template-columns:repeat(4,1fr)}}
.myself-section{background:#211d3c;border:1px solid #2e2a50;border-radius:10px;padding:14px}
.myself-section .card-label{color:#a070d0}
.myself-section p{font-size:13px;line-height:1.75;color:#ccc8e0}

/* ── MISC ── */
.divider{height:1px;background:#2e2a50;margin:14px 0}
.dim{color:#8880b0;font-size:12px}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;background:#2a2048;color:#a080d0;border:1px solid #3a3060}
.loading{color:#7860a0;font-size:13px;padding:8px 0;display:flex;align-items:center;gap:6px}
.loading::before{content:'';width:14px;height:14px;border:2px solid #4040a0;border-top-color:#a080d0;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-hint{text-align:center;padding:32px;color:#5050a0;font-size:13px;line-height:1.8}
.save-bar{display:flex;align-items:center;gap:10px;margin-top:14px}
.saved-note{font-size:11px;color:#6060a0;opacity:0}
.saved-note.show{opacity:1;transition:opacity .3s}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-title">⭐ 星盤分析</div>
  <button class="tab-btn active" onclick="switchTab('setting')">⚙️ 設定</button>
  <button class="tab-btn" onclick="switchTab('myself')">🌙 我的星象</button>
  <button class="tab-btn" onclick="switchTab('forecast')">📅 人生預測</button>
  <button class="tab-btn" onclick="switchTab('chat')">💬 討論</button>
  <a class="back-link" href="index.html">← CC</a>
</nav>

<!-- ══════════════ SETTING ══════════════ -->
<div class="page active" id="page-setting">
  <div class="panel">
    <div class="panel-title">基本設定</div>
    <label>姓名 / 暱稱</label>
    <input type="text" id="s-name" placeholder="Tina" style="max-width:200px;margin-bottom:14px">
  </div>

  <div class="panel">
    <div class="panel-title">西洋星盤 — 文字資料</div>
    <label>將星盤文字完整貼入（Astro.com 或其他來源均可）</label>
    <textarea id="s-western" rows="10" placeholder="貼入完整星盤文字，包含行星位置、宮位、相位等資料..."></textarea>
  </div>

  <div class="panel">
    <div class="panel-title">印度星盤 — 圖片（最多 3 張）</div>
    <div class="img-upload-area" onclick="document.getElementById('vedic-file').click()">
      <input type="file" id="vedic-file" accept="image/*" multiple onchange="handleVedicUpload(event)">
      <div style="font-size:22px;margin-bottom:6px">🪐</div>
      <div style="font-size:13px;color:#9080c0">點擊上傳圖片（支援 JPG / PNG，最多 3 張）</div>
      <div class="img-upload-hint">圖片將壓縮後儲存在本機</div>
    </div>
    <div class="img-previews" id="vedic-previews"></div>
  </div>

  <div class="panel">
    <div class="panel-title">補充備註（選填）</div>
    <textarea id="s-notes" rows="3" placeholder="特殊相位、主導元素、格局說明，或其他你認為重要的背景資訊..."></textarea>
  </div>

  <div class="save-bar">
    <button class="btn btn-primary" onclick="saveSettings()">儲存設定</button>
    <span class="saved-note" id="saved-note">已儲存 ✓</span>
  </div>
</div>

<!-- ══════════════ MYSELF ══════════════ -->
<div class="page" id="page-myself">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
    <button class="btn btn-primary" id="myself-btn" onclick="genMyself()">✦ 生成分析</button>
    <button class="btn btn-ghost btn-sm" onclick="clearMyself()">清除</button>
    <span class="dim" id="myself-ts"></span>
  </div>
  <div id="myself-loading" style="display:none" class="loading">分析中，請稍候…</div>
  <div class="myself-grid" id="myself-out"></div>
  <div class="empty-hint" id="myself-empty">尚無分析結果<br>請先在設定頁貼入星盤資料，再點擊「生成分析」</div>
</div>

<!-- ══════════════ FORECAST ══════════════ -->
<div class="page" id="page-forecast">
  <div class="panel">
    <div class="panel-title">選擇時間段</div>
    <div class="year-row" id="year-row"></div>
    <div id="month-section" style="display:none">
      <div class="divider"></div>
      <div style="font-size:11px;color:#7060a0;margin-bottom:8px">選擇月份（點選年份即分析全年；選月份分析當月）</div>
      <div class="month-grid" id="month-grid"></div>
    </div>
  </div>

  <div id="forecast-loading" style="display:none" class="loading">推算中，請稍候…</div>

  <div id="forecast-result" style="display:none">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div id="forecast-period-label" style="font-size:13px;font-weight:700;color:#c8a8f0"></div>
      <button class="btn btn-ghost btn-sm" onclick="regenForecast()">重新生成</button>
      <button class="btn btn-ghost btn-sm" onclick="clearForecast()">清除</button>
    </div>
    <div class="forecast-out" id="forecast-out"></div>
  </div>
</div>

<!-- ══════════════ CHAT ══════════════ -->
<div class="page" id="page-chat">
  <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
    <button class="btn btn-ghost btn-sm btn-danger" onclick="clearChat()">清除對話</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="msg sys">對話上下文包含你的完整星盤資料。直接提問即可。</div>
  </div>
  <div class="chat-input-row">
    <textarea id="chat-input" placeholder="輸入問題，例如：我適合自己創業嗎？今年感情運如何？" onkeydown="chatKeydown(event)"></textarea>
    <button class="btn btn-primary" id="chat-send" onclick="sendChat()" style="align-self:flex-end;padding:10px 16px">送出</button>
  </div>
</div>

<script src="cc_autosync.js"></script>
<script>
const GROQ = 'https://api.groq.com/openai/v1/chat/completions';
const MODEL_TEXT = 'llama-3.3-70b-versatile';
const MODEL_VISION = 'meta-llama/llama-4-scout-17b-16e-instruct';
const KEY_SETTINGS = 'astro_settings';
const KEY_MYSELF   = 'astro_myself';
const KEY_FORECAST = 'astro_forecast';
const KEY_CHAT     = 'astro_chat';
const KEY_IMAGES   = 'astro_vedic_images';

const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
let selYear = null, selMonth = null;
let chatHistory = [];

// ── Groq API ──
function getGroqKey(){
  return localStorage.getItem('groq_key')||localStorage.getItem('tina_groq')||localStorage.getItem('oasis_groq_key')||'';
}

async function callGroq(messages, useVision=false){
  const key = getGroqKey();
  if(!key) throw new Error('未設定 Groq API Key（請在 CC 主頁設定）');
  const model = useVision ? MODEL_VISION : MODEL_TEXT;
  const resp = await fetch(GROQ, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body: JSON.stringify({model, messages, temperature:0.65, max_tokens:1200})
  });
  if(!resp.ok){
    const err = await resp.json().catch(()=>({}));
    throw new Error(err.error?.message||'HTTP '+resp.status);
  }
  const data = await resp.json();
  return data.choices?.[0]?.message?.content||'';
}

// ── Settings helpers ──
function loadSettings(){
  return JSON.parse(localStorage.getItem(KEY_SETTINGS)||'{}');
}
function getImages(){
  try{ return JSON.parse(localStorage.getItem(KEY_IMAGES)||'[]'); }
  catch(e){ return []; }
}
function chartContext(){
  const s = loadSettings();
  let ctx = '';
  if(s.western) ctx += '【西洋星盤資料】\n'+s.western;
  if(s.notes) ctx += '\n\n【補充備註】\n'+s.notes;
  return ctx;
}
function hasChart(){
  const s = loadSettings();
  return !!(s.western || getImages().length);
}
function getName(){
  return loadSettings().name || 'Tina';
}

// ── Tab ──
function switchTab(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  const idx = ['setting','myself','forecast','chat'].indexOf(id);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if(id==='forecast') renderYearRow();
  if(id==='myself') renderMyself();
}

// ══ SETTING ══
function handleVedicUpload(e){
  const files = Array.from(e.target.files);
  const images = getImages();
  const remaining = 3 - images.length;
  if(!remaining){ alert('最多只能上傳 3 張圖片'); return; }
  const toProcess = files.slice(0, remaining);
  let done = 0;
  toProcess.forEach(file=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      compressImage(ev.target.result, compressed=>{
        images.push(compressed);
        done++;
        if(done===toProcess.length){
          localStorage.setItem(KEY_IMAGES, JSON.stringify(images));
          renderImagePreviews();
        }
      });
    };
    reader.readAsDataURL(file);
  });
  e.target.value='';
}

function compressImage(dataUrl, cb){
  const img = new Image();
  img.onload = ()=>{
    const maxW = 1024, maxH = 1024;
    let w = img.width, h = img.height;
    if(w>maxW||h>maxH){
      const r = Math.min(maxW/w, maxH/h);
      w = Math.round(w*r); h = Math.round(h*r);
    }
    const canvas = document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    cb(canvas.toDataURL('image/jpeg',0.75));
  };
  img.src = dataUrl;
}

function renderImagePreviews(){
  const imgs = getImages();
  const wrap = document.getElementById('vedic-previews');
  wrap.innerHTML = imgs.map((src,i)=>`
    <div class="img-preview-wrap">
      <img src="${src}" alt="印度星盤${i+1}">
      <button class="img-del" onclick="delImage(${i})">✕</button>
    </div>`).join('');
}

function delImage(idx){
  const imgs = getImages();
  imgs.splice(idx,1);
  localStorage.setItem(KEY_IMAGES, JSON.stringify(imgs));
  renderImagePreviews();
}

function saveSettings(){
  const s = {
    name: document.getElementById('s-name').value.trim(),
    western: document.getElementById('s-western').value.trim(),
    notes: document.getElementById('s-notes').value.trim(),
    savedAt: Date.now()
  };
  localStorage.setItem(KEY_SETTINGS, JSON.stringify(s));
  const note = document.getElementById('saved-note');
  note.classList.add('show');
  setTimeout(()=>note.classList.remove('show'), 2000);
}

function loadSettingForm(){
  const s = loadSettings();
  if(s.name) document.getElementById('s-name').value = s.name;
  if(s.western) document.getElementById('s-western').value = s.western;
  if(s.notes) document.getElementById('s-notes').value = s.notes;
  renderImagePreviews();
}

// ══ MYSELF ══
const MYSELF_SECTIONS = [
  {key:'personality', label:'核心個性'},
  {key:'strengths',   label:'天賦強項'},
  {key:'challenges',  label:'成長課題'},
  {key:'relationship',label:'關係模式'},
  {key:'communication',label:'溝通風格'},
  {key:'life_theme',  label:'人生主軸'},
];

async function genMyself(){
  if(!hasChart()){
    alert('請先在設定頁貼入星盤資料或上傳印度星盤圖');
    return;
  }
  const btn = document.getElementById('myself-btn');
  btn.disabled = true; btn.textContent = '分析中…';
  document.getElementById('myself-loading').style.display = 'flex';
  document.getElementById('myself-empty').style.display = 'none';
  document.getElementById('myself-out').innerHTML = '';

  try{
    const name = getName();
    const ctx = chartContext();
    const imgs = getImages();
    const useVision = imgs.length > 0;

    const promptText = `你是專業占星師。以下是 ${name} 的星盤資料：\n\n${ctx}\n\n請用繁體中文，以深度、個人化的方式分析此星盤，以下列結構輸出，每個【標題】獨立一行：\n\n【核心個性】\n根據太陽/月亮/上升組合，描述此人的核心性格（3-4句）\n\n【天賦強項】\n此星盤顯示的天然優勢與才能（2-3項）\n\n【成長課題】\n此星盤中的挑戰與成長方向（2-3項）\n\n【關係模式】\n此人在親密關係與人際互動中的傾向\n\n【溝通風格】\n水星位置所呈現的溝通與思考方式\n\n【人生主軸】\n此星盤的整體主題與核心任務（1-2句）\n\n語氣直接，給出真實觀察，不過度鼓勵。${useVision?'\n\n圖片為此人的印度星盤（共'+imgs.length+'張），請整合西洋與印度占星進行全面分析。':''}`;

    let messages;
    if(useVision){
      messages = [{
        role:'user',
        content:[
          {type:'text', text: promptText},
          ...imgs.map(src=>({type:'image_url', image_url:{url:src}}))
        ]
      }];
    } else {
      messages = [{role:'user', content: promptText}];
    }

    const result = await callGroq(messages, useVision);
    const cache = {text: result, ts: Date.now()};
    localStorage.setItem(KEY_MYSELF, JSON.stringify(cache));
    renderMyself();
  }catch(e){
    alert('生成失敗：'+e.message);
  }finally{
    btn.disabled = false; btn.textContent = '✦ 重新生成';
    document.getElementById('myself-loading').style.display = 'none';
  }
}

function renderMyself(){
  const cache = JSON.parse(localStorage.getItem(KEY_MYSELF)||'null');
  const out = document.getElementById('myself-out');
  const empty = document.getElementById('myself-empty');
  const ts = document.getElementById('myself-ts');
  if(!cache){
    out.innerHTML=''; empty.style.display='block'; ts.textContent='';
    document.getElementById('myself-btn').textContent='✦ 生成分析';
    return;
  }
  empty.style.display='none';
  document.getElementById('myself-btn').textContent='✦ 重新生成';
  const d = new Date(cache.ts);
  ts.textContent = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')} 生成`;

  // Parse sections from text
  const text = cache.text;
  const sections = {};
  const sectionKeys = MYSELF_SECTIONS.map(s=>s.label);
  let currentKey = null, currentLines = [];
  text.split('\n').forEach(line=>{
    const trimmed = line.trim();
    const matched = sectionKeys.find(k=>trimmed===`【${k}】`||trimmed.startsWith(`【${k}】`));
    if(matched){
      if(currentKey) sections[currentKey] = currentLines.join('\n').trim();
      currentKey = matched; currentLines = [];
      const inline = trimmed.replace(`【${matched}】`,'').trim();
      if(inline) currentLines.push(inline);
    } else if(currentKey){
      currentLines.push(line);
    }
  });
  if(currentKey) sections[currentKey] = currentLines.join('\n').trim();

  out.innerHTML = MYSELF_SECTIONS.map(({key,label})=>{
    const content = sections[label] || '';
    return `<div class="myself-section">
      <div class="card-label">${label}</div>
      <p>${content ? esc(content).replace(/\n/g,'<br>') : '<span style="color:#5050a0">（未能解析此段落）</span>'}</p>
    </div>`;
  }).join('');
}

function clearMyself(){
  if(!confirm('確定清除分析結果？')) return;
  localStorage.removeItem(KEY_MYSELF);
  renderMyself();
}

// ══ FORECAST ══
function renderYearRow(){
  const cur = new Date().getFullYear();
  const years = [cur-1, cur, cur+1, cur+2, cur+3];
  const row = document.getElementById('year-row');
  row.innerHTML = years.map(y=>`
    <button class="year-btn${selYear===y?' active':''}" onclick="selectYear(${y})">${y}</button>
  `).join('');
}

function selectYear(y){
  selYear = y; selMonth = null;
  renderYearRow();
  renderMonthGrid();
  loadForecastResult();
}

function renderMonthGrid(){
  if(!selYear){ document.getElementById('month-section').style.display='none'; return; }
  document.getElementById('month-section').style.display='block';
  const forecasts = JSON.parse(localStorage.getItem(KEY_FORECAST)||'{}');
  document.getElementById('month-grid').innerHTML = MONTHS.map((m,i)=>{
    const hasC = !!(forecasts[`${selYear}_${i+1}`]);
    return `<button class="month-btn${selMonth===i+1?' active':''}${hasC?' has-cache':''}" onclick="selectMonth(${i+1})">${m}</button>`;
  }).join('');
}

function selectMonth(m){
  selMonth = (selMonth===m) ? null : m;
  renderMonthGrid();
  loadForecastResult();
}

function loadForecastResult(){
  const key = selMonth ? `${selYear}_${selMonth}` : selYear ? String(selYear) : null;
  if(!key){ document.getElementById('forecast-result').style.display='none'; return; }
  const forecasts = JSON.parse(localStorage.getItem(KEY_FORECAST)||'{}');
  const cache = forecasts[key];
  const resultDiv = document.getElementById('forecast-result');
  const outDiv = document.getElementById('forecast-out');
  const label = document.getElementById('forecast-period-label');
  if(cache){
    label.textContent = selMonth ? `${selYear}年 ${MONTHS[selMonth-1]}` : `${selYear}年`;
    outDiv.innerHTML = esc(cache.text).replace(/【([^】]+)】/g,'<strong>【$1】</strong>').replace(/\n/g,'<br>');
    resultDiv.style.display='block';
  } else {
    resultDiv.style.display='none';
    genForecast(key);
  }
}

async function genForecast(cacheKey){
  if(!hasChart()){
    alert('請先在設定頁貼入星盤資料');
    return;
  }
  const loading = document.getElementById('forecast-loading');
  loading.style.display='flex';
  try{
    const name = getName();
    const ctx = chartContext();
    const imgs = getImages();
    const useVision = imgs.length > 0;
    const period = selMonth ? `${selYear}年${MONTHS[selMonth-1]}` : `${selYear}年`;
    const granularity = selMonth ? '當月（約30天）' : '全年';

    const promptText = `你是專業占星師。以下是 ${name} 的星盤資料：\n\n${ctx}\n\n請根據此本命盤，分析 ${period} 對此人的影響（${granularity}維度），以繁體中文輸出，結構如下：\n\n【整體能量方向】\n此時期的整體主題與核心能量（2-3句）\n\n【工作 & 事業】\n機會、挑戰與適合的行動方向\n\n【感情 & 人際】\n感情狀態、關係互動的傾向\n\n【財務 & 資源】\n財務機遇或需注意的方向\n\n【健康 & 能量】\n身心狀態的提醒\n\n【本期建議】\n1-2個此時期最值得優先執行的具體行動\n\n語氣直接，給出真實、有深度的觀察，避免泛泛而談。${useVision?'\n\n圖片為印度星盤，請整合印度占星觀點。':''}`;

    let messages;
    if(useVision){
      messages = [{role:'user', content:[
        {type:'text', text:promptText},
        ...imgs.map(src=>({type:'image_url', image_url:{url:src}}))
      ]}];
    } else {
      messages = [{role:'user', content:promptText}];
    }

    const result = await callGroq(messages, useVision);
    const forecasts = JSON.parse(localStorage.getItem(KEY_FORECAST)||'{}');
    forecasts[cacheKey] = {text:result, ts:Date.now()};
    localStorage.setItem(KEY_FORECAST, JSON.stringify(forecasts));

    const label = document.getElementById('forecast-period-label');
    label.textContent = selMonth ? `${selYear}年 ${MONTHS[selMonth-1]}` : `${selYear}年`;
    document.getElementById('forecast-out').innerHTML = esc(result).replace(/【([^】]+)】/g,'<strong>【$1】</strong>').replace(/\n/g,'<br>');
    document.getElementById('forecast-result').style.display='block';
    renderMonthGrid();
  }catch(e){
    alert('生成失敗：'+e.message);
  }finally{
    loading.style.display='none';
  }
}

function regenForecast(){
  if(!selYear) return;
  const key = selMonth ? `${selYear}_${selMonth}` : String(selYear);
  const forecasts = JSON.parse(localStorage.getItem(KEY_FORECAST)||'{}');
  delete forecasts[key];
  localStorage.setItem(KEY_FORECAST, JSON.stringify(forecasts));
  document.getElementById('forecast-result').style.display='none';
  genForecast(key);
}

function clearForecast(){
  if(!selYear) return;
  const key = selMonth ? `${selYear}_${selMonth}` : String(selYear);
  const forecasts = JSON.parse(localStorage.getItem(KEY_FORECAST)||'{}');
  delete forecasts[key];
  localStorage.setItem(KEY_FORECAST, JSON.stringify(forecasts));
  document.getElementById('forecast-result').style.display='none';
  renderMonthGrid();
}

// ══ CHAT ══
function loadChatHistory(){
  try{ chatHistory = JSON.parse(localStorage.getItem(KEY_CHAT)||'[]'); }
  catch(e){ chatHistory = []; }
  renderChatMessages();
}

function saveChatHistory(){
  const trimmed = chatHistory.slice(-40);
  localStorage.setItem(KEY_CHAT, JSON.stringify(trimmed));
}

function renderChatMessages(){
  const container = document.getElementById('chat-messages');
  const sysMsg = '<div class="msg sys">對話上下文包含你的完整星盤資料。直接提問即可。</div>';
  container.innerHTML = sysMsg + chatHistory.map(m=>`
    <div class="msg ${m.role==='user'?'user':'ai'}">${
      esc(m.content).replace(/【([^】]+)】/g,'<strong>【$1】</strong>').replace(/\n/g,'<br>')
    }</div>`).join('');
  container.scrollTop = container.scrollHeight;
}

async function sendChat(){
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  if(!hasChart()){ alert('請先在設定頁貼入星盤資料'); return; }

  input.value = '';
  const btn = document.getElementById('chat-send');
  btn.disabled = true; btn.textContent = '…';

  chatHistory.push({role:'user', content:text});
  renderChatMessages();

  try{
    const name = getName();
    const ctx = chartContext();
    const imgs = getImages();
    const useVision = imgs.length > 0 && chatHistory.length === 1;

    const systemMsg = {role:'system', content:`你是 ${name} 的專屬占星師顧問。\n以下是她的完整星盤資料：\n${ctx}\n\n請用繁體中文回答，給出針對星盤特質的具體觀察，不說泛泛廢話。回答簡明有深度。`};

    let messages = [systemMsg, ...chatHistory.map(m=>({role:m.role, content:m.content}))];

    if(useVision && imgs.length){
      const lastMsg = messages[messages.length-1];
      messages[messages.length-1] = {
        role: 'user',
        content: [
          {type:'text', text: lastMsg.content + '\n\n（圖片為印度星盤，請參考）'},
          ...imgs.map(src=>({type:'image_url', image_url:{url:src}}))
        ]
      };
    }

    const result = await callGroq(messages, useVision);
    chatHistory.push({role:'assistant', content:result});
    saveChatHistory();
    renderChatMessages();
  }catch(e){
    chatHistory.push({role:'assistant', content:'生成失敗：'+e.message});
    renderChatMessages();
  }finally{
    btn.disabled=false; btn.textContent='送出';
  }
}

function chatKeydown(e){
  if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){
    e.preventDefault();
    sendChat();
  }
}

function clearChat(){
  if(!confirm('確定清除對話記錄？')) return;
  chatHistory=[];
  localStorage.removeItem(KEY_CHAT);
  renderChatMessages();
}

// ── Util ──
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── Init ──
loadSettingForm();
loadChatHistory();
</script>
